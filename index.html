// CLIENTEAPP — con multi-bici (Opzione B)
// ═══════════════════════════════════════════════════════
function ClienteApp({ user, onLogout, lang, setLang, t }) {
  const [allBikes, setAllBikes] = React.useState(initBikes);
  const [activeBikeIds, setActiveBikeIds] = React.useState([]);

  // Carica bici real-time da Firebase (bikes collection)
  React.useEffect(()=>{
    const load = async () => {
      try {
        await waitFB();
        const {collection, onSnapshot} = window.firebaseFunctions;
        onSnapshot(collection(window.firebaseDb, "bikes"), snap => {
          if (snap.empty) return; // usa initBikes se non ci sono dati
          const fbBikes = snap.docs.map(d => {
            const data = d.data();
            const pedId = d.id; // es. PED027
            const paId = pedId.replace('PED', 'PA-0').replace('PA-0', 'PA-'); // PED027 → PA-027
            // Normalizza: PED027 → PA-027
            const normalizedId = 'PA-' + pedId.replace('PED','').padStart(3,'0');
            const existing = initBikes.find(b => b.id === normalizedId);
            return {
              id: normalizedId,
              battery: data.batteryPercent || data.battery || existing?.battery || 50,
              status: data.locked === false ? "Disponibile" : (existing?.status || "Disponibile"),
              odometer: existing?.odometer || 0,
              zone: existing?.zone || "Castiglione",
              model: existing?.model || "City Comfort",
              lat: data.lat || existing?.lat || 43.15,
              lng: data.lng || existing?.lng || 12.08,
              note: existing?.note || "",
              lastMaint: existing?.lastMaint || "",
              checks: existing?.checks || {},
              online: data.online || false,
              speed: data.speed || 0,
            };
          });
          setAllBikes(fbBikes);
        });
      } catch(e) { console.error("Errore caricamento bici:", e); }
    };
    load();
  },[]);
  const [tab, setTab] = React.useState("mappa");
  const [selectedBike, setSelectedBike] = React.useState(null);
  const [selectedBikes, setSelectedBikes] = React.useState([]);
  const [showPlan, setShowPlan] = React.useState(false);
  const [plan, setPlan] = React.useState("minuti");
  const [showPayment, setShowPayment] = React.useState(false);
  const [riding, setRiding] = React.useState(false);
  const [confirmed, setConfirmed] = React.useState([]);
  const [currentRideIds, setCurrentRideIds] = React.useState([]);
  const [showSummary, setShowSummary] = React.useState(false);
  const [rideSummary, setRideSummary] = React.useState(null);
  const [feedback, setFeedback] = React.useState(null); // 'up' | 'down'
  const [feedbackProblems, setFeedbackProblems] = React.useState([]);
  const [feedbackNote, setFeedbackNote] = React.useState("");
  const [feedbackSent, setFeedbackSent] = React.useState(false);
  const PROBLEMI = ["🚲 Ruota sgonfia","⛓️ Catena a terra","🦶 Pedale lento","🔧 Ruota lesionata","⚡ Pedalata assistita non funzionante","💺 Seggiolino danneggiato","💰 Troppo costosa","🧹 Bicicletta sporca"];
  const [showQRScanner, setShowQRScanner] = React.useState(false);
  const [addingBike, setAddingBike] = React.useState(false);
  const [restoringRide, setRestoringRide] = React.useState(true);
  const [restoredElapsed, setRestoredElapsed] = React.useState(0); // controlla corsa attiva al login
  const qrIntervalRef = React.useRef(null);
  const [clientZones, setClientZones] = React.useState([]);
  const [userPos, setUserPos] = React.useState(null);

  const [bikeFilter, setBikeFilter] = React.useState("tutte");
  const [mtbBikesMap, setMtbBikesMap] = React.useState([]);

  // Carica MTB per la mappa (dopo autenticazione)
  React.useEffect(()=>{
    if (!user?.uid) return;
    const load = async () => {
      try {
        await waitFB();
        const {collection, getDocs} = window.firebaseFunctions;
        const snap = await getDocs(collection(window.firebaseDb, "mtbBikers"));
        const mtbs = snap.docs
          .map(d=>({id:d.id,...d.data()}))
          .filter(b=>b.status==="Disponibile")
          .map(b=>({...b, lat:b.lat||43.1208, lng:b.lng||11.9847}));
        console.log("🏔️ MTBmap cliente:", mtbs.length, mtbs.map(b=>b.id));
        setMtbBikesMap(mtbs);
      } catch(e) { console.error("Errore MTB mappa:", e.code, e.message); }
    };
    load();
  },[user?.uid]);

  // Bici disponibili = non in corsa da altri utenti
  const bikes = allBikes.filter(b => b.status==="Disponibile" && !activeBikeIds.includes(b.id));

  React.useEffect(()=>{ if (!navigator.geolocation) return; navigator.geolocation.watchPosition(pos=>{ setUserPos({lat:pos.coords.latitude,lng:pos.coords.longitude}); window._userPosition={lat:pos.coords.latitude,lng:pos.coords.longitude}; },()=>{},{enableHighAccuracy:true}); 
    // Salva posizione apertura app per heatmap
    navigator.geolocation.getCurrentPosition(async pos => {
      try {
        await waitFB();
        const {collection, addDoc} = window.firebaseFunctions;
        if (user?.uid) await addDoc(collection(window.firebaseDb,"appOpens"),{
          lat: pos.coords.latitude, lng: pos.coords.longitude,
          userId: user.uid, ts: new Date().toISOString(),
          country: navigator.language||"", ua: navigator.userAgent.slice(0,80)
        });
      } catch(e){}
    },()=>{},{enableHighAccuracy:false});
  },[]);

  React.useEffect(()=>{
    const load=async()=>{ 
      try { 
        await waitFB(); 
        const {doc,getDoc}=window.firebaseFunctions; 
        const snap=await getDoc(doc(window.firebaseDb,"config","zones")); 
        const zones = snap.exists() && (snap.data().zones||[]).length>0 ? snap.data().zones : DEFAULT_ZONES;
        setClientZones(zones); 
        window._clientZones = zones;
      } catch(e){ 
        setClientZones(DEFAULT_ZONES); 
        window._clientZones = DEFAULT_ZONES;
      } 
    };
    window._clientZones = DEFAULT_ZONES;
    load();
  },[]);

  React.useEffect(()=>{ window._clientZones = clientZones; },[clientZones]);
  React.useEffect(()=>{
    const load = async () => {
      await waitFB();
      const {collection, onSnapshot} = window.firebaseFunctions;
      onSnapshot(collection(window.firebaseDb, "bikesStatus"), snap => {
        const active = snap.docs
          .filter(d => d.data().inUse === true)
          .map(d => d.id); // id è bikeId tipo PA-027
        setActiveBikeIds(active);
      });
    };
    load();
  },[]);

  // Recupera corsa attiva al login
  React.useEffect(()=>{
    // ── Gestione ritorno da Stripe Checkout ──────────────────────────────────
    const urlParams = new URLSearchParams(window.location.search);
    const checkoutSuccess = urlParams.get('checkout_success');
    const checkoutCancelled = urlParams.get('checkout_cancelled');

    if (checkoutCancelled) {
      window.history.replaceState({}, '', '/');
      setRestoringRide(false);
      return;
    }

    if (checkoutSuccess) {
      window.history.replaceState({}, '', '/');
      // Funzione async per gestire il ritorno dal checkout
      const handleCheckoutReturn = async () => {
        const pending = sessionStorage.getItem('pendingCheckout');
        if (!pending) { setRestoringRide(false); return; }
        try {
          const { sessionId, bikeIds, plan, amount } = JSON.parse(pending);
          sessionStorage.removeItem('pendingCheckout');
          const res = await fetch('https://web-production-eafa5.up.railway.app/checkout-status', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ sessionId })
          });
          const data = await res.json();
          if (data.paid) {
            await waitFB();
            const {collection,addDoc} = window.firebaseFunctions;
            const bks = bikeIds.map(id => {
              const found = initBikes.find(b => b.id === id);
              return found || {id, zone:'', battery:80, status:'Disponibile', lat:43.15, lng:12.08};
            });
            const rideIds = [];
            for (const bike of bks) {
              const rideDoc = await addDoc(collection(window.firebaseDb,'rides'), {
                bikeId: bike.id, userId: user.uid||'',
                userName: `${user.nome||''} ${user.cognome||''}`.trim()||'Cliente',
                userEmail: user.email||'', zone: bike.zone, plan,
                status: 'In corso', startTime: new Date().toISOString(),
                track: [], cost: 0, groupSize: bks.length,
                paymentIntentId: data.paymentIntentId||null,
                sessionId,
              });
              rideIds.push({bikeId: bike.id, rideId: rideDoc.id});
              await sendBikeCommand(bike.id, 'unlock');
              await sendBikeCommand(bike.id, 'gps_high');
              await setBikeInUse(bike.id, true);
            }
            setCurrentRideIds(rideIds);
            setConfirmed(bks);
            setPlan(plan);
            setRiding(true);
          }
        } catch(e) { console.error('Errore verifica checkout:', e); }
        setRestoringRide(false);
      };
      handleCheckoutReturn();
      return;
    }
    // ─────────────────────────────────────────────────────────────────────────

    const restore = async () => {
      console.log("🔄 Restore avviato, user.uid:", user?.uid);
      try {
        await waitFB();
        const {collection, getDocs} = window.firebaseFunctions;
        const ridesSnap = await getDocs(collection(window.firebaseDb, "rides"));
        console.log("📦 Tot rides:", ridesSnap.docs.length);
        const allActiveRides = ridesSnap.docs
          .filter(d => {
            const data = d.data();
            return data.status === "In corso" && data.userId === user.uid;
          })
          .map(d => ({id: d.id, ...d.data()}));
        // Deduplica per bikeId — tieni la più recente
        const seenBikes = new Set();
        const activeRides = allActiveRides
          .sort((a,b) => new Date(b.startTime||0) - new Date(a.startTime||0))
          .filter(r => { if(seenBikes.has(r.bikeId)) return false; seenBikes.add(r.bikeId); return true; });
        console.log("🔍 Corse attive trovate:", activeRides.length);
        if (activeRides.length > 0) {
          const rideIds = activeRides.map(r => ({bikeId: r.bikeId, rideId: r.id}));
          const bks = activeRides.map(r => {
            const found = initBikes.find(b => b.id === r.bikeId);
            return found || {id: r.bikeId, zone: r.zone||"", battery: 80, status: "Disponibile", lat: 43.15, lng: 12.08};
          });
          setCurrentRideIds(rideIds);
          setConfirmed(bks);
          setPlan(activeRides[0].plan || "minuti");
          setRestoredElapsed(new Date(activeRides[0].startTime).getTime());
          setRiding(true);
        }
      } catch(e) { console.error("Errore ripristino corsa:", e); }
      setRestoringRide(false);
    };
    if (user?.uid) restore();
    else setRestoringRide(false);
  },[]);

  // QR scanner — usato sia per prima bici che per aggiungerne altre
  const startQRScanner = (isAdding=false) => {
    setAddingBike(isAdding);
    setShowQRScanner(true);
  };

  React.useEffect(() => {
    if (!showQRScanner) {
      clearInterval(qrIntervalRef.current);
      const video=document.getElementById("qrVideo");
      if(video&&video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
      return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
      const video=document.getElementById("qrVideo"); if(video){video.srcObject=stream;video.play();}
      qrIntervalRef.current=setInterval(()=>{
        const video=document.getElementById("qrVideo"); const canvas=document.getElementById("qrCanvas");
        if(!video||!canvas||!window.jsQR) return;
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=window.jsQR(imageData.data,imageData.width,imageData.height);
        if(code){
          try{
            const url=new URL(code.data); const bikeId=url.searchParams.get("bike");
            if(bikeId){
              const bike=bikes.find(b=>b.id===bikeId);
              clearInterval(qrIntervalRef.current); stream.getTracks().forEach(t=>t.stop()); setShowQRScanner(false);
              if(!bike){alert(`Bici ${bikeId} non disponibile`);return;}
              if(addingBike){
                // Aggiunge al gruppo
                if(selectedBikes.find(b=>b.id===bikeId)){alert(`Bici ${bikeId} già aggiunta`);return;}
                if(selectedBikes.length>=4){alert(t('maxBikes'));return;}
                setSelectedBikes(prev=>[...prev,bike]);
              } else {
                setSelectedBike(bike); setSelectedBikes([bike]); setShowPlan(true);
              }
            }
          }catch(e){}
        }
      },500);
    }).catch(()=>alert("Fotocamera non accessibile"));
  },[showQRScanner]);

  React.useEffect(() => {
    const bikeId=getUrlBike();
    if(bikeId){ const bike=bikes.find(b=>b.id===bikeId); if(bike){setSelectedBike(bike);setSelectedBikes([bike]);setShowPlan(true);} else alert(`Bici ${bikeId} non disponibile`); window.history.replaceState({},"","/"); }
  },[]);

  const handleBikeClick=(bike)=>{ setSelectedBike(bike); setSelectedBikes([bike]); setShowPlan(true); };

  // ── CODICI PROMO ──
  const [promoCode, setPromoCode] = React.useState("");
  const [promoApplied, setPromoApplied] = React.useState(null); // { code, type, hotelOption, hotelName }
  const [promoError, setPromoError] = React.useState("");
  const [promoLoading, setPromoLoading] = React.useState(false);

  const applyPromo = async () => {
    const code = promoCode.trim().toUpperCase();
    if (!code) return;
    setPromoLoading(true); setPromoError(""); setPromoApplied(null);
    try {
      await waitFB();
      const {doc, getDoc} = window.firebaseFunctions;
      const snap = await getDoc(doc(window.firebaseDb, "promoCodes", code));
      if (!snap.exists()) { setPromoError(t('promoInvalid')); setPromoLoading(false); return; }
      const data = snap.data();
      // Controlla scadenza
      if (data.expiresAt) {
        const exp = new Date(data.expiresAt);
        if (exp < new Date()) { setPromoError(t('promoExpired')); setPromoLoading(false); return; }
      }
      if (!data.active) { setPromoError(t('promoInvalid')); setPromoLoading(false); return; }
      setPromoApplied({ code, type: data.type, hotelOption: data.hotelOption, hotelName: data.hotelName || "" });
    } catch(e) { setPromoError(t('promoInvalid')); }
    setPromoLoading(false);
  };

  const removePromo = () => { setPromoApplied(null); setPromoCode(""); setPromoError(""); };

  // Calcola importo effettivo in base al promo
  const nBikes = selectedBikes.length || 1;
  const getEffectiveAmount = () => {
    const base = plan==="settimana" ? TARIFFA_SETTIMANALE*nBikes : plan==="giornata" ? TARIFFA_GIORNATA*nBikes : SBLOCCO*nBikes;
    if (!promoApplied) return base;
    if (promoApplied.type === "dipendente" || promoApplied.type === "famiglia" || promoApplied.type === "struttura" || (promoApplied.type === "hotel" && promoApplied.hotelOption === "bonifico")) return 0;
    if (promoApplied.type === "hotel") {
      if (promoApplied.hotelOption === "scontata") return 16 * nBikes;
      if (promoApplied.hotelOption === "cashback") return 18.90 * nBikes;
    }
    return base;
  };
  const payAmount = getEffectiveAmount();
  const isFree = promoApplied && (promoApplied.type==="dipendente"||promoApplied.type==="famiglia"||promoApplied.type==="struttura"||(promoApplied.type==="hotel"&&promoApplied.hotelOption==="bonifico"));

  const handlePaySuccess=async(paymentMethodId)=>{
    setShowPayment(false); setShowPlan(false);
    console.log("💳 handlePaySuccess chiamato");
    try {
      await waitFB();
      const {collection,addDoc,doc,updateDoc,getDoc}=window.firebaseFunctions;
      const bks=selectedBikes.length>0?selectedBikes:[selectedBike];
      const rideIds=[];
      const hotelCashback = promoApplied?.type==="hotel" && promoApplied?.hotelOption==="cashback" ? 3 : 0;
      for(const bike of bks){
        const rideDoc=await addDoc(collection(window.firebaseDb,"rides"),{
          bikeId:bike.id, userId:user.uid||"",
          userName:`${user.nome||""} ${user.cognome||""}`.trim()||"Cliente",
          userEmail:user.email||"", zone:bike.zone, plan,
          status:"In corso", startTime:new Date().toISOString(),
          track:[], cost:0, groupSize:bks.length,
          promoCode: promoApplied?.code||null,
          promoType: promoApplied?.type||null,
          hotelName: promoApplied?.hotelName||null,
          hotelOption: promoApplied?.hotelOption||null,
          hotelCashback,
          isFree: isFree||false,
          paymentMethodId: paymentMethodId||null,
        });
        rideIds.push({bikeId:bike.id,rideId:rideDoc.id});
        console.log(`✅ Ride creata: ${rideDoc.id} per ${bike.id}, status: In corso`);
      }
      // Aggiorna rimborso hotel su Firebase
      if (hotelCashback > 0 && promoApplied?.code) {
        try {
          const codeRef = doc(window.firebaseDb,"promoCodes",promoApplied.code);
          const codeSnap = await getDoc(codeRef);
          const current = codeSnap.data()?.totalCashback || 0;
          const uses = codeSnap.data()?.totalUses || 0;
          await updateDoc(codeRef, { totalCashback: current + hotelCashback * bks.length, totalUses: uses + bks.length });
        } catch(e){}
      }
      setCurrentRideIds(rideIds);
      setConfirmed(bks);
      setRiding(true); // Mostra timer SUBITO senza aspettare i comandi IoT
      // Sblocca tutte le bici in parallelo in background
      Promise.all(bks.map(bike => Promise.all([
        sendBikeCommand(bike.id, 'unlock'),
        sendBikeCommand(bike.id, 'gps_high'),
        setBikeInUse(bike.id, true),
      ]))).catch(e=>console.error('Errore comandi IoT:', e));
    } catch(e){ console.error('Errore handlePaySuccess:', e); }
  };

  // ── COMANDI IoT ──
  const sendBikeCommand = async (bikeId, type) => {
    try {
      // Se Firebase già pronto non aspettare
      if (!window.firebaseDb || !window.firebaseFunctions) await waitFB();
      const {collection, addDoc} = window.firebaseFunctions;
      const pedId = 'PED' + bikeId.replace('PA-','').padStart(3,'0');
      const cmdRef = collection(window.firebaseDb, 'bikes', pedId, 'commands');
      const result = await addDoc(cmdRef, {
        type, status: 'pending', createdAt: new Date().toISOString()
      });
      console.log(`✅ Comando ${type} inviato a ${pedId}, doc:`, result.id);
    } catch(e) {
      console.error('❌ Errore comando IoT:', e.code, e.message);
    }
  };

  const setBikeInUse = async (bikeId, inUse) => {
    try {
      await waitFB();
      const {doc, setDoc} = window.firebaseFunctions;
      await setDoc(doc(window.firebaseDb, 'bikesStatus', bikeId), {
        inUse, userId: inUse ? (user.uid||"") : null, updatedAt: new Date().toISOString()
      }, {merge: true});
    } catch(e) { console.error('Errore setBikeInUse:', e); }
  };

  const handleFreeStart = async () => {
    setShowPlan(false);
    setRiding(true);
    try {
      await waitFB();
      const {collection,addDoc}=window.firebaseFunctions;
      const bks=selectedBikes.length>0?selectedBikes:[selectedBike];
      const rideIds=[];
      for(const bike of bks){
        const rideDoc=await addDoc(collection(window.firebaseDb,"rides"),{
          bikeId:bike.id, userId:user.uid||"",
          userName:`${user.nome||""} ${user.cognome||""}`.trim()||"Cliente",
          userEmail:user.email||"", zone:bike.zone, plan:"giornata",
          status:"In corso", startTime:new Date().toISOString(),
          track:[], cost:0, groupSize:bks.length,
          promoCode:promoApplied?.code||null, promoType:promoApplied?.type||null, isFree:true,
        });
        rideIds.push({bikeId:bike.id,rideId:rideDoc.id});
        await sendBikeCommand(bike.id, 'unlock');
        await sendBikeCommand(bike.id, 'gps_high');
        await setBikeInUse(bike.id, true);
      }
      setCurrentRideIds(rideIds);
      setConfirmed(bks);
      setRiding(true); // Mostra timer SUBITO
      // Comandi IoT in parallelo in background
      Promise.all(bks.map(bike => Promise.all([
        sendBikeCommand(bike.id, 'unlock'),
        sendBikeCommand(bike.id, 'gps_high'),
        setBikeInUse(bike.id, true),
      ]))).catch(e=>console.error('Errore comandi IoT:', e));
    } catch(e){console.error(e); setConfirmed(selectedBikes.length>0?selectedBikes:[selectedBike]);}
  };

  const handleEndRide=(secs,cost,bikeId)=>{
    sendBikeCommand(bikeId, 'lock');
    sendBikeCommand(bikeId, 'gps_normal'); // Ripristina frequenza normale
    setBikeInUse(bikeId, false);
    setConfirmed(prev=>{
      const remaining=prev.filter(b=>b.id!==bikeId);
      if(remaining.length===0){
        setRiding(false);
        setShowSummary(true);
        setRideSummary({bikes:prev,secs,cost});
      }
      return remaining;
    });
    setCurrentRideIds(prev=>prev.filter(r=>r.bikeId!==bikeId));
  };

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.deepBlue} 0%,#034a6e 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <style>{css}</style>
      <div style={{width:390,minHeight:844,background:C.bgLight,borderRadius:40,border:`6px solid ${C.deepBlue}`,overflow:"hidden",position:"relative",display:"flex",flexDirection:"column",boxShadow:`0 40px 80px rgba(2,48,71,0.5)`}}>

        {/* Caricamento ripristino corsa */}
        {restoringRide&&(
          <div style={{position:"absolute",inset:0,background:C.deepBlue,zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <img src="https://www.pedalagilla.it/icons/icon-192x192.png" style={{width:100,height:100,objectFit:"contain",marginBottom:20}} alt="PedalAgilla"/>
            <p style={{color:C.skyBlue,fontSize:14,...ds}}>⏳ Caricamento...</p>
          </div>
        )}

        {/* QR Scanner */}
        {showQRScanner&&(
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.95)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <button onClick={()=>setShowQRScanner(false)} style={{position:"absolute",top:20,right:20,background:"none",border:"none",color:C.white,fontSize:28,cursor:"pointer"}}>{t('scanClose')}</button>
            {addingBike&&<div style={{position:"absolute",top:20,left:20,background:C.warmOrange,borderRadius:10,padding:"4px 12px"}}><p style={{color:C.white,fontSize:11,...ds,fontWeight:700,margin:0}}>➕ Aggiunta bici #{selectedBikes.length+1}</p></div>}
            <div style={{fontSize:60,marginBottom:20}}>📷</div>
            <p style={{color:C.white,fontSize:18,fontWeight:700,fontFamily:"Lora",marginBottom:8}}>{t('scanTitle')}</p>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,...ds,marginBottom:20,textAlign:"center",padding:"0 30px"}}>{t('scanDesc')}</p>
            <video id="qrVideo" style={{width:260,height:260,borderRadius:16,objectFit:"cover",border:`3px solid ${C.blueGreen}`,marginBottom:20}} autoPlay playsInline muted/>
            <canvas id="qrCanvas" style={{display:"none"}}/>
            <div style={{background:C.white,borderRadius:16,padding:16,width:260,textAlign:"center"}}>
              <p style={{color:C.deepBlue,fontSize:12,...ds,fontWeight:600,margin:"0 0 8px"}}>{t('scanManual')}</p>
              <input placeholder={t('scanPh')} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`2px solid ${C.blueGreen}`,fontSize:15,fontFamily:"'DM Sans'",color:C.deepBlue,textAlign:"center",textTransform:"uppercase"}}
                onChange={e=>{
                  const val=e.target.value.toUpperCase().trim();
                  const bike=bikes.find(b=>b.id===val);
                  if(bike){
                    setShowQRScanner(false);
                    if(addingBike){
                      if(selectedBikes.find(b=>b.id===val)){alert(`Bici ${val} già aggiunta`);return;}
                      if(selectedBikes.length>=4){alert(t('maxBikes'));return;}
                      setSelectedBikes(prev=>[...prev,bike]);
                    } else {
                      setSelectedBike(bike);setSelectedBikes([bike]);setShowPlan(true);
                    }
                  }
                }}/>
            </div>
          </div>
        )}

        {/* Timer corsa */}
        {riding&&confirmed&&confirmed.length>0&&(
          confirmed.length===1
            ?<RideTimer bike={confirmed[0]} plan={plan} user={user} rideId={currentRideIds[0]?.rideId} rideStartTime={restoredElapsed} onEnd={(s,c)=>handleEndRide(s,c,confirmed[0].id)} t={t} userPos={userPos}/>
            :<MultiRideTimer bikes={confirmed} plan={plan} user={user} rideIds={currentRideIds} onEnd={handleEndRide} t={t}/>
        )}

        {/* Riepilogo fine corsa */}
        {showSummary&&rideSummary&&(
          <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,overflowY:"auto",padding:24}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{width:80,height:80,borderRadius:40,background:`linear-gradient(135deg,${C.blueGreen},${C.deepBlue})`,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>🏁</div>
              <h2 style={{color:C.deepBlue,fontSize:22,fontWeight:700,fontFamily:"Lora",margin:"0 0 4px"}}>{t('rideComplete')}</h2>
              <p style={{color:"#888",fontSize:13,...ds}}>{t('thankYou')}</p>
            </div>
            <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:20,padding:20,marginBottom:16,textAlign:"center"}}>
              <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 4px",...ds,letterSpacing:2}}>{t('totalPaid')}</p>
              <p style={{color:C.sunYellow,fontSize:40,fontWeight:700,margin:0,...ds}}>€{rideSummary.cost.toFixed(2)}</p>
            </div>
            {(Array.isArray(rideSummary.bikes)?rideSummary.bikes:[rideSummary.bikes]).map(bike=>(
              <div key={bike.id} style={{display:"flex",justifyContent:"space-between",borderBottom:`1px solid ${C.skyBlue}20`,paddingBottom:10,marginBottom:10}}>
                <span style={{color:"#888",fontSize:13,...ds}}>{t('bikeLbl')}</span>
                <span style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:600}}>{bike.id} · {bike.zone}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",borderBottom:`1px solid ${C.skyBlue}20`,paddingBottom:10,marginBottom:16}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{t('durationLbl')}</span>
              <span style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:600}}>{Math.floor(rideSummary.secs/60)}{t('min')}</span>
            </div>

            {/* FEEDBACK */}
            {!feedbackSent ? (
              <div style={{background:C.white,borderRadius:20,padding:20,marginBottom:16,boxShadow:"0 2px 12px rgba(2,48,71,0.08)"}}>
                <p style={{color:C.deepBlue,fontSize:15,fontWeight:700,margin:"0 0 4px",fontFamily:"Lora",textAlign:"center"}}>Com'è andata la corsa?</p>
                <p style={{color:"#aaa",fontSize:12,...ds,textAlign:"center",margin:"0 0 16px"}}>How was your ride?</p>
                <div style={{display:"flex",gap:12,marginBottom:16,justifyContent:"center"}}>
                  <button onClick={()=>setFeedback("up")} style={{flex:1,background:feedback==="up"?C.blueGreen:`${C.blueGreen}15`,border:`2px solid ${feedback==="up"?C.blueGreen:C.skyBlue+"40"}`,borderRadius:16,padding:"18px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                    <span style={{fontSize:36}}>👍</span>
                    <span style={{color:feedback==="up"?C.white:C.blueGreen,fontSize:13,...ds,fontWeight:700}}>Ottima!</span>
                    <span style={{color:feedback==="up"?"rgba(255,255,255,0.7)":"#aaa",fontSize:10,...ds}}>Great!</span>
                  </button>
                  <button onClick={()=>setFeedback("down")} style={{flex:1,background:feedback==="down"?C.warmOrange:`${C.warmOrange}15`,border:`2px solid ${feedback==="down"?C.warmOrange:C.warmOrange+"40"}`,borderRadius:16,padding:"18px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
                    <span style={{fontSize:36}}>👎</span>
                    <span style={{color:feedback==="down"?C.white:C.warmOrange,fontSize:13,...ds,fontWeight:700}}>Problema</span>
                    <span style={{color:feedback==="down"?"rgba(255,255,255,0.7)":"#aaa",fontSize:10,...ds}}>Issue</span>
                  </button>
                </div>

                {/* Problemi specifici — solo se pollice giù */}
                {feedback==="down"&&(
                  <div>
                    <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 10px",...ds}}>Segnala il problema:</p>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
                      {PROBLEMI.map(p=>(
                        <button key={p} onClick={()=>setFeedbackProblems(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p])}
                          style={{background:feedbackProblems.includes(p)?C.warmOrange:`${C.warmOrange}10`,border:`1.5px solid ${feedbackProblems.includes(p)?C.warmOrange:C.warmOrange+"40"}`,borderRadius:20,padding:"6px 12px",color:feedbackProblems.includes(p)?C.white:C.warmOrange,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                          {p}
                        </button>
                      ))}
                    </div>
                    <textarea value={feedbackNote} onChange={e=>setFeedbackNote(e.target.value)}
                      placeholder="Altro problema... / Other issue..."
                      style={{width:"100%",padding:"10px 14px",borderRadius:12,border:`1.5px solid ${C.skyBlue}50`,fontSize:12,fontFamily:"'DM Sans'",color:C.deepBlue,background:C.white,minHeight:70,resize:"none",marginBottom:4}}/>
                  </div>
                )}

                <button onClick={async()=>{
                  if (!feedback) { setFeedbackSent(true); return; }
                  try {
                    await waitFB();
                    const {collection, addDoc} = window.firebaseFunctions;
                    const bikes = Array.isArray(rideSummary.bikes)?rideSummary.bikes:[rideSummary.bikes];
                    await addDoc(collection(window.firebaseDb,"feedback"),{
                      userId: user.uid,
                      userName: `${user.nome||""} ${user.cognome||""}`.trim(),
                      bikeId: bikes.map(b=>b.id).join(", "),
                      rating: feedback,
                      problems: feedbackProblems,
                      note: feedbackNote.trim(),
                      rideId: currentRideIds[0]?.rideId||null,
                      createdAt: new Date().toISOString(),
                    });
                  } catch(e){ console.error("Errore feedback:", e); }
                  setFeedbackSent(true);
                }} style={{width:"100%",background:feedback?`linear-gradient(90deg,${feedback==="up"?C.blueGreen:C.warmOrange},${C.deepBlue})`:`${C.deepBlue}20`,border:"none",borderRadius:14,padding:13,color:feedback?C.white:C.deepBlue,fontSize:14,...ds,fontWeight:700,cursor:"pointer",marginTop:4}}>
                  {feedback?"✅ Invia feedback":"⏭️ Salta"}
                </button>
              </div>
            ):(
              <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:16,padding:16,marginBottom:16,textAlign:"center"}}>
                <p style={{fontSize:28,margin:"0 0 6px"}}>🙏</p>
                <p style={{color:C.blueGreen,fontSize:14,fontWeight:700,margin:0,...ds}}>Grazie per il feedback!</p>
                <p style={{color:"#aaa",fontSize:12,...ds,margin:"4px 0 0"}}>Thank you for your feedback!</p>
              </div>
            )}

            <button onClick={()=>{setShowSummary(false);setRideSummary(null);setConfirmed([]);setSelectedBikes([]);setFeedback(null);setFeedbackProblems([]);setFeedbackNote("");setFeedbackSent(false);}} style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginTop:4}}>
              {t('backToMap')}
            </button>
          </div>
        )}

        {/* Schermata piano + selezione multi-bici */}
        {showPlan&&selectedBike&&!selectedBike.isMTB&&!riding&&!showSummary&&(
          <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:200,display:"flex",flexDirection:"column",overflowY:"auto"}}>
            {showPayment?(
              <>
                <div style={{background:C.deepBlue,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <button onClick={()=>setShowPayment(false)} style={{background:"none",border:"none",color:C.skyBlue,fontSize:22,cursor:"pointer"}}>←</button>
                  <p style={{color:C.white,fontSize:15,fontWeight:700,margin:0,fontFamily:"Lora"}}>{t('payment')}</p>
                  <div style={{width:30}}/>
                </div>
                <PaymentForm amount={payAmount} bike={selectedBikes.length>1?selectedBikes:selectedBike} plan={plan==="settimana"?t('planWeek')||"Settimana":plan==="giornata"?t('planDay'):t('planMinutes')} user={user} onSuccess={handlePaySuccess} onCancel={()=>setShowPayment(false)} t={t}/>
              </>
            ):(
              <>
                <div style={{background:C.deepBlue,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <button onClick={()=>{setShowPlan(false);setSelectedBikes([]);}} style={{background:"none",border:"none",color:C.skyBlue,fontSize:22,cursor:"pointer"}}>✕</button>
                  <p style={{color:C.white,fontSize:15,fontWeight:700,margin:0,fontFamily:"Lora"}}>
                    {selectedBikes.length>1?`🚲×${selectedBikes.length} Gruppo`:`🚲 ${selectedBike.id}`}
                  </p>
                  <div style={{width:30}}/>
                </div>
                <div style={{padding:20}}>

                  {/* Bici selezionate */}
                  {selectedBikes.map((bike,i)=>(
                    <div key={bike.id} style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:16,padding:14,marginBottom:10,display:"flex",gap:12,alignItems:"center"}}>
                      <div style={{fontSize:32}}>🚲</div>
                      <div style={{flex:1}}>
                        <p style={{color:C.white,fontSize:16,fontWeight:700,margin:0,fontFamily:"Lora"}}>{bike.id}</p>
                        <p style={{color:C.skyBlue,fontSize:12,margin:"2px 0 0",...ds}}>📍 {bike.zone} · ⚡ {bike.battery}%</p>
                      </div>
                      {i>0&&<button onClick={()=>setSelectedBikes(prev=>prev.filter(b=>b.id!==bike.id))}
                        style={{background:`${C.warmOrange}30`,border:"none",borderRadius:8,padding:"4px 10px",color:C.warmOrange,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                        {t('removeBike')}
                      </button>}
                    </div>
                  ))}

                  {/* Bottone aggiungi bici */}
                  {selectedBikes.length<4&&(
                    <button onClick={()=>startQRScanner(true)}
                      style={{width:"100%",background:`${C.blueGreen}15`,border:`2px dashed ${C.blueGreen}`,borderRadius:14,padding:12,color:C.blueGreen,fontSize:13,...ds,fontWeight:700,cursor:"pointer",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                      {t('addBike')}
                    </button>
                  )}
                  {selectedBikes.length>=4&&(
                    <div style={{background:`${C.sunYellow}15`,border:`1px solid ${C.sunYellow}`,borderRadius:10,padding:"8px 14px",marginBottom:14,textAlign:"center"}}>
                      <p style={{color:"#b38600",fontSize:12,...ds,fontWeight:600,margin:0}}>⚠️ {t('maxBikes')}</p>
                    </div>
                  )}

                  {/* Selezione piano */}
                  {[
                    {id:"minuti", icon:"⏱️", label:t('planMinutes')||"Al minuto",
                     price:`€${SBLOCCO.toFixed(2)}`, unit:"sblocco",
                     details:[`€${TARIFFA_MIN}/min in corsa`,`€${TARIFFA_PAUSA}/min in pausa`],
                     tag:null},
                    {id:"giornata", icon:"☀️", label:t('planDay')||"Giornata intera",
                     price:`€${(TARIFFA_GIORNATA*nBikes).toFixed(2)}`, unit:"tutto il giorno",
                     details:["Sblocco incluso","Pausa gratuita"],
                     tag:"PIÙ USATA"},
                    {id:"settimana", icon:"🗓️", label:t('planWeek')||"Settimana",
                     price:`€${(TARIFFA_SETTIMANALE*nBikes).toFixed(2)}`, unit:"7 giorni",
                     details:["Uso illimitato","Pausa gratuita"],
                     tag:"CONVENIENTE"},
                  ].map(p=>(
                    <div key={p.id} onClick={()=>setPlan(p.id)}
                      style={{background:plan===p.id?C.deepBlue:C.white,borderRadius:14,padding:"12px 14px",marginBottom:8,cursor:"pointer",border:`2px solid ${plan===p.id?C.deepBlue:C.skyBlue+"30"}`,position:"relative",overflow:"hidden"}}>
                      {p.tag&&<div style={{position:"absolute",top:0,right:0,background:plan===p.id?C.blueGreen:C.sunYellow,padding:"2px 10px",borderRadius:"0 12px 0 10px"}}><span style={{color:plan===p.id?C.white:C.deepBlue,fontSize:9,...ds,fontWeight:700}}>{p.tag}</span></div>}
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <span style={{fontSize:26}}>{p.icon}</span>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:4}}>
                            <p style={{color:plan===p.id?C.white:C.deepBlue,fontWeight:700,fontSize:15,margin:0,fontFamily:"Lora"}}>{p.label}</p>
                            <p style={{color:plan===p.id?C.sunYellow:C.blueGreen,fontWeight:700,fontSize:16,margin:0,...ds}}>{p.price}</p>
                            <p style={{color:plan===p.id?"rgba(255,255,255,0.6)":"#aaa",fontSize:10,margin:0,...ds}}>{p.unit}</p>
                          </div>
                          <div style={{display:"flex",gap:10}}>
                            {p.details.map(d=>(
                              <span key={d} style={{color:plan===p.id?"rgba(255,255,255,0.75)":"#888",fontSize:10,...ds}}>• {d}</span>
                            ))}
                          </div>
                        </div>
                        {plan===p.id&&<div style={{width:22,height:22,borderRadius:11,background:C.blueGreen,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:13,flexShrink:0}}>✓</div>}
                      </div>
                    </div>
                  ))}

                  {/* Distanza a piedi — usa posizione aggiornata da Firebase */}
                  {userPos&&selectedBike&&selectedBikes.length===1&&(()=>{
                    // Cerca la bici aggiornata in allBikes (con posizione reale da Firebase)
                    const liveBike = allBikes.find(b=>b.id===selectedBike.id) || selectedBike;
                    const bikeLat = liveBike.lat;
                    const bikeLng = liveBike.lng;
                    // Calcola solo se le coordinate sono valide e non di default
                    if (!bikeLat || !bikeLng || (bikeLat===43.0950&&bikeLng===12.0650)) return null;
                    const R=6371000;
                    const dLat=(bikeLat-userPos.lat)*Math.PI/180;
                    const dLng=(bikeLng-userPos.lng)*Math.PI/180;
                    const a=Math.sin(dLat/2)**2+Math.cos(userPos.lat*Math.PI/180)*Math.cos(bikeLat*Math.PI/180)*Math.sin(dLng/2)**2;
                    const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
                    // Nascondi se distanza > 50km (probabilmente coordinate sbagliate)
                    if (d > 50000) return null;
                    const mins=Math.round(d/80);
                    const distText=d<1000?`${Math.round(d)}m · ~${mins} min`:`${(d/1000).toFixed(1)}km · ~${mins} min`;
                    return(
                      <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:12,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:20}}>🚶</span>
                        <div>
                          <p style={{color:C.blueGreen,fontSize:13,fontWeight:700,margin:0,...ds}}>{distText}</p>
                          <p style={{color:"#aaa",fontSize:11,margin:0,...ds}}>{t('walkDistance')}</p>
                        </div>
                      </div>
                    );
                  })()}

                  {/* Totale gruppo se >1 bici */}
                  {nBikes>1&&(
                    <div style={{background:`${C.deepBlue}08`,border:`1px solid ${C.deepBlue}20`,borderRadius:12,padding:"10px 14px",marginBottom:10}}>
                      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>{t('groupTotal')} ({nBikes} 🚲)</p>
                      <p style={{color:C.blueGreen,fontSize:18,fontWeight:700,margin:0,...ds}}>€{payAmount.toFixed(2)}</p>
                    </div>
                  )}

                  {/* CAMPO CODICE PROMOZIONALE */}
                  {!promoApplied ? (
                    <div style={{background:`${C.skyBlue}15`,border:`1.5px solid ${C.skyBlue}50`,borderRadius:14,padding:14,marginBottom:12}}>
                      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 8px",...ds}}>🎟️ {t('promoLabel')}</p>
                      <div style={{display:"flex",gap:8}}>
                        <input
                          value={promoCode}
                          onChange={e=>{setPromoCode(e.target.value.toUpperCase());setPromoError("");}}
                          placeholder={t('promoPlaceholder')}
                          style={{flex:1,padding:"10px 12px",borderRadius:10,border:`1.5px solid ${C.skyBlue}`,fontSize:14,fontFamily:"'DM Sans'",color:C.deepBlue,background:C.white,textTransform:"uppercase",letterSpacing:2}}
                        />
                        <button onClick={applyPromo} disabled={promoLoading||!promoCode.trim()}
                          style={{background:promoCode.trim()?C.deepBlue:"#ccc",border:"none",borderRadius:10,padding:"10px 16px",color:C.white,fontSize:13,...ds,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                          {promoLoading?"...":t('promoApply')}
                        </button>
                      </div>
                      {promoError&&<p style={{color:C.warmOrange,fontSize:12,margin:"6px 0 0",...ds}}>⚠️ {promoError}</p>}
                    </div>
                  ) : (
                    <div style={{background: isFree ? "#E8F5E9" : "#E3F2FD", border:`2px solid ${isFree?C.blueGreen:"#2196F3"}`,borderRadius:14,padding:14,marginBottom:12}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                        <div>
                          <p style={{color:isFree?C.blueGreen:"#1565C0",fontSize:13,fontWeight:700,margin:"0 0 2px",...ds}}>
                            {isFree ? ((promoApplied.type==="hotel"&&promoApplied.hotelOption==="bonifico") ? "🏨 Convenzione hotel" : "🎉 "+t('promoFreeRide')) : promoApplied.type==="hotel" ? "🏨 Tariffa hotel convenzionata" : "🏨 "+t('promoHotelDiscount')}
                          </p>
                          <p style={{color:"#555",fontSize:11,...ds,margin:0}}>
                            🎟️ {promoApplied.code}
                            {promoApplied.hotelName ? ` · ${promoApplied.hotelName}` : ""}
                          </p>
                          {promoApplied.type==="hotel" && promoApplied.hotelOption==="scontata" && (
                            <p style={{color:"#1565C0",fontSize:12,...ds,margin:"4px 0 0",fontWeight:600}}>€16/giornata × {nBikes} = €{payAmount.toFixed(2)}</p>
                          )}
                          {promoApplied.type==="hotel" && promoApplied.hotelOption==="cashback" && (
                            <p style={{color:"#1565C0",fontSize:12,...ds,margin:"4px 0 0",fontWeight:600}}>€18,90/giornata · pausa gratuita</p>
                          )}
                          {promoApplied.type==="hotel" && promoApplied.hotelOption==="bonifico" && (
                            <p style={{color:"#2E7D32",fontSize:12,...ds,margin:"4px 0 0",fontWeight:600}}>✅ Incluso nella tua struttura</p>
                          )}
                        </div>
                        <button onClick={removePromo} style={{background:"none",border:"none",color:"#aaa",fontSize:18,cursor:"pointer",padding:"0 4px"}}>✕</button>
                      </div>
                    </div>
                  )}

                  {/* BOTTONE CONTINUA / PARTI GRATIS */}
                  {isFree ? (
                    <button onClick={handleFreeStart} style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},#027a4e)`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginTop:4}}>
                      {(promoApplied?.type==="struttura"||(promoApplied?.type==="hotel"&&promoApplied?.hotelOption==="bonifico"))?"🏨 Attiva noleggio convenzionato":"🎉 "+t('promoStartFree')}
                    </button>
                  ) : (
                    <button onClick={()=>setShowPayment(true)} style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginTop:4}}>
                      {t('continueBtn')} — €{payAmount.toFixed(2)}
                    </button>
                  )}
                </div>
              </>
            )}
          </div>
        )}

        {/* MAPPA */}
        {tab==="mappa"&&(
          <div style={{flex:1,position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,zIndex:10,background:"linear-gradient(180deg,rgba(2,48,71,0.9) 0%,transparent 100%)",padding:"12px 18px 40px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div>
                  <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>{t('hiUser')} {user.nome?.toUpperCase()}!</p>
                  <h1 style={{color:C.white,fontSize:16,fontWeight:700,margin:"2px 0 0",fontFamily:"Lora"}}>PedalAgilla 🌊</h1>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <div style={{background:"rgba(33,158,188,0.85)",borderRadius:10,padding:"5px 10px"}}>
                    <span style={{color:C.white,fontSize:11,...ds,fontWeight:600}}>{bikes.length} 🚲 · {mtbBikesMap.length} 🏔️</span>
                  </div>
                  <button onClick={onLogout} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:10,padding:"6px 12px",color:C.white,fontSize:11,...ds,cursor:"pointer"}}>{t('logout')}</button>
                </div>
              </div>
              {/* Filtri tipo bici */}
              <div style={{display:"flex",gap:6}}>
                {[["tutte","🚲+🏔️","Tutte"],["ebike","⚡","E-Bike"],["mtb","🏔️","MTB"]].map(([id,icon,label])=>(
                  <button key={id} onClick={()=>setBikeFilter(id)}
                    style={{background:bikeFilter===id?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.15)",border:"none",borderRadius:20,padding:"4px 12px",color:bikeFilter===id?C.deepBlue:C.white,fontSize:11,...ds,fontWeight:bikeFilter===id?700:400,cursor:"pointer"}}>
                    {icon} {label}
                  </button>
                ))}
              </div>
            </div>
            <div style={{position:"absolute",inset:0}}>
              <MapView
                bikes={[
                  ...(bikeFilter!=="mtb" ? bikes : []),
                  ...(bikeFilter!=="ebike" ? mtbBikesMap.map(b=>({...b, isMTB:true, battery:100})) : [])
                ]}
                onBikeClick={b=>{ if(b.isMTB){ setTab("mtb"); } else { handleBikeClick(b); }}}
                fullscreen={true} zones={clientZones} userPos={userPos}/>
            </div>
            <div style={{position:"absolute",bottom:90,left:12,right:12,zIndex:10}}>
              {/* Bottone centrami */}
              {userPos&&<button onClick={()=>{
                if(window._mapInstance) { window._mapInstance.setCenter(userPos); window._mapInstance.setZoom(16); }
              }} style={{position:"absolute",right:0,bottom:130,background:"white",border:`2px solid ${C.blueGreen}`,borderRadius:12,padding:"10px 12px",color:C.blueGreen,fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.15)",zIndex:11}}>
                📍
              </button>}
              <button onClick={()=>startQRScanner(false)} style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:"11px 16px",color:C.white,fontSize:13,...ds,fontWeight:700,cursor:"pointer",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {t('scanQR')}
              </button>
              <div style={{background:"rgba(2,48,71,0.88)",borderRadius:16,padding:"8px 14px",backdropFilter:"blur(8px)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <p style={{color:"rgba(255,255,255,0.7)",fontSize:10,...ds,margin:0}}>{t('tapBike')}</p>
                  <div style={{display:"flex",gap:6}}>
                    {[[C.blueGreen,"≥80%"],[C.sunYellow,"50%"],[C.warmOrange,"<50%"]].map(([c,l])=>(
                      <div key={l} style={{display:"flex",alignItems:"center",gap:3}}>
                        <div style={{width:7,height:7,borderRadius:4,background:c}}/>
                        <span style={{color:"rgba(255,255,255,0.6)",fontSize:9,...ds}}>{l}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* MTB */}
        {tab==="mtb"&&(
          <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
            <div style={{background:C.deepBlue,padding:"12px 22px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <button onClick={()=>setTab("mappa")} style={{background:"none",border:"none",color:C.skyBlue,fontSize:22,cursor:"pointer",padding:0}}>←</button>
                  <div>
                    <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>NOLEGGIO</p>
                    <h1 style={{color:C.white,fontSize:18,fontWeight:700,margin:"2px 0 0",fontFamily:"Lora"}}>MTB Muscolare 🚲</h1>
                  </div>
                </div>
                <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:10,padding:"6px 12px",color:C.skyBlue,fontSize:11,...ds,cursor:"pointer"}}>{t('logout')}</button>
              </div>
            </div>
            <MTBTab user={user} t={t}/>
          </div>
        )}

        {/* PROFILO */}
        {tab==="profilo"&&(
          <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
            <div style={{background:C.deepBlue,padding:"12px 22px 16px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>{t('myProfile')}</p>
                  <h1 style={{color:C.white,fontSize:18,fontWeight:700,margin:"2px 0 0",fontFamily:"Lora"}}>PedalAgilla 🌊</h1>
                </div>
                <button onClick={onLogout} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:10,padding:"6px 12px",color:C.skyBlue,fontSize:11,...ds,cursor:"pointer"}}>{t('logout')}</button>
              </div>
            </div>
            <div style={{padding:"16px 18px 0"}}>
              <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:20,padding:20,marginBottom:14,textAlign:"center"}}>
                <div style={{width:60,height:60,borderRadius:30,background:C.blueGreen,margin:"0 auto 10px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>👤</div>
                <h2 style={{color:C.white,fontSize:20,fontWeight:700,margin:0,fontFamily:"Lora"}}>{user.nome} {user.cognome}</h2>
                <p style={{color:C.skyBlue,fontSize:12,margin:"4px 0 0",...ds}}>{user.email}</p>
              </div>
              <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
                <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 10px",fontFamily:"Lora"}}>{t('rates')}</p>
                {[[t('unlockRate'),`€${SBLOCCO.toFixed(2)}`],[t('perMinRate'),`€${TARIFFA_MIN}`],[t('pauseRate'),`€${TARIFFA_PAUSA}/min`],[t('dayRate'),`€${TARIFFA_GIORNATA.toFixed(2)} (${t('pauseFree')})`]].map(([k,v])=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                    <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
                    <span style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:700}}>{v}</span>
                  </div>
                ))}
              </div>
              <div style={{background:`${C.warmOrange}10`,border:`1px solid ${C.warmOrange}30`,borderRadius:14,padding:16}}>
                <p style={{color:C.warmOrange,fontSize:13,fontWeight:600,margin:"0 0 10px",...ds}}>{t('assistance')}</p>
                <a href={`tel:+393495240422`} style={{display:"block",background:C.warmOrange,borderRadius:10,padding:"10px 16px",color:C.white,fontSize:13,...ds,fontWeight:600,textDecoration:"none",textAlign:"center",marginBottom:8}}>{t('callMarco')} +39 349 524 0422</a>
                <a href="https://wa.me/393495240422" style={{display:"block",background:"#25D366",borderRadius:10,padding:"10px 16px",color:C.white,fontSize:13,...ds,fontWeight:600,textDecoration:"none",textAlign:"center"}}>{t('whatsappMarco')}</a>
              </div>
            </div>

            {/* ── Sezione sviluppatore ── */}
            <DeveloperCard C={C} ds={ds}/>

          </div>
        )}

        {/* NAVBAR */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(245,249,251,0.97)",borderTop:`1px solid ${C.skyBlue}50`,display:"flex",padding:"10px 0 18px",zIndex:20}}>
          {[["mappa","🗺️",t('navMap')],["mtb","🚲","MTB"],["profilo","👤",t('navProfile')]].map(([id,icon,label])=>(
            <button key={id} className="btn" onClick={()=>setTab(id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:24}}>{icon}</span>
              <span style={{color:tab===id?C.blueGreen:"#bbb",fontSize:11,...ds,fontWeight:tab===id?600:400}}>{label}</span>
              {tab===id&&<div style={{width:20,height:3,borderRadius:2,background:C.blueGreen}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}


function Main() {
  const [user, setUser] = React.useState(null);
  const [lang, setLang] = React.useState(() => {
    const l = navigator.language?.slice(0,2);
    return LANG_LIST.includes(l) ? l : 'en';
  });
  const [installPrompt, setInstallPrompt] = React.useState(null);
  const [showInstallBanner, setShowInstallBanner] = React.useState(false);
  const [isIOS, setIsIOS] = React.useState(false);

  React.useEffect(()=>{
    const isIOSDevice = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    setIsIOS(isIOSDevice);
    if (!isInStandalone) setShowInstallBanner(true);
    const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstallBanner(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  },[]);

  const t = (k) => (TRANSLATIONS[lang] || TRANSLATIONS.en)[k] || k;
  const handleLogin=(u)=>setUser(u);
  const handleLogout=()=>{ if(window.firebaseAuth) window.firebaseFunctions.signOut(window.firebaseAuth).catch(()=>{}); setUser(null); };

  const installBanner = showInstallBanner && (
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:9999,background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 -4px 20px rgba(2,48,71,0.5)"}}>
      <img src="https://www.pedalagilla.it/icons/icon-192x192.png" style={{width:44,height:44,borderRadius:10,objectFit:"contain",background:"white",padding:2}} alt=""/>
      <div style={{flex:1}}>
        <p style={{color:C.white,fontSize:14,fontWeight:700,margin:0,...ds}}>Installa PedalAgilla</p>
        <p style={{color:C.skyBlue,fontSize:12,margin:0,...ds}}>
          {isIOS ? "Tocca ⎋ → 'Aggiungi a schermata Home'" : "Aggiungi alla schermata Home per un accesso rapido"}
        </p>
      </div>
      {!isIOS && installPrompt && (
        <button onClick={async()=>{ installPrompt.prompt(); await installPrompt.userChoice; setShowInstallBanner(false); }}
          style={{background:C.blueGreen,border:"none",borderRadius:10,padding:"10px 16px",color:C.white,fontSize:13,...ds,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
          Installa
        </button>
      )}
      <button onClick={()=>setShowInstallBanner(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:22,cursor:"pointer",padding:"0 4px",flexShrink:0}}>✕</button>
    </div>
  );

  if(COMING_SOON) return <ComingSoonScreen/>;
  if(!user) return <>{installBanner}<AuthScreen onLogin={handleLogin} lang={lang} setLang={setLang} t={t}/></>;
  return <>{installBanner}<ClienteApp user={user} onLogout={handleLogout} lang={lang} setLang={setLang} t={t}/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Main/>);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
</body>
</html>
