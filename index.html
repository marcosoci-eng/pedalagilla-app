function MapView({ bikes, onBikeClick, height=300, fullscreen=false, tracks=[], zones=[], userPos=null }) {
  const mapRef = React.useRef(null);

  const zoneShapesRef = React.useRef([]);
  const zoneMarkersRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const userMarkerRef = React.useRef(null);

  const calcDist = (lat1, lng1, lat2, lng2) => {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };

  const getDistText = (bike, pos) => {
    if (!pos) return "";
    const d = calcDist(pos.lat, pos.lng, bike.lat, bike.lng);
    const mins = Math.round(d / 80);
    return d < 1000 ? `🚶 ${Math.round(d)}m · ~${mins} min` : `🚶 ${(d/1000).toFixed(1)}km · ~${mins} min`;
  };

  // Aggiorna zone
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    zoneShapesRef.current.forEach(s => s?.setMap(null));
    zoneMarkersRef.current.forEach(m => m?.setMap(null));
    zoneShapesRef.current = [];
    zoneMarkersRef.current = [];
    const icons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" };
    zones.forEach(zone => {
      let shape = null, center = null;
      if (zone.shape === "circle" && zone.center) {
        shape = new window.google.maps.Circle({
          map: mapInstanceRef.current, center: zone.center, radius: zone.radius || 200,
          fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5
        });
        center = zone.center;
      } else if (zone.path?.length > 0) {
        shape = new window.google.maps.Polygon({
          map: mapInstanceRef.current, paths: zone.path,
          fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5
        });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p => bounds.extend(p));
        const c = bounds.getCenter();
        center = { lat: c.lat(), lng: c.lng() };
      }
      if (shape) zoneShapesRef.current.push(shape);
      if (center && zone.type !== "operativa" && icons[zone.type]) {
        const marker = new window.google.maps.Marker({
          position: center, map: mapInstanceRef.current,
          label: { text: icons[zone.type], fontSize: "16px" },
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 0, fillOpacity: 0, strokeOpacity: 0 }
        });
        zoneMarkersRef.current.push(marker);
      }
    });
  }, [zones, mapInstanceRef.current]);

  // Centra sulla posizione utente appena arriva il GPS
  React.useEffect(() => {
    if (!mapInstanceRef.current || !userPos) return;
    if (!mapInstanceRef.current._centeredOnUser) {
      mapInstanceRef.current.setCenter(userPos);
      mapInstanceRef.current.setZoom(14);
      mapInstanceRef.current._centeredOnUser = true;
    }
  }, [userPos]);

  // Aggiorna InfoWindow distanza e marker utente quando cambia userPos
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    markersRef.current.forEach(({ marker, iw, bike }) => {
      const distanceText = getDistText(bike, userPos);
      iw.setContent(
        `<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px">
          <b style="color:#023047;font-size:14px">${bike.id}</b><br/>
          <span style="color:#666;font-size:11px">📍 ${bike.zone}</span><br/>
          <span style="font-size:11px">⚡ ${bike.battery}% · ~${getRange(bike.battery)}km</span>
          ${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}
          <br/><span style="font-size:11px;color:${bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.status}</span>
        </div>`
      );
    });
    if (userPos && mapInstanceRef.current) {
      if (userMarkerRef.current) {
        userMarkerRef.current.setPosition(userPos);
      } else {
        userMarkerRef.current = new window.google.maps.Marker({
          position: userPos, map: mapInstanceRef.current, title: "La tua posizione",
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: "#219EBC", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 3 },
          zIndex: 999
        });
      }
    }
  }, [userPos]);

  // Inizializza mappa
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit, 200); return; }
      const initialCenter = window._userPosition || {lat:43.1500,lng:12.0800};
      const initialZoom = window._userPosition ? 14 : 11;
      const map = new window.google.maps.Map(mapRef.current, {
        center: initialCenter, zoom: initialZoom, mapTypeId: "roadmap",
        const map = new window.google.maps.Map(mapRef.current, {
  center: initialCenter, zoom: initialZoom, mapTypeId: "roadmap",
  gestureHandling: "greedy",
        styles: [
          { featureType:"water", elementType:"geometry", stylers:[{color:"#8ECAE6"}] },
          { featureType:"landscape", elementType:"geometry", stylers:[{color:"#e8f4f8"}] },
          { featureType:"road", elementType:"geometry", stylers:[{color:"#ffffff"}] },
          { featureType:"poi", stylers:[{visibility:"off"}] }
        ]
      });
      mapInstanceRef.current = map;
      bikes.forEach(bike => {
        const iw = new window.google.maps.InfoWindow({ content: "" });
        const marker = new window.google.maps.Marker({
          position: { lat: bike.lat, lng: bike.lng }, map, title: bike.id,
          label: { text: `${bike.battery}%`, color: "#ffffff", fontSize: "10px", fontWeight: "bold" },
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 }
        });
        markersRef.current.push({ marker, iw, bike });
        marker.addListener("click", () => {
          const distanceText = getDistText(bike, userPos);
          iw.setContent(
            `<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px">
              <b style="color:#023047;font-size:14px">${bike.id}</b><br/>
              <span style="color:#666;font-size:11px">📍 ${bike.zone}</span><br/>
              <span style="font-size:11px">⚡ ${bike.battery}% · ~${getRange(bike.battery)}km</span>
              ${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}
              <br/><span style="font-size:11px;color:${bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.status}</span>
            </div>`
          );
          iw.open(map, marker);
          onBikeClick(bike);
        });
      });
      zones.forEach(zone => {
        if (zone.shape === "circle" && zone.center) {
          new window.google.maps.Circle({ map, center: zone.center, radius: zone.radius||200, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
          const icons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" };
          if (zone.type !== "operativa" && icons[zone.type]) {
            new window.google.maps.Marker({ position: zone.center, map, label: { text: icons[zone.type], fontSize: "16px" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 0, fillOpacity: 0, strokeOpacity: 0 } });
          }
        } else if (zone.path?.length > 0) {
          new window.google.maps.Polygon({ map, paths: zone.path, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
        }
      });
      tracks.forEach(track => {
        if (track.points?.length > 1) {
          new window.google.maps.Polyline({ path: track.points, geodesic: true, strokeColor: track.color||"#219EBC", strokeOpacity: 0.8, strokeWeight: 4, map });
          new window.google.maps.Marker({ position: track.points[0], map, label:{text:"A",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#219EBC",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} });
          new window.google.maps.Marker({ position: track.points[track.points.length-1], map, label:{text:"B",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#FB8500",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} });
        }
      });
    };
    tryInit();
  }, []);

  const style = fullscreen ? { position:"absolute", inset:0, width:"100%", height:"100%" } : { width:"100%", height, borderRadius:16 };
  return <div ref={mapRef} style={style} />;
}
function ZoneMapEditor({ zones, zoneType, drawingMode, drawingActive, zoneName, onZoneSaved }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const drawingManagerRef = React.useRef(null);
  const shapesRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const zoneColors = { operativa:"#00C853", sosta:"#2196F3", lenta:"#FFB703", fuori:"#FB8500" };
  const zoneIcons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" };
const zoneTypeRef = React.useRef(zoneType);
  const zoneNameRef = React.useRef(zoneName);
  React.useEffect(()=>{ zoneTypeRef.current = zoneType; }, [zoneType]);
  React.useEffect(()=>{ zoneNameRef.current = zoneName; }, [zoneName]);
  const redrawZones = React.useCallback(() => {
    if (!mapInstanceRef.current || !window.google) return;
    shapesRef.current.forEach(s=>{ if(s) s.setMap(null); });
    markersRef.current.forEach(m=>{ if(m) m.setMap(null); });
  shapesRef.current = [];
    zones.forEach((zone, idx) => {
      let shape = null;
      let center = null;
      if (zone.shape==="circle" && zone.center) {
        shape = new window.google.maps.Circle({
          map:mapInstanceRef.current, center:zone.center, radius:zone.radius||200,
          fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2,
          draggable:true, editable:true
        });
        center = {lat:zone.center.lat, lng:zone.center.lng};
        // Aggiorna marker quando cerchio si sposta
        shape.addListener("center_changed", ()=>{
          const newCenter = shape.getCenter();
          if (markersRef.current[idx]) markersRef.current[idx].setPosition(newCenter);
          zone.center = {lat:newCenter.lat(), lng:newCenter.lng()};
        });
        shape.addListener("radius_changed", ()=>{ zone.radius = shape.getRadius(); });
      } else if (zone.path && zone.path.length>0) {
        shape = new window.google.maps.Polygon({
          map:mapInstanceRef.current, paths:zone.path,
          fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2,
          draggable:true, editable:true
        });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p=>bounds.extend(p));
        const c = bounds.getCenter();
        center = {lat:c.lat(), lng:c.lng()};
      }
      if (shape) shapesRef.current[idx] = shape;
      // Icona al centro (non per operativa)
      if (center && zone.type !== "operativa" && zoneIcons[zone.type]) {
        const marker = new window.google.maps.Marker({
          position:center, map:mapInstanceRef.current,
          label:{text:zoneIcons[zone.type], fontSize:"20px", fontWeight:"bold"},
          icon:{path:window.google.maps.SymbolPath.CIRCLE, scale:0, fillOpacity:0, strokeOpacity:0},
          zIndex:10
        });
        markersRef.current[idx] = marker;
      } else {
        markersRef.current[idx] = null;
      }
    });
  }, [zones]);

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google || !window.google.maps.drawing) { setTimeout(tryInit,200); return; }
      const map = new window.google.maps.Map(mapRef.current, {
        center:{lat:43.1500,lng:12.0800}, zoom:11, mapTypeId:"roadmap",
        styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      mapInstanceRef.current = map;
      const dm = new window.google.maps.drawing.DrawingManager({
        drawingMode:null, drawingControl:false,
        circleOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false},
        polygonOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false}
      });
      dm.setMap(map);
      drawingManagerRef.current = dm;
     window.google.maps.event.addListener(dm,"circlecomplete",circle=>{
        dm.setDrawingMode(null);
        const zt = zoneTypeRef.current;
        const zn = zoneNameRef.current;
        const color = zoneColors[zt]||"#219EBC";
        circle.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2});
        onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"circle",color,center:{lat:circle.getCenter().lat(),lng:circle.getCenter().lng()},radius:circle.getRadius()});
        circle.setMap(null);
      });
      window.google.maps.event.addListener(dm,"polygoncomplete",polygon=>{
        dm.setDrawingMode(null);
        const zt = zoneTypeRef.current;
        const zn = zoneNameRef.current;
        const color = zoneColors[zt]||"#219EBC";
        polygon.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2});
        const path = polygon.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()}));
        onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"polygon",color,path});
        polygon.setMap(null);
      });
      redrawZones();
    };
    tryInit();
  }, []);

  React.useEffect(() => {
    if (mapInstanceRef.current) redrawZones();
  }, [zones]);

  React.useEffect(() => {
    const activate = () => {
      if (!drawingManagerRef.current || !window.google || !window.google.maps.drawing) {
        if (drawingActive) setTimeout(activate, 300);
        return;
      }
      drawingManagerRef.current.setDrawingMode(
        drawingActive ? (drawingMode==="circle" ? window.google.maps.drawing.OverlayType.CIRCLE : window.google.maps.drawing.OverlayType.POLYGON) : null
      );
    };
    activate();
  }, [drawingActive, drawingMode]);

  return <div ref={mapRef} style={{width:"100%",height:"100%"}}/>;
}

function PaymentForm({ amount, bike, plan, onSuccess, onCancel }) {
  const cardRef = React.useRef(null);

function RideTimer({ bike, plan, user, rideId, onEnd }) {
  const [seconds, setSeconds] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const trackRef = React.useRef([]);
  const isGiornata = plan==="giornata";
  React.useEffect(() => { if (!paused&&!showEndFlow) { const t=setInterval(()=>setSeconds(s=>s+1),1000); return()=>clearInterval(t); } },[paused,showEndFlow]);
  React.useEffect(() => { if (paused&&!showEndFlow) { const t=setInterval(()=>setPauseSeconds(s=>s+1),1000); return()=>clearInterval(t); } },[paused,showEndFlow]);
  React.useEffect(() => {
    if (!navigator.geolocation||showEndFlow) return;
    const saveGPS = () => {
      navigator.geolocation.getCurrentPosition(async pos=>{
        const point={lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()};
        trackRef.current.push(point);
        if (rideId) { try { await waitFB(); const {doc,updateDoc}=window.firebaseFunctions; await updateDoc(doc(window.firebaseDb,"rides",rideId),{track:trackRef.current}); } catch(e){} }
      },()=>{},{enableHighAccuracy:true});
    };
    saveGPS(); const t=setInterval(saveGPS,30000); return()=>clearInterval(t);
  },[showEndFlow]);
  const mins=Math.floor(seconds/60), secs=seconds%60, pauseMins=Math.floor(pauseSeconds/60);
  const rideCost=isGiornata?TARIFFA_GIORNATA:SBLOCCO+(seconds/60)*TARIFFA_MIN;
  const pauseCost=isGiornata?0:(pauseSeconds/60)*TARIFFA_PAUSA;
  const totalCost=rideCost+pauseCost;
  const handleParkPhoto=(e)=>{ const file=e.target.files[0]; if(file){setParkPhoto(file);const r=new FileReader();r.onload=ev=>setParkPreview(ev.target.result);r.readAsDataURL(file);} };
  const handleEndConfirm=async()=>{
    if(!parkPhoto){alert("Scatta una foto al parcheggio!");return;}
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc}=window.firebaseFunctions;
      const sRef=ref(window.firebaseStorage,`parcheggi/${bike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL=await getDownloadURL(sRef);
      if(rideId) await updateDoc(doc(window.firebaseDb,"rides",rideId),{status:"Completata",endTime:new Date().toISOString(),duration:seconds,pauseDuration:pauseSeconds,cost:totalCost,parkPhotoURL,track:trackRef.current});
    } catch(e){console.error(e);}
    setUploading(false); onEnd(seconds,totalCost);
  };
  if(showEndFlow) return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
        <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>Foto del parcheggio</h2>
      </div>
      <div style={{padding:20,flex:1}}>
        <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
          <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>📸 Obbligatorio</p>
          <p style={{color:"#888",fontSize:12,...ds,margin:0}}>Scatta una foto alla bici parcheggiata</p>
        </div>
        <div style={{border:`2px dashed ${parkPhoto?C.blueGreen:C.warmOrange}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer"}}
          onClick={()=>document.getElementById("parkInput").click()}>
          {parkPreview?<div><img src={parkPreview} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover",marginBottom:8}}/><p style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:600,margin:0}}>✅ Tocca per cambiare</p></div>
            :<div><div style={{fontSize:48,marginBottom:8}}>📸</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>Scatta foto parcheggio</p></div>}
          <input id="parkInput" type="file" accept="image/*" capture="environment" onChange={handleParkPhoto} style={{display:"none"}} />
        </div>
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
          {[["⏱️ Corsa",`${mins}min ${secs}sec`],["⏸️ Pausa",`${pauseMins}min · ${isGiornata?"Gratis":`€${pauseCost.toFixed(2)}`}`],["💶 Totale",`€${totalCost.toFixed(2)}`]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
              <span style={{color:C.deepBlue,fontWeight:700,...ds}}>{v}</span>
            </div>
          ))}
        </div>
        <button onClick={handleEndConfirm} disabled={!parkPhoto||uploading}
          style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
          {uploading?"⏳ Salvataggio...":"✅ Conferma fine corsa"}
        </button>
        <button onClick={()=>setShowEndFlow(false)} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>← Torna alla corsa</button>
      </div>
    </div>
  );
  return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.deepBlue,padding:"16px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>CORSA IN CORSO</p>
        <h2 style={{color:C.white,fontSize:20,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{bike.id} · {bike.zone}</h2>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:24,padding:28,textAlign:"center",marginBottom:20,width:"100%"}}>
          {paused&&<div style={{background:C.sunYellow,borderRadius:10,padding:"4px 14px",display:"inline-block",marginBottom:10}}><p style={{color:C.deepBlue,fontSize:11,...ds,fontWeight:700,margin:0}}>⏸️ PAUSA — {isGiornata?"Gratis":`€${TARIFFA_PAUSA}/min`}</p></div>}
          <p style={{color:C.skyBlue,fontSize:12,margin:"0 0 6px",...ds,letterSpacing:2}}>{paused?"PAUSA":"CORSA"}</p>
          <p style={{color:C.white,fontSize:48,fontWeight:700,margin:"0 0 12px",...ds,fontFamily:"monospace"}}>
            {paused?`${String(pauseMins).padStart(2,"0")}:${String(pauseSeconds%60).padStart(2,"0")}`:
              `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`}
          </p>
          <p style={{color:C.skyBlue,fontSize:12,margin:"0 0 4px",...ds}}>Costo totale</p>
          <p style={{color:C.sunYellow,fontSize:34,fontWeight:700,margin:0,...ds}}>€{totalCost.toFixed(2)}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,width:"100%",marginBottom:16}}>
          {[["🔓 Sblocco",`€${SBLOCCO.toFixed(2)}`],["⏱️ Corsa",`€${TARIFFA_MIN}/min`],["⏸️ Pausa",isGiornata?"Gratis":`€${TARIFFA_PAUSA}/min`],["📍 Zona",bike.zone]].map(([k,v])=>(
            <div key={k} style={{background:C.white,borderRadius:12,padding:"10px 14px",boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
              <p style={{color:"#aaa",fontSize:10,...ds,margin:"0 0 2px"}}>{k}</p>
              <p style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:700,margin:0}}>{v}</p>
            </div>
          ))}
        </div>
        <button onClick={()=>setPaused(p=>!p)} style={{width:"100%",background:paused?C.blueGreen:C.sunYellow,border:"none",borderRadius:14,padding:14,color:C.deepBlue,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
          {paused?"▶️ Riprendi":"⏸️ Pausa"}
        </button>
        <button onClick={()=>setShowEndFlow(true)} style={{width:"100%",background:C.warmOrange,border:"none",borderRadius:14,padding:14,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
          🏁 Termina corsa
        </button>
      </div>
    </div>
  );
}

      return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
      const video=document.getElementById("qrVideo");
      if(video){video.srcObject=stream;video.play();}

        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);

function AdminApp({ user, onLogout }) {

  const today = new Date().toLocaleDateString("it-IT");

  const todayIncassi = todayRides.filter(r=>r.status==="Completata").reduce((a,r)=>a+(r.cost||0),0);
  const monthIncassi = monthRides.filter(r=>r.status==="Completata").reduce((a,r)=>a+(r.cost||0),0);
  const available = bikes.filter(b=>b.status==="Disponibile").length;
  const maint = bikes.filter(b=>b.status==="Manutenzione").length;
  const low = bikes.filter(b=>b.battery<50).length;
  const avg = Math.round(bikes.reduce((a,b)=>a+b.battery,0)/bikes.length);
  const filteredBikes = filter==="Tutti"?bikes:filter==="Disponibile"?bikes.filter(b=>b.status==="Disponibile"):filter==="Manutenzione"?bikes.filter(b=>b.status==="Manutenzione"):bikes.filter(b=>b.battery<50);
  const mapBikes = mapFilter==="Tutti"?bikes:mapFilter==="Disponibile"?bikes.filter(b=>b.status==="Disponibile"):bikes.filter(b=>b.status==="Manutenzione");
  const visibleZones = savedZones.filter(z=>zoneFilters[z.type]);

  React.useEffect(()=>{
    const load=async()=>{
      await waitFB(); const {collection,onSnapshot}=window.firebaseFunctions;
      onSnapshot(collection(window.firebaseDb,"rides"),snap=>{
        setRides(snap.docs.map(d=>{ const dd=d.data(); return{id:d.id,...dd,date:dd.startTime?new Date(dd.startTime).toLocaleDateString("it-IT"):"",user:dd.userName||"—",bike:dd.bikeId||"—",zone:dd.zone||"—",cost:dd.cost||0,status:dd.status||"In corso",duration:dd.duration||0,parkPhotoURL:dd.parkPhotoURL||null,track:dd.track||[]}; }));
      });
    }; load();
  },[]);

  const loadUsers=async()=>{
    setLoadingUsers(true);
    try{ await waitFB(); const {collection,getDocs}=window.firebaseFunctions; const snap=await getDocs(collection(window.firebaseDb,"users")); setFbUsers(snap.docs.map(d=>({id:d.id,...d.data()}))); } catch(e){console.error(e);}
    setLoadingUsers(false);

                  <p style={{color:"#888",fontSize:12,...ds,margin:"0 0 2px"}}>👤 {ride.user} · 📍 {ride.zone}</p>
                  <p style={{color:"#aaa",fontSize:11,...ds,margin:"0 0 4px"}}>⏰ Iniziata: {ride.startTime?new Date(ride.startTime).toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"}):ride.date}</p>
                  <p style={{color:C.blueGreen,fontSize:12,...ds,fontWeight:600,margin:"0 0 8px"}}>
                    💶 Stimato: €{ride.startTime?(SBLOCCO+(Math.floor((Date.now()-new Date(ride.startTime).getTime())/60000))*TARIFFA_MIN).toFixed(2):"0.00"} · ⏱️ {ride.startTime?Math.floor((Date.now()-new Date(ride.startTime).getTime())/60000):0} min
                  </p>
                  <button onClick={()=>{setSelectedRide(ride);setShowTrack(true);}} style={{background:`${C.blueGreen}15`,border:`1px solid ${C.blueGreen}30`,borderRadius:8,padding:"5px 12px",color:C.blueGreen,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>🗺️ Vedi percorso</button>
                </div>
              ))}
            </>}
            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"12px 0 8px",...ds,opacity:0.5}}>Completate</p>
            {(incassiPeriod==="oggi"?todayRides:monthRides).filter(r=>r.status!=="In corso").map(ride=>(
              <div key={ride.id} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${C.skyBlue}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{ride.bike}</span>
                  <span style={{color:C.blueGreen,fontWeight:700,fontSize:13,...ds}}>€{(ride.cost||0).toFixed(2)}</span>
                </div>
                <p style={{color:"#888",fontSize:12,...ds,margin:"0 0 2px"}}>👤 {ride.user} · 📍 {ride.zone}</p>
                <p style={{color:"#aaa",fontSize:11,...ds,margin:"0 0 8px"}}>⏱️ {Math.floor((ride.duration||0)/60)}min · {ride.date}</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={()=>{setSelectedRide(ride);setShowTrack(true);}} style={{background:`${C.blueGreen}15`,border:`1px solid ${C.blueGreen}30`,borderRadius:8,padding:"5px 12px",color:C.blueGreen,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>🗺️ Percorso</button>
                  {ride.parkPhotoURL&&<button onClick={()=>{setSelectedRide(ride);setShowTrack(true);}} style={{background:`${C.sunYellow}15`,border:`1px solid ${C.sunYellow}40`,borderRadius:8,padding:"5px 12px",color:"#b38600",fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>📸 Foto</button>}
                </div>
              </div>
            ))}
          </div>}

          {tab==="utenti"&&<div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:0,...ds,opacity:0.5}}>Utenti ({fbUsers.length})</p>
              <button onClick={exportExcel} style={{background:C.blueGreen,border:"none",borderRadius:10,padding:"7px 14px",color:C.white,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>📊 Excel</button>
            </div>
            {loadingUsers&&<p style={{color:"#aaa",fontSize:13,...ds,textAlign:"center",padding:20}}>⏳ Caricamento...</p>}
            {!loadingUsers&&fbUsers.length===0&&<div style={{textAlign:"center",padding:30}}><div style={{fontSize:40,marginBottom:10}}>👥</div><p style={{color:"#aaa",fontSize:13,...ds}}>Nessun utente</p></div>}
            {fbUsers.map((u,i)=>(
              <div key={i} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                  <div style={{width:40,height:40,borderRadius:20,background:`${C.blueGreen}20`,border:`2px solid ${C.blueGreen}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👤</div>
                  <div style={{flex:1}}>
                    <p style={{color:C.deepBlue,fontWeight:700,fontSize:14,margin:0,fontFamily:"Lora"}}>{u.nome} {u.cognome}</p>
                    <p style={{color:"#aaa",fontSize:11,...ds,margin:"2px 0 0"}}>{u.createdAt?new Date(u.createdAt).toLocaleDateString("it-IT"):"—"}</p>
                  </div>
                </div>
                <p style={{color:C.deepBlue,fontSize:12,...ds,margin:"0 0 4px"}}>📧 {u.email}</p>
                <p style={{color:C.deepBlue,fontSize:12,...ds,margin:"0 0 6px"}}>📱 {u.telefono||"—"}</p>
                {u.docURL&&<div style={{marginTop:8}}>
                  <p style={{color:C.deepBlue,fontSize:11,fontWeight:600,margin:"0 0 4px",...ds}}>📄 Documento</p>
                  <img src={u.docURL} style={{width:"100%",borderRadius:10,maxHeight:120,objectFit:"cover",cursor:"pointer"}} onClick={()=>window.open(u.docURL,"_blank")} alt="Documento"/>
                </div>}
              </div>
            ))}
          </div>}

          {tab==="zone"&&<div className="slide" style={{padding:"16px 18px 0"}}>
            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 12px",...ds,opacity:0.5}}>Gestione zone</p>

            {/* Filtri visibilità */}
            <div style={{background:C.white,borderRadius:14,padding:12,marginBottom:12,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 10px",...ds}}>👁️ Mostra sulla mappa</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[["operativa","🟢 Operativa","#00C853"],["sosta","🅿️ Sosta","#2196F3"],["lenta","🐢 Vel. ridotta","#FFB703"],["fuori","⛔ Fuori zona","#FB8500"]].map(([id,label,color])=>(
                  <div key={id} onClick={()=>setZoneFilters(prev=>({...prev,[id]:!prev[id]}))}
                    style={{background:zoneFilters[id]?color+"20":"#f5f5f5",borderRadius:10,padding:"8px 12px",cursor:"pointer",border:`2px solid ${zoneFilters[id]?color:"transparent"}`,display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:10,height:10,borderRadius:5,background:zoneFilters[id]?color:"#ccc"}}/>
                    <p style={{color:zoneFilters[id]?C.deepBlue:"#aaa",fontSize:11,...ds,fontWeight:600,margin:0}}>{label}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Disegna nuova zona */}
            <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:13,fontWeight:600,margin:"0 0 10px",...ds}}>✏️ Disegna nuova zona</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {[["operativa","🟢 Operativa","#00C853"],["sosta","🔵 Sosta","#2196F3"],["lenta","🟡 Vel. ridotta","#FFB703"],["fuori","🔴 Fuori zona","#FB8500"]].map(([zid,label,color])=>(
                  <div key={zid} onClick={()=>setZoneType(zid)}
                    style={{background:zoneType===zid?color:"#f5f5f5",borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"center",border:`2px solid ${zoneType===zid?color:"transparent"}`}}>
                    <p style={{color:zoneType===zid?C.white:C.deepBlue,fontSize:12,...ds,fontWeight:600,margin:0}}>{label}</p>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {[["circle","⭕ Cerchio"],["polygon","⬡ Poligono"]].map(([mid,label])=>(
                  <div key={mid} onClick={()=>setDrawingMode(mid)}
                    style={{background:drawingMode===mid?C.deepBlue:"#f5f5f5",borderRadius:10,padding:"10px 12px",cursor:"pointer",textAlign:"center",border:`2px solid ${drawingMode===mid?C.deepBlue:"transparent"}`}}>
                    <p style={{color:drawingMode===mid?C.white:C.deepBlue,fontSize:12,...ds,fontWeight:600,margin:0}}>{label}</p>
                  </div>
                ))}
              </div>
              <input value={zoneName} onChange={e=>setZoneName(e.target.value)} placeholder="Nome zona (es. Centro Passignano)"
                style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}50`,fontSize:13,fontFamily:"'DM Sans'",color:C.deepBlue,background:C.white,marginBottom:10}}/>
              <button onClick={()=>setDrawingActive(true)}
                style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:12,padding:"12px",color:C.white,fontSize:13,...ds,fontWeight:700,cursor:"pointer"}}>
                ✏️ Inizia a disegnare
              </button>
            </div>

            {/* Mappa zone */}
            <div style={{height:320,borderRadius:16,overflow:"hidden",marginBottom:12,boxShadow:"0 4px 20px rgba(2,48,71,0.15)"}}>
              <ZoneMapEditor
                zones={visibleZones}
                zoneType={zoneType} drawingMode={drawingMode} drawingActive={drawingActive} zoneName={zoneName}
                onZoneSaved={(zone)=>{setSavedZones(prev=>[...prev,zone]);setDrawingActive(false);setZoneName("");}}
              />
            </div>

            {/* Zone salvate */}
            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 8px",...ds,opacity:0.5}}>Zone ({savedZones.length})</p>
            {savedZones.map((zone,i)=>(
              <div key={i} style={{background:C.white,borderRadius:14,padding:"12px 14px",marginBottom:8,boxShadow:"0 2px 8px rgba(2,48,71,0.07)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:12,height:12,borderRadius:3,background:zone.color,flexShrink:0}}/>
                  <div>
                    <p style={{color:C.deepBlue,fontSize:13,fontWeight:600,margin:0,...ds}}>{zone.name}</p>
                    <p style={{color:"#aaa",fontSize:11,...ds,margin:"2px 0 0"}}>{zone.type} · {zone.shape}</p>
                  </div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{
                    const nuovoNome = window.prompt("Nuovo nome zona:", zone.name);
                    if(nuovoNome&&nuovoNome.trim()) setSavedZones(prev=>prev.map((z,idx)=>idx===i?{...z,name:nuovoNome.trim()}:z));
                  }} style={{background:`${C.blueGreen}15`,border:"none",borderRadius:8,padding:"5px 10px",color:C.blueGreen,fontSize:12,cursor:"pointer",...ds}}>✏️</button>
                  <button onClick={()=>setSavedZones(prev=>prev.filter((_,idx)=>idx!==i))}
                    style={{background:`${C.warmOrange}15`,border:"none",borderRadius:8,padding:"5px 10px",color:C.warmOrange,fontSize:12,cursor:"pointer",...ds}}>🗑️</button>
                </div>
              </div>
            ))}
          </div>}

          {tab==="qr"&&<div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{background:C.white,borderRadius:16,padding:20,marginBottom:16,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",textAlign:"center"}}>
              <p style={{color:C.deepBlue,fontSize:15,fontWeight:700,margin:"0 0 4px",fontFamily:"Lora"}}>📱 QR Scarica l'app</p>
              <p style={{color:"#aaa",fontSize:12,...ds,margin:"0 0 14px"}}>Mettilo su cartelli, volantini e hotel!</p>
              <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(APP_URL)}&bgcolor=ffffff&color=023047&qzone=2`}
                style={{width:180,height:180,borderRadius:12,border:`3px solid ${C.skyBlue}30`,marginBottom:14}} alt="QR App"/>
              <p style={{color:C.deepBlue,fontSize:12,...ds,fontWeight:600,margin:"0 0 10px"}}>{APP_URL}</p>
              <a href={`https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(APP_URL)}&bgcolor=ffffff&color=023047&qzone=2`}
                target="_blank" style={{display:"block",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,borderRadius:12,padding:"12px 16px",color:C.white,fontSize:13,...ds,fontWeight:600,textDecoration:"none",textAlign:"center"}}>
                🖨️ Stampa QR in alta qualità
              </a>
            </div>
            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 14px",...ds,opacity:0.5}}>QR Code bici</p>
            <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
              <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>💡 Come usare</p>
              <p style={{color:"#888",fontSize:12,...ds,margin:0}}>Stampa il QR di ogni bici e attaccalo al telaio. Il cliente lo scansiona per sbloccarla.</p>
            </div>
            {initBikes.map(bike=>(
              <div key={bike.id} style={{background:C.white,borderRadius:14,padding:16,marginBottom:10,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div>
                    <p style={{color:C.deepBlue,fontWeight:700,fontSize:15,margin:0,fontFamily:"Lora"}}>{bike.id}</p>
                    <p style={{color:"#aaa",fontSize:12,...ds,margin:"2px 0 0"}}>📍 {bike.zone} · {bike.model}</p>
                    <p style={{color:getStatusColor(bike.status),fontSize:11,...ds,margin:"2px 0 0"}}>● {bike.status}</p>
                  </div>
                  <img src={`https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${encodeURIComponent(QR_BASE_URL+bike.id)}&bgcolor=ffffff&color=023047&qzone=1`}
                    style={{width:100,height:100,borderRadius:8,border:`2px solid ${C.skyBlue}30`}} alt={`QR ${bike.id}`}/>
                </div>
                <a href={`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(QR_BASE_URL+bike.id)}&bgcolor=ffffff&color=023047&qzone=2`}
                  target="_blank" style={{display:"block",background:C.deepBlue,borderRadius:10,padding:"10px 16px",color:C.white,fontSize:13,...ds,fontWeight:600,textDecoration:"none",textAlign:"center",marginBottom:8}}>
                  🖨️ Stampa QR {bike.id}
                </a>
                <div style={{background:"#f5f5f5",borderRadius:8,padding:"8px 12px"}}>
                  <p style={{color:"#aaa",fontSize:10,...ds,margin:0,wordBreak:"break-all"}}>{QR_BASE_URL+bike.id}</p>
                </div>
              </div>
            ))}
          </div>}

          {tab==="stats"&&<div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>⚡ Batteria flotta</p>
              {[["≥80%",bikes.filter(b=>b.battery>=80).length,C.blueGreen],["50-79%",bikes.filter(b=>b.battery>=50&&b.battery<80).length,C.sunYellow],["<50%",bikes.filter(b=>b.battery<50).length,C.warmOrange]].map(([range,count,color])=>(
                <div key={range} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#888",fontSize:12,...ds}}>{range}</span>
                    <span style={{color,fontSize:12,...ds,fontWeight:700}}>{count} bici</span>
                  </div>
                  <div style={{height:8,background:"#eee",borderRadius:4,overflow:"hidden"}}>
                    <div style={{width:`${(count/bikes.length)*100}%`,height:"100%",background:color,borderRadius:4}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>📍 Corse per zona</p>
              {["Passignano","Castiglione","Tuoro","Magione","Panicale"].map(zona=>{
                const count=rides.filter(r=>r.zone===zona).length; const total=rides.length||1;
                return <div key={zona} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#888",fontSize:12,...ds}}>{zona}</span>
                    <span style={{color:C.blueGreen,fontSize:12,...ds,fontWeight:700}}>{count} corse</span>
                  </div>
                  <div style={{height:6,background:"#eee",borderRadius:3,overflow:"hidden"}}>
                    <div style={{width:`${(count/total)*100}%`,height:"100%",background:C.blueGreen,borderRadius:3}}/>
                  </div>
                </div>;
              })}
            </div>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:18,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>🛣️ Top km percorsi</p>
              {[...bikes].sort((a,b)=>b.odometer-a.odometer).slice(0,5).map((bike,i)=>(
                <div key={bike.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{color:i===0?C.sunYellow:"#ccc",fontSize:13,...ds,fontWeight:700}}>#{i+1}</span>
                    <span style={{color:C.deepBlue,fontSize:13,...ds}}>{bike.id} · {bike.zone}</span>
                  </div>
                  <span style={{color:C.blueGreen,fontSize:13,fontWeight:700,...ds}}>{bike.odometer.toFixed(0)} km</span>
                </div>
              ))}
            </div>
          </div>}

        </div>

        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(245,249,251,0.97)",borderTop:`1px solid ${C.skyBlue}50`,display:"flex",padding:"8px 0 16px",zIndex:20}}>
          {[["dashboard","⊞","Home"],["mappa","🗺️","Mappa"],["bici","🚲","Bici"],["corse","🏁","Corse"],["utenti","👥","Utenti"],["zone","🗺️","Zone"],["qr","🔲","QR"],["stats","📊","Stats"]].map(([tid,icon,label])=>(
            <button key={tid} className="btn" onClick={()=>setTab(tid)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:16}}>{icon}</span>
              <span style={{color:tab===tid?C.blueGreen:"#bbb",fontSize:8,...ds,fontWeight:tab===tid?600:400}}>{label}</span>
              {tab===tid&&<div style={{width:14,height:3,borderRadius:2,background:C.blueGreen}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Main() {
  const [user, setUser] = React.useState(null);
  const handleLogin=(u)=>setUser(u);
  const handleLogout=()=>{ if(window.firebaseAuth) window.firebaseFunctions.signOut(window.firebaseAuth).catch(()=>{}); setUser(null); };
  if(!user) return <AuthScreen onLogin={handleLogin}/>;
  if(user.type==="admin") return <AdminApp user={user} onLogout={handleLogout}/>;
  return <ClienteApp user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Main/>);
</script>
</body>
</html>
