function FullMapView({ bikes, onBikeClick }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=AIzaSyBfgaG8lGRp7P8XGI-powaYfKufeLPebx8&callback=initMap`;
    script.async = true;
    window.initMap = () => {
      const map = new window.google.maps.Map(mapRef.current, {
        center:{lat:43.1500,lng:12.1000}, zoom:12, mapTypeId:"roadmap",
        disableDefaultUI:true, zoomControl:true,
        styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]},{featureType:"transit",stylers:[{visibility:"off"}]}]
      });
      mapInstanceRef.current = map;
      bikes.forEach(bike => {
        const marker = new window.google.maps.Marker({
          position:{lat:bike.lat,lng:bike.lng}, map, title:bike.id,
          label:{text:`${bike.battery}%`,color:"#ffffff",fontSize:"11px",fontWeight:"bold"},
          icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:18,fillColor:bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500",fillOpacity:1,strokeColor:"#ffffff",strokeWeight:3}
        });
        marker.addListener("click",()=>onBikeClick(bike));
      });
    };
    document.head.appendChild(script);
  }, []);
  return <div ref={mapRef} style={{width:"100%",height:"100%"}} />;
}

function PaymentForm({ amount, onSuccess, onCancel, label }) {
  const cardRef = React.useRef(null);
  const cardEl = React.useRef(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [nome, setNome] = React.useState("");
  React.useEffect(() => {
    if (!cardRef.current || cardEl.current) return;
    const card = stripeElements.create("card",{style:{base:{fontSize:"16px",color:"#023047",fontFamily:"'DM Sans',sans-serif","::placeholder":{color:"#aaa"}}},hidePostalCode:true});
    card.mount(cardRef.current); cardEl.current = card;
  }, []);
  const handlePay = async () => {
    if (!nome.trim()) { setError("Inserisci il tuo nome"); return; }
    setLoading(true); setError(null);
    try {
      const {paymentMethod,error:e} = await stripeInstance.createPaymentMethod({type:"card",card:cardEl.current,billing_details:{name:nome}});
      if (e) { setError(e.message); setLoading(false); return; }
      setTimeout(()=>{ setLoading(false); onSuccess(); },1500);
    } catch(e) { setError("Errore. Riprova."); setLoading(false); }
  };
  return (
    <div style={{padding:"20px 18px"}}>
      <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:16,padding:16,marginBottom:20,textAlign:"center"}}>
        <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 4px",...ds,letterSpacing:2}}>{label||"TOTALE"}</p>
        <p style={{color:C.sunYellow,fontSize:36,fontWeight:700,margin:"0 0 4px",...ds}}>€{amount}</p>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,margin:0,...ds}}>Pagamento sicuro con Stripe</p>
      </div>
      <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:12,padding:12,marginBottom:16}}>
        <p style={{color:C.blueGreen,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>🧪 Test: 4242 4242 4242 4242 · 12/28 · 123</p>
      </div>
      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 6px",...ds}}>Nome intestatario</p>
      <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Mario Rossi"
        style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}`,fontSize:15,fontFamily:"'DM Sans'",color:C.deepBlue,marginBottom:14,background:C.white}} />
      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 6px",...ds}}>Carta di credito</p>
      <div ref={cardRef} style={{background:C.white,padding:14,borderRadius:10,border:`1.5px solid ${C.skyBlue}`,marginBottom:14}} />
      {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 12px",...ds}}>⚠️ {error}</p>}
      <button onClick={handlePay} disabled={loading}
        style={{width:"100%",background:loading?`${C.blueGreen}80`:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
        {loading?"⏳ Elaborazione...":`💳 Paga €${amount}`}
      </button>
      <button onClick={onCancel} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:12,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>Annulla</button>

function CorsaAttiva({ bike, user, piano, onCorsaFinita }) {

    if (paused || showPhoto) return;
    const interval = setInterval(() => setSeconds(s=>s+1), 1000);

    if (!photo) return;

    window.open(`https://wa.me/${WHATSAPP}?text=${msg}`,"_blank");
    setTimeout(()=>{ setSending(false); onCorsaFinita(cost,seconds); },1000);
  };

        <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:10,display:"flex",flexDirection:"column",overflowY:"auto"}}>

            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:20,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>

                  <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
                  <span style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:600}}>{v}</span>

  const handleDocChange = (e) => {
    const file = e.target.files[0];
    if (file) { setDocFile(file); const r=new FileReader(); r.onload=ev=>setDocPreview(ev.target.result); r.readAsDataURL(file); }
  };

  const handleAdminLogin = () => {
    if (adminUser==="marco" && adminPass==="pedalagilla2026") onLogin({type:"admin",nome:"Marco",email:"marco@pedalagilla.it"});
    else setError("Credenziali errate");
  };

  const handleLogin = async () => {
    if (!email||!password) { setError("Inserisci email e password"); return; }
    setLoading(true); setError(null);
    try {
      await waitFB();
      const {signInWithEmailAndPassword,doc,getDoc} = window.firebaseFunctions;
      const cred = await signInWithEmailAndPassword(window.firebaseAuth,email,password);
      const snap = await getDoc(doc(window.firebaseDb,"users",cred.user.uid));
      onLogin({type:"cliente",...snap.data(),uid:cred.user.uid});
    } catch(e) { setError("Email o password errati"); }
    setLoading(false);
  };

  const handleRegister = async () => {
    if (!nome||!cognome||!email||!password||!telefono) { setError("Compila tutti i campi"); return; }
    if (password.length<6) { setError("Password minimo 6 caratteri"); return; }
    setLoading(true); setError(null);
    try {
      await waitFB();
      const {createUserWithEmailAndPassword,doc,setDoc,ref,uploadBytes,getDownloadURL} = window.firebaseFunctions;
      const cred = await createUserWithEmailAndPassword(window.firebaseAuth,email,password);
      let docURL = "";
      if (docFile) {
        const sRef = ref(window.firebaseStorage,`documenti/${cred.user.uid}`);
        await uploadBytes(sRef,docFile);
        docURL = await getDownloadURL(sRef);
      }
      await setDoc(doc(window.firebaseDb,"users",cred.user.uid),{nome,cognome,email,telefono,docURL,type:"cliente",createdAt:new Date().toISOString()});
      onLogin({type:"cliente",nome,cognome,email,telefono,uid:cred.user.uid});
    } catch(e) {
      setError(e.code==="auth/email-already-in-use"?"Email già registrata":"Errore: "+e.message);
    }
    setLoading(false);
  };

  const inputStyle = {width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}50`,fontSize:14,fontFamily:"'DM Sans'",color:C.deepBlue,background:C.white,marginBottom:10};

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.deepBlue} 0%,#034a6e 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:390,background:C.bgLight,borderRadius:40,border:`6px solid ${C.deepBlue}`,overflow:"hidden",boxShadow:`0 40px 80px rgba(2,48,71,0.5)`}}>
        <div style={{background:C.deepBlue,padding:"30px 24px 24px",textAlign:"center"}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <Logo size={80}/>
          </div>
          <h1 style={{color:C.white,fontSize:26,fontWeight:700,margin:0,fontFamily:"Lora"}}>PedalAgilla</h1>
          <p style={{color:C.skyBlue,fontSize:12,margin:"4px 0 0",...ds,letterSpacing:2}}>E-BIKE SHARING · LAGO TRASIMENO</p>
        </div>
        <div style={{padding:"24px 20px",maxHeight:"75vh",overflowY:"auto"}}>
          {mode!=="adminLogin" && (
            <div style={{display:"flex",background:"#e8f4f8",borderRadius:12,padding:4,marginBottom:20}}>
              {[["login","Accedi"],["register","Registrati"]].map(([m,l])=>(
                <button key={m} onClick={()=>{setMode(m);setError(null);}}
                  style={{flex:1,background:mode===m?C.deepBlue:"transparent",border:"none",borderRadius:10,padding:10,color:mode===m?C.white:"#888",fontSize:13,...ds,fontWeight:600,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
          )}

          {mode==="login" && <>
            <p style={{color:C.deepBlue,fontSize:13,marginBottom:16,...ds,opacity:0.7,textAlign:"center"}}>Bentornato! Pedala con noi 🚲</p>
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>📧 Email</p>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="mario@example.com" style={inputStyle} />
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>🔑 Password</p>
            <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="••••••••" style={inputStyle} />
            {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 12px",...ds}}>⚠️ {error}</p>}
            <button onClick={handleLogin} disabled={loading}
              style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:12}}>
              {loading?"⏳ Accesso...":"Accedi 🚲"}
            </button>
            <button onClick={()=>{setMode("adminLogin");setError(null);}}
              style={{width:"100%",background:"none",border:`1px solid ${C.deepBlue}30`,borderRadius:14,padding:10,color:"#aaa",fontSize:12,...ds,cursor:"pointer"}}>
              🔐 Accesso amministratore
            </button>
          </>}

          {mode==="register" && <>
            <p style={{color:C.deepBlue,fontSize:13,marginBottom:16,...ds,opacity:0.7,textAlign:"center"}}>Unisciti a PedalAgilla 🌊</p>
            {[["👤 Nome",nome,setNome,"text","Mario"],["👤 Cognome",cognome,setCognome,"text","Rossi"],
              ["📧 Email",email,setEmail,"email","mario@example.com"],
              ["📱 Telefono",telefono,setTelefono,"tel","+39 333 1234567"],
              ["🔑 Password",password,setPassword,"password","Minimo 6 caratteri"]].map(([label,val,setter,type,ph])=>(
              <div key={label}>
                <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>{label}</p>
                <input value={val} onChange={e=>setter(e.target.value)} type={type} placeholder={ph} style={inputStyle} />
              </div>
            ))}
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"6px 0 6px",...ds}}>📷 Documento <span style={{color:"#aaa",fontWeight:400}}>(opzionale)</span></p>
            <div style={{border:`1.5px dashed ${C.blueGreen}`,borderRadius:12,padding:16,textAlign:"center",marginBottom:12,background:`${C.blueGreen}05`,cursor:"pointer"}}
              onClick={()=>document.getElementById("docInput").click()}>
              {docPreview ? <img src={docPreview} style={{width:"100%",borderRadius:8,maxHeight:120,objectFit:"cover"}} />
                : <div><div style={{fontSize:32,marginBottom:6}}>📄</div>
                    <p style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:600,margin:0}}>Carica documento</p>
                    <p style={{color:"#aaa",fontSize:11,...ds,margin:"4px 0 0"}}>Opzionale</p>
                  </div>
              }
              <input id="docInput" type="file" accept="image/*" onChange={handleDocChange} style={{display:"none"}} />
            </div>
            {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 12px",...ds}}>⚠️ {error}</p>}
            <button onClick={handleRegister} disabled={loading}
              style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
              {loading?"⏳ Registrazione...":"Crea account 🌊"}
            </button>
          </>}

          {mode==="adminLogin" && <>
            <button onClick={()=>{setMode("login");setError(null);}} style={{background:"none",border:"none",color:C.blueGreen,fontSize:14,cursor:"pointer",...ds,fontWeight:600,marginBottom:16}}>← Torna</button>
            <p style={{color:C.deepBlue,fontSize:13,marginBottom:16,...ds,opacity:0.7,textAlign:"center"}}>🔐 Accesso riservato</p>
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>👤 Username</p>
            <input value={adminUser} onChange={e=>setAdminUser(e.target.value)} type="text" placeholder="marco" style={inputStyle} />
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>🔑 Password</p>
            <input value={adminPass} onChange={e=>setAdminPass(e.target.value)} type="password" placeholder="••••••••" style={inputStyle} />
            {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 12px",...ds}}>⚠️ {error}</p>}
            <button onClick={handleAdminLogin}
              style={{width:"100%",background:`linear-gradient(90deg,${C.deepBlue},#034a6e)`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
              Accedi come Admin 🔐
            </button>
          </>}
        </div>
      </div>
    </div>
  );
}

                </div>
              </div>)
            }</div>}

            {step===3 && bookedBike && <div className="slide">
              <p style={{color:C.deepBlue,fontSize:13,marginBottom:16,...ds,opacity:0.7}}>Scegli il tuo piano tariffario</p>
              {piani.map(p=>(
                <div key={p.id} className="card" onClick={()=>setPiano(p.id)}
                  style={{background:piano===p.id?C.deepBlue:C.white,border:`2px solid ${piano===p.id?C.deepBlue:C.skyBlue+"50"}`,borderRadius:16,padding:20,marginBottom:12,boxShadow:"0 2px 12px rgba(2,48,71,0.08)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <span style={{fontSize:28}}>{p.icon}</span>

                        <p style={{color:piano===p.id?C.white:C.deepBlue,fontWeight:700,fontSize:15,margin:0,fontFamily:"Lora"}}>{p.label}</p>

                      </div>
                    </div>
                    {piano===p.id && <div style={{width:24,height:24,borderRadius:12,background:C.blueGreen,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:14}}>✓</div>}
                  </div>
                </div>
              ))}

              <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
                <p style={{color:C.blueGreen,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>💶 Tariffe trasparenti</p>
                <p style={{color:"#888",fontSize:11,...ds,margin:0}}>Al minuto: €1,00 sblocco + €0,19 ogni minuto</p>
                <p style={{color:"#888",fontSize:11,...ds,margin:"2px 0 0"}}>Giornata: €19,90 flat con cambio bici incluso</p>
              </div>

              <button className="btn" onClick={()=>setShowPayment(true)}
                style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
                💳 Paga {piano==="giornata"?"€19,90":"€1,00 (sblocco)"} →
              </button>
            </div>}
          </div>
        </div>
      )}

      {/* PAYMENT */}
      {showPayment && bookedBike && (
        <div style={{position:"fixed",inset:0,background:C.bgLight,zIndex:200,display:"flex",flexDirection:"column",overflowY:"auto"}}>
          <div style={{background:C.deepBlue,padding:"50px 20px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>

            <div style={{width:30}}/>
          </div>
          <PaymentForm
            amount={payAmount}
            label={piano==="giornata"?"GIORNATA INTERA":"SBLOCCO BICI"}
            onSuccess={()=>{ setShowPayment(false); setShowBooking(false); setCorsaAttiva(bookedBike); }}
            onCancel={()=>setShowPayment(false)} />
        </div>
      )}
    </div>
  );
}

              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 14px",fontFamily:"Lora"}}>🛣️ Top km percorsi</p>

            </div>

        </div>

        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(245,249,251,0.97)",borderTop:`1px solid ${C.skyBlue}50`,display:"flex",padding:"10px 0 18px"}}>
          {[["dashboard","⊞","Home"],["mappa","🗺️","Mappa"],["bici","🚲","Bici"],["ordini","🔧","Ordini"],["stats","📊","Stats"]].map(([id,icon,label])=>(
            <button key={id} className="btn" onClick={()=>setTab(id)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:20}}>{icon}</span>

            </button>

      </div>
    </div>

function Main() {
  const [user, setUser] = React.useState(null);
  const handleLogin = (u) => setUser(u);
  const handleLogout = () => {
    if (window.firebaseAuth) window.firebaseFunctions.signOut(window.firebaseAuth).catch(()=>{});
    setUser(null);
  };
  if (!user) return <AuthScreen onLogin={handleLogin} />;
  if (user.type==="admin") return <AdminApp user={user} onLogout={handleLogout} />;
  return <ClienteApp user={user} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
</script>
