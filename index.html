    try {
      await waitFB();
      const {doc, setDoc} = window.firebaseFunctions;
      await setDoc(doc(window.firebaseDb, 'bikesStatus', bikeId), {
        inUse, userId: inUse ? (user.uid||"") : null, updatedAt: new Date().toISOString()
      }, {merge: true});
      console.log(`β€Ö setBikeInUse: ${bikeId} βÜ£ inUse=${inUse}`);
    } catch(e) { console.error('βù¨ Errore setBikeInUse:', e.code, e.message); }

  const handleFreeStart = async () => {
    setShowPlan(false);
    setRiding(true);
    try {
      await waitFB();
      const {collection,addDoc}=window.firebaseFunctions;
      const bks=selectedBikes.length>0?selectedBikes:[selectedBike];
      const rideIds=[];
      for(const bike of bks){
        const rideDoc=await addDoc(collection(window.firebaseDb,"rides"),{
          bikeId:bike.id, userId:user.uid||"",
          userName:`${user.nome||""} ${user.cognome||""}`.trim()||"Cliente",
          userEmail:user.email||"", zone:bike.zone, plan:"giornata",
          status:"In corso", startTime:new Date().toISOString(),
          track:[], cost:0, groupSize:bks.length,
          promoCode:promoApplied?.code||null, promoType:promoApplied?.type||null, isFree:true,
        });
        rideIds.push({bikeId:bike.id,rideId:rideDoc.id});
        await sendBikeCommand(bike.id, 'unlock');
        await sendBikeCommand(bike.id, 'gps_high');
        await setBikeInUse(bike.id, true);
      }
      setCurrentRideIds(rideIds);
      setConfirmed(bks);
      setRiding(true); // Mostra timer SUBITO
      // Comandi IoT in parallelo in background
      Promise.all(bks.map(bike => Promise.all([
        sendBikeCommand(bike.id, 'unlock'),
        sendBikeCommand(bike.id, 'gps_high'),
        setBikeInUse(bike.id, true),
      ]))).catch(e=>console.error('Errore comandi IoT:', e));
    } catch(e){console.error(e); setConfirmed(selectedBikes.length>0?selectedBikes:[selectedBike]);}
  };

  const handleEndRide=(secs,cost,bikeId)=>{
    sendBikeCommand(bikeId, 'lock');
    sendBikeCommand(bikeId, 'gps_normal'); // Frequenza reattiva (30s) per sblocco rapido del prossimo cliente
    setBikeInUse(bikeId, false);
    setConfirmed(prev=>{
      const remaining=prev.filter(b=>b.id!==bikeId);
      if(remaining.length===0){
        setRiding(false);
        setShowSummary(true);
        setRideSummary({bikes:prev,secs,cost});
      }
      return remaining;

    setCurrentRideIds(prev=>prev.filter(r=>r.bikeId!==bikeId));
  };

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.deepBlue} 0%,#034a6e 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <style>{css}</style>
      <div style={{width:390,minHeight:844,background:C.bgLight,borderRadius:40,border:`6px solid ${C.deepBlue}`,overflow:"hidden",position:"relative",display:"flex",flexDirection:"column",boxShadow:`0 40px 80px rgba(2,48,71,0.5)`}}>

        {/* Caricamento ripristino corsa */}
        {restoringRide&&(
          <div style={{position:"absolute",inset:0,background:C.deepBlue,zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <img src="https://www.pedalagilla.it/icons/icon-192x192.png" style={{width:100,height:100,objectFit:"contain",marginBottom:20}} alt="PedalAgilla"/>
            <p style={{color:C.skyBlue,fontSize:14,...ds}}>βè≥ Caricamento...</p>
          </div>
        )}

        {/* QR Scanner */}
        {showQRScanner&&(
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.95)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <button onClick={()=>setShowQRScanner(false)} style={{position:"absolute",top:20,right:20,background:"none",border:"none",color:C.white,fontSize:28,cursor:"pointer"}}>{t('scanClose')}</button>
            {addingBike&&<div style={{position:"absolute",top:20,left:20,background:C.warmOrange,borderRadius:10,padding:"4px 12px"}}><p style={{color:C.white,fontSize:11,...ds,fontWeight:700,margin:0}}>βûï Aggiunta bici #{selectedBikes.length+1}</p></div>}
            <div style={{fontSize:60,marginBottom:20}}>πü™Ζ</div>
            <p style={{color:C.white,fontSize:18,fontWeight:700,fontFamily:"Lora",marginBottom:8}}>{t('scanTitle')}</p>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,...ds,marginBottom:20,textAlign:"center",padding:"0 30px"}}>{t('scanDesc')}</p>
            <video id="qrVideo" style={{width:260,height:260,borderRadius:16,objectFit:"cover",border:`3px solid ${C.blueGreen}`,marginBottom:20}} autoPlay playsInline muted/>
            <canvas id="qrCanvas" style={{display:"none"}}/>
            <div style={{background:C.white,borderRadius:16,padding:16,width:260,textAlign:"center"}}>
              <p style={{color:C.deepBlue,fontSize:12,...ds,fontWeight:600,margin:"0 0 8px"}}>{t('scanManual')}</p>
              <input placeholder={t('scanPh')} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`2px solid ${C.blueGreen}`,fontSize:15,fontFamily:"'DM Sans'",color:C.deepBlue,textAlign:"center",textTransform:"uppercase"}}
                onChange={e=>{
                  const val=e.target.value.toUpperCase().trim();
                  const exists=(allBikes||[]).some(b=>b.id===val);
                  if(!exists) return; // ancora in digitazione o codice inesistente
                  const res=resolveBikeForStart(val);
                  if(!res.ok){ alert(res.msg); return; }
                  const bike=res.bike;
                  setShowQRScanner(false);
                  if(addingBike){
                    if(selectedBikes.find(b=>b.id===val)){alert(`Bici ${val} giΟ† aggiunta`);return;}
                    if(selectedBikes.length>=4){alert(t('maxBikes'));return;}
                    setSelectedBikes(prev=>[...prev,bike]);
                  } else {
                    setSelectedBike(bike);setSelectedBikes([bike]);setShowPlan(true);
                  }
                }}/>
            </div>
          </div>
        )}

        {/* Timer corsa */}
        {riding&&confirmed&&confirmed.length>0&&(
          confirmed.length===1
            ?<RideTimer bike={confirmed[0]} plan={plan} user={user} rideId={currentRideIds[0]?.rideId} rideStartTime={restoredElapsed} onEnd={(s,c)=>handleEndRide(s,c,confirmed[0].id)} t={t} userPos={userPos} availableBikes={bikes} isFree={isFree} fixedCost={hotelPerBike}/>
            :<MultiRideTimer bikes={confirmed} plan={plan} user={user} rideIds={currentRideIds} onEnd={handleEndRide} t={t} isFree={isFree} fixedCost={hotelPerBike}/>

function Main() {
  const [user, setUser] = React.useState(null);
  const [lang, setLang] = React.useState(() => {
    const l = navigator.language?.slice(0,2);
    return LANG_LIST.includes(l) ? l : 'en';
  });
  const [installPrompt, setInstallPrompt] = React.useState(null);
  const [showInstallBanner, setShowInstallBanner] = React.useState(false);
  const [isIOS, setIsIOS] = React.useState(false);

  React.useEffect(()=>{
    const isIOSDevice = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    setIsIOS(isIOSDevice);
    if (!isInStandalone) setShowInstallBanner(true);
    const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstallBanner(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  },[]);

  const t = (k) => (TRANSLATIONS[lang] || TRANSLATIONS.en)[k] || k;
  const handleLogin=(u)=>setUser(u);
  const handleLogout=()=>{ if(window.firebaseAuth) window.firebaseFunctions.signOut(window.firebaseAuth).catch(()=>{}); setUser(null); };

  const installBanner = showInstallBanner && (
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:9999,background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 -4px 20px rgba(2,48,71,0.5)"}}>
      <img src="https://www.pedalagilla.it/icons/icon-192x192.png" style={{width:44,height:44,borderRadius:10,objectFit:"contain",background:"white",padding:2}} alt=""/>
      <div style={{flex:1}}>
        <p style={{color:C.white,fontSize:14,fontWeight:700,margin:0,...ds}}>Installa PedalAgilla</p>
        <p style={{color:C.skyBlue,fontSize:12,margin:0,...ds}}>
          {isIOS ? "Tocca βé΄ βÜ£ 'Aggiungi a schermata Home'" : "Aggiungi alla schermata Home per un accesso rapido"}
        </p>
      </div>
      {!isIOS && installPrompt && (
        <button onClick={async()=>{ installPrompt.prompt(); await installPrompt.userChoice; setShowInstallBanner(false); }}
          style={{background:C.blueGreen,border:"none",borderRadius:10,padding:"10px 16px",color:C.white,fontSize:13,...ds,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
          Installa
        </button>
      )}
      <button onClick={()=>setShowInstallBanner(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.5)",fontSize:22,cursor:"pointer",padding:"0 4px",flexShrink:0}}>β€ï</button>
    </div>
  );

  if(COMING_SOON) return <ComingSoonScreen/>;
  if(!user) return <>{installBanner}<AuthScreen onLogin={handleLogin} lang={lang} setLang={setLang} t={t}/></>;
  return <>{installBanner}<ClienteApp user={user} onLogout={handleLogout} lang={lang} setLang={setLang} t={t}/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Main/>);
</script>

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');

</script>
