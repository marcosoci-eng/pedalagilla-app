function MapView({ bikes, onBikeClick, height=300, fullscreen=false, tracks=[], zones=[], userPos=null }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const zoneShapesRef = React.useRef([]);
  const zoneMarkersRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const userMarkerRef = React.useRef(null);
  const calcDist = (lat1, lng1, lat2, lng2) => {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };
  const getDistText = (bike, pos) => {
    if (!pos) return "";
    const d = calcDist(pos.lat, pos.lng, bike.lat, bike.lng);
    const mins = Math.round(d / 80);
    return d < 1000 ? `πüöΕ ${Math.round(d)}m ¬Ζ ~${mins} min` : `πüöΕ ${(d/1000).toFixed(1)}km ¬Ζ ~${mins} min`;
  };
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    zoneShapesRef.current.forEach(s => s?.setMap(null));
    zoneMarkersRef.current.forEach(m => m?.setMap(null));
    zoneShapesRef.current = [];
    zoneMarkersRef.current = [];
    const icons = { sosta:"πüÖΩοΗè", lenta:"πüêΔ", fuori:"β¦î" };
    zones.forEach(zone => {
      let shape = null, center = null;
      if (zone.shape === "circle" && zone.center) {
        shape = new window.google.maps.Circle({ map: mapInstanceRef.current, center: zone.center, radius: zone.radius || 200, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
        center = zone.center;
      } else if (zone.path?.length > 0) {
        shape = new window.google.maps.Polygon({ map: mapInstanceRef.current, paths: zone.path, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p => bounds.extend(p));
        const c = bounds.getCenter();
        center = { lat: c.lat(), lng: c.lng() };
      }
      if (shape) zoneShapesRef.current.push(shape);
      if (center && zone.type !== "operativa" && icons[zone.type]) {
        const marker = new window.google.maps.Marker({ position: center, map: mapInstanceRef.current, label: { text: icons[zone.type], fontSize: "16px" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 0, fillOpacity: 0, strokeOpacity: 0 } });
        zoneMarkersRef.current.push(marker);
      }
    });
  }, [zones, mapInstanceRef.current]);
  React.useEffect(() => {
    if (!mapInstanceRef.current || !userPos) return;
    if (!mapInstanceRef.current._centeredOnUser) { mapInstanceRef.current.setCenter(userPos); mapInstanceRef.current.setZoom(14); mapInstanceRef.current._centeredOnUser = true; }
  }, [userPos]);
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    markersRef.current.forEach(({ marker, iw, bike }) => {
      const distanceText = getDistText(bike, userPos);
      iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">πü™ç ${bike.zone}</span><br/><span style="font-size:11px">βöΓ ${bike.battery}% ¬Ζ ~${getRange(bike.battery)}km</span>${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}<br/><span style="font-size:11px;color:${bike.status==='Disponibile'?'#219EBC':'#FB8500'}">β½è ${bike.status}</span></div>`);
    });
    if (userPos && mapInstanceRef.current) {
      if (userMarkerRef.current) { 
        userMarkerRef.current.setPosition(userPos);
        if (userMarkerRef.current._circle) userMarkerRef.current._circle.setCenter(userPos);
        if (userMarkerRef.current._outer) userMarkerRef.current._outer.setPosition(userPos);
      } else {
        // Cerchio accuratezza GPS - non intercetta click
        const circle = new window.google.maps.Circle({
          map: mapInstanceRef.current, center: userPos, radius: 30,
          fillColor: "#219EBC", fillOpacity: 0.12,
          strokeColor: "#219EBC", strokeWeight: 1.5, strokeOpacity: 0.4,
          zIndex: 1, clickable: false
        });
        // Cerchio esterno pulsante - non intercetta click
        const outer = new window.google.maps.Marker({
          position: userPos, map: mapInstanceRef.current, zIndex: 2,
          clickable: false,
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 18, fillColor: "#219EBC", fillOpacity: 0.2, strokeColor: "#219EBC", strokeWeight: 1 }
        });
        // Punto centrale - non intercetta click
        const marker = new window.google.maps.Marker({ 
          position: userPos, map: mapInstanceRef.current, title: "La tua posizione",
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: "#219EBC", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 3 }, 
          zIndex: 3, clickable: false
        });
        marker._circle = circle;
        marker._outer = outer;
        userMarkerRef.current = marker;
        // Centra mappa sulla posizione utente la prima volta
        if (!mapInstanceRef.current._centeredOnUser) {
          mapInstanceRef.current.setCenter(userPos);
          mapInstanceRef.current.setZoom(15);
          mapInstanceRef.current._centeredOnUser = true;
        }
      }
    }
  }, [userPos]);

  // Aggiorna marker quando cambiano le bici (posizione/batteria real-time)
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    bikes.forEach(bike => {
      const entry = markersRef.current.find(m => m.bike.id === bike.id);
      if (entry) {
        entry.marker.setPosition({ lat: bike.lat, lng: bike.lng });
        const color = bike.isMTB?"#FB8500":bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500";
        entry.marker.setIcon({ path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: color, fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 });
        entry.marker.setLabel({ text: bike.isMTB?"πüèîοΗè":`${bike.battery}%`, color: "#ffffff", fontSize: bike.isMTB?"14px":"10px", fontWeight: "bold" });
        entry.bike = bike;
      } else if (mapInstanceRef.current) {
        // Nuova bici βÄî aggiungi marker
        const iw = new window.google.maps.InfoWindow({ content: "" });
        const color = bike.isMTB?"#FB8500":bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500";
        const marker = new window.google.maps.Marker({
          position: { lat: bike.lat, lng: bike.lng }, map: mapInstanceRef.current, title: bike.id,
          label: { text: bike.isMTB?"πüèîοΗè":`${bike.battery}%`, color: "#ffffff", fontSize: bike.isMTB?"14px":"10px", fontWeight: "bold" },
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: color, fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 }
        });
        markersRef.current.push({ marker, iw, bike });
        marker.addListener("click", () => {
          const distanceText = getDistText(bike, userPos);
          iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">πü™ç ${bike.zone||""}</span><br/>${bike.isMTB?'<span style="font-size:11px">πüèîοΗè MTB Muscolare ¬Ζ Tocca per noleggiare</span>':'<span style="font-size:11px">βöΓ '+bike.battery+'% ¬Ζ ~'+getRange(bike.battery)+'km</span>'}${distanceText?`<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>`:""}
          <br/><span style="font-size:11px;color:${bike.isMTB?"#FB8500":bike.status==='Disponibile'?"#219EBC":"#FB8500"}">β½è ${bike.isMTB?"Disponibile":bike.status}</span></div>`);
          iw.open(mapInstanceRef.current, marker); onBikeClick(bike);
        });
      }
    });
    // Rimuovi marker di bici non piΟΙ presenti
    markersRef.current = markersRef.current.filter(({marker, bike}) => {
      if (!bikes.find(b => b.id === bike.id)) { marker.setMap(null); return false; }
      return true;
    });
  }, [bikes]);
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit, 200); return; }
      const map = new window.google.maps.Map(mapRef.current, { center: window._userPosition || {lat:43.1500,lng:12.0800}, zoom: window._userPosition ? 14 : 11, mapTypeId: "roadmap", gestureHandling: "greedy", mapTypeControl: false, fullscreenControl: false, styles: [{ featureType:"water", elementType:"geometry", stylers:[{color:"#8ECAE6"}] },{ featureType:"landscape", elementType:"geometry", stylers:[{color:"#e8f4f8"}] },{ featureType:"road", elementType:"geometry", stylers:[{color:"#ffffff"}] },{ featureType:"poi", stylers:[{visibility:"off"}] }] });
      mapInstanceRef.current = map;
      window._mapInstance = map; // per bottone centrami
      bikes.forEach(bike => {
        const iw = new window.google.maps.InfoWindow({ content: "" });
        const marker = new window.google.maps.Marker({ position: { lat: bike.lat, lng: bike.lng }, map, title: bike.id, label: { text: bike.isMTB?"πüèîοΗè":`${bike.battery}%`, color: "#ffffff", fontSize: bike.isMTB?"14px":"10px", fontWeight: "bold" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: bike.isMTB?"#FB8500":bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 } });
        markersRef.current.push({ marker, iw, bike });
        marker.addListener("click", () => { const distanceText = getDistText(bike, userPos); iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">πü™ç ${bike.zone||""}</span><br/>${bike.isMTB?'<span style="font-size:11px">πüèîοΗè MTB Muscolare</span>':'<span style="font-size:11px">βöΓ '+bike.battery+'% ¬Ζ ~'+getRange(bike.battery)+'km</span>'}${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}<br/><span style="font-size:11px;color:${bike.isMTB?'#FB8500':bike.status==='Disponibile'?'#219EBC':'#FB8500'}">β½è ${bike.isMTB?'Disponibile':bike.status}</span></div>`); iw.open(map, marker); onBikeClick(bike); });
      });
      zones.forEach(zone => {
        if (zone.shape === "circle" && zone.center) { 
          new window.google.maps.Circle({ map, center: zone.center, radius: zone.radius||200, fillColor: zone.color, fillOpacity: zone.type==="sosta"?0.25:0.15, strokeColor: zone.color, strokeWeight: zone.type==="sosta"?2.5:1.5 }); 
          const icons = { sosta:"πüÖΩοΗè", lenta:"πüêΔ", fuori:"β¦î" }; 
          if (zone.type !== "operativa" && icons[zone.type]) { 
            new window.google.maps.Marker({ 
              position: zone.center, map, 
              label: { text: icons[zone.type], fontSize: zone.type==="sosta"?"22px":"16px", fontWeight:"bold" }, 
              icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: zone.type==="sosta"?18:0, fillColor:"#2196F3", fillOpacity: zone.type==="sosta"?0.9:0, strokeColor:"#ffffff", strokeWeight: zone.type==="sosta"?2:0 },
              title: zone.name||""
            }); 
          } 
        }
        else if (zone.path?.length > 0) { new window.google.maps.Polygon({ map, paths: zone.path, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 }); }
      });
      tracks.forEach(track => {
        if (track.points?.length > 1) { 
          const path = track.points.map(p => ({lat: p.lat||p[0], lng: p.lng||p[1]})).filter(p=>p.lat&&p.lng);
          if (path.length > 1) {
            new window.google.maps.Polyline({ path, geodesic: true, strokeColor: track.color||"#219EBC", strokeOpacity: 0.85, strokeWeight: 4, map }); 
            new window.google.maps.Marker({ position: path[0], map, label:{text:"A",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#219EBC",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} }); 
            new window.google.maps.Marker({ position: path[path.length-1], map, label:{text:"B",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#FB8500",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} }); 
          }
        }
      });
    };
    tryInit();
  }, []);
  const style = fullscreen ? { position:"absolute", inset:0, width:"100%", height:"100%" } : { width:"100%", height, borderRadius:16 };
  return <div ref={mapRef} style={style} />;
}

function ZoneMapEditor({ zones, zoneType, drawingMode, drawingActive, zoneName, onZoneSaved, onZoneUpdated }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const drawingManagerRef = React.useRef(null);
  const shapesRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const nameMarkersRef = React.useRef([]);
  const zonesRef = React.useRef(zones);
  const zoneColors = { operativa:"#00C853", sosta:"#2196F3", lenta:"#FFB703", fuori:"#FB8500" };
  const zoneIcons = { sosta:"πüÖΩοΗè", lenta:"πüêΔ", fuori:"β¦î" };
  const zoneTypeRef = React.useRef(zoneType);
  const zoneNameRef = React.useRef(zoneName);
  React.useEffect(()=>{ zoneTypeRef.current = zoneType; }, [zoneType]);
  React.useEffect(()=>{ zoneNameRef.current = zoneName; }, [zoneName]);

  const drawZones = (zoneList, map) => {
    shapesRef.current.forEach(s=>{ if(s) s.setMap(null); });
    markersRef.current.forEach(m=>{ if(m) m.setMap(null); });
    nameMarkersRef.current.forEach(m=>{ if(m) m.setMap(null); });
    shapesRef.current = []; markersRef.current = []; nameMarkersRef.current = [];
    const mapTarget = map || mapInstanceRef.current;
    if (!mapTarget || !window.google) return;
    zoneList.forEach((zone, idx) => {
      let shape = null, center = null;
      if (zone.shape==="circle" && zone.center) {
        shape = new window.google.maps.Circle({ map:mapTarget, center:zone.center, radius:zone.radius||200, fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2, draggable:true, editable:true });
        center = {lat:zone.center.lat, lng:zone.center.lng};
        shape.addListener("center_changed", ()=>{
          isEditingRef.current = true;
          const nc = shape.getCenter();
          zonesRef.current = zonesRef.current.map((z,i)=>i===idx?{...z,center:{lat:nc.lat(),lng:nc.lng()}}:z);
          setTimeout(()=>{ isEditingRef.current = false; }, 500);
        });
        shape.addListener("radius_changed", ()=>{
          isEditingRef.current = true;
          zonesRef.current = zonesRef.current.map((z,i)=>i===idx?{...z,radius:shape.getRadius()}:z);
          setTimeout(()=>{ isEditingRef.current = false; }, 500);
        });
      } else if (zone.path && zone.path.length>0) {
        shape = new window.google.maps.Polygon({ map:mapTarget, paths:zone.path, fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2, draggable:true, editable:true });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p=>bounds.extend(p));
        const c = bounds.getCenter();
        center = {lat:c.lat(), lng:c.lng()};
        shape.getPath().addListener("set_at", ()=>{
          isEditingRef.current = true;
          const newPath = shape.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()}));
          zonesRef.current = zonesRef.current.map((z,i)=>i===idx?{...z,path:newPath}:z);
          setTimeout(()=>{ isEditingRef.current = false; }, 500);
        });
      }
      if (shape) shapesRef.current[idx] = shape;
      if (center) {
        if (zone.type !== "operativa" && zoneIcons[zone.type]) {
          markersRef.current[idx] = new window.google.maps.Marker({ position:center, map:mapTarget, label:{text:zoneIcons[zone.type],fontSize:"20px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0}, zIndex:10, clickable:false });
        }
        if (zone.name) {
          nameMarkersRef.current[idx] = new window.google.maps.Marker({ position:center, map:mapTarget, label:{text:zone.name,color:"#023047",fontSize:"11px",fontWeight:"700",fontFamily:"'DM Sans',sans-serif"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0}, zIndex:9, clickable:false });
        }
      }
    });
  };

  const isEditingRef = React.useRef(false);

  // Ridisegna solo quando cambia il numero di zone (non durante editing)
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    if (isEditingRef.current) return; // non ridisegnare durante edit
    if (zones.length !== zonesRef.current.length) {
      zonesRef.current = zones;
      drawZones(zones);
    }
  }, [zones.length]);

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google || !window.google.maps.drawing) { setTimeout(tryInit,200); return; }
      const map = new window.google.maps.Map(mapRef.current, {
        center:{lat:43.1500,lng:12.0800}, zoom:11, mapTypeId:"roadmap",
        gestureHandling:"cooperative",
        styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      mapInstanceRef.current = map;
      zonesRef.current = zones;
      const dm = new window.google.maps.drawing.DrawingManager({ drawingMode:null, drawingControl:false, circleOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false}, polygonOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false} });
      dm.setMap(map);
      drawingManagerRef.current = dm;
      window.google.maps.event.addListener(dm,"circlecomplete",circle=>{
        dm.setDrawingMode(null);
        const zt=zoneTypeRef.current; const zn=zoneNameRef.current; const color=zoneColors[zt]||"#219EBC";
        circle.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2});
        onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"circle",color,center:{lat:circle.getCenter().lat(),lng:circle.getCenter().lng()},radius:circle.getRadius()});
        circle.setMap(null);
      });
      window.google.maps.event.addListener(dm,"polygoncomplete",polygon=>{
        dm.setDrawingMode(null);
        const zt=zoneTypeRef.current; const zn=zoneNameRef.current; const color=zoneColors[zt]||"#219EBC";
        polygon.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2});
        const path=polygon.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()}));
        onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"polygon",color,path});
        polygon.setMap(null);
      });
      drawZones(zones, map);
      // Esponi il ref delle zone per il salvataggio
      window._zoneEditorRef = zonesRef;
    };
    tryInit();
  }, []);

  React.useEffect(() => {
    const activate = () => {
      if (!drawingManagerRef.current || !window.google || !window.google.maps.drawing) { if (drawingActive) setTimeout(activate,300); return; }
      drawingManagerRef.current.setDrawingMode(drawingActive?(drawingMode==="circle"?window.google.maps.drawing.OverlayType.CIRCLE:window.google.maps.drawing.OverlayType.POLYGON):null);
      if (mapInstanceRef.current) mapInstanceRef.current.setOptions({gestureHandling:drawingActive?"none":"cooperative"});
    };
    activate();
  }, [drawingActive, drawingMode]);

  return <div ref={mapRef} style={{width:"100%",height:"100%"}}/>;
}
function PaymentForm({ amount, bike, plan, planId, onSuccess, onCancel, t, hidePreAuth=false, flatCharge=false }) {
  const cardRef = React.useRef(null);
  const cardEl = React.useRef(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [nome, setNome] = React.useState("");
  const nBikes = Array.isArray(bike) ? bike.length : 1;
  const preAuth = nBikes * 19.90;
  React.useEffect(() => {
    const elements = stripeInstance.elements();
    const tryMount = () => {
      if (!cardRef.current) { setTimeout(tryMount, 200); return; }
      const card = elements.create("card",{style:{base:{fontSize:"16px",color:"#023047",fontFamily:"'DM Sans',sans-serif","::placeholder":{color:"#aaa"}}},hidePostalCode:true});
      card.mount(cardRef.current); cardEl.current = card;
    };
    setTimeout(tryMount, 100);
    return () => { if (cardEl.current) { cardEl.current.destroy(); cardEl.current = null; } };
  }, []);
  const handlePay = async () => {
    if (!nome.trim()) { setError(t('errName')); return; }
    if (!cardEl.current) { setError("Carta non caricata, riprova"); return; }
    setLoading(true); setError(null);
    try {
      const {paymentMethod, error:e} = await stripeInstance.createPaymentMethod({
        type:"card", card:cardEl.current, billing_details:{name:nome}
      });
      if (e) { setError(e.message); setLoading(false); return; }
      
      // Tariffa al minuto: PRE-AUTORIZZA (hold) l'importo massimo giornaliero (19.90/bici).
      // L'addebito reale avviene a fine corsa con la cattura. Giornata/Settimanale: addebito immediato.
      const isPerMinute = planId === 'minuti' && !flatCharge;
      let resp, data, isPreAuth = false;
      if (isPerMinute) {
        const holdAmount = 19.90 * nBikes;
        resp = await fetch('https://web-production-eafa5.up.railway.app/create-pre-auth', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            paymentMethodId: paymentMethod.id, amount: holdAmount,
            bikeIds: Array.isArray(bike) ? bike.map(b=>b.id) : [bike.id]
          })
        });
        isPreAuth = true;
      } else {
        resp = await fetch('https://web-production-eafa5.up.railway.app/create-payment-intent', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            amount, paymentMethodId: paymentMethod.id,
            bikeId: Array.isArray(bike) ? bike.map(b=>b.id).join(',') : bike.id,
            plan, userId: window._currentUserId||'', userName: nome
          })
        });
      }
      console.log('πü£≥ Stripe response status:', resp.status);
      data = await resp.json();
      console.log('πü£≥ Stripe response:', data);
      if (!data.success) { setError(data.error || t('errPayment')); setLoading(false); return; }
      
      setLoading(false);
      // Passa anche isPreAuth: se true, l'importo va catturato a fine corsa
      onSuccess(paymentMethod.id, data.paymentIntentId, isPreAuth);
    } catch(e) { setError(t('errPayment')); setLoading(false); }
  };
  const bikeIds = Array.isArray(bike) ? bike.map(b=>b.id).join(', ') : bike.id;
  return (
    <div style={{padding:"20px 18px"}}>
      <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:16,padding:16,marginBottom:12,textAlign:"center"}}>
        {planId==='minuti' && !flatCharge ? (<>
          <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 6px",...ds,letterSpacing:2}}>{plan}</p>
          <p style={{color:C.sunYellow,fontSize:26,fontWeight:700,margin:"0 0 6px",...ds}}>β²§{SBLOCCO.toFixed(2)} + β²§{TARIFFA_MIN}/{t('min')}</p>
          <p style={{color:"rgba(255,255,255,0.7)",fontSize:11.5,margin:0,...ds,lineHeight:"1.4"}}>{bikeIds} ¬Ζ {t('planMinutesDesc')}</p>
        </>) : (<>
          <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 4px",...ds,letterSpacing:2}}>{t('total')}</p>
          <p style={{color:C.sunYellow,fontSize:36,fontWeight:700,margin:"0 0 4px",...ds}}>β²§{amount.toFixed(2)}</p>
          <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,margin:0,...ds}}>{bikeIds} ¬Ζ {plan}</p>
        </>)}
      </div>

      {/* Box pre-autorizzazione βÄî solo tariffa al minuto */}
      {planId==='minuti' && !flatCharge && <div style={{background:"#FFF8E1",border:"2px solid #FFB703",borderRadius:14,padding:"14px 16px",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
          <span style={{fontSize:22,flexShrink:0}}>πüî£</span>
          <div>
            <p style={{color:"#7a5800",fontSize:13,fontWeight:700,margin:"0 0 4px",...ds}}>
              {t('preAuthTitle')} β²§{preAuth.toFixed(2)}
            </p>
            <p style={{color:"#7a5800",fontSize:12,margin:0,...ds,lineHeight:"1.5"}}>
              {t('preAuthDesc')}
            </p>
            <p style={{color:"#5a8a3a",fontSize:12,fontWeight:700,margin:"8px 0 0",...ds,lineHeight:"1.5"}}>
              β€Ö {t('capNote')}
            </p>
            {nBikes > 1 && (
              <p style={{color:"#b38600",fontSize:11,margin:"6px 0 0",...ds}}>
                {nBikes} {t('bikesSelected')} Ο½ β²§19,90 = β²§{preAuth.toFixed(2)}
              </p>
            )}
          </div>
        </div>
      </div>}

      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>{t('cardName')}</p>
      <input value={nome} onChange={e=>setNome(e.target.value)} placeholder={t('cardNamePh')} style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}`,fontSize:14,fontFamily:"'DM Sans'",color:C.deepBlue,marginBottom:12,background:C.white}} />
      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>{t('card')}</p>
      <div ref={cardRef} style={{background:C.white,padding:14,borderRadius:10,border:`1.5px solid ${C.skyBlue}`,marginBottom:12}} />
      {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 10px",...ds}}>βö†οΗè {error}</p>}
      <button onClick={handlePay} disabled={loading} style={{width:"100%",background:loading?`${C.blueGreen}80`:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:8}}>
        {loading?t('paying'):`${t('payBtn')} β²§${amount.toFixed(2)}`}
      </button>
      <button onClick={onCancel} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>{t('cancel')}</button>
    </div>
  );
}

// βïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïê
// RIDETIMER βÄî singola bici (invariato)
// βïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïê
function RideTimer({ bike, plan, user, rideId, rideStartTime=0, onEnd, t, userPos, availableBikes=[], isFree=false, fixedCost=null }) {
  const computedStart = rideStartTime || Date.now();
  const [seconds, setSeconds] = React.useState(() => Math.floor((Date.now() - computedStart) / 1000));
  const [paused, setPaused] = React.useState(false);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const startTimeRef = React.useRef(computedStart);
  const pauseStartRef = React.useRef(null);
  const totalPausedRef = React.useRef(0);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const trackRef = React.useRef([]);
  const [currentSpeed, setCurrentSpeed] = React.useState(0);
  const [totalDistKm, setTotalDistKm] = React.useState(0);
  const lastPosRef = React.useRef(null);
  // null = posizione non nota; 'ok' = dentro area sosta; 'mainland' = fuori, terraferma (β²§35); 'island' = fuori, su isola (β²§70)
  const [parkStatus, setParkStatus] = React.useState(null);
  // Geofence area di funzionamento (operativa)
  const [outOfOperativa, setOutOfOperativa] = React.useState(false);
  const geoStateRef = React.useRef('in');      // 'in' | 'out' rispetto all'area operativa
  const geoLockedRef = React.useRef(false);     // true se abbiamo bloccato l'assistenza per uscita
  const lastWatchPosRef = React.useRef(null);   // per stimare la velocitΟ† nel watcher
  // Batteria reale della bici (aggiornata in tempo reale da Firestore)
  const [liveBattery, setLiveBattery] = React.useState(typeof bike.battery==='number'?bike.battery:null);
  const [lowBattDismissed, setLowBattDismissed] = React.useState(false);
  const isGiornata = plan==="giornata";
  React.useEffect(() => {
    const i = setInterval(() => {
      if (!paused) {
        const elapsed = Math.floor((Date.now() - startTimeRef.current - totalPausedRef.current) / 1000);
        setSeconds(elapsed);
      } else {
        if (pauseStartRef.current) {
          setPauseSeconds(Math.floor((Date.now() - pauseStartRef.current) / 1000));
        }
      }
    }, 500);
    return () => clearInterval(i);
  }, [paused]);

  const handlePauseToggle = async () => {
    if (!paused) {
      pauseStartRef.current = Date.now();
      try {
        await waitFB();
        const {collection, addDoc} = window.firebaseFunctions;
        // PA-027 βÜ£ PED027 (togli PA- e aggiungi PED con padding 3 cifre)
        const pedId = 'PED' + bike.id.replace('PA-','').padStart(3,'0');
        console.log('βèΗοΗè Pausa βÄî invio lock a', pedId);
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'lock',status:'pending',createdAt:new Date().toISOString()});
      } catch(e){ console.error('Errore lock pausa:', e); }
    } else {
      totalPausedRef.current += Date.now() - pauseStartRef.current;
      pauseStartRef.current = null;
      try {
        await waitFB();
        const {collection, addDoc} = window.firebaseFunctions;
        const pedId = 'PED' + bike.id.replace('PA-','').padStart(3,'0');
        console.log('β•ΕοΗè Riprendi βÄî invio unlock a', pedId);
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'unlock',status:'pending',createdAt:new Date().toISOString()});
      } catch(e){ console.error('Errore unlock ripresa:', e); }
    }
    setPaused(p => !p);
  };
  React.useEffect(() => {
    if (!navigator.geolocation||showEndFlow) return;
    const haversine = (a,b) => {
      const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lng-a.lng)*Math.PI/180;
      const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    };
    // Verifica se un punto e' dentro una zona (cerchio o poligono)
    const pointInZone = (pt, zone) => {
      if (zone.shape === "circle" && zone.center) {
        return haversine(zone.center, pt) * 1000 <= (zone.radius || 300);
      }
      if (zone.shape === "polygon" && Array.isArray(zone.path)) {
        let inside = false;
        const path = zone.path;
        for (let i=0, j=path.length-1; i<path.length; j=i++) {
          const xi=path[i].lat, yi=path[i].lng, xj=path[j].lat, yj=path[j].lng;
          const intersect = ((yi>pt.lng)!==(yj>pt.lng)) && (pt.lat < (xj-xi)*(pt.lng-yi)/(yj-yi)+xi);
          if (intersect) inside = !inside;
        }
        return inside;
      }
      return false;
    };
    // Sei "in area autorizzata" se sei dentro almeno una zona di tipo sosta; altrimenti distingui isola/terraferma
    const checkParkZone = (pt) => {
      const zones = (window._clientZones || []).filter(z=>z.type==="sosta");
      if (zones.some(z=>pointInZone(pt, z))) { setParkStatus('ok'); return; }
      const onIsland = ISLANDS.some(is=>haversine({lat:is.lat,lng:is.lng}, pt)*1000 <= is.radius);
      setParkStatus(onIsland ? 'island' : 'mainland');
    };
    const saveGPS = () => { navigator.geolocation.getCurrentPosition(async pos=>{
      const point={lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()};
      if (pos.coords.speed != null) setCurrentSpeed(Math.round(pos.coords.speed*3.6*10)/10);
      if (lastPosRef.current) {
        const d = haversine(lastPosRef.current, point);
        if (d < 0.5) setTotalDistKm(prev => Math.round((prev+d)*100)/100);
      }
      lastPosRef.current = point;
      trackRef.current.push(point);
      checkParkZone(point);
      if (rideId) { try { await waitFB(); const {doc,updateDoc}=window.firebaseFunctions; await updateDoc(doc(window.firebaseDb,"rides",rideId),{track:trackRef.current}); } catch(e){} }
    },()=>{},{enableHighAccuracy:true}); };
    saveGPS(); const i=setInterval(saveGPS,30000); return()=>clearInterval(i);
  },[showEndFlow]);
  // Rilevamento area di sosta + geofence area operativa in tempo reale
  React.useEffect(()=>{
    if (!navigator.geolocation) return;
    const haversine = (a,b) => {
      const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLon=(b.lng-a.lng)*Math.PI/180;
      const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
    };
    const inZone = (pt, z) => {
      if (z.shape==="circle" && z.center) return haversine(z.center, pt)*1000 <= (z.radius||300);
      if (z.shape==="polygon" && Array.isArray(z.path)) {
        let inside=false; const p=z.path;
        for (let i=0,j=p.length-1;i<p.length;j=i++){ const xi=p[i].lat,yi=p[i].lng,xj=p[j].lat,yj=p[j].lng; if(((yi>pt.lng)!==(yj>pt.lng))&&(pt.lat<(xj-xi)*(pt.lng-yi)/(yj-yi)+xi)) inside=!inside; }
        return inside;
      }
      return false;
    };
    // Invia un comando IoT alla bici (stessa via di unlock/lock)
    const sendBikeCmd = async (type) => {
      try {
        await waitFB();
        const {collection,addDoc}=window.firebaseFunctions;
        const pedId='PED'+bike.id.replace('PA-','').padStart(3,'0');
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type,status:'pending',createdAt:new Date().toISOString()});
        console.log('πü™Γ Comando geofence inviato:', type);
      } catch(e){ console.error('Errore comando geofence:', e); }
    };
    const wid = navigator.geolocation.watchPosition(pos=>{
      const pt={lat:pos.coords.latitude,lng:pos.coords.longitude};
      // Stima velocitΟ† (km/h): da GPS se disponibile, altrimenti da spostamento
      let speedKmh = pos.coords.speed!=null ? pos.coords.speed*3.6 : null;
      if (speedKmh==null && lastWatchPosRef.current) {
        const dt=(Date.now()-lastWatchPosRef.current.t)/1000;
        if (dt>0) speedKmh = (haversine(lastWatchPosRef.current, pt)*1000/dt)*3.6;
      }
      lastWatchPosRef.current = {...pt, t:Date.now()};
      const zones=(window._clientZones||[]);
      // --- Stato area di sosta (per il flag β²§35/β²§70) ---
      const sosta=zones.filter(z=>z.type==="sosta");
      if (sosta.some(z=>inZone(pt,z))) setParkStatus('ok');
      else { const onIsland=ISLANDS.some(is=>haversine({lat:is.lat,lng:is.lng},pt)*1000<=is.radius); setParkStatus(onIsland?'island':'mainland'); }
      // --- Geofence area operativa (beep + blocco assistenza) ---
      const operativa=zones.filter(z=>z.type==="operativa");
      if (operativa.length>0) {
        const inside=operativa.some(z=>inZone(pt,z));
        setOutOfOperativa(!inside);
        if (!inside) {
          // Appena esce dall'area: avviso sonoro + blocco assistenza immediato (una sola volta)
          if (!geoLockedRef.current) {
            geoStateRef.current='out';
            geoLockedRef.current=true;
            sendBikeCmd('beep');
            sendBikeCmd('lock');
          }
        } else {
          // Rientrato nell'area: sblocca subito l'assistenza se l'avevamo bloccata
          if (geoLockedRef.current) {
            geoStateRef.current='in';
            geoLockedRef.current=false;
            sendBikeCmd('unlock');
          }
        }
      }
    }, ()=>{}, {enableHighAccuracy:true, maximumAge:3000, timeout:20000});
    return ()=>navigator.geolocation.clearWatch(wid);
  },[]);
  // Batteria della bici in tempo reale (per suggerire il cambio quando scende verso il 25%)
  React.useEffect(()=>{
    let unsub=null;
    (async()=>{
      try {
        await waitFB();
        const {doc,onSnapshot}=window.firebaseFunctions;
        const pedId='PED'+bike.id.replace('PA-','').padStart(3,'0');
        unsub=onSnapshot(doc(window.firebaseDb,"bikes",pedId),snap=>{
          const d=snap.data();
          if(!d) return;
          const b = typeof d.batteryPercent==='number' ? d.batteryPercent : (typeof d.battery==='number'?d.battery:null);
          if(b!=null) setLiveBattery(b);
        });
      } catch(e){ console.error('Errore listener batteria:', e); }
    })();
    return ()=>{ if(unsub) unsub(); };
  },[]);
  const mins=Math.floor(seconds/60), secs=seconds%60, pauseMins=Math.floor(pauseSeconds/60);
  const isSettimanale = plan==="settimanale";
  // Suggerimento cambio bici quando la batteria scende verso il 25%
  const lowBattery = liveBattery!=null && liveBattery<=25;
  const nearestSwapBike = React.useMemo(()=>{
    if (!lowBattery || !userPos || !availableBikes || availableBikes.length===0) return null;
    const hav=(a,b)=>{const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLon=(b.lng-a.lng)*Math.PI/180,x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));};
    const candidates=availableBikes.filter(b=>b.id!==bike.id && b.lat && b.lng && (b.battery==null||b.battery>40));
    if (candidates.length===0) return null;
    let best=null,bestD=Infinity;
    candidates.forEach(b=>{const d=hav(userPos,{lat:b.lat,lng:b.lng}); if(d<bestD){bestD=d;best={...b,distKm:d};}});
    return best;
  },[lowBattery,userPos,availableBikes,bike.id]);
  // Conto alla rovescia a mezzanotte (sia giornata che minuti)
  const midnightCountdown = React.useMemo(() => {
    const midnight = new Date(); midnight.setHours(24,0,0,0);
    const diffSec = Math.max(0, Math.floor((midnight - new Date()) / 1000));
    const h = Math.floor(diffSec/3600), m = Math.floor((diffSec%3600)/60), s = diffSec%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }, [seconds]);

  // Calcolo costo con logica multi-giorno per piano al minuto
  // Il costo si azzera a mezzanotte e riparte, cap β²§19.90/giorno
  const calcMinutiCost = React.useMemo(() => {
    if (!(!isGiornata && !isSettimanale)) return 0;
    // Tempo di pedalata effettivo (durata corsa meno le pause)
    const activeSecs = Math.max(0, seconds - pauseSeconds);
    // Giorni che la corsa ha attraversato (per il cap giornaliero con reset a mezzanotte)
    const startMs = Date.now() - seconds * 1000;
    const startDay = new Date(startMs); startDay.setHours(0,0,0,0);
    const todayDay = new Date(); todayDay.setHours(0,0,0,0);
    const daysPassed = Math.max(0, Math.round((todayDay - startDay) / 86400000));
    const costoBase = SBLOCCO + (activeSecs/60)*TARIFFA_MIN + (pauseSeconds/60)*TARIFFA_PAUSA;
    // Cap: una giornata se la corsa Ο® nello stesso giorno, altrimenti (giorni+1) giornate
    const cap = (daysPassed + 1) * TARIFFA_GIORNATA;
    return Math.min(costoBase, cap);
  }, [seconds, pauseSeconds, isGiornata, isSettimanale]);

  const rideCost = fixedCost!=null ? fixedCost : (isGiornata ? TARIFFA_GIORNATA : isSettimanale ? TARIFFA_SETTIMANALE : calcMinutiCost);
  const pauseCost = isGiornata||isSettimanale ? 0 : 0; // incluso in calcMinutiCost
  const totalCost = isFree ? 0 : rideCost;
  const cappedAtMax = !isGiornata && !isSettimanale && fixedCost==null && (() => {
    // Οà "gratuito fino a mezzanotte" solo quando il costo reale ha raggiunto il tetto giornaliero (β²§19.90)
    const activeSecs = Math.max(0, seconds - pauseSeconds);
    const startMs = Date.now() - seconds * 1000;
    const startDay = new Date(startMs); startDay.setHours(0,0,0,0);
    const todayDay = new Date(); todayDay.setHours(0,0,0,0);
    const daysPassed = Math.max(0, Math.round((todayDay - startDay) / 86400000));
    const costoBase = SBLOCCO + (activeSecs/60)*TARIFFA_MIN + (pauseSeconds/60)*TARIFFA_PAUSA;
    const cap = (daysPassed + 1) * TARIFFA_GIORNATA;
    return costoBase >= cap;
  })();
  const handleParkPhoto=(e)=>{ 
    const file=e.target.files[0]; 
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=1200; let w=img.width, h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>{setParkPhoto(blob);setParkPreview(URL.createObjectURL(blob));},'image/jpeg',0.75);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const handleEndConfirm=async()=>{
    if(!parkPhoto){alert("πü™Η");return;}
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc,addDoc,collection}=window.firebaseFunctions;
      // Invia subito lock e frequenza reattiva (30s) per lo sblocco rapido del prossimo cliente
      const pedId='PED'+bike.id.replace('PA-','').padStart(3,'0');
      try {
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'lock',status:'pending',createdAt:new Date().toISOString()});
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'gps_normal',status:'pending',createdAt:new Date(Date.now()+100).toISOString()});
        console.log('πüî£ Comandi lock+gps_normal inviati a',pedId);
      } catch(e){ console.error('Errore comandi fine corsa:', e); }
      const sRef=ref(window.firebaseStorage,`parcheggi/${bike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL=await getDownloadURL(sRef);
      // CATTURA PAGAMENTO: per la tariffa al minuto (pre-autorizzazione) cattura il costo reale
      let captured = null;
      if(rideId){
        try {
          const {getDoc}=window.firebaseFunctions;
          const rideSnap=await getDoc(doc(window.firebaseDb,"rides",rideId));
          const rideData=rideSnap.data()||{};
          if(rideData.isPreAuth && rideData.paymentIntentId && !rideData.isFree){
            const capResp=await fetch('https://web-production-eafa5.up.railway.app/capture-payment',{
              method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({paymentIntentId:rideData.paymentIntentId, amount:totalCost})
            });
            const capData=await capResp.json();
            captured = capData.success ? (capData.cancelled ? 0 : (capData.captured||totalCost)) : null;
            console.log('πü£Α Cattura pagamento:', capData);
          }
        } catch(e){ console.error('Errore cattura pagamento:', e); }
        await updateDoc(doc(window.firebaseDb,"rides",rideId),{status:"Completata",endTime:new Date().toISOString(),duration:seconds,pauseDuration:pauseSeconds,cost:totalCost,amountPaid:captured!==null?captured:totalCost,parkPhotoURL,track:trackRef.current});
      }
    } catch(e){console.error(e);}
    setUploading(false); onEnd(seconds,totalCost,bike.id);
  };
  const rideMapRef = React.useRef(null);
  const rideMapInstance = React.useRef(null);
  const rideUserMarker = React.useRef(null);
  const rideZonesDrawn = React.useRef(false);

  // Inizializza mappa durante la corsa
  React.useEffect(()=>{
    if (!rideMapRef.current || rideMapInstance.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit, 300); return; }
      const map = new window.google.maps.Map(rideMapRef.current, {
        center: {lat:43.15, lng:12.08}, zoom:15,
        mapTypeId:"roadmap",
        disableDefaultUI: true,
        zoomControl: true,
        gestureHandling:"greedy",
        styles:[{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      rideMapInstance.current = map;
      // Disegna zone parcheggio βÄî riprova ogni 300ms finchΟ© non sono disponibili
      const drawParkingZones = (attempt=0) => {
        const zones = window._clientZones || [];
        if (zones.length === 0 && attempt < 40) { 
          setTimeout(()=>drawParkingZones(attempt+1), 300); 
          return; 
        }
        // Area operativa (contorno verde, riempimento leggero) βÄî il confine entro cui restare
        zones.filter(z=>z.type==="operativa").forEach(zone=>{
          if (zone.center) {
            new window.google.maps.Circle({
              map, center: zone.center, radius: zone.radius||25000,
              fillColor:"#00C853", fillOpacity:0.05,
              strokeColor:"#00C853", strokeWeight:2.5, clickable:false, zIndex:1
            });
          } else if (Array.isArray(zone.path) && zone.path.length>0) {
            new window.google.maps.Polygon({
              map, paths: zone.path,
              fillColor:"#00C853", fillOpacity:0.05,
              strokeColor:"#00C853", strokeWeight:2.5, clickable:false, zIndex:1
            });
          }
        });
        zones.filter(z=>z.type==="sosta").forEach(zone=>{
          let mark = zone.center;
          if (zone.center) {
            new window.google.maps.Circle({
              map, center: zone.center,
              radius: zone.radius||300,
              fillColor:"#2196F3", fillOpacity:0.25,
              strokeColor:"#2196F3", strokeWeight:2.5, clickable:false
            });
          } else if (Array.isArray(zone.path) && zone.path.length>0) {
            new window.google.maps.Polygon({
              map, paths: zone.path,
              fillColor:"#2196F3", fillOpacity:0.25,
              strokeColor:"#2196F3", strokeWeight:2.5, clickable:false
            });
            const b = new window.google.maps.LatLngBounds();
            zone.path.forEach(p=>b.extend(p));
            const c = b.getCenter(); mark = {lat:c.lat(), lng:c.lng()};
          }
          if (mark) {
            new window.google.maps.Marker({
              position: mark, map,
              label:{text:"πüÖΩοΗè", fontSize:"20px"},
              icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0},
              clickable:false, zIndex:10
            });
            if(zone.name) new window.google.maps.Marker({
              position: mark, map,
              label:{text:zone.name,color:"#023047",fontSize:"11px",fontWeight:"700",fontFamily:"'DM Sans',sans-serif"},
              icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0},
              clickable:false, zIndex:9
            });
          }
        });
        rideZonesDrawn.current = true;
      };
      drawParkingZones();
    };
    tryInit();
  }, []);

  // Aggiorna posizione utente sulla mappa durante corsa
  React.useEffect(()=>{
    if (!userPos || !rideMapInstance.current || !window.google) return;
    if (rideUserMarker.current) {
      rideUserMarker.current.setPosition(userPos);
    } else {
      rideUserMarker.current = new window.google.maps.Marker({
        position: userPos, map: rideMapInstance.current,
        icon: {path:window.google.maps.SymbolPath.CIRCLE, scale:12, fillColor:"#219EBC", fillOpacity:1, strokeColor:"#ffffff", strokeWeight:3},
        title:"Sei qui", zIndex:999, clickable:false
      });
      rideMapInstance.current.setCenter(userPos);
      rideMapInstance.current.setZoom(16);
    }
  }, [userPos]);

  if(showEndFlow) return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
        <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{t('endRideTitle')}</h2>
      </div>
      <div style={{padding:20,flex:1}}>
        <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
          <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>{t('photoRequired')}</p>
          <p style={{color:"#888",fontSize:12,...ds,margin:0}}>{t('photoDesc')}</p>
        </div>
        <div style={{border:`2px dashed ${parkPhoto?C.blueGreen:C.warmOrange}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer"}} onClick={()=>document.getElementById("parkInput").click()}>
          {parkPreview?<div><img src={parkPreview} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover",marginBottom:8}}/><p style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:600,margin:0}}>{t('photoChange')}</p></div>
            :<div><div style={{fontSize:48,marginBottom:8}}>πü™Η</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>{t('takePhoto')}</p></div>}
          <input id="parkInput" type="file" accept="image/*" capture="environment" onChange={handleParkPhoto} style={{display:"none"}} />

            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>

        </div>
        <button onClick={handleEndConfirm} disabled={!parkPhoto||uploading} style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
          {uploading?t('saving'):t('confirmEnd')}
        </button>
        <button onClick={()=>setShowEndFlow(false)} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>{t('backToRide')}</button>
      </div>
    </div>
  );
  return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      {/* HEADER COMPATTO */}
      <div style={{background:C.deepBlue,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{flex:1}}>
          <p style={{color:C.skyBlue,fontSize:9,margin:0,letterSpacing:2,...ds}}>{bike.id} ¬Ζ {paused?t('ridePause'):t('rideInProgress')}</p>
          <p style={{color:C.white,fontSize:28,fontWeight:700,margin:0,...ds,fontFamily:"monospace",lineHeight:1.1}}>
            {paused?`${String(pauseMins).padStart(2,"0")}:${String(pauseSeconds%60).padStart(2,"0")}`:
              `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`}
          </p>
        </div>
        <div style={{textAlign:"right"}}>
          <p style={{color:C.skyBlue,fontSize:9,margin:0,...ds}}>Totale</p>
          <p style={{color:C.sunYellow,fontSize:22,fontWeight:700,margin:0,...ds}}>β²§{totalCost.toFixed(2)}</p>
        </div>
        {paused&&<div style={{background:C.sunYellow,borderRadius:8,padding:"3px 10px"}}><p style={{color:C.deepBlue,fontSize:10,...ds,fontWeight:700,margin:0}}>PAUSA</p></div>}
      </div>

      {/* COUNTDOWN MEZZANOTTE βÄî barra compatta sotto header */}
      {midnightCountdown&&(
        <div style={{background:cappedAtMax&&!isGiornata&&!isSettimanale?C.blueGreen:C.warmOrange,padding:"5px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <p style={{color:"#fff",fontSize:10,...ds,fontWeight:700,margin:0,letterSpacing:1}}>
            πü¨ô {isGiornata||isSettimanale||fixedCost!=null?"SCADE A MEZZANOTTE":cappedAtMax?"GRATUITO FINO A MEZZANOTTE":"SI AZZERA A MEZZANOTTE"}
          </p>
          <p style={{color:"#fff",fontSize:14,...ds,fontWeight:700,margin:0,fontFamily:"monospace"}}>{midnightCountdown}</p>
        </div>
      )}
      {/* AVVISO BATTERIA BASSA βÄî suggerisce cambio bici */}
      {lowBattery&&!lowBattDismissed&&(
        <div style={{background:"#E65100",padding:"8px 16px",display:"flex",alignItems:"flex-start",gap:8,flexShrink:0}}>
          <span style={{fontSize:16,marginTop:1}}>πüî΄</span>
          <div style={{flex:1}}>
            <p style={{color:"#fff",fontSize:11.5,...ds,fontWeight:700,margin:0,lineHeight:1.3}}>
              Batteria bassa: {liveBattery}%. Conviene cambiare e-bike per non restare a piedi.
              {nearestSwapBike && ` La piΟΙ vicina Ο® ${nearestSwapBike.id}${nearestSwapBike.zone?` (${nearestSwapBike.zone})`:""} a ~${nearestSwapBike.distKm<1?Math.round(nearestSwapBike.distKm*1000)+" m":nearestSwapBike.distKm.toFixed(1)+" km"}.`}
            </p>
          </div>
          <button onClick={()=>setLowBattDismissed(true)} style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:6,color:"#fff",fontSize:14,...ds,fontWeight:700,cursor:"pointer",padding:"0 8px",flexShrink:0,lineHeight:"22px"}}>β€ï</button>
        </div>
      )}
      {/* AVVISO FUORI AREA DI FUNZIONAMENTO */}
      {outOfOperativa&&(
        <div style={{background:"#B71C1C",padding:"7px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <span style={{fontSize:16}}>πüöΪ</span>
          <p style={{color:"#fff",fontSize:11.5,...ds,fontWeight:700,margin:0,lineHeight:1.3}}>Sei FUORI dall'area di funzionamento. Rientra: l'assistenza alla pedalata viene disattivata fino al rientro.</p>
        </div>
      )}
      {/* INDICATORE AREA DI SOSTA */}
      {parkStatus==='ok'&&(
        <div style={{background:"#00C853",padding:"7px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <span style={{fontSize:16}}>πüö©</span>
          <p style={{color:"#fff",fontSize:12,...ds,fontWeight:700,margin:0,letterSpacing:0.3}}>Sei in un'area di parcheggio autorizzata ¬Ζ puoi terminare qui</p>
        </div>
      )}
      {parkStatus==='mainland'&&(
        <div style={{background:C.warmOrange,padding:"7px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <span style={{fontSize:16}}>βö†οΗè</span>
          <p style={{color:"#fff",fontSize:11.5,...ds,fontWeight:600,margin:0,lineHeight:1.3}}>Fuori da un'area di sosta autorizzata. Parcheggiare qui puΟ≤ comportare un sovrapprezzo di β²§35 (vedi condizioni).</p>
        </div>
      )}
      {parkStatus==='island'&&(
        <div style={{background:"#D32F2F",padding:"7px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <span style={{fontSize:16}}>πüèùοΗè</span>
          <p style={{color:"#fff",fontSize:11.5,...ds,fontWeight:700,margin:0,lineHeight:1.3}}>Sei su un'isola del lago. Lasciare qui la bici comporta un sovrapprezzo di β²§70 per il recupero (vedi condizioni).</p>
        </div>
      )}
      {/* MAPPA */}
      <div style={{flex:1,position:"relative",minHeight:0}}>
        <div ref={rideMapRef} style={{width:"100%",height:"100%"}}/>
        <div style={{position:"absolute",top:8,left:8,background:"rgba(2,48,71,0.85)",borderRadius:10,padding:"4px 10px"}}> 
          <p style={{color:C.white,fontSize:11,...ds,margin:0,fontWeight:600}}>πü™ç {bike.zone}</p>
        </div>
        {/* Speed + Distance overlay */}
        <div style={{position:"absolute",bottom:8,left:8,display:"flex",gap:6}}>
          <div style={{background:"rgba(2,48,71,0.88)",borderRadius:10,padding:"5px 10px",textAlign:"center"}}>
            <p style={{color:C.skyBlue,fontSize:8,...ds,margin:0,letterSpacing:1}}>VELOCITΟÄ</p>
            <p style={{color:C.white,fontSize:16,fontWeight:700,margin:0,...ds}}>{currentSpeed.toFixed(1)} <span style={{fontSize:9}}>km/h</span></p>
          </div>
          <div style={{background:"rgba(2,48,71,0.88)",borderRadius:10,padding:"5px 10px",textAlign:"center"}}>
            <p style={{color:C.skyBlue,fontSize:8,...ds,margin:0,letterSpacing:1}}>DISTANZA</p>
            <p style={{color:C.white,fontSize:16,fontWeight:700,margin:0,...ds}}>{totalDistKm.toFixed(2)} <span style={{fontSize:9}}>km</span></p>
          </div>
        </div>
        <button onClick={()=>{ if(rideMapInstance.current&&userPos) rideMapInstance.current.setCenter(userPos); }}
          style={{position:"absolute",top:8,right:8,background:"white",border:"none",borderRadius:10,padding:"6px 10px",fontSize:18,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>πü™ç</button>
      </div>

      {/* BOTTONI IN BASSO βÄî piΟΙ spazio e piΟΙ grandi */}
      <div style={{padding:"12px 14px 20px",flexShrink:0,background:C.white,boxShadow:"0 -2px 12px rgba(2,48,71,0.08)"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:6}}>
          <button onClick={handlePauseToggle} style={{background:paused?C.blueGreen:C.sunYellow,border:"none",borderRadius:14,padding:"16px 8px",color:paused?C.white:C.deepBlue,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
            {paused?`β•ΕοΗè ${t('resumeBtn')}`:`βèΗοΗè ${t('pauseBtn')}`}
          </button>
          <button onClick={()=>setShowEndFlow(true)} style={{background:C.warmOrange,border:"none",borderRadius:14,padding:"16px 8px",color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
            πüè¹ {t('endRide')}
          </button>
        </div>
        {!isGiornata && !isSettimanale && fixedCost==null && <div style={{display:"flex",justifyContent:"center",gap:20}}>
          {[[t('ridePerMin'),`β²§${TARIFFA_MIN}/min`],[t('pausePerMin'),`β²§${TARIFFA_PAUSA}/min`]].map(([k,v])=>(
            <p key={k} style={{color:"#aaa",fontSize:10,...ds,margin:0}}>{k}: <span style={{color:C.deepBlue,fontWeight:600}}>{v}</span></p>
          ))}
        </div>}
      </div>
    </div>
  );
}

// βïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïê
// MULTIRIDETIMER βÄî piΟΙ bici (NUOVO)
// βïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïê
function MultiRideTimer({ bikes, plan, user, rideIds, onEnd, t, isFree=false, fixedCost=null }) {
  const [activeTab, setActiveTab] = React.useState(0);
  const [globalPaused, setGlobalPaused] = React.useState(false);
  const [seconds, setSeconds] = React.useState(0);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const [completedBikes, setCompletedBikes] = React.useState([]);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [endingBike, setEndingBike] = React.useState(null);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const trackRefs = React.useRef({});
  const isGiornata = plan === "giornata";

  React.useEffect(() => { bikes.forEach(b => { if (!trackRefs.current[b.id]) trackRefs.current[b.id] = []; }); }, []);
  React.useEffect(() => { if (globalPaused||showEndFlow) return; const i=setInterval(()=>setSeconds(s=>s+1),1000); return()=>clearInterval(i); },[globalPaused,showEndFlow]);
  React.useEffect(() => { if (!globalPaused||showEndFlow) return; const i=setInterval(()=>setPauseSeconds(s=>s+1),1000); return()=>clearInterval(i); },[globalPaused,showEndFlow]);
  React.useEffect(() => {
    if (!navigator.geolocation||showEndFlow) return;
    const saveGPS = () => {
      navigator.geolocation.getCurrentPosition(async pos => {
        const point = {lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()};
        const activeBikes = bikes.filter(b=>!completedBikes.includes(b.id));
        for (const bike of activeBikes) {
          trackRefs.current[bike.id] = trackRefs.current[bike.id]||[];
          trackRefs.current[bike.id].push(point);
          const rideEntry = rideIds.find(r=>r.bikeId===bike.id);
          if (rideEntry) { try { await waitFB(); const {doc,updateDoc}=window.firebaseFunctions; await updateDoc(doc(window.firebaseDb,"rides",rideEntry.rideId),{track:trackRefs.current[bike.id]}); } catch(e){} }
        }
      },()=>{},{enableHighAccuracy:true});
    };
    saveGPS(); const i=setInterval(saveGPS,30000); return()=>clearInterval(i);
  },[showEndFlow,completedBikes]);

  const mins=Math.floor(seconds/60), secs=seconds%60;
  const pauseMins=Math.floor(pauseSeconds/60);
  const costPerBike=isFree?0:(fixedCost!=null?fixedCost:(isGiornata?TARIFFA_GIORNATA:Math.min(SBLOCCO+(seconds/60)*TARIFFA_MIN, TARIFFA_GIORNATA)));
  const pauseCost=isFree?0:(isGiornata?0:(pauseSeconds/60)*TARIFFA_PAUSA);
  const activeBikes=bikes.filter(b=>!completedBikes.includes(b.id));
  const totalCost=Math.min((costPerBike+pauseCost), TARIFFA_GIORNATA)*activeBikes.length;

  const handleParkPhoto=(e)=>{ 
    const file=e.target.files[0]; 
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=1200; let w=img.width, h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>{setParkPhoto(blob);setParkPreview(URL.createObjectURL(blob));},'image/jpeg',0.75);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const startEndFlow=(bike)=>{ setEndingBike(bike);setShowEndFlow(true);setParkPhoto(null);setParkPreview(null); };

  const handleEndConfirm=async()=>{
    if(!parkPhoto){alert("πü™Η");return;}
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc}=window.firebaseFunctions;
      // Blocca subito la bici che si sta terminando
      const pedId='PED'+endingBike.id.replace('PA-','').padStart(3,'0');
      const {addDoc,collection,getDoc}=window.firebaseFunctions;
      try {
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'lock',status:'pending',createdAt:new Date().toISOString()});
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'gps_normal',status:'pending',createdAt:new Date(Date.now()+100).toISOString()});
      } catch(e){ console.error('Errore comandi fine corsa multi:', e); }
      const sRef=ref(window.firebaseStorage,`parcheggi/${endingBike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL=await getDownloadURL(sRef);
      const rideEntry=rideIds.find(r=>r.bikeId===endingBike.id);
      const thisCost=Math.min(costPerBike+pauseCost, TARIFFA_GIORNATA);
      if(rideEntry) await updateDoc(doc(window.firebaseDb,"rides",rideEntry.rideId),{status:"Completata",endTime:new Date().toISOString(),duration:seconds,pauseDuration:pauseSeconds,cost:thisCost,parkPhotoURL,track:trackRefs.current[endingBike.id]||[]});
      // Se questa e' l'ULTIMA bici del gruppo, cattura la pre-autorizzazione combinata col totale reale
      const isLastBike = activeBikes.length<=1;
      if(isLastBike && rideEntry){
        try {
          const rideSnap=await getDoc(doc(window.firebaseDb,"rides",rideEntry.rideId));
          const rd=rideSnap.data()||{};
          if(rd.isPreAuth && rd.paymentIntentId && !rd.isFree){
            // Somma i costi reali di tutte le corse del gruppo

function MTBTab({ user, t }) {  const [showInstructions, setShowInstructions] = React.useState(false);

  const isMTBFree = promoApplied && (promoApplied.type==="dipendente"||promoApplied.type==="famiglia");

  const applyMTBPromo = async () => {
    const code = promoCode.trim().toUpperCase();

      await waitFB();
      const {doc, getDoc} = window.firebaseFunctions;

      const data = snap.data();
      if (data.expiresAt && new Date(data.expiresAt) < new Date()) { setPromoError("Codice scaduto"); setPromoLoading(false); return; }
      if (!data.active) { setPromoError("Codice non valido"); setPromoLoading(false); return; }

    setPromoLoading(false);

  // Controlla noleggio attivo
  React.useEffect(()=>{

        const active = snap.docs.find(d => d.data().userId===user.uid && d.data().status==="In corso");
        if (active) setActiveRental({id:active.id,...active.data()});
      } catch(e) {}

    check();

  // GPS tracking
  React.useEffect(()=>{

    const saveGPS = () => {

        const point = {lat:pos.coords.latitude, lng:pos.coords.longitude, t:Date.now()};
        trackRef.current.push(point);
        try {
          await waitFB();
          const {doc, updateDoc} = window.firebaseFunctions;
          await updateDoc(doc(window.firebaseDb,"mtbRentals",activeRental.id),{track:trackRef.current});

      if(video?.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
      return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
      const video=document.getElementById("mtbQrVideo");

      qrIntervalRef.current=setInterval(()=>{
        const video=document.getElementById("mtbQrVideo");
        const canvas=document.getElementById("mtbQrCanvas");
        if(!video||!canvas||!window.jsQR) return;
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=window.jsQR(imageData.data,imageData.width,imageData.height);
        if(code){
          try{
            const url=new URL(code.data);
            const mtbId=url.searchParams.get("mtb");
            if(mtbId){
              clearInterval(qrIntervalRef.current);
              stream.getTracks().forEach(t=>t.stop());

      setSelectedMTB(null); setTariffa(null);
      setShowMtbFeedback(true); // Mostra feedback
    } catch(e){console.error(e);}
    setUploading(false);
  };

  const amount = tariffa==="adulto" ? TARIFFA_MTB_ADULTO : TARIFFA_MTB_BAMBINO;

  // Noleggio attivo βÄî mostra stato e bottone fine
  if(activeRental) return(
    <div style={{padding:"16px 18px 0"}}>
      {showEndFlow ? (
        <div>
          <div style={{background:C.deepBlue,borderRadius:16,padding:16,marginBottom:16,textAlign:"center"}}>
            <p style={{color:C.skyBlue,fontSize:11,...ds,margin:"0 0 4px",letterSpacing:2}}>TERMINA NOLEGGIO MTB</p>

          </div>

            <p style={{color:"#888",fontSize:12,...ds,margin:0}}>Scatta una foto alla bici parcheggiata</p>

              :<div><div style={{fontSize:48,marginBottom:8}}>πü™Η</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>Scatta foto parcheggio</p></div>}

        </div>

// CLIENTEAPP βÄî con multi-bici (Opzione B)
// βïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïêβïê
function ClienteApp({ user, onLogout, lang, setLang, t }) {
  const [allBikes, setAllBikes] = React.useState(initBikes);
  const [activeBikeIds, setActiveBikeIds] = React.useState([]);
  const [bikesLoaded, setBikesLoaded] = React.useState(false);

  // Carica bici real-time da Firebase (bikes collection)
  React.useEffect(()=>{
    const load = async () => {
      try {
        await waitFB();
        const {collection, onSnapshot} = window.firebaseFunctions;
        onSnapshot(collection(window.firebaseDb, "bikes"), snap => {
          if (snap.empty) { setBikesLoaded(true); return; } // usa initBikes se non ci sono dati
          const fbBikes = snap.docs.map(d => {
            const data = d.data();
            const pedId = d.id; // es. PED027
            const paId = pedId.replace('PED', 'PA-0').replace('PA-0', 'PA-'); // PED027 βÜ£ PA-027
            // Normalizza: PED027 βÜ£ PA-027
            const normalizedId = 'PA-' + pedId.replace('PED','').padStart(3,'0');
            const existing = initBikes.find(b => b.id === normalizedId);
            return {
              id: normalizedId,
              battery: data.batteryPercent ?? data.battery ?? existing?.battery ?? 50,
              status: data.status === "Manutenzione" ? "Manutenzione" : (data.locked === false ? "Disponibile" : (data.status || existing?.status || "Disponibile")),
              odometer: existing?.odometer || 0,
              zone: existing?.zone || "Castiglione",
              model: existing?.model || "City Comfort",
              lat: data.lat || existing?.lat || 43.15,
              lng: data.lng || existing?.lng || 12.08,
              note: existing?.note || "",
              lastMaint: existing?.lastMaint || "",
              checks: existing?.checks || {},

  const [feedback, setFeedback] = React.useState(null); // 'up' | 'down'
  const [feedbackProblems, setFeedbackProblems] = React.useState([]);
  const [feedbackNote, setFeedbackNote] = React.useState("");

        });

    },()=>{},{enableHighAccuracy:false});

  React.useEffect(()=>{

  // Recupera corsa attiva al login
  React.useEffect(()=>{
    const restore = async () => {
      console.log("πüî³ Restore avviato, user.uid:", user?.uid);
      try {
        await waitFB();
        const {collection, getDocs} = window.firebaseFunctions;
        const ridesSnap = await getDocs(collection(window.firebaseDb, "rides"));
        console.log("πü™Π Tot rides:", ridesSnap.docs.length);
        const allActiveRides = ridesSnap.docs
          .filter(d => {
            const data = d.data();
            const isRecent = data.startTime && (Date.now() - new Date(data.startTime).getTime()) < 24 * 60 * 60 * 1000;
            return data.status === "In corso" && data.userId === user.uid && isRecent;
          })
          .map(d => ({id: d.id, ...d.data()}));
        // Deduplica per bikeId βÄî tieni la piΟΙ recente
        const seenBikes = new Set();
        const activeRides = allActiveRides
          .sort((a,b) => new Date(b.startTime||0) - new Date(a.startTime||0))
          .filter(r => { if(seenBikes.has(r.bikeId)) return false; seenBikes.add(r.bikeId); return true; });
        console.log("πüîç Corse attive trovate:", activeRides.length);

    if (user?.uid) restore();
    else setRestoringRide(false);

  // QR scanner βÄî usato sia per prima bici che per aggiungerne altre
  const startQRScanner = (isAdding=false) => {
    setAddingBike(isAdding);
    setShowQRScanner(true);
  };

  React.useEffect(() => {
    if (!showQRScanner) {
      clearInterval(qrIntervalRef.current);
      const video=document.getElementById("qrVideo");
      if(video&&video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
      return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
      const video=document.getElementById("qrVideo"); if(video){video.srcObject=stream;video.play();}
      qrIntervalRef.current=setInterval(()=>{
        const video=document.getElementById("qrVideo"); const canvas=document.getElementById("qrCanvas");
        if(!video||!canvas||!window.jsQR) return;
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=window.jsQR(imageData.data,imageData.width,imageData.height);
        if(code){
          try{
            const url=new URL(code.data); const bikeId=url.searchParams.get("bike");
            if(bikeId){
              clearInterval(qrIntervalRef.current); stream.getTracks().forEach(t=>t.stop()); setShowQRScanner(false);
              const res=resolveBikeForStart(bikeId);
              if(!res.ok){alert(res.msg);return;}
              const bike=res.bike;
              if(addingBike){
                // Aggiunge al gruppo
                if(selectedBikes.find(b=>b.id===bikeId)){alert(`Bici ${bikeId} giΟ† aggiunta`);return;}
                if(selectedBikes.length>=4){alert(t('maxBikes'));return;}
                setSelectedBikes(prev=>[...prev,bike]);
              } else {
                setSelectedBike(bike); setSelectedBikes([bike]); setShowPlan(true);
              }
            }
          }catch(e){}
        }
      },500);
    }).catch(()=>alert("Fotocamera non accessibile"));
  },[showQRScanner]);

  const [pendingUrlBike, setPendingUrlBike] = React.useState(() => getUrlBike());
  React.useEffect(() => {
    if(!pendingUrlBike) return;
    if(user?.type==="admin"){ window.location.href="/admin"; return; }
    // Aspetta che lo stato REALE delle bici sia arrivato da Firestore (evita di partire sui default)

    setPendingUrlBike(null);

    const res=resolveBikeForStart(id);
    if(!res.ok){ alert(res.msg); return; }
    setSelectedBike(res.bike); setSelectedBikes([res.bike]); setShowPlan(true);
  },[pendingUrlBike, bikesLoaded, allBikes, activeBikeIds, user]);

  // Verifica robusta prima di avviare una corsa: blocca manutenzione, giΟ† in uso, non disponibile
  const resolveBikeForStart=(bikeId)=>{
    const full=(allBikes||[]).find(b=>b.id===bikeId);
    if(!full) return {ok:false,msg:`Bici ${bikeId} non trovata`};
    if(full.status==="Manutenzione") return {ok:false,msg:`πüîß La bici ${bikeId} Ο® in manutenzione e al momento non Ο® disponibile.`};
    if((activeBikeIds||[]).includes(bikeId)) return {ok:false,msg:`La bici ${bikeId} Ο® giΟ† in uso da un altro utente.`};
    if(full.status!=="Disponibile") return {ok:false,msg:`Bici ${bikeId} non disponibile`};
    return {ok:true,bike:full};
  };

  const handleBikeClick=(bike)=>{ setSelectedBike(bike); setSelectedBikes([bike]); setShowPlan(true); };

  // βîÄβîÄ CODICI PROMO βîÄβîÄ
  const [promoCode, setPromoCode] = React.useState("");
  const [promoApplied, setPromoApplied] = React.useState(null); // { code, type, hotelOption, hotelName }
  const [promoError, setPromoError] = React.useState("");
  const [promoLoading, setPromoLoading] = React.useState(false);

  const applyPromo = async () => {
    const code = promoCode.trim().toUpperCase();
    if (!code) return;
    setPromoLoading(true); setPromoError(""); setPromoApplied(null);
    try {
      await waitFB();
      const {doc, getDoc} = window.firebaseFunctions;
      const snap = await getDoc(doc(window.firebaseDb, "promoCodes", code));
      if (!snap.exists()) { setPromoError(t('promoInvalid')); setPromoLoading(false); return; }
      const data = snap.data();
      // Controlla scadenza
      if (data.expiresAt) {
        const exp = new Date(data.expiresAt);
        if (exp < new Date()) { setPromoError(t('promoExpired')); setPromoLoading(false); return; }
      }
      if (!data.active) { setPromoError(t('promoInvalid')); setPromoLoading(false); return; }
      setPromoApplied({ code, type: data.type, hotelOption: data.hotelOption, hotelName: data.hotelName || "" });
    } catch(e) { setPromoError(t('promoInvalid')); }
    setPromoLoading(false);
  };

  const removePromo = () => { setPromoApplied(null); setPromoCode(""); setPromoError(""); };

  // Calcola importo effettivo in base al promo
  const nBikes = selectedBikes.length || 1;
  const getEffectiveAmount = () => {
    const base = plan==="settimanale" ? TARIFFA_SETTIMANALE*nBikes : plan==="giornata" ? TARIFFA_GIORNATA*nBikes : SBLOCCO*nBikes;
    if (!promoApplied) return base;
    if (promoApplied.type === "dipendente" || promoApplied.type === "famiglia") return 0;
    if (promoApplied.type === "hotel") {
      if (promoApplied.hotelOption === "scontata") return 16 * nBikes;
      if (promoApplied.hotelOption === "cashback") return 18.90 * nBikes;
    }
    return plan==="settimanale" ? TARIFFA_SETTIMANALE*nBikes : plan==="giornata" ? TARIFFA_GIORNATA*nBikes : SBLOCCO*nBikes;
  };
  const payAmount = getEffectiveAmount();
  const hotelPerBike = promoApplied?.type==="hotel" ? (promoApplied.hotelOption==="cashback" ? 18.90 : promoApplied.hotelOption==="scontata" ? 16 : null) : null;
  const isFree = promoApplied && (promoApplied.type==="dipendente"||promoApplied.type==="famiglia");

  const handlePaySuccess=async(paymentMethodId, paymentIntentId, isPreAuth=false)=>{
    setShowPayment(false); setShowPlan(false);
    console.log("πü£≥ handlePaySuccess chiamato");
    try {
      await waitFB();
      const {collection,addDoc,doc,updateDoc,getDoc}=window.firebaseFunctions;
      const bks=selectedBikes.length>0?selectedBikes:[selectedBike];
      const rideIds=[];
      const hotelCashback = promoApplied?.type==="hotel" && promoApplied?.hotelOption==="cashback" ? 3 : 0;
      for(const bike of bks){
        const rideDoc=await addDoc(collection(window.firebaseDb,"rides"),{
          bikeId:bike.id, userId:user.uid||"",
          userName:`${user.nome||""} ${user.cognome||""}`.trim()||"Cliente",
          userEmail:user.email||"", zone:bike.zone, plan,
          status:"In corso", startTime:new Date().toISOString(),
          track:[], cost:0, groupSize:bks.length,
          promoCode: promoApplied?.code||null,
          promoType: promoApplied?.type||null,
          hotelName: promoApplied?.hotelName||null,
          hotelCashback,
          isFree: isFree||false,
          paymentIntentId: paymentIntentId||null,
          paymentMethodId: paymentMethodId||null,
          isPreAuth: isPreAuth||false,
          amountPaid: isPreAuth ? 0 : (payAmount||0),

          const codeRef = doc(window.firebaseDb,"promoCodes",promoApplied.code);

          const current = codeSnap.data()?.totalCashback || 0;
          const uses = codeSnap.data()?.totalUses || 0;
          await updateDoc(codeRef, { totalCashback: current + hotelCashback * bks.length, totalUses: uses + bks.length });
        } catch(e){}
      }
      setCurrentRideIds(rideIds);
      setConfirmed(bks);
      setRiding(true); // Mostra timer SUBITO senza aspettare i comandi IoT
      // Sblocca tutte le bici in parallelo in background
      Promise.all(bks.map(bike => Promise.all([
        sendBikeCommand(bike.id, 'unlock'),
        sendBikeCommand(bike.id, 'gps_high'),
        setBikeInUse(bike.id, true),
      ]))).catch(e=>console.error('Errore comandi IoT:', e));
    } catch(e){ console.error('Errore handlePaySuccess:', e); }
  };

  // βîÄβîÄ COMANDI IoT βîÄβîÄ
  const sendBikeCommand = async (bikeId, type) => {
    try {
      // Se Firebase giΟ† pronto non aspettare
      if (!window.firebaseDb || !window.firebaseFunctions) await waitFB();
      const {collection, addDoc} = window.firebaseFunctions;
      const pedId = 'PED' + bikeId.replace('PA-','').padStart(3,'0');
      const cmdRef = collection(window.firebaseDb, 'bikes', pedId, 'commands');
      const result = await addDoc(cmdRef, {
        type, status: 'pending', createdAt: new Date().toISOString()
      });
      console.log(`β€Ö Comando ${type} inviato a ${pedId}, doc:`, result.id);
    } catch(e) {
      console.error('βù¨ Errore comando IoT:', e.code, e.message);
    }
  };

  const setBikeInUse = async (bikeId, inUse) => {
    // Aggiorna anche lo status della bici su Firestore bikes collection
    if (!inUse) {
      const pedId = 'PED' + bikeId.replace('PA-','').padStart(3,'0');
      try {
        const {doc, setDoc} = window.firebaseFunctions;
        await setDoc(doc(window.firebaseDb,'bikes',pedId),{status:'Disponibile',updatedAt:new Date().toISOString()},{merge:true});
      } catch(e){ console.error('Errore aggiornamento status bici:', e); }
