function MapView({ bikes, onBikeClick, height=300, fullscreen=false, tracks=[], zones=[], userPos=null }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const zoneShapesRef = React.useRef([]);
  const zoneMarkersRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const userMarkerRef = React.useRef(null);
  const calcDist = (lat1, lng1, lat2, lng2) => {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };
  const getDistText = (bike, pos) => {
    if (!pos) return "";
    const d = calcDist(pos.lat, pos.lng, bike.lat, bike.lng);
    const mins = Math.round(d / 80);
    return d < 1000 ? `🚶 ${Math.round(d)}m · ~${mins} min` : `🚶 ${(d/1000).toFixed(1)}km · ~${mins} min`;
  };
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    zoneShapesRef.current.forEach(s => s?.setMap(null));
    zoneMarkersRef.current.forEach(m => m?.setMap(null));
    zoneShapesRef.current = [];
    zoneMarkersRef.current = [];
    const icons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" };
    zones.forEach(zone => {
      let shape = null, center = null;
      if (zone.shape === "circle" && zone.center) {
        shape = new window.google.maps.Circle({ map: mapInstanceRef.current, center: zone.center, radius: zone.radius || 200, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
        center = zone.center;
      } else if (zone.path?.length > 0) {
        shape = new window.google.maps.Polygon({ map: mapInstanceRef.current, paths: zone.path, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p => bounds.extend(p));
        const c = bounds.getCenter();
        center = { lat: c.lat(), lng: c.lng() };
      }
      if (shape) zoneShapesRef.current.push(shape);
      if (center && zone.type !== "operativa" && icons[zone.type]) {
        const marker = new window.google.maps.Marker({ position: center, map: mapInstanceRef.current, label: { text: icons[zone.type], fontSize: "16px" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 0, fillOpacity: 0, strokeOpacity: 0 } });
        zoneMarkersRef.current.push(marker);
      }
    });
  }, [zones, mapInstanceRef.current]);
  React.useEffect(() => {
    if (!mapInstanceRef.current || !userPos) return;
    if (!mapInstanceRef.current._centeredOnUser) { mapInstanceRef.current.setCenter(userPos); mapInstanceRef.current.setZoom(14); mapInstanceRef.current._centeredOnUser = true; }
  }, [userPos]);
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    markersRef.current.forEach(({ marker, iw, bike }) => {
      const distanceText = getDistText(bike, userPos);
      iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">📍 ${bike.zone}</span><br/><span style="font-size:11px">⚡ ${bike.battery}% · ~${getRange(bike.battery)}km</span>${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}<br/><span style="font-size:11px;color:${bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.status}</span></div>`);
    });
    if (userPos && mapInstanceRef.current) {
      if (userMarkerRef.current) { userMarkerRef.current.setPosition(userPos); }
      else { userMarkerRef.current = new window.google.maps.Marker({ position: userPos, map: mapInstanceRef.current, title: "La tua posizione", icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: "#219EBC", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 3 }, zIndex: 999 }); }
    }
  }, [userPos]);

  // Aggiorna marker quando cambiano le bici (posizione/batteria real-time)
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google || !markersRef.current.length) return;
    bikes.forEach(bike => {
      const entry = markersRef.current.find(m => m.bike.id === bike.id);
      if (entry) {
        // Aggiorna posizione
        entry.marker.setPosition({ lat: bike.lat, lng: bike.lng });
        // Aggiorna colore e label batteria
        const color = bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500";
        entry.marker.setIcon({ path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: color, fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 });
        entry.marker.setLabel({ text: `${bike.battery}%`, color: "#ffffff", fontSize: "10px", fontWeight: "bold" });
        entry.bike = bike; // aggiorna riferimento
      }
    });
  }, [bikes]);
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit, 200); return; }
      const map = new window.google.maps.Map(mapRef.current, { center: window._userPosition || {lat:43.1500,lng:12.0800}, zoom: window._userPosition ? 14 : 11, mapTypeId: "roadmap", gestureHandling: "greedy", styles: [{ featureType:"water", elementType:"geometry", stylers:[{color:"#8ECAE6"}] },{ featureType:"landscape", elementType:"geometry", stylers:[{color:"#e8f4f8"}] },{ featureType:"road", elementType:"geometry", stylers:[{color:"#ffffff"}] },{ featureType:"poi", stylers:[{visibility:"off"}] }] });
      mapInstanceRef.current = map;
      bikes.forEach(bike => {
        const iw = new window.google.maps.InfoWindow({ content: "" });
        const marker = new window.google.maps.Marker({ position: { lat: bike.lat, lng: bike.lng }, map, title: bike.id, label: { text: bike.isMTB?"🏔️":`${bike.battery}%`, color: "#ffffff", fontSize: bike.isMTB?"14px":"10px", fontWeight: "bold" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: bike.isMTB?"#FB8500":bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 } });
        markersRef.current.push({ marker, iw, bike });
        marker.addListener("click", () => { const distanceText = getDistText(bike, userPos); iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">📍 ${bike.zone||""}</span><br/>${bike.isMTB?'<span style="font-size:11px">🏔️ MTB Muscolare</span>':'<span style="font-size:11px">⚡ '+bike.battery+'% · ~'+getRange(bike.battery)+'km</span>'}${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}<br/><span style="font-size:11px;color:${bike.isMTB?'#FB8500':bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.isMTB?'Disponibile':bike.status}</span></div>`); iw.open(map, marker); onBikeClick(bike); });
      });
      zones.forEach(zone => {
        if (zone.shape === "circle" && zone.center) { new window.google.maps.Circle({ map, center: zone.center, radius: zone.radius||200, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 }); const icons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" }; if (zone.type !== "operativa" && icons[zone.type]) { new window.google.maps.Marker({ position: zone.center, map, label: { text: icons[zone.type], fontSize: "16px" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 0, fillOpacity: 0, strokeOpacity: 0 } }); } }
        else if (zone.path?.length > 0) { new window.google.maps.Polygon({ map, paths: zone.path, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 }); }
      });
      tracks.forEach(track => {
        if (track.points?.length > 1) { new window.google.maps.Polyline({ path: track.points, geodesic: true, strokeColor: track.color||"#219EBC", strokeOpacity: 0.8, strokeWeight: 4, map }); new window.google.maps.Marker({ position: track.points[0], map, label:{text:"A",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#219EBC",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} }); new window.google.maps.Marker({ position: track.points[track.points.length-1], map, label:{text:"B",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#FB8500",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} }); }
      });
    };
    tryInit();
  }, []);
  const style = fullscreen ? { position:"absolute", inset:0, width:"100%", height:"100%" } : { width:"100%", height, borderRadius:16 };
  return <div ref={mapRef} style={style} />;
}

function ZoneMapEditor({ zones, zoneType, drawingMode, drawingActive, zoneName, onZoneSaved }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const drawingManagerRef = React.useRef(null);
  const shapesRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const zoneColors = { operativa:"#00C853", sosta:"#2196F3", lenta:"#FFB703", fuori:"#FB8500" };
  const zoneIcons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" };
  const zoneTypeRef = React.useRef(zoneType);
  const zoneNameRef = React.useRef(zoneName);
  React.useEffect(()=>{ zoneTypeRef.current = zoneType; }, [zoneType]);
  React.useEffect(()=>{ zoneNameRef.current = zoneName; }, [zoneName]);
  const redrawZones = React.useCallback(() => {
    if (!mapInstanceRef.current || !window.google) return;
    shapesRef.current.forEach(s=>{ if(s) s.setMap(null); });
    markersRef.current.forEach(m=>{ if(m) m.setMap(null); });
    shapesRef.current = [];
    zones.forEach((zone, idx) => {
      let shape = null, center = null;
      if (zone.shape==="circle" && zone.center) {
        shape = new window.google.maps.Circle({ map:mapInstanceRef.current, center:zone.center, radius:zone.radius||200, fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2, draggable:true, editable:true });
        center = {lat:zone.center.lat, lng:zone.center.lng};
        shape.addListener("center_changed", ()=>{ const newCenter = shape.getCenter(); if (markersRef.current[idx]) markersRef.current[idx].setPosition(newCenter); zone.center = {lat:newCenter.lat(), lng:newCenter.lng()}; });
        shape.addListener("radius_changed", ()=>{ zone.radius = shape.getRadius(); });
      } else if (zone.path && zone.path.length>0) {
        shape = new window.google.maps.Polygon({ map:mapInstanceRef.current, paths:zone.path, fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2, draggable:true, editable:true });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p=>bounds.extend(p));
        const c = bounds.getCenter();
        center = {lat:c.lat(), lng:c.lng()};
      }
      if (shape) shapesRef.current[idx] = shape;
      if (center && zone.type !== "operativa" && zoneIcons[zone.type]) {
        const marker = new window.google.maps.Marker({ position:center, map:mapInstanceRef.current, label:{text:zoneIcons[zone.type], fontSize:"20px", fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE, scale:0, fillOpacity:0, strokeOpacity:0}, zIndex:10 });
        markersRef.current[idx] = marker;
      } else { markersRef.current[idx] = null; }
    });
  }, [zones]);
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google || !window.google.maps.drawing) { setTimeout(tryInit,200); return; }
      const map = new window.google.maps.Map(mapRef.current, { center:{lat:43.1500,lng:12.0800}, zoom:11, mapTypeId:"roadmap", styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]}] });
      mapInstanceRef.current = map;
      const dm = new window.google.maps.drawing.DrawingManager({ drawingMode:null, drawingControl:false, circleOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false}, polygonOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false} });
      dm.setMap(map);
      drawingManagerRef.current = dm;
      window.google.maps.event.addListener(dm,"circlecomplete",circle=>{ dm.setDrawingMode(null); const zt = zoneTypeRef.current; const zn = zoneNameRef.current; const color = zoneColors[zt]||"#219EBC"; circle.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2}); onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"circle",color,center:{lat:circle.getCenter().lat(),lng:circle.getCenter().lng()},radius:circle.getRadius()}); circle.setMap(null); });
      window.google.maps.event.addListener(dm,"polygoncomplete",polygon=>{ dm.setDrawingMode(null); const zt = zoneTypeRef.current; const zn = zoneNameRef.current; const color = zoneColors[zt]||"#219EBC"; polygon.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2}); const path = polygon.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()})); onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"polygon",color,path}); polygon.setMap(null); });
      redrawZones();
    };
    tryInit();
  }, []);
  React.useEffect(() => { if (mapInstanceRef.current) redrawZones(); }, [zones]);
  React.useEffect(() => {
    const activate = () => {
      if (!drawingManagerRef.current || !window.google || !window.google.maps.drawing) { if (drawingActive) setTimeout(activate, 300); return; }
      drawingManagerRef.current.setDrawingMode(drawingActive ? (drawingMode==="circle" ? window.google.maps.drawing.OverlayType.CIRCLE : window.google.maps.drawing.OverlayType.POLYGON) : null);
    };
    activate();
  }, [drawingActive, drawingMode]);
  return <div ref={mapRef} style={{width:"100%",height:"100%"}}/>;
}

function RideTimer({ bike, plan, user, rideId, rideStartTime=0, onEnd, t }) {
  const computedStart = rideStartTime || Date.now();
  const [seconds, setSeconds] = React.useState(() => Math.floor((Date.now() - computedStart) / 1000));
  const [paused, setPaused] = React.useState(false);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const startTimeRef = React.useRef(computedStart);
  const pauseStartRef = React.useRef(null);
  const totalPausedRef = React.useRef(0);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const trackRef = React.useRef([]);
  const isGiornata = plan==="giornata";
  React.useEffect(() => {
    const i = setInterval(() => {
      if (!paused) {
        const elapsed = Math.floor((Date.now() - startTimeRef.current - totalPausedRef.current) / 1000);
        setSeconds(elapsed);
      } else {
        if (pauseStartRef.current) {
          setPauseSeconds(Math.floor((Date.now() - pauseStartRef.current) / 1000));
        }
      }
    }, 500);
    return () => clearInterval(i);
  }, [paused]);

  const handlePauseToggle = () => {
    if (!paused) {
      pauseStartRef.current = Date.now();
    } else {
      totalPausedRef.current += Date.now() - pauseStartRef.current;
      pauseStartRef.current = null;
    }
    setPaused(p => !p);
  };
  React.useEffect(() => {
    if (!navigator.geolocation||showEndFlow) return;
    const saveGPS = () => { navigator.geolocation.getCurrentPosition(async pos=>{ const point={lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()}; trackRef.current.push(point); if (rideId) { try { await waitFB(); const {doc,updateDoc}=window.firebaseFunctions; await updateDoc(doc(window.firebaseDb,"rides",rideId),{track:trackRef.current}); } catch(e){} } },()=>{},{enableHighAccuracy:true}); };
    saveGPS(); const i=setInterval(saveGPS,30000); return()=>clearInterval(i);
  },[showEndFlow]);
  const mins=Math.floor(seconds/60), secs=seconds%60, pauseMins=Math.floor(pauseSeconds/60);
  const rideCost=isGiornata?TARIFFA_GIORNATA:Math.min(SBLOCCO+(seconds/60)*TARIFFA_MIN, TARIFFA_GIORNATA);
  const pauseCost=isGiornata?0:(pauseSeconds/60)*TARIFFA_PAUSA;
  const totalCost=Math.min(rideCost+pauseCost, TARIFFA_GIORNATA);
  const cappedAtMax = !isGiornata && totalCost >= TARIFFA_GIORNATA;
  const handleParkPhoto=(e)=>{ const file=e.target.files[0]; if(file){setParkPhoto(file);const r=new FileReader();r.onload=ev=>setParkPreview(ev.target.result);r.readAsDataURL(file);} };
  const handleEndConfirm=async()=>{
    if(!parkPhoto){alert("📸");return;}
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc}=window.firebaseFunctions;
      const sRef=ref(window.firebaseStorage,`parcheggi/${bike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL=await getDownloadURL(sRef);
      if(rideId) await updateDoc(doc(window.firebaseDb,"rides",rideId),{status:"Completata",endTime:new Date().toISOString(),duration:seconds,pauseDuration:pauseSeconds,cost:totalCost,parkPhotoURL,track:trackRef.current});
    } catch(e){console.error(e);}
    setUploading(false); onEnd(seconds,totalCost,bike.id);
  };
  if(showEndFlow) return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
        <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{t('endRideTitle')}</h2>
      </div>
      <div style={{padding:20,flex:1}}>
        <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
          <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>{t('photoRequired')}</p>
          <p style={{color:"#888",fontSize:12,...ds,margin:0}}>{t('photoDesc')}</p>
        </div>
        <div style={{border:`2px dashed ${parkPhoto?C.blueGreen:C.warmOrange}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer"}} onClick={()=>document.getElementById("parkInput").click()}>
          {parkPreview?<div><img src={parkPreview} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover",marginBottom:8}}/><p style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:600,margin:0}}>{t('photoChange')}</p></div>
            :<div><div style={{fontSize:48,marginBottom:8}}>📸</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>{t('takePhoto')}</p></div>}
          <input id="parkInput" type="file" accept="image/*" capture="environment" onChange={handleParkPhoto} style={{display:"none"}} />
        </div>
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
          {[[t('ridePerMin'),`${mins}min ${secs}sec`],[t('pausePerMin'),`${pauseMins}min · ${isGiornata?t('free'):`€${pauseCost.toFixed(2)}`}`],[`💶 ${t('totalCost')}`,`€${totalCost.toFixed(2)}`]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
              <span style={{color:C.deepBlue,fontWeight:700,...ds}}>{v}</span>
            </div>
          ))}
        </div>
        <button onClick={handleEndConfirm} disabled={!parkPhoto||uploading} style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
          {uploading?t('saving'):t('confirmEnd')}
        </button>
        <button onClick={()=>setShowEndFlow(false)} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>{t('backToRide')}</button>
      </div>
    </div>
  );
  return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.deepBlue,padding:"16px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>{t('rideInProgress')}</p>
        <h2 style={{color:C.white,fontSize:20,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{bike.id} · {bike.zone}</h2>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:24,padding:28,textAlign:"center",marginBottom:20,width:"100%"}}>
          {paused&&<div style={{background:C.sunYellow,borderRadius:10,padding:"4px 14px",display:"inline-block",marginBottom:10}}><p style={{color:C.deepBlue,fontSize:11,...ds,fontWeight:700,margin:0}}>{t('ridePause')} — {isGiornata?t('free'):`€${TARIFFA_PAUSA}/min`}</p></div>}
          {cappedAtMax&&<div style={{background:C.blueGreen,borderRadius:10,padding:"4px 14px",display:"inline-block",marginBottom:10}}><p style={{color:C.white,fontSize:11,...ds,fontWeight:700,margin:0}}>🎉 Massimo giornaliero raggiunto!</p></div>}
          <p style={{color:C.skyBlue,fontSize:12,margin:"0 0 6px",...ds,letterSpacing:2}}>{paused?t('ridePause'):t('rideInProgress')}</p>
          <p style={{color:C.white,fontSize:48,fontWeight:700,margin:"0 0 12px",...ds,fontFamily:"monospace"}}>
            {paused?`${String(pauseMins).padStart(2,"0")}:${String(pauseSeconds%60).padStart(2,"0")}`:
              `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`}
          </p>
          <p style={{color:C.skyBlue,fontSize:12,margin:"0 0 4px",...ds}}>{t('totalCost')}</p>
          <p style={{color:C.sunYellow,fontSize:34,fontWeight:700,margin:0,...ds}}>€{totalCost.toFixed(2)}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,width:"100%",marginBottom:16}}>
          {[[t('unlock'),`€${SBLOCCO.toFixed(2)}`],[t('ridePerMin'),`€${TARIFFA_MIN}/min`],[t('pausePerMin'),isGiornata?t('free'):`€${TARIFFA_PAUSA}/min`],[t('zone'),bike.zone]].map(([k,v])=>(
            <div key={k} style={{background:C.white,borderRadius:12,padding:"10px 14px",boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
              <p style={{color:"#aaa",fontSize:10,...ds,margin:"0 0 2px"}}>{k}</p>
              <p style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:700,margin:0}}>{v}</p>

          ))}
        </div>
        <button onClick={handlePauseToggle} style={{width:"100%",background:paused?C.blueGreen:C.sunYellow,border:"none",borderRadius:14,padding:14,color:C.deepBlue,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
          {paused?t('resumeBtn'):t('pauseBtn')}
        </button>
        <button onClick={()=>setShowEndFlow(true)} style={{width:"100%",background:C.warmOrange,border:"none",borderRadius:14,padding:14,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
          {t('endRide')}
        </button>
      </div>
    </div>
  );
}

// MULTIRIDETIMER — più bici (NUOVO)
// ═══════════════════════════════════════════════════════
function MultiRideTimer({ bikes, plan, user, rideIds, onEnd, t }) {
  const [activeTab, setActiveTab] = React.useState(0);
  const [globalPaused, setGlobalPaused] = React.useState(false);
  const [seconds, setSeconds] = React.useState(0);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const [completedBikes, setCompletedBikes] = React.useState([]);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [endingBike, setEndingBike] = React.useState(null);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const trackRefs = React.useRef({});
  const isGiornata = plan === "giornata";

  React.useEffect(() => { bikes.forEach(b => { if (!trackRefs.current[b.id]) trackRefs.current[b.id] = []; }); }, []);
  React.useEffect(() => { if (globalPaused||showEndFlow) return; const i=setInterval(()=>setSeconds(s=>s+1),1000); return()=>clearInterval(i); },[globalPaused,showEndFlow]);
  React.useEffect(() => { if (!globalPaused||showEndFlow) return; const i=setInterval(()=>setPauseSeconds(s=>s+1),1000); return()=>clearInterval(i); },[globalPaused,showEndFlow]);
  React.useEffect(() => {
    if (!navigator.geolocation||showEndFlow) return;
    const saveGPS = () => {
      navigator.geolocation.getCurrentPosition(async pos => {
        const point = {lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()};
        const activeBikes = bikes.filter(b=>!completedBikes.includes(b.id));
        for (const bike of activeBikes) {
          trackRefs.current[bike.id] = trackRefs.current[bike.id]||[];
          trackRefs.current[bike.id].push(point);
          const rideEntry = rideIds.find(r=>r.bikeId===bike.id);
          if (rideEntry) { try { await waitFB(); const {doc,updateDoc}=window.firebaseFunctions; await updateDoc(doc(window.firebaseDb,"rides",rideEntry.rideId),{track:trackRefs.current[bike.id]}); } catch(e){} }
        }
      },()=>{},{enableHighAccuracy:true});
    };
    saveGPS(); const i=setInterval(saveGPS,30000); return()=>clearInterval(i);
  },[showEndFlow,completedBikes]);

  const mins=Math.floor(seconds/60), secs=seconds%60;
  const pauseMins=Math.floor(pauseSeconds/60);
  const costPerBike=isGiornata?TARIFFA_GIORNATA:Math.min(SBLOCCO+(seconds/60)*TARIFFA_MIN, TARIFFA_GIORNATA);
  const pauseCost=isGiornata?0:(pauseSeconds/60)*TARIFFA_PAUSA;
  const activeBikes=bikes.filter(b=>!completedBikes.includes(b.id));
  const totalCost=Math.min((costPerBike+pauseCost), TARIFFA_GIORNATA)*activeBikes.length;

  const handleParkPhoto=(e)=>{ const file=e.target.files[0]; if(file){setParkPhoto(file);const r=new FileReader();r.onload=ev=>setParkPreview(ev.target.result);r.readAsDataURL(file);} };
  const startEndFlow=(bike)=>{ setEndingBike(bike);setShowEndFlow(true);setParkPhoto(null);setParkPreview(null); };

  const handleEndConfirm=async()=>{
    if(!parkPhoto){alert("📸");return;}
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc}=window.firebaseFunctions;
      const sRef=ref(window.firebaseStorage,`parcheggi/${endingBike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL=await getDownloadURL(sRef);
      const rideEntry=rideIds.find(r=>r.bikeId===endingBike.id);
      if(rideEntry) await updateDoc(doc(window.firebaseDb,"rides",rideEntry.rideId),{status:"Completata",endTime:new Date().toISOString(),duration:seconds,pauseDuration:pauseSeconds,cost:costPerBike+pauseCost,parkPhotoURL,track:trackRefs.current[endingBike.id]||[]});
    } catch(e){console.error(e);}
    setUploading(false);
    setShowEndFlow(false);
    const newCompleted=[...completedBikes,endingBike.id];
    setCompletedBikes(newCompleted);
    if(activeTab>=activeBikes.length-1) setActiveTab(Math.max(0,activeBikes.length-2));
    onEnd(seconds,costPerBike+pauseCost,endingBike.id);
    setEndingBike(null);
  };

  if(showEndFlow&&endingBike) return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
        <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{endingBike.id} · {endingBike.zone}</h2>
      </div>
      <div style={{padding:20,flex:1}}>
        <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
          <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>{t('photoRequired')}</p>
          <p style={{color:"#888",fontSize:12,...ds,margin:0}}>{t('photoDesc')}</p>
        </div>
        <div style={{border:`2px dashed ${parkPhoto?C.blueGreen:C.warmOrange}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer"}} onClick={()=>document.getElementById("parkInputMulti").click()}>
          {parkPreview?<div><img src={parkPreview} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover",marginBottom:8}}/><p style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:600,margin:0}}>{t('photoChange')}</p></div>
            :<div><div style={{fontSize:48,marginBottom:8}}>📸</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>{t('takePhoto')}</p></div>}
          <input id="parkInputMulti" type="file" accept="image/*" capture="environment" onChange={handleParkPhoto} style={{display:"none"}}/>
        </div>
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
          {[[t('ridePerMin'),`${mins}min ${secs}sec`],[t('pausePerMin'),`${pauseMins}min · ${isGiornata?t('free'):`€${pauseCost.toFixed(2)}`}`],[`💶 ${t('totalCost')}`,`€${(costPerBike+pauseCost).toFixed(2)}`]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
              <span style={{color:C.deepBlue,fontWeight:700,...ds}}>{v}</span>
            </div>
          ))}
        </div>
        <button onClick={handleEndConfirm} disabled={!parkPhoto||uploading} style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
          {uploading?t('saving'):t('confirmEnd')}
        </button>
        <button onClick={()=>setShowEndFlow(false)} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>{t('backToRide')}</button>
      </div>
    </div>
  );

  return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>{t('rideInProgress')} · {activeBikes.length} 🚲</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
          <p style={{color:C.white,fontSize:28,fontWeight:700,margin:0,...ds,fontFamily:"monospace"}}>{String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}</p>
          <p style={{color:C.sunYellow,fontSize:24,fontWeight:700,margin:0,...ds}}>€{totalCost.toFixed(2)}</p>
        </div>
      </div>
      {activeBikes.length>1&&(
        <div style={{display:"flex",overflowX:"auto",background:C.white,borderBottom:`1px solid #eee`,padding:"0 8px"}}>
          {activeBikes.map((bike,i)=>(
            <button key={bike.id} onClick={()=>setActiveTab(i)} style={{padding:"10px 16px",border:"none",background:"none",borderBottom:`2px solid ${activeTab===i?C.warmOrange:"transparent"}`,color:activeTab===i?C.warmOrange:C.deepBlue,fontSize:13,...ds,fontWeight:activeTab===i?700:400,cursor:"pointer",whiteSpace:"nowrap"}}>
              {bike.id}
            </button>
          ))}
        </div>
      )}
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:20,overflowY:"auto"}}>
        {activeBikes.length>0&&(()=>{
          const bike=activeBikes[Math.min(activeTab,activeBikes.length-1)];
          return(
            <div>
              <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:18,padding:20,marginBottom:16,textAlign:"center"}}>
                <p style={{color:C.skyBlue,fontSize:13,margin:"0 0 4px",...ds,fontWeight:600}}>{bike.id} · {bike.zone}</p>
                <p style={{color:"rgba(255,255,255,0.7)",fontSize:12,...ds,margin:0}}>{isGiornata?`€${TARIFFA_GIORNATA.toFixed(2)} giornata`:`€${SBLOCCO.toFixed(2)} sblocco + €${TARIFFA_MIN}/min`}</p>
              </div>
              {globalPaused&&(
                <div style={{background:C.sunYellow,borderRadius:12,padding:"8px 14px",textAlign:"center",marginBottom:12}}>
                  <p style={{color:C.deepBlue,fontSize:12,...ds,fontWeight:700,margin:0}}>⏸ Pausa · {pauseMins}min {pauseSeconds%60}sec · {isGiornata?t('free'):`€${pauseCost.toFixed(2)}`}</p>
                </div>
              )}
              <button onClick={()=>setGlobalPaused(p=>!p)} style={{width:"100%",background:globalPaused?C.blueGreen:C.sunYellow,border:"none",borderRadius:14,padding:14,color:C.deepBlue,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
                {globalPaused?t('resumeBtn'):t('pauseBtn')}
              </button>
              <button onClick={()=>startEndFlow(bike)} style={{width:"100%",background:C.warmOrange,border:"none",borderRadius:14,padding:14,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
                {t('endRide')} — {bike.id}
              </button>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// MTB NOLEGGIO — bici muscolari
// ═══════════════════════════════════════════════════════
function MTBTab({ user, t }) {  const [mtbBikes, setMtbBikes] = React.useState([]);
  const [selectedMTB, setSelectedMTB] = React.useState(null);
  const [tariffa, setTariffa] = React.useState(null);
  const [showPayment, setShowPayment] = React.useState(false);
  const [showCode, setShowCode] = React.useState(false);
  const [lockCode, setLockCode] = React.useState("");
  const [rentalId, setRentalId] = React.useState(null);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const [showQR, setShowQR] = React.useState(false);
  const qrIntervalRef = React.useRef(null);
  const [activeRental, setActiveRental] = React.useState(null);
  const trackRef = React.useRef([]);
  const [promoCode, setPromoCode] = React.useState("");
  const [promoApplied, setPromoApplied] = React.useState(null);
  const [promoError, setPromoError] = React.useState("");
  const [promoLoading, setPromoLoading] = React.useState(false);

  const isMTBFree = promoApplied && (promoApplied.type==="dipendente"||promoApplied.type==="famiglia");
  const mtbAmount = isMTBFree ? 0 : (tariffa==="adulto" ? TARIFFA_MTB_ADULTO : TARIFFA_MTB_BAMBINO);

  const applyMTBPromo = async () => {
    const code = promoCode.trim().toUpperCase();
    if (!code) return;
    setPromoLoading(true); setPromoError(""); setPromoApplied(null);
    try {
      await waitFB();
      const {doc, getDoc} = window.firebaseFunctions;
      const snap = await getDoc(doc(window.firebaseDb, "promoCodes", code));
      if (!snap.exists()) { setPromoError("Codice non valido"); setPromoLoading(false); return; }
      const data = snap.data();
      if (data.expiresAt && new Date(data.expiresAt) < new Date()) { setPromoError("Codice scaduto"); setPromoLoading(false); return; }
      if (!data.active) { setPromoError("Codice non valido"); setPromoLoading(false); return; }
      setPromoApplied({code, type:data.type});
    } catch(e) { setPromoError("Codice non valido"); }
    setPromoLoading(false);
  };

  // Carica MTB da Firebase
  React.useEffect(()=>{
    const load = async () => {
      try {
        await waitFB();
        const {collection, onSnapshot} = window.firebaseFunctions;
        onSnapshot(collection(window.firebaseDb, "mtbBikers"), snap => {
          console.log("🚲 MTB snap size:", snap.size, snap.docs.map(d=>d.id));
          setMtbBikes(snap.docs.map(d=>({id:d.id,...d.data()})));
        });
      } catch(e) {}
    };
    load();
  },[]);

  // Controlla noleggio attivo
  React.useEffect(()=>{
    const check = async () => {
      try {
        await waitFB();
        const {collection, getDocs} = window.firebaseFunctions;
        const snap = await getDocs(collection(window.firebaseDb, "mtbRentals"));
        const active = snap.docs.find(d => d.data().userId===user.uid && d.data().status==="In corso");
        if (active) setActiveRental({id:active.id,...active.data()});
      } catch(e) {}
    };
    check();
  },[]);

  // GPS tracking
  React.useEffect(()=>{
    if (!activeRental || showEndFlow) return;
    const saveGPS = () => {
      navigator.geolocation?.getCurrentPosition(async pos => {
        const point = {lat:pos.coords.latitude, lng:pos.coords.longitude, t:Date.now()};
        trackRef.current.push(point);
        try {
          await waitFB();
          const {doc, updateDoc} = window.firebaseFunctions;
          await updateDoc(doc(window.firebaseDb,"mtbRentals",activeRental.id),{track:trackRef.current});
        } catch(e){}
      },()=>{},{enableHighAccuracy:true});
    };
    saveGPS();
    const i = setInterval(saveGPS, 30000);
    return()=>clearInterval(i);
  },[activeRental, showEndFlow]);

  // QR Scanner
  React.useEffect(()=>{
    if (!showQR) {
      clearInterval(qrIntervalRef.current);
      const video=document.getElementById("mtbQrVideo");
      if(video?.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
      return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
      const video=document.getElementById("mtbQrVideo");
      if(video){video.srcObject=stream;video.play();}
      qrIntervalRef.current=setInterval(()=>{
        const video=document.getElementById("mtbQrVideo");
        const canvas=document.getElementById("mtbQrCanvas");
        if(!video||!canvas||!window.jsQR) return;
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=window.jsQR(imageData.data,imageData.width,imageData.height);
        if(code){
          try{
            const url=new URL(code.data);
            const mtbId=url.searchParams.get("mtb");
            if(mtbId){
              clearInterval(qrIntervalRef.current);
              stream.getTracks().forEach(t=>t.stop());
              setShowQR(false);
              const bike = mtbBikes.find(b=>b.id===mtbId) || {id:mtbId,name:`MTB ${mtbId}`,zone:"Castiglione"};
              setSelectedMTB(bike);
            }
          }catch(e){}
        }
      },500);
    }).catch(()=>alert("Fotocamera non accessibile"));
  },[showQR]);

  const handlePaySuccess = async () => {
    setShowPayment(false);
    let code = "----";
    try {
      await waitFB();
      const {collection, addDoc, doc, getDoc} = window.firebaseFunctions;

        if (bikeSnap.exists()) code = bikeSnap.data()?.lockCode || "----";

      setLockCode(code);
      const rental = await addDoc(collection(window.firebaseDb,"mtbRentals"),{
        mtbId: selectedMTB.id,

        userName: `${user.nome||""} ${user.cognome||""}`.trim(),

      setRentalId(rental.id);

      await updateDoc(doc(window.firebaseDb,"mtbRentals",activeRental.id),{

// CLIENTEAPP — con multi-bici (Opzione B)
// ═══════════════════════════════════════════════════════
function ClienteApp({ user, onLogout, lang, setLang, t }) {
  const [allBikes, setAllBikes] = React.useState(initBikes);
  const [activeBikeIds, setActiveBikeIds] = React.useState([]);

  // Carica bici real-time da Firebase (bikes collection)
  React.useEffect(()=>{
    const load = async () => {
      try {
        await waitFB();
        const {collection, onSnapshot} = window.firebaseFunctions;
        onSnapshot(collection(window.firebaseDb, "bikes"), snap => {
          if (snap.empty) return; // usa initBikes se non ci sono dati
          const fbBikes = snap.docs.map(d => {
            const data = d.data();
            const pedId = d.id; // es. PED027
            const paId = pedId.replace('PED', 'PA-0').replace('PA-0', 'PA-'); // PED027 → PA-027
            // Normalizza: PED027 → PA-027
            const normalizedId = 'PA-' + pedId.replace('PED','').padStart(3,'0');
            const existing = initBikes.find(b => b.id === normalizedId);
            return {
              id: normalizedId,
              battery: data.batteryPercent || data.battery || existing?.battery || 50,
              status: data.locked === false ? "Disponibile" : (existing?.status || "Disponibile"),
              odometer: existing?.odometer || 0,
              zone: existing?.zone || "Castiglione",
              model: existing?.model || "City Comfort",
              lat: data.lat || existing?.lat || 43.15,
              lng: data.lng || existing?.lng || 12.08,
              note: existing?.note || "",
              lastMaint: existing?.lastMaint || "",
              checks: existing?.checks || {},
              online: data.online || false,
              speed: data.speed || 0,
            };
          });
          setAllBikes(fbBikes);
        });
      } catch(e) { console.error("Errore caricamento bici:", e); }
    };
    load();
  },[]);
  const [tab, setTab] = React.useState("mappa");
  const [selectedBike, setSelectedBike] = React.useState(null);
  const [selectedBikes, setSelectedBikes] = React.useState([]);
  const [showPlan, setShowPlan] = React.useState(false);
  const [plan, setPlan] = React.useState("minuti");
  const [showPayment, setShowPayment] = React.useState(false);
  const [riding, setRiding] = React.useState(false);
  const [confirmed, setConfirmed] = React.useState([]);
  const [currentRideIds, setCurrentRideIds] = React.useState([]);
  const [showSummary, setShowSummary] = React.useState(false);
  const [rideSummary, setRideSummary] = React.useState(null);
  const [showQRScanner, setShowQRScanner] = React.useState(false);
  const [addingBike, setAddingBike] = React.useState(false);
  const [restoringRide, setRestoringRide] = React.useState(true);
  const [restoredElapsed, setRestoredElapsed] = React.useState(0); // controlla corsa attiva al login
  const qrIntervalRef = React.useRef(null);
  const [clientZones, setClientZones] = React.useState([]);
  const [userPos, setUserPos] = React.useState(null);

  const [bikeFilter, setBikeFilter] = React.useState("tutte");
  const [mtbBikesMap, setMtbBikesMap] = React.useState([]);

  // Carica MTB per la mappa
  React.useEffect(()=>{
    const load = async () => {
      try {
        await waitFB();
        const {collection, getDocs} = window.firebaseFunctions;
        const snap = await getDocs(collection(window.firebaseDb, "mtbBikers"));
        const mtbs = snap.docs
          .map(d=>({id:d.id,...d.data()}))
          .filter(b=>b.status==="Disponibile")
          .map(b=>({...b, lat:b.lat||43.1208, lng:b.lng||11.9847}));
        console.log("🏔️ MTBmap cliente:", mtbs.length, mtbs.map(b=>b.id));
        setMtbBikesMap(mtbs);
      } catch(e) { console.error("Errore MTB mappa:", e); }
    };
    load();
  },[]);

  // Bici disponibili = non in corsa da altri utenti
  const bikes = allBikes.filter(b => b.status==="Disponibile" && !activeBikeIds.includes(b.id));

  React.useEffect(()=>{ if (!navigator.geolocation) return; navigator.geolocation.watchPosition(pos=>{ setUserPos({lat:pos.coords.latitude,lng:pos.coords.longitude}); window._userPosition={lat:pos.coords.latitude,lng:pos.coords.longitude}; },()=>{},{enableHighAccuracy:true}); },[]);

  React.useEffect(()=>{
    const load=async()=>{ try { await waitFB(); const {doc,getDoc}=window.firebaseFunctions; const snap=await getDoc(doc(window.firebaseDb,"config","zones")); if(snap.exists()) setClientZones(snap.data().zones||[]); else setClientZones(DEFAULT_ZONES); } catch(e){ setClientZones(DEFAULT_ZONES); } };
    load();
  },[]);

  // Ascolta bici occupate da bikesStatus
  React.useEffect(()=>{
    const load = async () => {
      await waitFB();
      const {collection, onSnapshot} = window.firebaseFunctions;
      onSnapshot(collection(window.firebaseDb, "bikesStatus"), snap => {
        const active = snap.docs
          .filter(d => d.data().inUse === true)
          .map(d => d.id); // id è bikeId tipo PA-027
        setActiveBikeIds(active);
      });
    };
    load();
  },[]);

  // Recupera corsa attiva al login
  React.useEffect(()=>{
    const restore = async () => {
      console.log("🔄 Restore avviato, user.uid:", user?.uid);
      try {
        await waitFB();
        const {collection, getDocs} = window.firebaseFunctions;
        const ridesSnap = await getDocs(collection(window.firebaseDb, "rides"));
        console.log("📦 Tot rides:", ridesSnap.docs.length);
        const allActiveRides = ridesSnap.docs
          .filter(d => {
            const data = d.data();
            return data.status === "In corso" && data.userId === user.uid;
          })
          .map(d => ({id: d.id, ...d.data()}));
        // Deduplica per bikeId — tieni la più recente
        const seenBikes = new Set();
        const activeRides = allActiveRides
          .sort((a,b) => new Date(b.startTime||0) - new Date(a.startTime||0))
          .filter(r => { if(seenBikes.has(r.bikeId)) return false; seenBikes.add(r.bikeId); return true; });
        console.log("🔍 Corse attive trovate:", activeRides.length);
        if (activeRides.length > 0) {
          const rideIds = activeRides.map(r => ({bikeId: r.bikeId, rideId: r.id}));
          const bks = activeRides.map(r => {
            const found = initBikes.find(b => b.id === r.bikeId);
            return found || {id: r.bikeId, zone: r.zone||"", battery: 80, status: "Disponibile", lat: 43.15, lng: 12.08};
          });
          setCurrentRideIds(rideIds);
          setConfirmed(bks);
          setPlan(activeRides[0].plan || "minuti");
          setRestoredElapsed(new Date(activeRides[0].startTime).getTime());
          setRiding(true);
        }
      } catch(e) { console.error("Errore ripristino corsa:", e); }
      setRestoringRide(false);
    };
    if (user?.uid) restore();
    else setRestoringRide(false);
  },[]);

  // QR scanner — usato sia per prima bici che per aggiungerne altre
  const startQRScanner = (isAdding=false) => {
    setAddingBike(isAdding);
    setShowQRScanner(true);
  };

  React.useEffect(() => {
    if (!showQRScanner) {
      clearInterval(qrIntervalRef.current);
      const video=document.getElementById("qrVideo");
      if(video&&video.srcObject){video.srcObject.getTracks().forEach(t=>t.stop());video.srcObject=null;}
      return;
    }
    navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
      const video=document.getElementById("qrVideo"); if(video){video.srcObject=stream;video.play();}
      qrIntervalRef.current=setInterval(()=>{
        const video=document.getElementById("qrVideo"); const canvas=document.getElementById("qrCanvas");
        if(!video||!canvas||!window.jsQR) return;
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=window.jsQR(imageData.data,imageData.width,imageData.height);
        if(code){
          try{
            const url=new URL(code.data); const bikeId=url.searchParams.get("bike");
            if(bikeId){
              const bike=bikes.find(b=>b.id===bikeId);
              clearInterval(qrIntervalRef.current); stream.getTracks().forEach(t=>t.stop()); setShowQRScanner(false);
              if(!bike){alert(`Bici ${bikeId} non disponibile`);return;}
              if(addingBike){
                // Aggiunge al gruppo
                if(selectedBikes.find(b=>b.id===bikeId)){alert(`Bici ${bikeId} già aggiunta`);return;}
                if(selectedBikes.length>=4){alert(t('maxBikes'));return;}
                setSelectedBikes(prev=>[...prev,bike]);
              } else {
                setSelectedBike(bike); setSelectedBikes([bike]); setShowPlan(true);
              }
            }
          }catch(e){}
        }
      },500);
    }).catch(()=>alert("Fotocamera non accessibile"));
  },[showQRScanner]);

  React.useEffect(() => {
    const bikeId=getUrlBike();
    if(bikeId){ const bike=bikes.find(b=>b.id===bikeId); if(bike){setSelectedBike(bike);setSelectedBikes([bike]);setShowPlan(true);} else alert(`Bici ${bikeId} non disponibile`); window.history.replaceState({},"","/"); }
  },[]);

  const handleBikeClick=(bike)=>{ setSelectedBike(bike); setSelectedBikes([bike]); setShowPlan(true); };

  // ── CODICI PROMO ──
  const [promoCode, setPromoCode] = React.useState("");
  const [promoApplied, setPromoApplied] = React.useState(null); // { code, type, hotelOption, hotelName }
  const [promoError, setPromoError] = React.useState("");
  const [promoLoading, setPromoLoading] = React.useState(false);

  const applyPromo = async () => {
    const code = promoCode.trim().toUpperCase();
    if (!code) return;
    setPromoLoading(true); setPromoError(""); setPromoApplied(null);
    try {
      await waitFB();
      const {doc, getDoc} = window.firebaseFunctions;
      const snap = await getDoc(doc(window.firebaseDb, "promoCodes", code));
      if (!snap.exists()) { setPromoError(t('promoInvalid')); setPromoLoading(false); return; }
      const data = snap.data();
      // Controlla scadenza
      if (data.expiresAt) {
        const exp = new Date(data.expiresAt);
        if (exp < new Date()) { setPromoError(t('promoExpired')); setPromoLoading(false); return; }
      }
      if (!data.active) { setPromoError(t('promoInvalid')); setPromoLoading(false); return; }
      setPromoApplied({ code, type: data.type, hotelOption: data.hotelOption, hotelName: data.hotelName || "" });
    } catch(e) { setPromoError(t('promoInvalid')); }
    setPromoLoading(false);
  };

  const removePromo = () => { setPromoApplied(null); setPromoCode(""); setPromoError(""); };

  // Calcola importo effettivo in base al promo
  const nBikes = selectedBikes.length || 1;
  const getEffectiveAmount = () => {
    if (!promoApplied) return plan==="giornata" ? TARIFFA_GIORNATA*nBikes : SBLOCCO*nBikes;
    if (promoApplied.type === "dipendente" || promoApplied.type === "famiglia") return 0;
    if (promoApplied.type === "hotel") {
      if (promoApplied.hotelOption === "scontata") return 16 * nBikes;
      if (promoApplied.hotelOption === "cashback") return 18.90 * nBikes;
    }
    return plan==="giornata" ? TARIFFA_GIORNATA*nBikes : SBLOCCO*nBikes;
  };
  const payAmount = getEffectiveAmount();
  const isFree = promoApplied && (promoApplied.type==="dipendente"||promoApplied.type==="famiglia");

  const handlePaySuccess=async(paymentMethodId)=>{
    setShowPayment(false); setShowPlan(false);
    console.log("💳 handlePaySuccess chiamato");
    try {
      await waitFB();
      const {collection,addDoc,doc,updateDoc,getDoc}=window.firebaseFunctions;
      const bks=selectedBikes.length>0?selectedBikes:[selectedBike];
      const rideIds=[];
      const hotelCashback = promoApplied?.type==="hotel" && promoApplied?.hotelOption==="cashback" ? 3 : 0;
      for(const bike of bks){
        const rideDoc=await addDoc(collection(window.firebaseDb,"rides"),{
          bikeId:bike.id, userId:user.uid||"",
          userName:`${user.nome||""} ${user.cognome||""}`.trim()||"Cliente",
          userEmail:user.email||"", zone:bike.zone, plan,
          status:"In corso", startTime:new Date().toISOString(),
          track:[], cost:0, groupSize:bks.length,
          promoCode: promoApplied?.code||null,
          promoType: promoApplied?.type||null,
          hotelName: promoApplied?.hotelName||null,
          hotelCashback,
          isFree: isFree||false,
        });
        rideIds.push({bikeId:bike.id,rideId:rideDoc.id});
        console.log(`✅ Ride creata: ${rideDoc.id} per ${bike.id}, status: In corso`);
      }
      // Aggiorna rimborso hotel su Firebase
      if (hotelCashback > 0 && promoApplied?.code) {
        try {
          const codeRef = doc(window.firebaseDb,"promoCodes",promoApplied.code);
          const codeSnap = await getDoc(codeRef);
          const current = codeSnap.data()?.totalCashback || 0;
          const uses = codeSnap.data()?.totalUses || 0;
          await updateDoc(codeRef, { totalCashback: current + hotelCashback * bks.length, totalUses: uses + bks.length });
        } catch(e){}
      }
      setCurrentRideIds(rideIds);
      setConfirmed(bks);
      // Sblocca tutte le bici
      for(const bike of bks) {
        await sendBikeCommand(bike.id, 'unlock');
        await setBikeInUse(bike.id, true);
      }
    } catch(e){console.error(e);}
    setRiding(true);
  };

  // ── COMANDI IoT ──
  const sendBikeCommand = async (bikeId, type) => {
    try {
      await waitFB();
      const {collection, addDoc} = window.firebaseFunctions;
      const pedId = bikeId.replace('PA-', 'PED');
      const cmdRef = collection(window.firebaseDb, 'bikes', pedId, 'commands');
      const result = await addDoc(cmdRef, {
        type, status: 'pending', createdAt: new Date().toISOString()
      });
      console.log(`✅ Comando ${type} inviato a ${pedId}, doc:`, result.id);
    } catch(e) {
      console.error('❌ Errore comando IoT:', e.code, e.message);
      alert(`Errore sblocco: ${e.message}`);
    }
  };

  const setBikeInUse = async (bikeId, inUse) => {
    try {
      await waitFB();
      const {doc, setDoc} = window.firebaseFunctions;
      await setDoc(doc(window.firebaseDb, 'bikesStatus', bikeId), {
        inUse, userId: inUse ? (user.uid||"") : null, updatedAt: new Date().toISOString()
      }, {merge: true});
    } catch(e) { console.error('Errore setBikeInUse:', e); }
  };

  const handleFreeStart = async () => {
    setShowPlan(false);
    setRiding(true);
    try {
      await waitFB();
      const {collection,addDoc}=window.firebaseFunctions;
      const bks=selectedBikes.length>0?selectedBikes:[selectedBike];
      const rideIds=[];
      for(const bike of bks){
        const rideDoc=await addDoc(collection(window.firebaseDb,"rides"),{
          bikeId:bike.id, userId:user.uid||"",
          userName:`${user.nome||""} ${user.cognome||""}`.trim()||"Cliente",
          userEmail:user.email||"", zone:bike.zone, plan:"giornata",
          status:"In corso", startTime:new Date().toISOString(),
          track:[], cost:0, groupSize:bks.length,
          promoCode:promoApplied?.code||null, promoType:promoApplied?.type||null, isFree:true,
        });
        rideIds.push({bikeId:bike.id,rideId:rideDoc.id});
        await sendBikeCommand(bike.id, 'unlock');
        await setBikeInUse(bike.id, true);
      }
      setCurrentRideIds(rideIds);
      setConfirmed(bks);
    } catch(e){console.error(e); setConfirmed(selectedBikes.length>0?selectedBikes:[selectedBike]);}
  };

  const handleEndRide=(secs,cost,bikeId)=>{
    sendBikeCommand(bikeId, 'lock');
    setBikeInUse(bikeId, false);
    setConfirmed(prev=>{
      const remaining=prev.filter(b=>b.id!==bikeId);
      if(remaining.length===0){
        setRiding(false);
        setShowSummary(true);
        setRideSummary({bikes:prev,secs,cost});
      }
      return remaining;
    });
    setCurrentRideIds(prev=>prev.filter(r=>r.bikeId!==bikeId));
  };

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.deepBlue} 0%,#034a6e 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <style>{css}</style>
      <div style={{width:390,minHeight:844,background:C.bgLight,borderRadius:40,border:`6px solid ${C.deepBlue}`,overflow:"hidden",position:"relative",display:"flex",flexDirection:"column",boxShadow:`0 40px 80px rgba(2,48,71,0.5)`}}>

        {/* Caricamento ripristino corsa */}
        {restoringRide&&(
          <div style={{position:"absolute",inset:0,background:C.deepBlue,zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <img src="https://www.pedalagilla.it/icons/icon-192x192.png" style={{width:100,height:100,objectFit:"contain",marginBottom:20}} alt="PedalAgilla"/>
            <p style={{color:C.skyBlue,fontSize:14,...ds}}>⏳ Caricamento...</p>
          </div>
        )}

        {/* QR Scanner */}
        {showQRScanner&&(
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.95)",zIndex:400,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <button onClick={()=>setShowQRScanner(false)} style={{position:"absolute",top:20,right:20,background:"none",border:"none",color:C.white,fontSize:28,cursor:"pointer"}}>{t('scanClose')}</button>
            {addingBike&&<div style={{position:"absolute",top:20,left:20,background:C.warmOrange,borderRadius:10,padding:"4px 12px"}}><p style={{color:C.white,fontSize:11,...ds,fontWeight:700,margin:0}}>➕ Aggiunta bici #{selectedBikes.length+1}</p></div>}
            <div style={{fontSize:60,marginBottom:20}}>📷</div>
            <p style={{color:C.white,fontSize:18,fontWeight:700,fontFamily:"Lora",marginBottom:8}}>{t('scanTitle')}</p>
            <p style={{color:"rgba(255,255,255,0.6)",fontSize:13,...ds,marginBottom:20,textAlign:"center",padding:"0 30px"}}>{t('scanDesc')}</p>
            <video id="qrVideo" style={{width:260,height:260,borderRadius:16,objectFit:"cover",border:`3px solid ${C.blueGreen}`,marginBottom:20}} autoPlay playsInline muted/>
            <canvas id="qrCanvas" style={{display:"none"}}/>
            <div style={{background:C.white,borderRadius:16,padding:16,width:260,textAlign:"center"}}>
              <p style={{color:C.deepBlue,fontSize:12,...ds,fontWeight:600,margin:"0 0 8px"}}>{t('scanManual')}</p>
              <input placeholder={t('scanPh')} style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`2px solid ${C.blueGreen}`,fontSize:15,fontFamily:"'DM Sans'",color:C.deepBlue,textAlign:"center",textTransform:"uppercase"}}
                onChange={e=>{
                  const val=e.target.value.toUpperCase().trim();
                  const bike=bikes.find(b=>b.id===val);
                  if(bike){
                    setShowQRScanner(false);
                    if(addingBike){
                      if(selectedBikes.find(b=>b.id===val)){alert(`Bici ${val} già aggiunta`);return;}
                      if(selectedBikes.length>=4){alert(t('maxBikes'));return;}
                      setSelectedBikes(prev=>[...prev,bike]);
                    } else {
                      setSelectedBike(bike);setSelectedBikes([bike]);setShowPlan(true);
                    }
                  }
                }}/>
            </div>
          </div>
        )}

        {/* Timer corsa */}
        {riding&&confirmed&&confirmed.length>0&&(
          confirmed.length===1
            ?<RideTimer bike={confirmed[0]} plan={plan} user={user} rideId={currentRideIds[0]?.rideId} rideStartTime={restoredElapsed} onEnd={(s,c)=>handleEndRide(s,c,confirmed[0].id)} t={t}/>
            :<MultiRideTimer bikes={confirmed} plan={plan} user={user} rideIds={currentRideIds} onEnd={handleEndRide} t={t}/>
        )}

        {/* Riepilogo fine corsa */}
        {showSummary&&rideSummary&&(
          <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,overflowY:"auto",padding:24}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{width:80,height:80,borderRadius:40,background:`linear-gradient(135deg,${C.blueGreen},${C.deepBlue})`,margin:"0 auto 16px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>🏁</div>
              <h2 style={{color:C.deepBlue,fontSize:22,fontWeight:700,fontFamily:"Lora",margin:"0 0 4px"}}>{t('rideComplete')}</h2>
              <p style={{color:"#888",fontSize:13,...ds}}>{t('thankYou')}</p>
            </div>
            <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:20,padding:20,marginBottom:16,textAlign:"center"}}>
              <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 4px",...ds,letterSpacing:2}}>{t('totalPaid')}</p>
              <p style={{color:C.sunYellow,fontSize:40,fontWeight:700,margin:0,...ds}}>€{rideSummary.cost.toFixed(2)}</p>
            </div>
            {(Array.isArray(rideSummary.bikes)?rideSummary.bikes:[rideSummary.bikes]).map(bike=>(
              <div key={bike.id} style={{display:"flex",justifyContent:"space-between",borderBottom:`1px solid ${C.skyBlue}20`,paddingBottom:10,marginBottom:10}}>
                <span style={{color:"#888",fontSize:13,...ds}}>{t('bikeLbl')}</span>
                <span style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:600}}>{bike.id} · {bike.zone}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",borderBottom:`1px solid ${C.skyBlue}20`,paddingBottom:10,marginBottom:10}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{t('durationLbl')}</span>
              <span style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:600}}>{Math.floor(rideSummary.secs/60)}{t('min')}</span>
            </div>
            <button onClick={()=>{setShowSummary(false);setRideSummary(null);setConfirmed([]);setSelectedBikes([]);}} style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginTop:8}}>
              {t('backToMap')}
            </button>
          </div>
        )}

        {/* Schermata piano + selezione multi-bici */}
        {showPlan&&selectedBike&&!riding&&!showSummary&&(
          <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:200,display:"flex",flexDirection:"column",overflowY:"auto"}}>
            {showPayment?(
              <>
                <div style={{background:C.deepBlue,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <button onClick={()=>setShowPayment(false)} style={{background:"none",border:"none",color:C.skyBlue,fontSize:22,cursor:"pointer"}}>←</button>
                  <p style={{color:C.white,fontSize:15,fontWeight:700,margin:0,fontFamily:"Lora"}}>{t('payment')}</p>
                  <div style={{width:30}}/>
                </div>
                <PaymentForm amount={payAmount} bike={selectedBikes.length>1?selectedBikes:selectedBike} plan={plan==="giornata"?t('planDay'):t('planMinutes')} onSuccess={handlePaySuccess} onCancel={()=>setShowPayment(false)} t={t}/>
              </>
            ):(
              <>
                <div style={{background:C.deepBlue,padding:"12px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <button onClick={()=>{setShowPlan(false);setSelectedBikes([]);}} style={{background:"none",border:"none",color:C.skyBlue,fontSize:22,cursor:"pointer"}}>✕</button>
                  <p style={{color:C.white,fontSize:15,fontWeight:700,margin:0,fontFamily:"Lora"}}>
                    {selectedBikes.length>1?`🚲×${selectedBikes.length} Gruppo`:`🚲 ${selectedBike.id}`}
                  </p>
                  <div style={{width:30}}/>
                </div>
                <div style={{padding:20}}>

                  {/* Bici selezionate */}
                  {selectedBikes.map((bike,i)=>(
                    <div key={bike.id} style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:16,padding:14,marginBottom:10,display:"flex",gap:12,alignItems:"center"}}>
                      <div style={{fontSize:32}}>🚲</div>
                      <div style={{flex:1}}>
                        <p style={{color:C.white,fontSize:16,fontWeight:700,margin:0,fontFamily:"Lora"}}>{bike.id}</p>
                        <p style={{color:C.skyBlue,fontSize:12,margin:"2px 0 0",...ds}}>📍 {bike.zone} · ⚡ {bike.battery}%</p>
                      </div>
                      {i>0&&<button onClick={()=>setSelectedBikes(prev=>prev.filter(b=>b.id!==bike.id))}
                        style={{background:`${C.warmOrange}30`,border:"none",borderRadius:8,padding:"4px 10px",color:C.warmOrange,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                        {t('removeBike')}
                      </button>}
                    </div>
                  ))}

                  {/* Bottone aggiungi bici */}
                  {selectedBikes.length<4&&(
                    <button onClick={()=>startQRScanner(true)}
                      style={{width:"100%",background:`${C.blueGreen}15`,border:`2px dashed ${C.blueGreen}`,borderRadius:14,padding:12,color:C.blueGreen,fontSize:13,...ds,fontWeight:700,cursor:"pointer",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                      {t('addBike')}
                    </button>
                  )}
                  {selectedBikes.length>=4&&(
                    <div style={{background:`${C.sunYellow}15`,border:`1px solid ${C.sunYellow}`,borderRadius:10,padding:"8px 14px",marginBottom:14,textAlign:"center"}}>
                      <p style={{color:"#b38600",fontSize:12,...ds,fontWeight:600,margin:0}}>⚠️ {t('maxBikes')}</p>
                    </div>
                  )}

                  {/* Selezione piano */}
                  {[{id:"minuti",label:t('planMinutes'),icon:"⏱️",desc:`€${SBLOCCO.toFixed(2)}×${nBikes} + €${TARIFFA_MIN}/min`},{id:"giornata",label:t('planDay'),icon:"☀️",desc:`€${(TARIFFA_GIORNATA*nBikes).toFixed(2)} — ${t('free')}`}].map(p=>(
                    <div key={p.id} onClick={()=>setPlan(p.id)} style={{background:plan===p.id?C.deepBlue:C.white,borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer",border:`2px solid ${plan===p.id?C.deepBlue:C.skyBlue+"30"}`,display:"flex",alignItems:"center",gap:14}}>
                      <div style={{fontSize:28}}>{p.icon}</div>
                      <div style={{flex:1}}>
                        <p style={{color:plan===p.id?C.white:C.deepBlue,fontWeight:700,fontSize:15,margin:0,fontFamily:"Lora"}}>{p.label}</p>

                    </div>
                  ))}

                  {/* Distanza a piedi (solo per bici singola) */}
                  {userPos&&selectedBike&&selectedBikes.length===1&&(()=>{
                    const R=6371000;
                    const dLat=(selectedBike.lat-userPos.lat)*Math.PI/180;
                    const dLng=(selectedBike.lng-userPos.lng)*Math.PI/180;
                    const a=Math.sin(dLat/2)**2+Math.cos(userPos.lat*Math.PI/180)*Math.cos(selectedBike.lat*Math.PI/180)*Math.sin(dLng/2)**2;
                    const d=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
                    const mins=Math.round(d/80);
                    const distText=d<1000?`${Math.round(d)}m · ~${mins} min`:`${(d/1000).toFixed(1)}km · ~${mins} min`;
                    return(
                      <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:12,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>

                        </div>
                      </div>
                    );

                          {promoApplied.type==="hotel" && promoApplied.hotelOption==="cashback" && (

function PromoAdmin() {
  const [codes, setCodes] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [showForm, setShowForm] = React.useState(false);
  // Form fields
  const [newCode, setNewCode] = React.useState("");
  const [newType, setNewType] = React.useState("dipendente"); // dipendente | famiglia | hotel
  const [newHotelOption, setNewHotelOption] = React.useState("scontata"); // scontata | cashback
  const [newHotelName, setNewHotelName] = React.useState("");
  const [newExpiry, setNewExpiry] = React.useState("2026-09-30");
  const [newNoExpiry, setNewNoExpiry] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [formError, setFormError] = React.useState("");

  const loadCodes = async () => {
    setLoading(true);
    try {
      await waitFB();
      const {collection, getDocs} = window.firebaseFunctions;
      const snap = await getDocs(collection(window.firebaseDb, "promoCodes"));
      setCodes(snap.docs.map(d => ({id: d.id, ...d.data()})));
    } catch(e) {}
    setLoading(false);
  };

  React.useEffect(() => { loadCodes(); }, []);

  const handleSave = async () => {
    const code = newCode.trim().toUpperCase();
    if (!code) { setFormError("Inserisci il codice"); return; }
    if (newType === "hotel" && !newHotelName.trim()) { setFormError("Inserisci il nome dell'hotel"); return; }
    setSaving(true); setFormError("");
    try {
      await waitFB();
      const {doc, setDoc} = window.firebaseFunctions;
      const data = {
        type: newType,
        active: true,
        createdAt: new Date().toISOString(),
        expiresAt: newNoExpiry ? null : new Date(newExpiry).toISOString(),
        totalUses: 0,
      };
      if (newType === "hotel") {
        data.hotelOption = newHotelOption;
        data.hotelName = newHotelName.trim();
        data.totalCashback = 0;
      }
      await setDoc(doc(window.firebaseDb, "promoCodes", code), data);
      setShowForm(false);
      setNewCode(""); setNewHotelName(""); setNewType("dipendente"); setNewNoExpiry(false);
      loadCodes();
    } catch(e) { setFormError("Errore: " + e.message); }
    setSaving(false);
  };

  const toggleActive = async (code, current) => {
    try {
      await waitFB();
      const {doc, updateDoc} = window.firebaseFunctions;
      await updateDoc(doc(window.firebaseDb, "promoCodes", code), {active: !current});
      loadCodes();
    } catch(e) {}
  };

  const deleteCode = async (code) => {
    if (!window.confirm(`Eliminare il codice ${code}?`)) return;
    try {
      await waitFB();
      const {doc} = window.firebaseFunctions;
      // Firestore SDK non ha deleteDoc nel bundle CDN v10 compat — usiamo updateDoc con active:false
      const {updateDoc} = window.firebaseFunctions;
      await updateDoc(doc(window.firebaseDb, "promoCodes", code), {active: false, deleted: true});
      loadCodes();
    } catch(e) {}
  };

  const typeLabel = (c) => {
    if (c.type === "dipendente") return "👷 Dipendente";
    if (c.type === "famiglia") return "👨‍👩‍👧 Famiglia";
    if (c.type === "hotel") return c.hotelOption === "scontata" ? "🏨 Hotel €16" : "🏨 Hotel cashback €3";
    return c.type;
  };
  const typeColor = (c) => c.type === "hotel" ? "#1565C0" : c.type === "famiglia" ? "#6A0DAD" : C.deepBlue;

  return (
    <div className="slide" style={{padding:"16px 18px 0"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:0,...ds,opacity:0.5}}>Codici promo ({codes.filter(c=>!c.deleted).length})</p>
        <button onClick={()=>setShowForm(f=>!f)} style={{background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:10,padding:"8px 14px",color:C.white,fontSize:12,...ds,fontWeight:700,cursor:"pointer"}}>
          {showForm ? "✕ Chiudi" : "➕ Nuovo codice"}
        </button>
      </div>

      {/* FORM NUOVO CODICE */}
      {showForm && (
        <div style={{background:C.white,borderRadius:16,padding:18,marginBottom:16,boxShadow:"0 4px 16px rgba(2,48,71,0.10)",border:`1.5px solid ${C.skyBlue}40`}}>
          <p style={{color:C.deepBlue,fontSize:14,fontWeight:700,margin:"0 0 14px",fontFamily:"Lora"}}>✏️ Crea codice</p>

          <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>Codice *</p>
          <input value={newCode} onChange={e=>setNewCode(e.target.value.toUpperCase())}
            placeholder="Es. MARCO2024, HOTELROME01"
            style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}50`,fontSize:14,...ds,color:C.deepBlue,background:C.white,marginBottom:12,textTransform:"uppercase",letterSpacing:2}}/>

          <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 8px",...ds}}>Tipo</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
            {[["dipendente","👷","Dipendente"],["famiglia","👨‍👩‍👧","Famiglia"],["hotel","🏨","Hotel"]].map(([v,icon,label])=>(
              <div key={v} onClick={()=>setNewType(v)}
                style={{background:newType===v?C.deepBlue:"#f5f5f5",borderRadius:10,padding:"10px 6px",textAlign:"center",cursor:"pointer",border:`2px solid ${newType===v?C.deepBlue:"transparent"}`}}>
                <p style={{fontSize:20,margin:"0 0 2px"}}>{icon}</p>
                <p style={{color:newType===v?C.white:C.deepBlue,fontSize:11,...ds,fontWeight:600,margin:0}}>{label}</p>
              </div>
            ))}
          </div>

          {/* Opzioni hotel */}
          {newType === "hotel" && (<>
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 8px",...ds}}>Nome hotel *</p>
            <input value={newHotelName} onChange={e=>setNewHotelName(e.target.value)}
              placeholder="Es. Hotel Bella Vista"
              style={{width:"100%",padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}50`,fontSize:13,...ds,color:C.deepBlue,background:C.white,marginBottom:12}}/>
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 8px",...ds}}>Tipo convenzione</p>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
