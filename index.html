  { id:"PA-034", battery:100, status:"Manutenzione", odometer:157.5, zone:"Magione", model:"City Comfort", range:60, lat:43.1414, lng:12.2080 },

  { id:"PA-016", battery:96, status:"Disponibile", odometer:502.8, zone:"Panicale", model:"Trail Explorer", range:58, lat:43.0298, lng:12.1020 },

  { id:"OL-001", bike:"PA-035", type:"Batteria scarica", priority:"Alta", date:"17/03/2026", tech:"Marco R.", status:"Aperto", zone:"Tuoro" },
  { id:"OL-002", bike:"PA-015", type:"Sostituzione batteria", priority:"Alta", date:"17/03/2026", tech:"Luigi B.", status:"In corso", zone:"Tuoro" },

  { id:"OL-004", bike:"PA-022", type:"Ispezione", priority:"Bassa", date:"18/03/2026", tech:"Marco R.", status:"Aperto", zone:"Castiglione" },
];

const getBattColor = (b) => b >= 80 ? C.blueGreen : b >= 50 ? C.sunYellow : C.warmOrange;
const getStatusColor = (s) => s === "Disponibile" ? C.blueGreen : C.warmOrange;
const getWOColor = (s) => s === "Completato" ? C.blueGreen : s === "In corso" ? C.blueGreen : C.sunYellow;
const getPrioColor = (p) => p === "Alta" ? C.warmOrange : p === "Media" ? C.sunYellow : C.blueGreen;

// Mappa con marker emoji
function MapView({ bikes, onBikeClick }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;

    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=AIzaSyBfgaG8lGRp7P8XGI-powaYfKufeLPebx8&callback=initMap`;
    script.async = true;
    window.initMap = () => {
      const map = new window.google.maps.Map(mapRef.current, {
        center: { lat: 43.1500, lng: 12.1000 },
        zoom: 12,
        mapTypeId: "roadmap",
        styles: [
          { featureType:"water", elementType:"geometry", stylers:[{ color:"#8ECAE6" }] },
          { featureType:"landscape", elementType:"geometry", stylers:[{ color:"#e8f4f8" }] },
          { featureType:"road", elementType:"geometry", stylers:[{ color:"#ffffff" }] },
          { featureType:"poi", stylers:[{ visibility:"off" }] },
        ]
      });
      mapInstanceRef.current = map;

      bikes.forEach(bike => {
        const marker = new window.google.maps.Marker({
          position: { lat: bike.lat, lng: bike.lng },
          map,
          title: bike.id,
          label: {
            text: `${bike.battery}%`,
            color: "#ffffff",
            fontSize: "10px",
            fontWeight: "bold",
          },
          icon: {
            path: window.google.maps.SymbolPath.CIRCLE,
            scale: 14,
            fillColor: bike.battery >= 80 ? "#219EBC" : bike.battery >= 50 ? "#FFB703" : "#FB8500",
            fillOpacity: 1,
            strokeColor: "#ffffff",
            strokeWeight: 2,
          }
        });

        const infoWindow = new window.google.maps.InfoWindow({
          content: `
            <div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:150px">
              <h3 style="color:#023047;margin:0 0 4px;font-size:15px">${bike.id}</h3>
              <p style="margin:2px 0;font-size:12px;color:#666">📍 ${bike.zone}</p>
              <p style="margin:2px 0;font-size:12px;color:${bike.battery>=80?'#219EBC':bike.battery>=50?'#FFB703':'#FB8500'}">⚡ ${bike.battery}%</p>
              <p style="margin:2px 0;font-size:12px;color:${bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.status}</p>
              <p style="margin:4px 0 0;font-size:11px;color:#999">🛣️ ~${bike.range} km autonomia</p>
            </div>
          `
        });

        marker.addListener("click", () => {
          infoWindow.open(map, marker);
          onBikeClick(bike);
        });
      });
    };
    document.head.appendChild(script);
  }, []);

  return <div ref={mapRef} style={{ width:"100%", height:"100%", borderRadius:16 }} />;
}

function App() {
  const [tab, setTab] = React.useState("dashboard");
  const [selectedBike, setSelectedBike] = React.useState(null);
  const [showBooking, setShowBooking] = React.useState(false);
  const [filterStatus, setFilterStatus] = React.useState("Tutti");
  const [bookingStep, setBookingStep] = React.useState(1);
  const [bookZone, setBookZone] = React.useState(null);
  const [bookedBike, setBookedBike] = React.useState(null);
  const [plan, setPlan] = React.useState("orario");
  const [duration, setDuration] = React.useState(2);
  const [confirmedBike, setConfirmedBike] = React.useState(null);
  const [mapBike, setMapBike] = React.useState(null);

  const available = bikes.filter(b => b.status === "Disponibile").length;
  const lowBattery = bikes.filter(b => b.battery < 50).length;
  const maintenance = bikes.filter(b => b.status === "Manutenzione").length;
  const avgBattery = Math.round(bikes.reduce((a,b) => a + b.battery, 0) / bikes.length);
  const openOrders = workOrders.filter(w => w.status !== "Completato").length;
  const filteredBikes = filterStatus === "Tutti" ? bikes : filterStatus === "Batteria Bassa" ? bikes.filter(b => b.battery < 50) : bikes.filter(b => b.status === filterStatus);

  const zones = ["Passignano","Castiglione","Tuoro","Magione","Panicale"];
  const zoneIcons = { Passignano:"🏛️", Castiglione:"🏰", Tuoro:"⛵", Magione:"🌿", Panicale:"🍷" };
  const plans = [
    { id:"orario", label:"Orario", price:3, unit:"€/ora", icon:"⏱️" },
    { id:"mezza", label:"Mezza giornata", price:10, unit:"4h", icon:"🌤️" },
    { id:"giornata", label:"Giornata intera", price:18, unit:"8h", icon:"☀️" },
  ];
  const selPlan = plans.find(p => p.id === plan);
  const totalPrice = plan === "orario" ? duration * 3 : selPlan.price;
  const availableInZone = bikes.filter(b => b.status === "Disponibile" && b.zone === bookZone);
  const ds = { fontFamily:"'DM Sans', sans-serif" };

  return (
    <div style={{ minHeight:"100vh", background:`linear-gradient(160deg, ${C.deepBlue} 0%, #034a6e 100%)`, display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>

        .card { transition: all 0.2s; cursor: pointer; }
        .card:hover { transform: translateY(-2px); }
        .btn { transition: all 0.15s; cursor: pointer; }
        .btn:active { transform: scale(0.97); }
        @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .slide { animation: slideUp 0.3s ease; }
      `}</style>

      <div style={{ width:390, minHeight:844, background:C.bgLight, borderRadius:40, border:`6px solid ${C.deepBlue}`, overflow:"hidden", position:"relative", display:"flex", flexDirection:"column", boxShadow:`0 40px 80px rgba(2,48,71,0.5)` }}>

        {/* BOOKING OVERLAY */}
        {showBooking && (
          <div style={{ position:"absolute", inset:0, background:C.bgLight, zIndex:100, display:"flex", flexDirection:"column", overflowY:"auto" }}>
            <div style={{ background:C.deepBlue, padding:"12px 20px 16px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <button className="btn" onClick={() => bookingStep > 1 && bookingStep < 5 ? setBookingStep(s => s-1) : setShowBooking(false)}
                  style={{ background:"none", border:"none", color:C.skyBlue, fontSize:22, cursor:"pointer" }}>
                  {bookingStep > 1 && bookingStep < 5 ? "←" : "✕"}
                </button>
                <div style={{ textAlign:"center" }}>
                  <p style={{ color:C.skyBlue, fontSize:10, margin:0, letterSpacing:2, ...ds }}>PRENOTA</p>
                  <p style={{ color:C.white, fontSize:15, fontWeight:700, margin:0, fontFamily:"Lora" }}>

                </div>
                <div style={{ width:30 }} />
              </div>
              {bookingStep < 5 && (

              )}
            </div>
            <div style={{ flex:1, padding:"20px 18px" }}>
              {bookingStep===1 && (
                <div className="slide">
                  <p style={{ color:C.deepBlue, fontSize:13, marginBottom:16, ...ds, opacity:0.7 }}>Dove vuoi iniziare la tua avventura?</p>

                    const count = bikes.filter(b => b.status==="Disponibile" && b.zone===zone).length;
                    return (
                      <div key={zone} className="card" onClick={() => { setBookZone(zone); setBookingStep(2); }}
                        style={{ background:C.white, borderRadius:16, padding:16, marginBottom:10, display:"flex", alignItems:"center", gap:14, boxShadow:"0 2px 12px rgba(2,48,71,0.08)", opacity:count===0?0.5:1 }}>

                        </div>
                        <span style={{ color:C.blueGreen, fontSize:20 }}>›</span>
                      </div>
                    );
                  })}

              )}
              {bookingStep===2 && (
                <div className="slide">

                  { label:"Batteria media", value:`${avgBattery}%`, icon:"⚡", accent:C.blueGreen },
                  { label:"Critiche", value:lowBattery, icon:"🔴", accent:C.warmOrange },
                  { label:"Manutenzione", value:maintenance, icon:"🔧", accent:C.sunYellow },
                ].map((k,i) => (
                  <div key={i} style={{ background:C.white, borderRadius:16, padding:"14px 16px", boxShadow:"0 2px 12px rgba(2,48,71,0.08)", borderLeft:`3px solid ${k.accent}` }}>
                    <div style={{ fontSize:20, marginBottom:6 }}>{k.icon}</div>
                    <div style={{ color:k.accent, fontSize:26, fontWeight:700 }}>{k.value}</div>
                    <div style={{ color:C.deepBlue, fontSize:12, marginTop:4, ...ds }}>{k.label}</div>
                  </div>
                ))}
              </div>
              <div style={{ background:`linear-gradient(135deg, ${C.deepBlue}, #034a6e)`, borderRadius:14, padding:"14px 16px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <p style={{ color:C.skyBlue, fontSize:11, margin:0, ...ds }}>ORDINI DI LAVORO</p>
                  <p style={{ color:C.white, fontSize:14, fontWeight:600, margin:"3px 0 0", ...ds }}>{openOrders} ordini aperti</p>
                </div>
                <button className="btn" onClick={() => setTab("ordini")} style={{ background:C.blueGreen, border:"none", borderRadius:10, padding:"8px 14px", color:C.white, fontSize:12, ...ds, fontWeight:600, cursor:"pointer" }}>Vedi →</button>
              </div>
              <p style={{ color:C.deepBlue, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", margin:"0 0 10px", ...ds, opacity:0.5 }}>Ultime attività</p>
              {bikes.slice(0,4).map(bike => (
                <div key={bike.id} className="card" onClick={() => { setSelectedBike(bike); setTab("dettaglio"); }}
                  style={{ background:C.white, borderRadius:14, padding:"13px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:12, boxShadow:"0 2px 10px rgba(2,48,71,0.07)" }}>
                  <div style={{ width:40, height:40, borderRadius:20, background:`${getBattColor(bike.battery)}20`, border:`2px solid ${getBattColor(bike.battery)}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🚲</div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", justifyContent:"space-between" }}>
                      <span style={{ color:C.deepBlue, fontWeight:700, fontSize:15, fontFamily:"Lora" }}>{bike.id}</span>
                      <span style={{ color:getBattColor(bike.battery), fontSize:13, fontWeight:700, ...ds }}>{bike.battery}%</span>
                    </div>
                    <div style={{ height:3, background:"#eee", borderRadius:2, margin:"5px 0", overflow:"hidden" }}>
                      <div style={{ width:`${bike.battery}%`, height:"100%", background:getBattColor(bike.battery), borderRadius:2 }} />
                    </div>
                    <div style={{ display:"flex", gap:10 }}>
                      <span style={{ color:getStatusColor(bike.status), fontSize:11, ...ds }}>● {bike.status}</span>
                      <span style={{ color:"#aaa", fontSize:11, ...ds }}>📍 {bike.zone}</span>
                    </div>
                  </div>
                  <span style={{ color:C.blueGreen, fontSize:18 }}>›</span>
                </div>
              ))}
            </div>
          )}

          {tab==="mappa" && (
            <div className="slide" style={{ padding:"18px 18px 0" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <p style={{ color:C.deepBlue, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", margin:0, ...ds, opacity:0.5 }}>Lago Trasimeno — Live</p>
                <button className="btn" onClick={() => { setShowBooking(true); setBookingStep(1); }} style={{ background:C.blueGreen, border:"none", borderRadius:10, padding:"7px 14px", color:C.white, fontSize:12, ...ds, fontWeight:600, cursor:"pointer" }}>🚲 Prenota</button>
              </div>
              <div style={{ height:320, borderRadius:16, overflow:"hidden", marginBottom:14, boxShadow:"0 4px 20px rgba(2,48,71,0.15)" }}>
                <MapView bikes={bikes} onBikeClick={(bike) => setMapBike(bike)} />
              </div>
              <div style={{ display:"flex", gap:14, marginBottom:12 }}>
                {[[C.blueGreen,"OK (≥80%)"],[C.sunYellow,"Medio"],[C.warmOrange,"Critico (<50%)"]].map(([c,l]) => (
                  <div key={l} style={{ display:"flex", alignItems:"center", gap:5 }}>
                    <div style={{ width:8, height:8, borderRadius:4, background:c }} />
                    <span style={{ color:C.deepBlue, fontSize:10, ...ds, opacity:0.7 }}>{l}</span>
                  </div>
                ))}
              </div>
              {mapBike && (
                <div style={{ background:C.white, borderRadius:14, padding:14, marginBottom:10, boxShadow:"0 2px 10px rgba(2,48,71,0.07)", border:`2px solid ${C.blueGreen}30` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <span style={{ color:C.deepBlue, fontWeight:700, fontSize:15, fontFamily:"Lora" }}>{mapBike.id}</span>
                    <span style={{ color:getBattColor(mapBike.battery), fontWeight:700, ...ds }}>{mapBike.battery}% ⚡</span>
                  </div>
                  <p style={{ color:"#aaa", fontSize:12, margin:"0 0 10px", ...ds }}>📍 {mapBike.zone} · {mapBike.model}</p>
                  {mapBike.status === "Disponibile" && (
                    <button className="btn" onClick={() => { setShowBooking(true); setBookingStep(1); }}
                      style={{ width:"100%", background:C.blueGreen, border:"none", borderRadius:10, padding:"10px", color:C.white, fontSize:13, ...ds, fontWeight:600, cursor:"pointer" }}>
                      🚲 Prenota questa bici
                    </button>
                  )}
                </div>
              )}
              <p style={{ color:C.deepBlue, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", margin:"0 0 8px", ...ds, opacity:0.5 }}>⚠️ Bici critiche</p>
              {bikes.filter(b => b.battery < 50).map(bike => (
                <div key={bike.id} className="card" onClick={() => setMapBike(bike)}
                  style={{ background:C.white, border:`1px solid ${C.warmOrange}30`, borderRadius:12, padding:"11px 14px", marginBottom:8, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ color:C.deepBlue, fontWeight:700, fontSize:14, fontFamily:"Lora" }}>{bike.id} · {bike.zone}</span>
                  <span style={{ color:C.warmOrange, fontWeight:700, fontSize:13, ...ds }}>{bike.battery}% ⚡</span>
                </div>
              ))}
            </div>
          )}

          {tab==="bici" && (
            <div className="slide" style={{ padding:"18px 18px 0" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <p style={{ color:C.deepBlue, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", margin:0, ...ds, opacity:0.5 }}>Tutte le e-bike ({bikes.length})</p>
                <button className="btn" onClick={() => { setShowBooking(true); setBookingStep(1); }} style={{ background:C.blueGreen, border:"none", borderRadius:10, padding:"7px 14px", color:C.white, fontSize:12, ...ds, fontWeight:600, cursor:"pointer" }}>🚲 Prenota</button>
              </div>
              <div style={{ display:"flex", gap:8, marginBottom:14, overflowX:"auto", paddingBottom:4 }}>
                {["Tutti","Disponibile","Manutenzione","Batteria Bassa"].map(f => (
                  <button key={f} className="btn" onClick={() => setFilterStatus(f)}
                    style={{ background:filterStatus===f?C.deepBlue:C.white, border:`1.5px solid ${filterStatus===f?C.deepBlue:C.skyBlue+"50"}`, borderRadius:20, padding:"6px 14px", color:filterStatus===f?C.white:C.deepBlue, fontSize:11, cursor:"pointer", whiteSpace:"nowrap", ...ds, fontWeight:500 }}>
                    {f}
                  </button>
                ))}
              </div>
              {filteredBikes.map(bike => (
                <div key={bike.id} className="card" onClick={() => { setSelectedBike(bike); setTab("dettaglio"); }}
                  style={{ background:C.white, borderRadius:14, padding:14, marginBottom:8, boxShadow:"0 2px 10px rgba(2,48,71,0.07)" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                    <div style={{ width:46, height:46, borderRadius:23, background:`${getBattColor(bike.battery)}15`, border:`2px solid ${getBattColor(bike.battery)}50`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>🚲</div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <span style={{ color:C.deepBlue, fontWeight:700, fontSize:15, fontFamily:"Lora" }}>{bike.id}</span>
                        <span style={{ color:getBattColor(bike.battery), fontSize:14, fontWeight:700, ...ds }}>{bike.battery}%</span>
                      </div>
                      <div style={{ height:5, background:"#eee", borderRadius:3, margin:"6px 0", overflow:"hidden" }}>
                        <div style={{ width:`${bike.battery}%`, height:"100%", background:getBattColor(bike.battery), borderRadius:3 }} />
                      </div>
                      <div style={{ display:"flex", justifyContent:"space-between" }}>
                        <span style={{ color:getStatusColor(bike.status), fontSize:11, ...ds }}>● {bike.status}</span>
                        <span style={{ color:"#bbb", fontSize:11, ...ds }}>📍 {bike.zone}</span>
                      </div>
                    </div>
                    <span style={{ color:C.blueGreen, fontSize:20 }}>›</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab==="dettaglio" && selectedBike && (
            <div className="slide" style={{ padding:"16px 18px 0" }}>
              <button className="btn" onClick={() => setTab("bici")} style={{ background:"none", border:"none", color:C.blueGreen, fontSize:14, cursor:"pointer", padding:"0 0 12px", ...ds, fontWeight:600 }}>← Torna</button>
              <div style={{ background:`linear-gradient(135deg, ${C.deepBlue}, #034a6e)`, borderRadius:20, padding:20, marginBottom:16, textAlign:"center" }}>
                <div style={{ fontSize:50, marginBottom:8 }}>🚲</div>
                <h2 style={{ color:C.white, fontSize:26, fontWeight:700, margin:0, fontFamily:"Lora" }}>{selectedBike.id}</h2>
                <p style={{ color:C.skyBlue, fontSize:12, margin:"4px 0 8px", ...ds }}>📍 {selectedBike.zone}</p>
                <span style={{ color:getStatusColor(selectedBike.status), fontSize:12, background:`${getStatusColor(selectedBike.status)}20`, padding:"4px 14px", borderRadius:20, ...ds }}>● {selectedBike.status}</span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:14 }}>
                {[["⚡","Batteria",`${selectedBike.battery}%`,getBattColor(selectedBike.battery)],["🛣️","Km",`${selectedBike.odometer.toFixed(0)}`,C.blueGreen],["📍","Zona",selectedBike.zone.substring(0,6),C.deepBlue]].map(([icon,label,value,color],i) => (
                  <div key={i} style={{ background:C.white, borderRadius:14, padding:"12px 10px", textAlign:"center", boxShadow:"0 2px 8px rgba(2,48,71,0.07)" }}>
                    <div style={{ fontSize:18, marginBottom:4 }}>{icon}</div>
                    <div style={{ color, fontSize:14, fontWeight:700, ...ds }}>{value}</div>
                    <div style={{ color:"#aaa", fontSize:10, marginTop:2, ...ds }}>{label}</div>
                  </div>
                ))}
              </div>
              {selectedBike.status==="Disponibile" && (
                <button className="btn" onClick={() => { setShowBooking(true); setBookingStep(1); }}
                  style={{ width:"100%", background:`linear-gradient(90deg, ${C.blueGreen}, ${C.deepBlue})`, border:"none", borderRadius:14, padding:16, color:C.white, fontSize:15, ...ds, fontWeight:700, cursor:"pointer", marginBottom:12 }}>
                  🚲 Prenota questa bici
                </button>
              )}
            </div>
          )}

          {tab==="ordini" && (
            <div className="slide" style={{ padding:"18px 18px 0" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <p style={{ color:C.deepBlue, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", margin:0, ...ds, opacity:0.5 }}>Ordini di lavoro</p>
                <button className="btn" style={{ background:C.blueGreen, border:"none", borderRadius:10, padding:"7px 16px", color:C.white, fontSize:12, ...ds, fontWeight:600, cursor:"pointer" }}>+ Nuovo</button>
              </div>
              {workOrders.map(order => (
                <div key={order.id} style={{ background:C.white, borderRadius:14, padding:14, marginBottom:10, boxShadow:"0 2px 10px rgba(2,48,71,0.07)", borderLeft:`3px solid ${getWOColor(order.status)}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                    <div>
                      <span style={{ color:C.deepBlue, fontWeight:700, fontSize:14, fontFamily:"Lora" }}>{order.id}</span>
                      <span style={{ color:"#bbb", fontSize:12, marginLeft:8, ...ds }}>— {order.bike}</span>
                    </div>
                    <span style={{ color:getWOColor(order.status), fontSize:11, background:`${getWOColor(order.status)}15`, padding:"3px 10px", borderRadius:20, ...ds }}>● {order.status}</span>
                  </div>
                  <div style={{ display:"flex", gap:12, flexWrap:"wrap" }}>
                    <span style={{ color:"#888", fontSize:11, ...ds }}>🔧 {order.type}</span>
                    <span style={{ color:getPrioColor(order.priority), fontSize:11, ...ds }}>▲ {order.priority}</span>
                    <span style={{ color:"#bbb", fontSize:11, ...ds }}>👤 {order.tech}</span>
                    <span style={{ color:"#bbb", fontSize:11, ...ds }}>📍 {order.zone}</span>
                  </div>
                </div>
              ))}
            </div>
          )}

          {tab==="stats" && (
            <div className="slide" style={{ padding:"18px 18px 0" }}>
              <p style={{ color:C.deepBlue, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", margin:"0 0 14px", ...ds, opacity:0.5 }}>Statistiche flotta</p>
              <div style={{ background:C.white, borderRadius:14, padding:16, marginBottom:12, boxShadow:"0 2px 10px rgba(2,48,71,0.07)" }}>
                <p style={{ color:C.deepBlue, fontSize:14, fontWeight:600, margin:"0 0 14px", fontFamily:"Lora" }}>⚡ Distribuzione batteria</p>
                {[["80-100%",bikes.filter(b=>b.battery>=80).length,C.blueGreen],["50-79%",bikes.filter(b=>b.battery>=50&&b.battery<80).length,C.sunYellow],["0-49%",bikes.filter(b=>b.battery<50).length,C.warmOrange]].map(([range,count,color]) => (
                  <div key={range} style={{ marginBottom:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
                      <span style={{ color:"#888", fontSize:12, ...ds }}>{range}</span>
                      <span style={{ color, fontSize:12, ...ds, fontWeight:700 }}>{count} bici</span>
                    </div>
                    <div style={{ height:8, background:"#eee", borderRadius:4, overflow:"hidden" }}>
                      <div style={{ width:`${(count/bikes.length)*100}%`, height:"100%", background:color, borderRadius:4 }} />
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ background:C.white, borderRadius:14, padding:16, marginBottom:18, boxShadow:"0 2px 10px rgba(2,48,71,0.07)" }}>
                <p style={{ color:C.deepBlue, fontSize:14, fontWeight:600, margin:"0 0 14px", fontFamily:"Lora" }}>🛣️ Top km percorsi</p>
                {[...bikes].sort((a,b)=>b.odometer-a.odometer).slice(0,5).map((bike,i) => (
                  <div key={bike.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                      <span style={{ color:i===0?C.sunYellow:"#ccc", fontSize:13, ...ds, fontWeight:700 }}>#{i+1}</span>
                      <span style={{ color:C.deepBlue, fontSize:13, ...ds }}>{bike.id}</span>
                    </div>
                    <span style={{ color:C.blueGreen, fontSize:13, fontWeight:700, ...ds }}>{bike.odometer.toFixed(0)} km</span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        {/* BOTTOM NAV */}
        <div style={{ position:"absolute", bottom:0, left:0, right:0, background:"rgba(245,249,251,0.97)", borderTop:`1px solid ${C.skyBlue}50`, display:"flex", padding:"10px 0 18px" }}>
          {[["dashboard","⊞","Home"],["mappa","🗺️","Mappa"],["bici","🚲","Bici"],["ordini","🔧","Ordini"],["stats","📊","Stats"]].map(([id,icon,label]) => (
            <button key={id} className="btn" onClick={() => setTab(id)}
              style={{ flex:1, background:"none", border:"none", cursor:"pointer", padding:"4px 0", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
              <span style={{ fontSize:20 }}>{icon}</span>
              <span style={{ color:tab===id?C.blueGreen:"#bbb", fontSize:10, ...ds, fontWeight:tab===id?600:400 }}>{label}</span>
              {tab===id && <div style={{ width:20, height:3, borderRadius:2, background:C.blueGreen }} />}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
