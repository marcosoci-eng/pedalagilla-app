function MapView({ bikes, onBikeClick }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const script = document.createElement("script");
    script.src = `https://maps.googleapis.com/maps/api/js?key=AIzaSyBfgaG8lGRp7P8XGI-powaYfKufeLPebx8&callback=initMap`;
    script.async = true;
    window.initMap = () => {
      const map = new window.google.maps.Map(mapRef.current, {
        center:{lat:43.1500,lng:12.1000}, zoom:12, mapTypeId:"roadmap",
        styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      mapInstanceRef.current = map;
      bikes.forEach(bike => {
        const marker = new window.google.maps.Marker({
          position:{lat:bike.lat,lng:bike.lng}, map, title:bike.id,
          label:{text:`${bike.battery}%`,color:"#ffffff",fontSize:"10px",fontWeight:"bold"},
          icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:14,fillColor:bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500",fillOpacity:1,strokeColor:"#ffffff",strokeWeight:2}
        });
        const iw = new window.google.maps.InfoWindow({content:`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:130px"><h3 style="color:#023047;margin:0 0 4px;font-size:14px">${bike.id}</h3><p style="margin:2px 0;font-size:11px;color:#666">📍 ${bike.zone}</p><p style="margin:2px 0;font-size:11px">⚡ ${bike.battery}% · ${bike.status}</p></div>`});
        marker.addListener("click",()=>{iw.open(map,marker);onBikeClick(bike);});
      });
    };
    document.head.appendChild(script);
  }, []);
  return <div ref={mapRef} style={{width:"100%",height:"100%",borderRadius:16}} />;
}

function PaymentForm({ amount, bike, plan, onSuccess, onCancel }) {
  const cardRef = React.useRef(null);
  const cardEl = React.useRef(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [nome, setNome] = React.useState("");
  React.useEffect(() => {
    if (!cardRef.current || cardEl.current) return;
    const card = stripeElements.create("card",{style:{base:{fontSize:"16px",color:"#023047",fontFamily:"'DM Sans',sans-serif","::placeholder":{color:"#aaa"}}},hidePostalCode:true});
    card.mount(cardRef.current); cardEl.current = card;
  }, []);
  const handlePay = async () => {
    if (!nome.trim()) { setError("Inserisci il tuo nome"); return; }
    setLoading(true); setError(null);
    try {
      const {paymentMethod,error:e} = await stripeInstance.createPaymentMethod({type:"card",card:cardEl.current,billing_details:{name:nome}});
      if (e) { setError(e.message); setLoading(false); return; }
      setTimeout(()=>{ setLoading(false); onSuccess(paymentMethod.id); },1500);
    } catch(e) { setError("Errore. Riprova."); setLoading(false); }
  };
  return (
    <div style={{padding:"20px 18px"}}>
      <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:16,padding:16,marginBottom:20,textAlign:"center"}}>
        <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 4px",...ds,letterSpacing:2}}>TOTALE</p>
        <p style={{color:C.sunYellow,fontSize:36,fontWeight:700,margin:"0 0 4px",...ds}}>€{amount}</p>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,margin:0,...ds}}>{bike.id} · {plan} · {bike.zone}</p>
      </div>
      <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:12,padding:12,marginBottom:16}}>
        <p style={{color:C.blueGreen,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>🧪 Test: 4242 4242 4242 4242 · 12/28 · 123</p>
      </div>
      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 6px",...ds}}>Nome</p>
      <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Mario Rossi"
        style={{width:"100%",padding:"12px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}`,fontSize:15,fontFamily:"'DM Sans'",color:C.deepBlue,marginBottom:14,background:C.white}} />
      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 6px",...ds}}>Carta</p>
      <div ref={cardRef} style={{background:C.white,padding:14,borderRadius:10,border:`1.5px solid ${C.skyBlue}`,marginBottom:14}} />
      {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 12px",...ds}}>⚠️ {error}</p>}
      <button onClick={handlePay} disabled={loading}
        style={{width:"100%",background:loading?`${C.blueGreen}80`:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:16,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
        {loading?"⏳ Elaborazione...":`💳 Paga €${amount}`}
      </button>
      <button onClick={onCancel} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:12,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>Annulla</button>
    </div>
  );
}

function AuthScreen({ onLogin }) {
  const [mode, setMode] = React.useState("login");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [nome, setNome] = React.useState("");
  const [cognome, setCognome] = React.useState("");
  const [telefono, setTelefono] = React.useState("");
  const [docFile, setDocFile] = React.useState(null);
  const [docPreview, setDocPreview] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [adminUser, setAdminUser] = React.useState("");
  const [adminPass, setAdminPass] = React.useState("");

  const waitFB = () => new Promise(r=>{ if(window.firebaseReady) r(); else window.addEventListener("firebaseReady",r); });

  const handleDocChange = (e) => {
    const file = e.target.files[0];
    if (file) { setDocFile(file); const r=new FileReader(); r.onload=ev=>setDocPreview(ev.target.result); r.readAsDataURL(file); }
  };

  const handleAdminLogin = () => {
    if (adminUser==="marco" && adminPass==="pedalagilla2026") onLogin({type:"admin",nome:"Marco",email:"marco@pedalagilla.it"});
    else setError("Credenziali errate");
  };

  const handleLogin = async () => {
    if (!email||!password) { setError("Inserisci email e password"); return; }
    setLoading(true); setError(null);
    try {
      await waitFB();
      const {signInWithEmailAndPassword,doc,getDoc} = window.firebaseFunctions;
      const cred = await signInWithEmailAndPassword(window.firebaseAuth,email,password);
      const snap = await getDoc(doc(window.firebaseDb,"users",cred.user.uid));
      onLogin({type:"cliente",...snap.data(),uid:cred.user.uid});
    } catch(e) { setError("Email o password errati"); }
    setLoading(false);
  };

  const handleRegister = async () => {
    if (!nome||!cognome||!email||!password||!telefono) { setError("Compila tutti i campi"); return; }
    if (password.length<6) { setError("Password minimo 6 caratteri"); return; }
    setLoading(true); setError(null);
    try {
      await waitFB();
      const {createUserWithEmailAndPassword,doc,setDoc,ref,uploadBytes,getDownloadURL} = window.firebaseFunctions;
      const cred = await createUserWithEmailAndPassword(window.firebaseAuth,email,password);
      let docURL = "";
      if (docFile) {
        const sRef = ref(window.firebaseStorage,`documenti/${cred.user.uid}`);
        await uploadBytes(sRef,docFile);
        docURL = await getDownloadURL(sRef);
      }
      await setDoc(doc(window.firebaseDb,"users",cred.user.uid),{nome,cognome,email,telefono,docURL,type:"cliente",createdAt:new Date().toISOString()});
      onLogin({type:"cliente",nome,cognome,email,telefono,uid:cred.user.uid});
    } catch(e) {
      console.error(e);
      setError(e.code==="auth/email-already-in-use"?"Email già registrata":"Errore: "+e.message);
    }
    setLoading(false);
  };

  const inputStyle = {width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}50`,fontSize:14,fontFamily:"'DM Sans'",color:C.deepBlue,background:C.white,marginBottom:10};

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.deepBlue} 0%,#034a6e 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:390,background:C.bgLight,borderRadius:40,border:`6px solid ${C.deepBlue}`,overflow:"hidden",boxShadow:`0 40px 80px rgba(2,48,71,0.5)`}}>
        <div style={{background:C.deepBlue,padding:"30px 24px 24px",textAlign:"center"}}>
          <div style={{fontSize:50,marginBottom:8}}>🌊</div>
          <h1 style={{color:C.white,fontSize:26,fontWeight:700,margin:0,fontFamily:"Lora"}}>PedalAgilla</h1>
          <p style={{color:C.skyBlue,fontSize:12,margin:"4px 0 0",...ds}}>E-BIKE SHARING · Lago Trasimeno</p>
        </div>
        <div style={{padding:"24px 20px",maxHeight:"75vh",overflowY:"auto"}}>
          {mode!=="adminLogin" && (
            <div style={{display:"flex",background:"#e8f4f8",borderRadius:12,padding:4,marginBottom:20}}>
              {[["login","Accedi"],["register","Registrati"]].map(([m,l])=>(
                <button key={m} onClick={()=>{setMode(m);setError(null);}}
                  style={{flex:1,background:mode===m?C.deepBlue:"transparent",border:"none",borderRadius:10,padding:10,color:mode===m?C.white:"#888",fontSize:13,...ds,fontWeight:600,cursor:"pointer"}}>{l}</button>
              ))}
            </div>

          {mode==="login" && <>
            <p style={{color:C.deepBlue,fontSize:13,marginBottom:16,...ds,opacity:0.7,textAlign:"center"}}>Bentornato! Accedi per prenotare 🚲</p>
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>📧 Email</p>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="mario@example.com" style={inputStyle} />

            <button onClick={handleLogin} disabled={loading}

                    <span style={{color:getBattColor(bike.battery),fontSize:13,fontWeight:700,...ds}}>{bike.battery}%</span>
                  </div>
                  <div style={{height:3,background:"#eee",borderRadius:2,margin:"5px 0",overflow:"hidden"}}>
                    <div style={{width:`${bike.battery}%`,height:"100%",background:getBattColor(bike.battery),borderRadius:2}}/>
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <span style={{color:getStatusColor(bike.status),fontSize:11,...ds}}>● {bike.status}</span>
                    <span style={{color:"#aaa",fontSize:11,...ds}}>📍 {bike.zone}</span>
                  </div>
                </div>
                <span style={{color:C.blueGreen,fontSize:18}}>›</span>
              </div>
            ))}
          </div>}

          {tab==="mappa" && <div className="slide" style={{padding:"18px 18px 0"}}>
            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 12px",...ds,opacity:0.5}}>Tutte le bici — Admin</p>
            <div style={{height:320,borderRadius:16,overflow:"hidden",marginBottom:14,boxShadow:"0 4px 20px rgba(2,48,71,0.15)"}}>
              <MapView bikes={allBikes} onBikeClick={b=>setMapBike(b)} />
            </div>
            {mapBike && <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <span style={{color:C.deepBlue,fontWeight:700,fontSize:15,fontFamily:"Lora"}}>{mapBike.id}</span>
                <span style={{color:getBattColor(mapBike.battery),fontWeight:700,...ds}}>{mapBike.battery}% ⚡</span>
              </div>
              <p style={{color:getStatusColor(mapBike.status),fontSize:12,margin:0,...ds}}>● {mapBike.status} · {mapBike.zone}</p>
            </div>}
            {allBikes.filter(b=>b.battery<50).map(bike=>(
              <div key={bike.id} className="card" onClick={()=>setMapBike(bike)}
                style={{background:C.white,border:`1px solid ${C.warmOrange}30`,borderRadius:12,padding:"11px 14px",marginBottom:8,display:"flex",justifyContent:"space-between"}}>
                <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{bike.id} · {bike.zone}</span>
                <span style={{color:C.warmOrange,fontWeight:700,fontSize:13,...ds}}>{bike.battery}% ⚡</span>
              </div>
            ))}
          </div>}

          {tab==="bici" && <div className="slide" style={{padding:"18px 18px 0"}}>
            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 12px",...ds,opacity:0.5}}>Tutte le e-bike ({allBikes.length})</p>
            <div style={{display:"flex",gap:8,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
              {["Tutti","Disponibile","Manutenzione","Batteria Bassa"].map(f=>(
                <button key={f} className="btn" onClick={()=>setFilter(f)}
                  style={{background:filter===f?C.deepBlue:C.white,border:`1.5px solid ${filter===f?C.deepBlue:C.skyBlue+"50"}`,borderRadius:20,padding:"6px 14px",color:filter===f?C.white:C.deepBlue,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",...ds,fontWeight:500}}>
                  {f}
                </button>
              ))}
            </div>
            {filtered.map(bike=>(
              <div key={bike.id} className="card" onClick={()=>{setSelBike(bike);setTab("dettaglio");}}
                style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${getStatusColor(bike.status)}`}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:46,height:46,borderRadius:23,background:`${getBattColor(bike.battery)}15`,border:`2px solid ${getBattColor(bike.battery)}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>🚲</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:C.deepBlue,fontWeight:700,fontSize:15,fontFamily:"Lora"}}>{bike.id}</span>
                      <span style={{color:getBattColor(bike.battery),fontSize:14,fontWeight:700,...ds}}>{bike.battery}%</span>
                    </div>
                    <div style={{height:5,background:"#eee",borderRadius:3,margin:"6px 0",overflow:"hidden"}}>
                      <div style={{width:`${bike.battery}%`,height:"100%",background:getBattColor(bike.battery),borderRadius:3}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:getStatusColor(bike.status),fontSize:11,...ds}}>● {bike.status}</span>
                      <span style={{color:"#bbb",fontSize:11,...ds}}>📍 {bike.zone}</span>
                    </div>
                  </div>
                  <span style={{color:C.blueGreen,fontSize:20}}>›</span>
                </div>
              </div>
            ))}
          </div>}

          {tab==="dettaglio" && selBike && <div className="slide" style={{padding:"16px 18px 0"}}>
            <button className="btn" onClick={()=>setTab("bici")} style={{background:"none",border:"none",color:C.blueGreen,fontSize:14,cursor:"pointer",padding:"0 0 12px",...ds,fontWeight:600}}>← Torna</button>
            <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:20,padding:20,marginBottom:16,textAlign:"center"}}>
              <div style={{fontSize:50,marginBottom:8}}>🚲</div>
              <h2 style={{color:C.white,fontSize:26,fontWeight:700,margin:0,fontFamily:"Lora"}}>{selBike.id}</h2>
              <p style={{color:C.skyBlue,fontSize:12,margin:"4px 0 8px",...ds}}>📍 {selBike.zone}</p>
              <span style={{color:getStatusColor(selBike.status),fontSize:12,background:`${getStatusColor(selBike.status)}20`,padding:"4px 14px",borderRadius:20,...ds}}>● {selBike.status}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              {[["⚡","Batteria",`${selBike.battery}%`,getBattColor(selBike.battery)],["🛣️","Km",`${selBike.odometer.toFixed(0)}`,C.blueGreen],["📍","Zona",selBike.zone.substring(0,6),C.deepBlue]].map(([icon,label,value,color],i)=>(
                <div key={i} style={{background:C.white,borderRadius:14,padding:"12px 10px",textAlign:"center",boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
                  <div style={{fontSize:18,marginBottom:4}}>{icon}</div>
                  <div style={{color,fontSize:14,fontWeight:700,...ds}}>{value}</div>
                  <div style={{color:"#aaa",fontSize:10,marginTop:2,...ds}}>{label}</div>
                </div>
              ))}
            </div>
          </div>}

          {tab==="ordini" && <div className="slide" style={{padding:"18px 18px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:0,...ds,opacity:0.5}}>Ordini di lavoro</p>
              <button className="btn" style={{background:C.blueGreen,border:"none",borderRadius:10,padding:"7px 16px",color:C.white,fontSize:12,...ds,fontWeight:600,cursor:"pointer"}}>+ Nuovo</button>
            </div>
            {workOrders.map(order=>(
              <div key={order.id} style={{background:C.white,borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${getWOColor(order.status)}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                  <div>
                    <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{order.id}</span>
                    <span style={{color:"#bbb",fontSize:12,marginLeft:8,...ds}}>— {order.bike}</span>
                  </div>
                  <span style={{color:getWOColor(order.status),fontSize:11,background:`${getWOColor(order.status)}15`,padding:"3px 10px",borderRadius:20,...ds}}>● {order.status}</span>
                </div>
                <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                  <span style={{color:"#888",fontSize:11,...ds}}>🔧 {order.type}</span>
                  <span style={{color:getPrioColor(order.priority),fontSize:11,...ds}}>▲ {order.priority}</span>
                  <span style={{color:"#bbb",fontSize:11,...ds}}>👤 {order.tech}</span>
                  <span style={{color:"#bbb",fontSize:11,...ds}}>📍 {order.zone}</span>
                </div>
              </div>
            ))}
          </div>}

          {tab==="stats" && <div className="slide" style={{padding:"18px 18px 0"}}>
            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 14px",...ds,opacity:0.5}}>Statistiche flotta</p>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 14px",fontFamily:"Lora"}}>⚡ Distribuzione batteria</p>
              {[["80-100%",allBikes.filter(b=>b.battery>=80).length,C.blueGreen],["50-79%",allBikes.filter(b=>b.battery>=50&&b.battery<80).length,C.sunYellow],["0-49%",allBikes.filter(b=>b.battery<50).length,C.warmOrange]].map(([range,count,color])=>(
                <div key={range} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#888",fontSize:12,...ds}}>{range}</span>
                    <span style={{color,fontSize:12,...ds,fontWeight:700}}>{count} bici</span>
                  </div>
                  <div style={{height:8,background:"#eee",borderRadius:4,overflow:"hidden"}}>
                    <div style={{width:`${(count/allBikes.length)*100}%`,height:"100%",background:color,borderRadius:4}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:18,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 14px",fontFamily:"Lora"}}>🛣️ Top km percorsi</p>
              {[...allBikes].sort((a,b)=>b.odometer-a.odometer).slice(0,5).map((bike,i)=>(
                <div key={bike.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{color:i===0?C.sunYellow:"#ccc",fontSize:13,...ds,fontWeight:700}}>#{i+1}</span>
                    <span style={{color:C.deepBlue,fontSize:13,...ds}}>{bike.id}</span>
                  </div>
                  <span style={{color:C.blueGreen,fontSize:13,fontWeight:700,...ds}}>{bike.odometer.toFixed(0)} km</span>
                </div>
              ))}
            </div>
          </div>}
        </div>

        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(245,249,251,0.97)",borderTop:`1px solid ${C.skyBlue}50`,display:"flex",padding:"10px 0 18px"}}>
          {[["dashboard","⊞","Home"],["mappa","🗺️","Mappa"],["bici","🚲","Bici"],["ordini","🔧","Ordini"],["stats","📊","Stats"]].map(([id,icon,label])=>(
            <button key={id} className="btn" onClick={()=>setTab(id)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
              <span style={{fontSize:20}}>{icon}</span>
              <span style={{color:tab===id?C.blueGreen:"#bbb",fontSize:10,...ds,fontWeight:tab===id?600:400}}>{label}</span>
              {tab===id && <div style={{width:20,height:3,borderRadius:2,background:C.blueGreen}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Main() {
  const [user, setUser] = React.useState(null);
  const handleLogin = (u) => setUser(u);
  const handleLogout = () => {
    if (window.firebaseAuth) window.firebaseFunctions.signOut(window.firebaseAuth).catch(()=>{});
    setUser(null);
  };
  if (!user) return <AuthScreen onLogin={handleLogin} />;
  if (user.type==="admin") return <AdminApp user={user} onLogout={handleLogout} />;
  return <ClienteApp user={user} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
</script>
</body>
</html>
