// ── MAPPA ────────────────────────────────────────────
function MapView({ bikes, onBikeClick, height=300, track=null }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const polyRef = React.useRef(null);

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit,200); return; }
      const map = new window.google.maps.Map(mapRef.current, {
        center:{lat:43.1500,lng:12.0800}, zoom:11, mapTypeId:"roadmap",
        styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      mapInstanceRef.current = map;
      bikes.forEach(bike => {
        const marker = new window.google.maps.Marker({
          position:{lat:bike.lat,lng:bike.lng}, map, title:bike.id,
          label:{text:`${bike.battery}%`,color:"#ffffff",fontSize:"10px",fontWeight:"bold"},
          icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:14,fillColor:bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500",fillOpacity:1,strokeColor:"#ffffff",strokeWeight:2}
        });
        marker.addListener("click",()=>onBikeClick(bike));
      });
      if (track && track.length > 1) {
        polyRef.current = new window.google.maps.Polyline({
          path: track,
          geodesic: true,
          strokeColor: "#219EBC",
          strokeOpacity: 1.0,
          strokeWeight: 3,
          map
        });
        const bounds = new window.google.maps.LatLngBounds();
        track.forEach(p => bounds.extend(p));
        map.fitBounds(bounds);
      }
    };
    if (!document.querySelector('script[src*="maps.googleapis"]')) {
      const s = document.createElement("script");
      s.src=`https://maps.googleapis.com/maps/api/js?key=AIzaSyBfgaG8lGRp7P8XGI-powaYfKufeLPebx8`;
      s.async=true; s.onload=tryInit; document.head.appendChild(s);
    } else tryInit();
  }, []);

  return <div ref={mapRef} style={{width:"100%",height,borderRadius:16}} />;
}

// ── TIMER CORSA ──────────────────────────────────────
function RideTimer({ bike, plan, user, rideId, onEnd }) {
  const [seconds, setSeconds] = React.useState(0);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const [gpsTrack, setGpsTrack] = React.useState([]);
  const intervalRef = React.useRef(null);
  const gpsRef = React.useRef(null);

  const isGiornata = plan === "giornata";

  // GPS tracking ogni 30 secondi
  React.useEffect(() => {
    if (navigator.geolocation) {
      const recordPos = () => {
        navigator.geolocation.getCurrentPosition(pos => {
          const point = { lat: pos.coords.latitude, lng: pos.coords.longitude, ts: Date.now() };
          setGpsTrack(prev => [...prev, point]);
          // Salva su Firebase
          if (rideId) {
            waitFB().then(() => {
              const {doc, updateDoc} = window.firebaseFunctions;
              updateDoc(doc(window.firebaseDb, "corse", rideId), {
                gpsTrack: [...gpsTrack, point]
              }).catch(()=>{});
            });
          }
        }, ()=>{}, { enableHighAccuracy: true });
      };
      recordPos();
      gpsRef.current = setInterval(recordPos, 30000);
    }
    return () => { if(gpsRef.current) clearInterval(gpsRef.current); };
  }, []);

  // Timer principale
  React.useEffect(() => {
    intervalRef.current = setInterval(() => {
      if (paused) {
        setPauseSeconds(s => s + 1);
      } else {
        setSeconds(s => s + 1);
      }
    }, 1000);
    return () => clearInterval(intervalRef.current);
  }, [paused]);

  // Costo in tempo reale
  const rideMins = seconds / 60;
  const pauseMins = pauseSeconds / 60;
  const rideCost = isGiornata ? TARIFFA_GIORNATA : SBLOCCO + rideMins * TARIFFA_MIN;
  const pauseCost = isGiornata ? 0 : pauseMins * TARIFFA_PAUSA;
  const totalCost = rideCost + pauseCost;

  const fmtTime = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  const handleParkPhoto = (e) => {
    const file = e.target.files[0];
    if (file) { setParkPhoto(file); const r=new FileReader(); r.onload=ev=>setParkPreview(ev.target.result); r.readAsDataURL(file); }
  };

  const handleEndConfirm = async () => {
    if (!parkPhoto) { alert("📸 Scatta una foto al parcheggio!"); return; }
    setUploading(true);
    try {
      await waitFB();
      const {ref, uploadBytes, getDownloadURL, doc, updateDoc} = window.firebaseFunctions;
      // Upload foto parcheggio
      const sRef = ref(window.firebaseStorage, `parcheggi/${bike.id}_${Date.now()}`);
      await uploadBytes(sRef, parkPhoto);
      const photoURL = await getDownloadURL(sRef);
      // Aggiorna corsa su Firebase
      if (rideId) {
        await updateDoc(doc(window.firebaseDb, "corse", rideId), {
          status: "Completata",
          endTime: new Date().toISOString(),
          duration: seconds,
          pauseDuration: pauseSeconds,
          totalCost: totalCost,
          parkPhotoURL: photoURL,
          gpsTrack: gpsTrack
        });
      }
    } catch(e) { console.error(e); }
    setUploading(false);
    onEnd(seconds, pauseSeconds, totalCost);
  };

  if (showEndFlow) {
    return (
      <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
        <div style={{background:C.deepBlue,padding:"14px 22px"}}>
          <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
          <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>Foto del parcheggio</h2>
        </div>
        <div style={{padding:20,flex:1}}>
          <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
            <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>📸 Obbligatorio</p>
            <p style={{color:"#888",fontSize:12,...ds,margin:0}}>Scatta una foto alla bici parcheggiata per completare la corsa</p>
          </div>
          <div style={{border:`2px dashed ${parkPhoto?C.blueGreen:C.warmOrange}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer",background:parkPhoto?`${C.blueGreen}05`:`${C.warmOrange}05`}}
            onClick={()=>document.getElementById("parkInput").click()}>
            {parkPreview
              ? <div><img src={parkPreview} style={{width:"100%",borderRadius:10,maxHeight:180,objectFit:"cover",marginBottom:8}} /><p style={{color:C.blueGreen,fontSize:12,...ds,fontWeight:600,margin:0}}>✅ Foto caricata</p></div>
              : <div><div style={{fontSize:44,marginBottom:8}}>📸</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>Scatta foto</p><p style={{color:"#aaa",fontSize:11,...ds,margin:"4px 0 0"}}>Da fotocamera o galleria</p></div>
            }
            <input id="parkInput" type="file" accept="image/*" capture="environment" onChange={handleParkPhoto} style={{display:"none"}} />
          </div>
          <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
            {[["⏱️ Tempo in corsa",fmtTime(seconds)],["⏸️ Tempo in pausa",fmtTime(pauseSeconds)],["💶 Totale",`€${totalCost.toFixed(2)}`]].map(([k,v])=>(
              <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
                <span style={{color:C.deepBlue,fontWeight:700,...ds}}>{v}</span>
              </div>
            ))}
          </div>
          <button onClick={handleEndConfirm} disabled={!parkPhoto||uploading}
            style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
            {uploading?"⏳ Salvataggio...":`✅ Conferma fine corsa`}
          </button>
          <button onClick={()=>setShowEndFlow(false)}
            style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>
            ← Torna alla corsa
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.deepBlue,padding:"16px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>{paused?"IN PAUSA":"CORSA IN CORSO"}</p>
        <h2 style={{color:C.white,fontSize:20,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{bike.id} · {bike.zone}</h2>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:24,padding:28,textAlign:"center",marginBottom:20,width:"100%"}}>
          {paused && (
            <div style={{background:`${C.warmOrange}20`,borderRadius:10,padding:"6px 12px",marginBottom:10,display:"inline-block"}}>
              <span style={{color:C.warmOrange,fontSize:12,...ds,fontWeight:600}}>⏸️ PAUSA — €{TARIFFA_PAUSA}/min{isGiornata?" (GRATIS)":""}</span>
            </div>
          )}
          <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 6px",...ds,letterSpacing:2}}>{paused?"PAUSA":"TEMPO"}</p>
          <p style={{color:C.white,fontSize:48,fontWeight:700,margin:"0 0 6px",...ds,fontFamily:"monospace"}}>
            {paused ? fmtTime(pauseSeconds) : fmtTime(seconds)}
          </p>
          {paused && <p style={{color:"#aaa",fontSize:11,...ds,margin:"0 0 10px"}}>Corsa: {fmtTime(seconds)}</p>}
          <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 4px",...ds}}>Costo totale</p>
          <p style={{color:C.sunYellow,fontSize:34,fontWeight:700,margin:0,...ds}}>€{totalCost.toFixed(2)}</p>
          {!isGiornata && pauseSeconds>0 && (
            <p style={{color:"rgba(255,255,255,0.5)",fontSize:11,...ds,margin:"6px 0 0"}}>
              (corsa €{rideCost.toFixed(2)} + pausa €{pauseCost.toFixed(2)})
            </p>
          )}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,width:"100%",marginBottom:16}}>
          {[["🔓 Sblocco",`€${SBLOCCO.toFixed(2)}`],["⏱️ Al minuto",`€${TARIFFA_MIN}`],["⏸️ Pausa",isGiornata?"GRATIS":`€${TARIFFA_PAUSA}/min`],["🛣️ Autonomia",`~${getRange(bike.battery)} km`]].map(([k,v])=>(
            <div key={k} style={{background:C.white,borderRadius:12,padding:"10px 12px",boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
              <p style={{color:"#aaa",fontSize:10,...ds,margin:"0 0 2px"}}>{k}</p>
              <p style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:700,margin:0}}>{v}</p>
            </div>
          ))}
        </div>
        <button onClick={()=>setPaused(p=>!p)}
          style={{width:"100%",background:paused?C.blueGreen:C.sunYellow,border:"none",borderRadius:14,padding:14,color:paused?C.white:C.deepBlue,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
          {paused?"▶️ Riprendi corsa":"⏸️ Pausa"}
        </button>
        <button onClick={()=>setShowEndFlow(true)}
          style={{width:"100%",background:C.warmOrange,border:"none",borderRadius:14,padding:14,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
          🏁 Termina corsa
        </button>
      </div>
    </div>
  );
}

  const today = new Date().toLocaleDateString("it-IT");
  const todayRides = fbRides.filter(r=>r.startTime&&new Date(r.startTime).toLocaleDateString("it-IT")===today);
  const todayIncassi = todayRides.filter(r=>r.status==="Completata").reduce((a,r)=>a+(r.totalCost||0),0);
  const monthIncassi = fbRides.filter(r=>r.status==="Completata").reduce((a,r)=>a+(r.totalCost||0),0);
  const available = bikes.filter(b=>b.status==="Disponibile").length;
  const maint = bikes.filter(b=>b.status==="Manutenzione").length;
  const low = bikes.filter(b=>b.battery<50).length;
  const avg = Math.round(bikes.reduce((a,b)=>a+b.battery,0)/bikes.length);

  const filteredBikes = filter==="Tutti"?bikes:filter==="Disponibile"?bikes.filter(b=>b.status==="Disponibile"):filter==="Manutenzione"?bikes.filter(b=>b.status==="Manutenzione"):bikes.filter(b=>b.battery<50);
  const mapBikes = mapFilter==="Tutti"?bikes:mapFilter==="Disponibile"?bikes.filter(b=>b.status==="Disponibile"):bikes.filter(b=>b.status==="Manutenzione");

  // Live listener per corse
  React.useEffect(() => {
    let unsub = null;
    waitFB().then(() => {
      const {collection,onSnapshot} = window.firebaseFunctions;
      unsub = onSnapshot(collection(window.firebaseDb,"corse"), snap => {
        const rides = snap.docs.map(d=>({id:d.id,...d.data()}));
        setFbRides(rides);
      });
    });
    return () => { if(unsub) unsub(); };
  }, []);

  React.useEffect(() => { if(tab==="utenti") loadUsers(); }, [tab]);

  const loadUsers = async () => {
    setLoadingUsers(true);
    try {
      await waitFB();
      const {collection,getDocs} = window.firebaseFunctions;
      const snap = await getDocs(collection(window.firebaseDb,"users"));
      setFbUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
    } catch(e) { console.error(e); }
    setLoadingUsers(false);
  };

  const forceEndRide = async (ride) => {
    if (!window.confirm(`Terminare forzatamente la corsa di ${ride.userName}?`)) return;
    try {
      await waitFB();
      const {doc,updateDoc} = window.firebaseFunctions;
      await updateDoc(doc(window.firebaseDb,"corse",ride.id),{
        status:"Terminata forzatamente",
        endTime: new Date().toISOString(),
        forcedByAdmin: true
      });
    } catch(e) { console.error(e); }
  };

  const exportExcel = () => {
    const data = fbUsers.map(u=>({
      "Nome":u.nome||"","Cognome":u.cognome||"","Email":u.email||"",
      "Telefono":u.telefono||"","Registrato":u.createdAt?new Date(u.createdAt).toLocaleDateString("it-IT"):""
    }));
    if (!data.length) { alert("Nessun utente"); return; }
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,"Utenti",ws);
    XLSX.writeFile(wb,"utenti_pedalagilla.xlsx");

                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <span style={{color:getStatusColor(bike.status),fontSize:10,...ds}}>● {bike.status}</span>
                    <span style={{color:"#aaa",fontSize:10,...ds}}>📍 {bike.zone}</span>
                  </div>
                </div>
                <span style={{color:C.blueGreen,fontSize:14}}>›</span>
              </div>
            ))}
          </div>}

          {tab==="mappa" && <div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{display:"flex",gap:8,marginBottom:10}}>
              {["Tutti","Disponibile","Manutenzione"].map(f=>(
                <button key={f} className="btn" onClick={()=>setMapFilter(f)}
                  style={{background:mapFilter===f?C.deepBlue:C.white,border:`1.5px solid ${mapFilter===f?C.deepBlue:C.skyBlue+"50"}`,borderRadius:20,padding:"5px 14px",color:mapFilter===f?C.white:C.deepBlue,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",...ds}}>
                  {f}
                </button>
              ))}
            </div>
            <div style={{height:300,borderRadius:16,overflow:"hidden",marginBottom:12,boxShadow:"0 4px 20px rgba(2,48,71,0.15)"}}>
              <MapView bikes={mapBikes} onBikeClick={b=>openBikeDetail(b)} height={300} />
            </div>
            {mapBikes.sort((a,b)=>a.battery-b.battery).map(bike=>(
              <div key={bike.id} className="card" onClick={()=>openBikeDetail(bike)}
                style={{background:C.white,border:`1px solid ${getBattColor(bike.battery)}30`,borderRadius:12,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <span style={{color:C.deepBlue,fontWeight:700,fontSize:13,fontFamily:"Lora"}}>{bike.id}</span>
                  <span style={{color:"#aaa",fontSize:11,...ds,marginLeft:8}}>📍 {bike.zone}</span>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span style={{color:getStatusColor(bike.status),fontSize:11,...ds}}>● {bike.status}</span>
                  <span style={{color:getBattColor(bike.battery),fontWeight:700,fontSize:12,...ds}}>{bike.battery}%</span>
                </div>
              </div>
            ))}
          </div>}

          {tab==="bici" && <div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{display:"flex",gap:8,marginBottom:12,overflowX:"auto"}}>
              {["Tutti","Disponibile","Manutenzione","Batteria Bassa"].map(f=>(
                <button key={f} className="btn" onClick={()=>setFilter(f)}
                  style={{background:filter===f?C.deepBlue:C.white,border:`1.5px solid ${filter===f?C.deepBlue:C.skyBlue+"50"}`,borderRadius:20,padding:"5px 14px",color:filter===f?C.white:C.deepBlue,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",...ds}}>
                  {f}
                </button>
              ))}
            </div>
            {filteredBikes.map(bike=>(
              <div key={bike.id} className="card" onClick={()=>openBikeDetail(bike)}
                style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${getStatusColor(bike.status)}`}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:22,background:`${getBattColor(bike.battery)}15`,border:`2px solid ${getBattColor(bike.battery)}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🚲</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{bike.id}</span>
                      <span style={{color:getBattColor(bike.battery),fontSize:13,fontWeight:700,...ds}}>{bike.battery}% · ~{getRange(bike.battery)}km</span>
                    </div>
                    <div style={{height:4,background:"#eee",borderRadius:3,margin:"5px 0",overflow:"hidden"}}>
                      <div style={{width:`${bike.battery}%`,height:"100%",background:getBattColor(bike.battery),borderRadius:3}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:getStatusColor(bike.status),fontSize:11,...ds}}>● {bike.status}</span>
                      <span style={{color:"#bbb",fontSize:11,...ds}}>📍 {bike.zone} · {bike.lastMaint}</span>
                    </div>
                    {bike.note && <p style={{color:"#aaa",fontSize:11,...ds,margin:"4px 0 0",fontStyle:"italic"}}>📝 {bike.note}</p>}
                  </div>
                  <span style={{color:C.blueGreen,fontSize:18}}>›</span>
                </div>
              </div>
            ))}
          </div>}

          {tab==="corse" && <div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {[["oggi","Oggi"],["mese","Mese"]].map(([v,l])=>(
                <button key={v} onClick={()=>setIncassiPeriod(v)}
                  style={{background:incassiPeriod===v?C.deepBlue:C.white,border:`1.5px solid ${incassiPeriod===v?C.deepBlue:C.skyBlue+"50"}`,borderRadius:20,padding:"5px 14px",color:incassiPeriod===v?C.white:C.deepBlue,fontSize:11,...ds,cursor:"pointer"}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
              {[["💶",(incassiPeriod==="oggi"?todayIncassi:monthIncassi).toFixed(2)+"€","Incassi",C.sunYellow],["🏁",incassiPeriod==="oggi"?todayRides.filter(r=>r.status==="Completata").length:fbRides.filter(r=>r.status==="Completata").length,"Completate",C.blueGreen],["🚴",fbRides.filter(r=>r.status==="In corso").length,"In corso",C.warmOrange]].map(([icon,val,label,color])=>(
                <div key={label} style={{background:C.white,borderRadius:14,padding:"12px 10px",textAlign:"center",boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
                  <div style={{fontSize:18,marginBottom:4}}>{icon}</div>
                  <div style={{color,fontSize:18,fontWeight:700,...ds}}>{val}</div>
                  <div style={{color:"#aaa",fontSize:10,marginTop:2,...ds}}>{label}</div>
                </div>
              ))}
            </div>

            {fbRides.filter(r=>r.status==="In corso").length>0 && <>
              <p style={{color:C.warmOrange,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 8px",...ds}}>🚴 In corso</p>
              {fbRides.filter(r=>r.status==="In corso").map(ride=>(
                <div key={ride.id} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${C.warmOrange}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{ride.bikeId}</span>
                    <button onClick={()=>forceEndRide(ride)}
                      style={{background:C.warmOrange,border:"none",borderRadius:8,padding:"4px 10px",color:C.white,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                      🛑 Forza stop
                    </button>
                  </div>
                  <p style={{color:"#888",fontSize:12,...ds,margin:"0 0 2px"}}>👤 {ride.userName} · 📍 {ride.zone}</p>
                  <p style={{color:"#aaa",fontSize:11,...ds,margin:0}}>{new Date(ride.startTime).toLocaleString("it-IT")}</p>
                </div>
              ))}
            </>}

            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"8px 0 8px",...ds,opacity:0.5}}>Completate</p>
            {(incassiPeriod==="oggi"?todayRides:fbRides).filter(r=>r.status==="Completata").map(ride=>(
              <div key={ride.id} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${C.skyBlue}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{ride.bikeId}</span>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <span style={{color:C.blueGreen,fontWeight:700,fontSize:13,...ds}}>€{(ride.totalCost||0).toFixed(2)}</span>
                    {ride.gpsTrack && ride.gpsTrack.length>1 && (
                      <button onClick={()=>{setSelRide(ride);setShowTrack(true);}}
                        style={{background:C.blueGreen,border:"none",borderRadius:8,padding:"4px 8px",color:C.white,fontSize:10,...ds,cursor:"pointer"}}>
                        🗺️
                      </button>
                    )}
                  </div>
                </div>
                <p style={{color:"#888",fontSize:12,...ds,margin:"0 0 2px"}}>👤 {ride.userName} · 📍 {ride.zone}</p>
                <p style={{color:"#aaa",fontSize:11,...ds,margin:"0 0 4px"}}>{new Date(ride.startTime).toLocaleString("it-IT")}</p>
                {ride.parkPhotoURL && (
                  <a href={ride.parkPhotoURL} target="_blank" style={{color:C.blueGreen,fontSize:11,...ds,fontWeight:600,textDecoration:"none"}}>📸 Foto parcheggio →</a>
                )}
              </div>
            ))}
          </div>}

          {tab==="utenti" && <div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:0,...ds,opacity:0.5}}>Utenti ({fbUsers.length})</p>
              <button onClick={exportExcel}
                style={{background:C.blueGreen,border:"none",borderRadius:10,padding:"7px 14px",color:C.white,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                📊 Export Excel
              </button>
            </div>
            {loadingUsers && <p style={{color:"#aaa",fontSize:13,...ds,textAlign:"center",padding:20}}>⏳ Caricamento...</p>}
            {!loadingUsers && fbUsers.length===0 && <div style={{textAlign:"center",padding:30}}><div style={{fontSize:40,marginBottom:10}}>👥</div><p style={{color:"#aaa",fontSize:13,...ds}}>Nessun utente ancora</p></div>}
            {fbUsers.map((u,i)=>(
              <div key={i} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <div style={{width:38,height:38,borderRadius:19,background:`${C.blueGreen}20`,border:`2px solid ${C.blueGreen}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>👤</div>
                  <div>
                    <p style={{color:C.deepBlue,fontWeight:700,fontSize:14,margin:0,fontFamily:"Lora"}}>{u.nome} {u.cognome}</p>
                    <p style={{color:"#aaa",fontSize:10,...ds,margin:0}}>{u.createdAt?new Date(u.createdAt).toLocaleDateString("it-IT"):""}</p>
                  </div>
                </div>
                {[["📧",u.email],["📱",u.telefono||"—"]].map(([icon,val])=>(
                  <div key={icon} style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                    <span style={{fontSize:12}}>{icon}</span>
                    <span style={{color:C.deepBlue,fontSize:12,...ds}}>{val}</span>
                  </div>
                ))}
                {u.docURL && <a href={u.docURL} target="_blank" style={{display:"inline-block",marginTop:6,color:C.blueGreen,fontSize:11,...ds,fontWeight:600,textDecoration:"none"}}>📄 Documento →</a>}
              </div>
            ))}
          </div>}

          {tab==="stats" && <div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>⚡ Batteria flotta</p>
              {[["≥80%",bikes.filter(b=>b.battery>=80).length,C.blueGreen],["50-79%",bikes.filter(b=>b.battery>=50&&b.battery<80).length,C.sunYellow],["<50%",bikes.filter(b=>b.battery<50).length,C.warmOrange]].map(([range,count,color])=>(
                <div key={range} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#888",fontSize:12,...ds}}>{range}</span>
                    <span style={{color,fontSize:12,...ds,fontWeight:700}}>{count} bici</span>
                  </div>
                  <div style={{height:8,background:"#eee",borderRadius:4,overflow:"hidden"}}>
                    <div style={{width:`${(count/bikes.length)*100}%`,height:"100%",background:color,borderRadius:4}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>📍 Corse per zona</p>
              {["Passignano","Castiglione","Tuoro","Magione","Panicale"].map(zona=>{
                const count=fbRides.filter(r=>r.zone===zona).length;
                const tot=fbRides.length||1;
                return <div key={zona} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#888",fontSize:12,...ds}}>{zona}</span>
                    <span style={{color:C.blueGreen,fontSize:12,...ds,fontWeight:700}}>{count}</span>
                  </div>
                  <div style={{height:6,background:"#eee",borderRadius:3,overflow:"hidden"}}>
                    <div style={{width:`${(count/tot)*100}%`,height:"100%",background:C.blueGreen,borderRadius:3}}/>
                  </div>
                </div>;
              })}
            </div>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:18,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>🛣️ Top km</p>
              {[...bikes].sort((a,b)=>b.odometer-a.odometer).slice(0,5).map((bike,i)=>(
                <div key={bike.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{color:i===0?C.sunYellow:"#ccc",fontSize:12,...ds,fontWeight:700}}>#{i+1}</span>
                    <span style={{color:C.deepBlue,fontSize:12,...ds}}>{bike.id} · {bike.zone}</span>
                  </div>
                  <span style={{color:C.blueGreen,fontSize:12,fontWeight:700,...ds}}>{bike.odometer.toFixed(0)} km</span>
                </div>
              ))}
            </div>
          </div>}

        </div>

        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(245,249,251,0.97)",borderTop:`1px solid ${C.skyBlue}50`,display:"flex",padding:"8px 0 16px"}}>
          {[["dashboard","⊞","Home"],["mappa","🗺️","Mappa"],["bici","🚲","Bici"],["corse","🏁","Corse"],["utenti","👥","Utenti"],["stats","📊","Stats"]].map(([id,icon,label])=>(
            <button key={id} className="btn" onClick={()=>setTab(id)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:17}}>{icon}</span>
              <span style={{color:tab===id?C.blueGreen:"#bbb",fontSize:9,...ds,fontWeight:tab===id?600:400}}>{label}</span>
              {tab===id && <div style={{width:16,height:3,borderRadius:2,background:C.blueGreen}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Main() {
  const [user, setUser] = React.useState(null);
  const handleLogin = (u) => setUser(u);
  const handleLogout = () => {
    if (window.firebaseAuth) window.firebaseFunctions.signOut(window.firebaseAuth).catch(()=>{});
    setUser(null);
  };
  if (!user) return <AuthScreen onLogin={handleLogin} />;
  if (user.type==="admin") return <AdminApp user={user} onLogout={handleLogout} />;
  return <ClienteApp user={user} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Main />);
</script>
</body>
</html>
