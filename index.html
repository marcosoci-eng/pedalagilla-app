PedalAgilla è un servizio di noleggio di biciclette elettriche (e-bike) gestito da Pedalagilla di Soci Marco.

function MapView({ bikes, onBikeClick, height=300, fullscreen=false, tracks=[], zones=[], userPos=null }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const zoneShapesRef = React.useRef([]);
  const zoneMarkersRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const userMarkerRef = React.useRef(null);
  const calcDist = (lat1, lng1, lat2, lng2) => {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  };
  const getDistText = (bike, pos) => {
    if (!pos) return "";
    const d = calcDist(pos.lat, pos.lng, bike.lat, bike.lng);
    const mins = Math.round(d / 80);
    return d < 1000 ? `🚶 ${Math.round(d)}m · ~${mins} min` : `🚶 ${(d/1000).toFixed(1)}km · ~${mins} min`;
  };
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    zoneShapesRef.current.forEach(s => s?.setMap(null));
    zoneMarkersRef.current.forEach(m => m?.setMap(null));
    zoneShapesRef.current = [];
    zoneMarkersRef.current = [];
    const icons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" };
    zones.forEach(zone => {
      let shape = null, center = null;
      if (zone.shape === "circle" && zone.center) {
        shape = new window.google.maps.Circle({ map: mapInstanceRef.current, center: zone.center, radius: zone.radius || 200, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
        center = zone.center;
      } else if (zone.path?.length > 0) {
        shape = new window.google.maps.Polygon({ map: mapInstanceRef.current, paths: zone.path, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p => bounds.extend(p));
        const c = bounds.getCenter();
        center = { lat: c.lat(), lng: c.lng() };
      }
      if (shape) zoneShapesRef.current.push(shape);
      if (center && zone.type !== "operativa" && icons[zone.type]) {
        const marker = new window.google.maps.Marker({ position: center, map: mapInstanceRef.current, label: { text: icons[zone.type], fontSize: "16px" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 0, fillOpacity: 0, strokeOpacity: 0 } });
        zoneMarkersRef.current.push(marker);
      }
    });
  }, [zones, mapInstanceRef.current]);
  React.useEffect(() => {
    if (!mapInstanceRef.current || !userPos) return;
    if (!mapInstanceRef.current._centeredOnUser) { mapInstanceRef.current.setCenter(userPos); mapInstanceRef.current.setZoom(14); mapInstanceRef.current._centeredOnUser = true; }
  }, [userPos]);
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    markersRef.current.forEach(({ marker, iw, bike }) => {
      const distanceText = getDistText(bike, userPos);
      iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">📍 ${bike.zone}</span><br/><span style="font-size:11px">⚡ ${bike.battery}% · ~${getRange(bike.battery)}km</span>${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}<br/><span style="font-size:11px;color:${bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.status}</span></div>`);
    });
    if (userPos && mapInstanceRef.current) {
      if (userMarkerRef.current) { 
        userMarkerRef.current.setPosition(userPos);
        if (userMarkerRef.current._circle) userMarkerRef.current._circle.setCenter(userPos);
        if (userMarkerRef.current._outer) userMarkerRef.current._outer.setPosition(userPos);
      } else {
        // Cerchio accuratezza GPS - non intercetta click
        const circle = new window.google.maps.Circle({
          map: mapInstanceRef.current, center: userPos, radius: 30,
          fillColor: "#219EBC", fillOpacity: 0.12,
          strokeColor: "#219EBC", strokeWeight: 1.5, strokeOpacity: 0.4,
          zIndex: 1, clickable: false
        });
        // Cerchio esterno pulsante - non intercetta click
        const outer = new window.google.maps.Marker({
          position: userPos, map: mapInstanceRef.current, zIndex: 2,
          clickable: false,
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 18, fillColor: "#219EBC", fillOpacity: 0.2, strokeColor: "#219EBC", strokeWeight: 1 }
        });
        // Punto centrale - non intercetta click
        const marker = new window.google.maps.Marker({ 
          position: userPos, map: mapInstanceRef.current, title: "La tua posizione",
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: "#219EBC", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 3 }, 
          zIndex: 3, clickable: false
        });
        marker._circle = circle;
        marker._outer = outer;
        userMarkerRef.current = marker;
        // Centra mappa sulla posizione utente la prima volta
        if (!mapInstanceRef.current._centeredOnUser) {
          mapInstanceRef.current.setCenter(userPos);
          mapInstanceRef.current.setZoom(15);
          mapInstanceRef.current._centeredOnUser = true;
        }
      }
    }
  }, [userPos]);

  // Aggiorna marker quando cambiano le bici (posizione/batteria real-time)
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    bikes.forEach(bike => {
      const entry = markersRef.current.find(m => m.bike.id === bike.id);
      if (entry) {
        entry.marker.setPosition({ lat: bike.lat, lng: bike.lng });
        const color = bike.isMTB?"#FB8500":bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500";
        entry.marker.setIcon({ path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: color, fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 });
        entry.marker.setLabel({ text: bike.isMTB?"🏔️":`${bike.battery}%`, color: "#ffffff", fontSize: bike.isMTB?"14px":"10px", fontWeight: "bold" });
        entry.bike = bike;
      } else if (mapInstanceRef.current) {
        // Nuova bici — aggiungi marker
        const iw = new window.google.maps.InfoWindow({ content: "" });
        const color = bike.isMTB?"#FB8500":bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500";
        const marker = new window.google.maps.Marker({
          position: { lat: bike.lat, lng: bike.lng }, map: mapInstanceRef.current, title: bike.id,
          label: { text: bike.isMTB?"🏔️":`${bike.battery}%`, color: "#ffffff", fontSize: bike.isMTB?"14px":"10px", fontWeight: "bold" },
          icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: color, fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 }
        });
        markersRef.current.push({ marker, iw, bike });
        marker.addListener("click", () => {
          const distanceText = getDistText(bike, userPos);
          iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">📍 ${bike.zone||""}</span><br/>${bike.isMTB?'<span style="font-size:11px">🏔️ MTB Muscolare · Tocca per noleggiare</span>':'<span style="font-size:11px">⚡ '+bike.battery+'% · ~'+getRange(bike.battery)+'km</span>'}${distanceText?`<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>`:""}
          <br/><span style="font-size:11px;color:${bike.isMTB?"#FB8500":bike.status==='Disponibile'?"#219EBC":"#FB8500"}">● ${bike.isMTB?"Disponibile":bike.status}</span></div>`);
          iw.open(mapInstanceRef.current, marker); onBikeClick(bike);
        });
      }
    });
    // Rimuovi marker di bici non più presenti
    markersRef.current = markersRef.current.filter(({marker, bike}) => {
      if (!bikes.find(b => b.id === bike.id)) { marker.setMap(null); return false; }
      return true;
    });
  }, [bikes]);
  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit, 200); return; }
      const map = new window.google.maps.Map(mapRef.current, { center: window._userPosition || {lat:43.1500,lng:12.0800}, zoom: window._userPosition ? 14 : 11, mapTypeId: "roadmap", gestureHandling: "greedy", styles: [{ featureType:"water", elementType:"geometry", stylers:[{color:"#8ECAE6"}] },{ featureType:"landscape", elementType:"geometry", stylers:[{color:"#e8f4f8"}] },{ featureType:"road", elementType:"geometry", stylers:[{color:"#ffffff"}] },{ featureType:"poi", stylers:[{visibility:"off"}] }] });
      mapInstanceRef.current = map;
      window._mapInstance = map; // per bottone centrami
      bikes.forEach(bike => {
        const iw = new window.google.maps.InfoWindow({ content: "" });
        const marker = new window.google.maps.Marker({ position: { lat: bike.lat, lng: bike.lng }, map, title: bike.id, label: { text: bike.isMTB?"🏔️":`${bike.battery}%`, color: "#ffffff", fontSize: bike.isMTB?"14px":"10px", fontWeight: "bold" }, icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: 16, fillColor: bike.isMTB?"#FB8500":bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500", fillOpacity: 1, strokeColor: "#ffffff", strokeWeight: 2 } });
        markersRef.current.push({ marker, iw, bike });
        marker.addListener("click", () => { const distanceText = getDistText(bike, userPos); iw.setContent(`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">📍 ${bike.zone||""}</span><br/>${bike.isMTB?'<span style="font-size:11px">🏔️ MTB Muscolare</span>':'<span style="font-size:11px">⚡ '+bike.battery+'% · ~'+getRange(bike.battery)+'km</span>'}${distanceText ? `<br/><span style="font-size:11px;color:#219EBC">${distanceText}</span>` : ""}<br/><span style="font-size:11px;color:${bike.isMTB?'#FB8500':bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.isMTB?'Disponibile':bike.status}</span></div>`); iw.open(map, marker); onBikeClick(bike); });
      });
      zones.forEach(zone => {
        if (zone.shape === "circle" && zone.center) { 
          new window.google.maps.Circle({ map, center: zone.center, radius: zone.radius||200, fillColor: zone.color, fillOpacity: zone.type==="sosta"?0.25:0.15, strokeColor: zone.color, strokeWeight: zone.type==="sosta"?2.5:1.5 }); 
          const icons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" }; 
          if (zone.type !== "operativa" && icons[zone.type]) { 
            new window.google.maps.Marker({ 
              position: zone.center, map, 
              label: { text: icons[zone.type], fontSize: zone.type==="sosta"?"22px":"16px", fontWeight:"bold" }, 
              icon: { path: window.google.maps.SymbolPath.CIRCLE, scale: zone.type==="sosta"?18:0, fillColor:"#2196F3", fillOpacity: zone.type==="sosta"?0.9:0, strokeColor:"#ffffff", strokeWeight: zone.type==="sosta"?2:0 },
              title: zone.name||""
            }); 
          } 
        }
        else if (zone.path?.length > 0) { new window.google.maps.Polygon({ map, paths: zone.path, fillColor: zone.color, fillOpacity: 0.15, strokeColor: zone.color, strokeWeight: 1.5 }); }
      });
      tracks.forEach(track => {
        if (track.points?.length > 1) { 
          const path = track.points.map(p => ({lat: p.lat||p[0], lng: p.lng||p[1]})).filter(p=>p.lat&&p.lng);
          if (path.length > 1) {
            new window.google.maps.Polyline({ path, geodesic: true, strokeColor: track.color||"#219EBC", strokeOpacity: 0.85, strokeWeight: 4, map }); 
            new window.google.maps.Marker({ position: path[0], map, label:{text:"A",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#219EBC",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} }); 
            new window.google.maps.Marker({ position: path[path.length-1], map, label:{text:"B",color:"#fff",fontSize:"11px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#FB8500",fillOpacity:1,strokeColor:"#fff",strokeWeight:2} }); 
          }
        }
      });
    };
    tryInit();
  }, []);
  const style = fullscreen ? { position:"absolute", inset:0, width:"100%", height:"100%" } : { width:"100%", height, borderRadius:16 };
  return <div ref={mapRef} style={style} />;
}

function ZoneMapEditor({ zones, zoneType, drawingMode, drawingActive, zoneName, onZoneSaved, onZoneUpdated }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const drawingManagerRef = React.useRef(null);
  const shapesRef = React.useRef([]);
  const markersRef = React.useRef([]);
  const nameMarkersRef = React.useRef([]);
  const zonesRef = React.useRef(zones);
  const zoneColors = { operativa:"#00C853", sosta:"#2196F3", lenta:"#FFB703", fuori:"#FB8500" };
  const zoneIcons = { sosta:"🅿️", lenta:"🐢", fuori:"⛔" };
  const zoneTypeRef = React.useRef(zoneType);
  const zoneNameRef = React.useRef(zoneName);
  React.useEffect(()=>{ zoneTypeRef.current = zoneType; }, [zoneType]);
  React.useEffect(()=>{ zoneNameRef.current = zoneName; }, [zoneName]);

  const drawZones = (zoneList, map) => {
    shapesRef.current.forEach(s=>{ if(s) s.setMap(null); });
    markersRef.current.forEach(m=>{ if(m) m.setMap(null); });
    nameMarkersRef.current.forEach(m=>{ if(m) m.setMap(null); });
    shapesRef.current = []; markersRef.current = []; nameMarkersRef.current = [];
    const mapTarget = map || mapInstanceRef.current;
    if (!mapTarget || !window.google) return;
    zoneList.forEach((zone, idx) => {
      let shape = null, center = null;
      if (zone.shape==="circle" && zone.center) {
        shape = new window.google.maps.Circle({ map:mapTarget, center:zone.center, radius:zone.radius||200, fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2, draggable:true, editable:true });
        center = {lat:zone.center.lat, lng:zone.center.lng};
        shape.addListener("center_changed", ()=>{
          isEditingRef.current = true;
          const nc = shape.getCenter();
          zonesRef.current = zonesRef.current.map((z,i)=>i===idx?{...z,center:{lat:nc.lat(),lng:nc.lng()}}:z);
          setTimeout(()=>{ isEditingRef.current = false; }, 500);
        });
        shape.addListener("radius_changed", ()=>{
          isEditingRef.current = true;
          zonesRef.current = zonesRef.current.map((z,i)=>i===idx?{...z,radius:shape.getRadius()}:z);
          setTimeout(()=>{ isEditingRef.current = false; }, 500);
        });
      } else if (zone.path && zone.path.length>0) {
        shape = new window.google.maps.Polygon({ map:mapTarget, paths:zone.path, fillColor:zone.color, fillOpacity:0.2, strokeColor:zone.color, strokeWeight:2, draggable:true, editable:true });
        const bounds = new window.google.maps.LatLngBounds();
        zone.path.forEach(p=>bounds.extend(p));
        const c = bounds.getCenter();
        center = {lat:c.lat(), lng:c.lng()};
        shape.getPath().addListener("set_at", ()=>{
          isEditingRef.current = true;
          const newPath = shape.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()}));
          zonesRef.current = zonesRef.current.map((z,i)=>i===idx?{...z,path:newPath}:z);
          setTimeout(()=>{ isEditingRef.current = false; }, 500);
        });
      }
      if (shape) shapesRef.current[idx] = shape;
      if (center) {
        if (zone.type !== "operativa" && zoneIcons[zone.type]) {
          markersRef.current[idx] = new window.google.maps.Marker({ position:center, map:mapTarget, label:{text:zoneIcons[zone.type],fontSize:"20px",fontWeight:"bold"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0}, zIndex:10, clickable:false });
        }
        if (zone.name) {
          nameMarkersRef.current[idx] = new window.google.maps.Marker({ position:center, map:mapTarget, label:{text:zone.name,color:"#023047",fontSize:"11px",fontWeight:"700",fontFamily:"'DM Sans',sans-serif"}, icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0}, zIndex:9, clickable:false });
        }
      }
    });
  };

  const isEditingRef = React.useRef(false);

  // Ridisegna solo quando cambia il numero di zone (non durante editing)
  React.useEffect(() => {
    if (!mapInstanceRef.current || !window.google) return;
    if (isEditingRef.current) return; // non ridisegnare durante edit
    if (zones.length !== zonesRef.current.length) {
      zonesRef.current = zones;
      drawZones(zones);
    }
  }, [zones.length]);

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google || !window.google.maps.drawing) { setTimeout(tryInit,200); return; }
      const map = new window.google.maps.Map(mapRef.current, {
        center:{lat:43.1500,lng:12.0800}, zoom:11, mapTypeId:"roadmap",
        gestureHandling:"cooperative",
        styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      mapInstanceRef.current = map;
      zonesRef.current = zones;
      const dm = new window.google.maps.drawing.DrawingManager({ drawingMode:null, drawingControl:false, circleOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false}, polygonOptions:{fillColor:"#219EBC",fillOpacity:0.2,strokeColor:"#219EBC",strokeWeight:2,editable:false} });
      dm.setMap(map);
      drawingManagerRef.current = dm;
      window.google.maps.event.addListener(dm,"circlecomplete",circle=>{
        dm.setDrawingMode(null);
        const zt=zoneTypeRef.current; const zn=zoneNameRef.current; const color=zoneColors[zt]||"#219EBC";
        circle.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2});
        onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"circle",color,center:{lat:circle.getCenter().lat(),lng:circle.getCenter().lng()},radius:circle.getRadius()});
        circle.setMap(null);
      });
      window.google.maps.event.addListener(dm,"polygoncomplete",polygon=>{
        dm.setDrawingMode(null);
        const zt=zoneTypeRef.current; const zn=zoneNameRef.current; const color=zoneColors[zt]||"#219EBC";
        polygon.setOptions({fillColor:color,strokeColor:color,fillOpacity:0.2});
        const path=polygon.getPath().getArray().map(p=>({lat:p.lat(),lng:p.lng()}));
        onZoneSaved({name:zn||"Nuova zona",type:zt,shape:"polygon",color,path});
        polygon.setMap(null);
      });
      drawZones(zones, map);
      // Esponi il ref delle zone per il salvataggio
      window._zoneEditorRef = zonesRef;
    };
    tryInit();
  }, []);

  React.useEffect(() => {
    const activate = () => {
      if (!drawingManagerRef.current || !window.google || !window.google.maps.drawing) { if (drawingActive) setTimeout(activate,300); return; }
      drawingManagerRef.current.setDrawingMode(drawingActive?(drawingMode==="circle"?window.google.maps.drawing.OverlayType.CIRCLE:window.google.maps.drawing.OverlayType.POLYGON):null);
      if (mapInstanceRef.current) mapInstanceRef.current.setOptions({gestureHandling:drawingActive?"none":"cooperative"});
    };
    activate();
  }, [drawingActive, drawingMode]);

  return <div ref={mapRef} style={{width:"100%",height:"100%"}}/>;
}
function PaymentForm({ amount, bike, plan, user, onSuccess, onCancel, t, hidePreAuth=false }) {

  const [error, setError] = React.useState(null);
  const nBikes = Array.isArray(bike) ? bike.length : 1;
  const preAuth = nBikes * 10;

  const handlePay = async () => {
    setLoading(true); setError(null);
    try {
      const bikeIds = Array.isArray(bike) ? bike.map(b=>b.id) : [bike.id];
      const planKey = plan && (plan.includes('min')||plan.includes('Min')||plan.includes('minute')||plan.includes('minuto')) ? 'minuti' : plan && (plan.includes('ett')||plan.includes('eek')||plan.includes('oche')) ? 'settimana' : 'giornata';
      const res = await fetch('https://web-production-eafa5.up.railway.app/create-checkout', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          amount,
          planLabel: plan,
          bikeIds,
          plan: planKey,
          userId: user?.uid || '',
          userName: `${user?.nome||''} ${user?.cognome||''}`.trim(),
          userEmail: user?.email || '',
        })
      });
      const data = await res.json();
      if (data.error) { setError(data.error); setLoading(false); return; }
      // Salva dati corsa in sessionStorage per recuperarli al ritorno da Stripe
      sessionStorage.setItem('pendingCheckout', JSON.stringify({
        sessionId: data.sessionId,
        bikeIds, plan: planKey, amount,
      }));
      window.location.href = data.url;
    } catch(e) { setError(t('errPayment')); setLoading(false); }

        <span style={{fontSize:28}}>🔒</span>

// ─── Helper zona parcheggio ────────────────────────────────────────────────
function haversineDist(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function getParkingStatus(userPos) {
  const zones = (window._clientZones && window._clientZones.length > 0) ? window._clientZones : DEFAULT_ZONES;
  const sostaZones = zones.filter(z => z.type === 'sosta' && z.center);
  if (!userPos || sostaZones.length === 0) return { inParking: null, nearest: null, dist: null };
  let nearest = null, minDist = Infinity;
  for (const z of sostaZones) {
    const d = haversineDist(userPos.lat, userPos.lng, z.center.lat, z.center.lng);
    if (d < minDist) { minDist = d; nearest = z; }
  }
  return { inParking: minDist <= (nearest.radius || 300), nearest, dist: Math.round(minDist) };
}

function RideTimer({ bike, plan, user, rideId, rideStartTime=0, onEnd, t, userPos }) {
  const computedStart = rideStartTime || Date.now();
  const [seconds, setSeconds] = React.useState(() => Math.floor((Date.now() - computedStart) / 1000));
  const [paused, setPaused] = React.useState(false);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const startTimeRef = React.useRef(computedStart);
  const pauseStartRef = React.useRef(null);
  const totalPausedRef = React.useRef(0);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const [autoPauseBanner, setAutoPauseBanner] = React.useState(false); // banner auto-pausa
  const trackRef = React.useRef([]);
  const isGiornata = plan==="giornata" || plan==="settimana"; // settimana = tariffa piatta
  const tariffaFissa = plan==="settimana" ? TARIFFA_SETTIMANALE : TARIFFA_GIORNATA;

  // ── Listener auto-pausa da server IoT ──────────────────────────────────────
  React.useEffect(() => {
    if (!rideId || !bike?.id) return;
    const pedId = 'PED' + bike.id.replace('PA-','').padStart(3,'0');
    const waitAndListen = async () => {
      await waitFB();
      const {doc, onSnapshot} = window.firebaseFunctions;
      const unsub = onSnapshot(doc(window.firebaseDb, 'bikes', pedId), async (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        if (data.autoPause === true && !paused) {
          console.log('⏸️ Auto-pausa ricevuta dal server IoT');
          // Attiva la pausa esattamente come handlePauseToggle
          pauseStartRef.current = Date.now();
          totalPausedRef.current = totalPausedRef.current || 0;
          setPaused(true);
          setAutoPauseBanner(true);
          // Nascondi il banner dopo 8 secondi
          setTimeout(() => setAutoPauseBanner(false), 8000);
        }
        // Se autoPause torna false (bici si rimette in moto) non facciamo nulla:
        // è l'utente che deve riprendere manualmente premendo il bottone
      });
      return unsub;
    };
    let unsub;
    waitAndListen().then(u => { unsub = u; });
    return () => { if (unsub) unsub(); };
  }, [rideId, bike?.id]); // non dipende da `paused` per evitare re-subscribe
  // ──────────────────────────────────────────────────────────────────────────
  React.useEffect(() => {
    const i = setInterval(() => {
      if (!paused) {
        const elapsed = Math.floor((Date.now() - startTimeRef.current - totalPausedRef.current) / 1000);
        setSeconds(elapsed);
      } else {
        if (pauseStartRef.current) {
          setPauseSeconds(Math.floor((Date.now() - pauseStartRef.current) / 1000));
        }
      }
    }, 500);
    return () => clearInterval(i);
  }, [paused]);

  const handlePauseToggle = async () => {
    if (!paused) {
      pauseStartRef.current = Date.now();
      try {
        await waitFB();
        const {collection, addDoc} = window.firebaseFunctions;
        // PA-027 → PED027 (togli PA- e aggiungi PED con padding 3 cifre)
        const pedId = 'PED' + bike.id.replace('PA-','').padStart(3,'0');
        console.log('⏸️ Pausa — invio lock a', pedId);
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'lock',status:'pending',createdAt:new Date().toISOString()});
      } catch(e){ console.error('Errore lock pausa:', e); }
    } else {
      totalPausedRef.current += Date.now() - pauseStartRef.current;
      pauseStartRef.current = null;
      try {
        await waitFB();
        const {collection, addDoc, doc, updateDoc} = window.firebaseFunctions;
        const pedId = 'PED' + bike.id.replace('PA-','').padStart(3,'0');
        console.log('▶️ Riprendi — invio unlock a', pedId);
        await addDoc(collection(window.firebaseDb,'bikes',pedId,'commands'),{type:'unlock',status:'pending',createdAt:new Date().toISOString()});
        // Reset autoPause su Firestore così il server non rimanda in pausa subito
        await updateDoc(doc(window.firebaseDb,'bikes',pedId),{autoPause:false});
      } catch(e){ console.error('Errore unlock ripresa:', e); }
    }
    setPaused(p => !p);
  };
  React.useEffect(() => {
    if (!navigator.geolocation||showEndFlow) return;
    const saveGPS = () => { navigator.geolocation.getCurrentPosition(async pos=>{ const point={lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()}; trackRef.current.push(point); if (rideId) { try { await waitFB(); const {doc,updateDoc}=window.firebaseFunctions; await updateDoc(doc(window.firebaseDb,"rides",rideId),{track:trackRef.current}); } catch(e){} } },()=>{},{enableHighAccuracy:true}); };
    saveGPS(); const i=setInterval(saveGPS,30000); return()=>clearInterval(i);
  },[showEndFlow]);
  const mins=Math.floor(seconds/60), secs=seconds%60, pauseMins=Math.floor(pauseSeconds/60);
  const rideCost=isGiornata?tariffaFissa:Math.min(SBLOCCO+(seconds/60)*TARIFFA_MIN, TARIFFA_GIORNATA);
  const pauseCost=isGiornata?0:(pauseSeconds/60)*TARIFFA_PAUSA;
  const totalCost=isGiornata?tariffaFissa:Math.min(rideCost+pauseCost, TARIFFA_GIORNATA);
  const cappedAtMax = !isGiornata && totalCost >= TARIFFA_GIORNATA;
  const handleParkPhoto=(e)=>{ 
    const file=e.target.files[0]; 
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=1200; let w=img.width, h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>{setParkPhoto(blob);setParkPreview(URL.createObjectURL(blob));},'image/jpeg',0.75);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const handleEndConfirm=async()=>{
    if(!parkPhoto){alert("📸");return;}
    // Controlla se la posizione attuale è in una zona sosta - OBBLIGATORIO
    const checkZone = () => new Promise(resolve => {
      if (!navigator.geolocation) { resolve({ok:true}); return; }
      // Carica zone fresche da Firebase
      const getZones = async () => {
        try {
          await waitFB();
          const {doc, getDoc} = window.firebaseFunctions;
          const snap = await getDoc(doc(window.firebaseDb,"config","zones"));
          return snap.exists() ? (snap.data().zones||[]) : (window._clientZones||[]);
        } catch(e) { return window._clientZones||[]; }
      };
      navigator.geolocation.getCurrentPosition(async pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const zones = await getZones();
        const sostaZones = zones.filter(z => z.type === "sosta");
        console.log(`🅿️ Zone sosta trovate: ${sostaZones.length}`, sostaZones.map(z=>z.name));
        console.log(`📍 Posizione utente: ${lat}, ${lng}`);
        if (sostaZones.length === 0) { resolve({ok:true}); return; }
        const operativaZone = zones.find(z => z.type === "operativa");
        const dist = (lat1,lng1,lat2,lng2) => {
          const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
          const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
          return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
        };
        if (operativaZone?.center) {
          const d = dist(lat,lng,operativaZone.center.lat,operativaZone.center.lng);
          console.log(`🗺️ Distanza da area operativa: ${Math.round(d)}m (max: ${operativaZone.radius||25000}m)`);
          if (d > (operativaZone.radius||25000)) {
            resolve({ok:false, msg:"🚫 Sei fuori dall'area operativa!\n\nRientra nell'area del Lago Trasimeno e parcheggia in una zona 🅿️."});
            return;
          }
        }
        // Raggio minimo 200m per compensare imprecisione GPS
        const inSosta = sostaZones.some(z => z.center && dist(lat,lng,z.center.lat,z.center.lng) <= Math.max(z.radius||300, 200));
        if (!inSosta) {
          resolve({ok:false, msg:"🚫 Non sei in una zona di parcheggio!\n\nPorta la bici vicino a uno dei punti 🅿️ sulla mappa.\n\nAssistenza: +39 349 524 0422"});
          return;
        }
        resolve({ok:true});
      }, () => resolve({ok:true}), {enableHighAccuracy:true, timeout:10000});
    });
    const zoneCheck = await checkZone();
    if (!zoneCheck.ok) {
      // Avvisa della penale ma lascia procedere — è l'utente che sceglie
      const proceed = window.confirm(
        "⚠️ Non sei in una zona di parcheggio autorizzata.\n\n" +
        "Ci riserviamo di addebitare €35 per parcheggio fuori zona.\n\n" +
        "Vuoi terminare comunque?"
      );
      if (!proceed) return;
      // Segna sulla corsa che è fuori zona — per eventuale addebito manuale
      if (rideId) {
        try {
          await waitFB();
          const {doc, updateDoc} = window.firebaseFunctions;
          await updateDoc(doc(window.firebaseDb, "rides", rideId), {
            parkingViolation: true,
            parkingViolationFee: 35,
            parkingViolationAt: new Date().toISOString()
          });
        } catch(e) { console.error("Errore flag violazione:", e); }
      }
    }
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc}=window.firebaseFunctions;
      const sRef=ref(window.firebaseStorage,`parcheggi/${bike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL=await getDownloadURL(sRef);
      if(rideId) await updateDoc(doc(window.firebaseDb,"rides",rideId),{status:"Completata",endTime:new Date().toISOString(),duration:seconds,pauseDuration:pauseSeconds,cost:totalCost,parkPhotoURL,track:trackRef.current});
    } catch(e){console.error(e);}
    setUploading(false);
    // Libera la bici subito — doppia sicurezza oltre a handleEndRide
    try {
      await waitFB();
      const {doc,setDoc}=window.firebaseFunctions;
      await setDoc(doc(window.firebaseDb,'bikesStatus',bike.id),
        {inUse:false,userId:null,updatedAt:new Date().toISOString()},{merge:true});
    } catch(e){ console.error('Errore liberazione bici:', e); }
    onEnd(seconds,totalCost,bike.id);
  };
  const rideMapRef = React.useRef(null);
  const rideMapInstance = React.useRef(null);
  const rideUserMarker = React.useRef(null);
  const rideZonesDrawn = React.useRef(false);
  // Stato zona parcheggio (aggiornato ogni volta che userPos cambia)
  const parkingStatus = React.useMemo(()=>getParkingStatus(userPos),[userPos]);
  const inParking = parkingStatus.inParking;
  const nearestParking = parkingStatus.nearest;
  const distToParking = parkingStatus.dist;
  // Marco/admin può sempre terminare ovunque
  const isOwner = user?.email && (user.email.includes('pedalagilla') || user.email.includes('marco'));

  // Inizializza mappa durante la corsa
  React.useEffect(()=>{
    if (!rideMapRef.current || rideMapInstance.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit, 300); return; }
      const map = new window.google.maps.Map(rideMapRef.current, {
        center: {lat:43.15, lng:12.08}, zoom:15,
        mapTypeId:"roadmap",
        disableDefaultUI: true,
        zoomControl: true,
        gestureHandling:"greedy",
        styles:[{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      rideMapInstance.current = map;
      // Disegna zone parcheggio — riprova ogni 300ms finché non sono disponibili
      const drawParkingZones = (attempt=0) => {
        const zones = (window._clientZones && window._clientZones.length > 0) 
          ? window._clientZones : DEFAULT_ZONES;
        if (zones.length === 0 && attempt < 5) { 
          setTimeout(()=>drawParkingZones(attempt+1), 300); 
          return; 
        }
        zones.filter(z=>z.type==="sosta"&&z.center).forEach(zone=>{
          new window.google.maps.Circle({
            map, center: zone.center,
            radius: Math.max(zone.radius||300, 200),
            fillColor:"#2196F3", fillOpacity:0.25,
            strokeColor:"#2196F3", strokeWeight:2.5, clickable:false
          });
          new window.google.maps.Marker({
            position: zone.center, map,
            label:{text:"🅿️", fontSize:"20px"},
            icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0},
            clickable:false, zIndex:10
          });
          if(zone.name) new window.google.maps.Marker({
            position: zone.center, map,
            label:{text:zone.name,color:"#023047",fontSize:"11px",fontWeight:"700",fontFamily:"'DM Sans',sans-serif"},
            icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:0,fillOpacity:0,strokeOpacity:0},
            clickable:false, zIndex:9
          });
        });
        rideZonesDrawn.current = true;
      };
      drawParkingZones();
    };
    tryInit();
  }, []);

  // Aggiorna posizione utente sulla mappa durante corsa
  React.useEffect(()=>{
    if (!userPos || !rideMapInstance.current || !window.google) return;
    if (rideUserMarker.current) {
      rideUserMarker.current.setPosition(userPos);
    } else {
      rideUserMarker.current = new window.google.maps.Marker({
        position: userPos, map: rideMapInstance.current,
        icon: {path:window.google.maps.SymbolPath.CIRCLE, scale:12, fillColor:"#219EBC", fillOpacity:1, strokeColor:"#ffffff", strokeWeight:3},
        title:"Sei qui", zIndex:999, clickable:false
      });
      rideMapInstance.current.setCenter(userPos);
      rideMapInstance.current.setZoom(16);
    }
  }, [userPos]);

  if(showEndFlow) return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
        <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{t('endRideTitle')}</h2>
      </div>
      <div style={{padding:20,flex:1}}>
        <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
          <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>{t('photoRequired')}</p>
          <p style={{color:"#888",fontSize:12,...ds,margin:0}}>{t('photoDesc')}</p>

              <p style={{color:"#997a00",fontSize:12,margin:"3px 0 0",...ds}}>Terminando qui ci riserviamo di addebitare €35</p>
              {nearestParking&&<p style={{color:"#b38600",fontSize:11,margin:"3px 0 0",...ds}}>🅿️ Più vicino: {nearestParking.name} · {distToParking}m</p>}
            </div>
          </div>
        )}
        {inParking===true&&(
          <div style={{background:`${C.blueGreen}15`,border:`1.5px solid ${C.blueGreen}`,borderRadius:14,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>✅</span>
            <p style={{color:C.blueGreen,fontSize:13,fontWeight:700,margin:0,...ds}}>Sei in zona parcheggio — puoi terminare</p>
          </div>
        )}
        {inParking===null&&(
          <div style={{background:"#f0f0f0",border:"1.5px solid #ccc",borderRadius:14,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:18}}>📡</span>
            <p style={{color:"#999",fontSize:12,margin:0,...ds}}>Rilevamento posizione...</p>
          </div>
        )}
        <button
          onClick={handleEndConfirm}
          disabled={!parkPhoto||uploading}
          style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
          {uploading?t('saving'):t('confirmEnd')}
        </button>
        <button onClick={()=>setShowEndFlow(false)} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>{t('backToRide')}</button>
      </div>
    </div>
  );
  return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      {/* HEADER COMPATTO */}
      <div style={{background:C.deepBlue,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <div style={{flex:1}}>
          <p style={{color:C.skyBlue,fontSize:9,margin:0,letterSpacing:2,...ds}}>{bike.id} · {paused?t('ridePause'):t('rideInProgress')}</p>
          <p style={{color:C.white,fontSize:28,fontWeight:700,margin:0,...ds,fontFamily:"monospace",lineHeight:1.1}}>
            {paused?`${String(pauseMins).padStart(2,"0")}:${String(pauseSeconds%60).padStart(2,"0")}`:
              `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`}
          </p>
        </div>
        <div style={{textAlign:"right"}}>
          <p style={{color:C.skyBlue,fontSize:9,margin:0,...ds}}>Totale</p>
          <p style={{color:C.sunYellow,fontSize:22,fontWeight:700,margin:0,...ds}}>€{totalCost.toFixed(2)}</p>
        </div>
        {paused&&<div style={{background:C.sunYellow,borderRadius:8,padding:"3px 10px"}}><p style={{color:C.deepBlue,fontSize:10,...ds,fontWeight:700,margin:0}}>PAUSA</p></div>}
        {autoPauseBanner&&(
          <div style={{position:"absolute",top:70,left:12,right:12,background:"rgba(2,48,71,0.95)",borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10,zIndex:10,boxShadow:"0 4px 16px rgba(0,0,0,0.3)"}}>
            <span style={{fontSize:20}}>⏸️</span>
            <div>
              <p style={{color:C.sunYellow,fontSize:12,fontWeight:700,margin:0,...ds}}>Bici in auto-pausa</p>
              <p style={{color:"rgba(255,255,255,0.7)",fontSize:11,margin:"2px 0 0",...ds}}>Ferma da 15 min — premi Riprendi quando sei pronto</p>
            </div>

      </div>

      {/* MAPPA */}
      <div style={{flex:1,position:"relative",minHeight:0}}>
        <div ref={rideMapRef} style={{width:"100%",height:"100%"}}/>
        <div style={{position:"absolute",top:8,left:8,background:"rgba(2,48,71,0.85)",borderRadius:10,padding:"4px 10px"}}>

      <div style={{padding:"12px 14px 20px",flexShrink:0,background:C.white,boxShadow:"0 -2px 12px rgba(2,48,71,0.08)"}}>

// MULTIRIDETIMER — più bici (NUOVO)
// ═══════════════════════════════════════════════════════
function MultiRideTimer({ bikes, plan, user, rideIds, onEnd, t }) {
  const [activeTab, setActiveTab] = React.useState(0);
  const [globalPaused, setGlobalPaused] = React.useState(false);
  const [seconds, setSeconds] = React.useState(0);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const [completedBikes, setCompletedBikes] = React.useState([]);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [endingBike, setEndingBike] = React.useState(null);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const trackRefs = React.useRef({});
  const isGiornata = plan === "giornata" || plan === "settimana";
  const tariffaFissa = plan==="settimana" ? TARIFFA_SETTIMANALE : TARIFFA_GIORNATA;

  React.useEffect(() => { bikes.forEach(b => { if (!trackRefs.current[b.id]) trackRefs.current[b.id] = []; }); }, []);
  React.useEffect(() => { if (globalPaused||showEndFlow) return; const i=setInterval(()=>setSeconds(s=>s+1),1000); return()=>clearInterval(i); },[globalPaused,showEndFlow]);
  React.useEffect(() => { if (!globalPaused||showEndFlow) return; const i=setInterval(()=>setPauseSeconds(s=>s+1),1000); return()=>clearInterval(i); },[globalPaused,showEndFlow]);
  React.useEffect(() => {
    if (!navigator.geolocation||showEndFlow) return;
    const saveGPS = () => {
      navigator.geolocation.getCurrentPosition(async pos => {
        const point = {lat:pos.coords.latitude,lng:pos.coords.longitude,t:Date.now()};
        const activeBikes = bikes.filter(b=>!completedBikes.includes(b.id));
        for (const bike of activeBikes) {
          trackRefs.current[bike.id] = trackRefs.current[bike.id]||[];
          trackRefs.current[bike.id].push(point);
          const rideEntry = rideIds.find(r=>r.bikeId===bike.id);
          if (rideEntry) { try { await waitFB(); const {doc,updateDoc}=window.firebaseFunctions; await updateDoc(doc(window.firebaseDb,"rides",rideEntry.rideId),{track:trackRefs.current[bike.id]}); } catch(e){} }
        }
      },()=>{},{enableHighAccuracy:true});
    };
    saveGPS(); const i=setInterval(saveGPS,30000); return()=>clearInterval(i);
  },[showEndFlow,completedBikes]);

  const mins=Math.floor(seconds/60), secs=seconds%60;
  const pauseMins=Math.floor(pauseSeconds/60);
  const costPerBike=isGiornata?tariffaFissa:Math.min(SBLOCCO+(seconds/60)*TARIFFA_MIN, TARIFFA_GIORNATA);
  const pauseCost=isGiornata?0:(pauseSeconds/60)*TARIFFA_PAUSA;
  const activeBikes=bikes.filter(b=>!completedBikes.includes(b.id));
  const totalCost=(isGiornata?tariffaFissa:Math.min(costPerBike+pauseCost, TARIFFA_GIORNATA))*activeBikes.length;

  const handleParkPhoto=(e)=>{ 
    const file=e.target.files[0]; 
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=1200; let w=img.width, h=img.height;
        if(w>MAX){h=Math.round(h*MAX/w);w=MAX;} if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        canvas.toBlob(blob=>{setParkPhoto(blob);setParkPreview(URL.createObjectURL(blob));},'image/jpeg',0.75);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  const startEndFlow=(bike)=>{ setEndingBike(bike);setShowEndFlow(true);setParkPhoto(null);setParkPreview(null); };

  const handleEndConfirm=async()=>{
    if(!parkPhoto){alert("📸");return;}
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc}=window.firebaseFunctions;
      const sRef=ref(window.firebaseStorage,`parcheggi/${endingBike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL=await getDownloadURL(sRef);
      const rideEntry=rideIds.find(r=>r.bikeId===endingBike.id);
      if(rideEntry) await updateDoc(doc(window.firebaseDb,"rides",rideEntry.rideId),{status:"Completata",endTime:new Date().toISOString(),duration:seconds,pauseDuration:pauseSeconds,cost:costPerBike+pauseCost,parkPhotoURL,track:trackRefs.current[endingBike.id]||[]});
    } catch(e){console.error(e);}
    setUploading(false);
    setShowEndFlow(false);
    const newCompleted=[...completedBikes,endingBike.id];
    setCompletedBikes(newCompleted);
    if(activeTab>=activeBikes.length-1) setActiveTab(Math.max(0,activeBikes.length-2));
    onEnd(seconds,costPerBike+pauseCost,endingBike.id);
    setEndingBike(null);
  };

  if(showEndFlow&&endingBike) return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
        <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{endingBike.id} · {endingBike.zone}</h2>
      </div>
      <div style={{padding:20,flex:1}}>
        <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
          <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>{t('photoRequired')}</p>
          <p style={{color:"#888",fontSize:12,...ds,margin:0}}>{t('photoDesc')}</p>
        </div>
        <div style={{border:`2px dashed ${parkPhoto?C.blueGreen:C.warmOrange}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer"}} onClick={()=>document.getElementById("parkInputMulti").click()}>
          {parkPreview?<div><img src={parkPreview} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover",marginBottom:8}}/><p style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:600,margin:0}}>{t('photoChange')}</p></div>
            :<div><div style={{fontSize:48,marginBottom:8}}>📸</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>{t('takePhoto')}</p></div>}
          <input id="parkInputMulti" type="file" accept="image/*" capture="environment" onChange={handleParkPhoto} style={{display:"none"}}/>
        </div>
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
          {[[t('ridePerMin'),`${mins}min ${secs}sec`],[t('pausePerMin'),`${pauseMins}min · ${isGiornata?t('free'):`€${pauseCost.toFixed(2)}`}`],[`💶 ${t('totalCost')}`,`€${(costPerBike+pauseCost).toFixed(2)}`]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
              <span style={{color:C.deepBlue,fontWeight:700,...ds}}>{v}</span>
            </div>
          ))}
        </div>
        <button onClick={handleEndConfirm} disabled={!parkPhoto||uploading} style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
          {uploading?t('saving'):t('confirmEnd')}
        </button>
        <button onClick={()=>setShowEndFlow(false)} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>{t('backToRide')}</button>
      </div>
    </div>
  );

  return(
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>{t('rideInProgress')} · {activeBikes.length} 🚲</p>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
          <p style={{color:C.white,fontSize:28,fontWeight:700,margin:0,...ds,fontFamily:"monospace"}}>{String(mins).padStart(2,"0")}:{String(secs).padStart(2,"0")}</p>
          <p style={{color:C.sunYellow,fontSize:24,fontWeight:700,margin:0,...ds}}>€{totalCost.toFixed(2)}</p>
        </div>
      </div>
      {activeBikes.length>1&&(
        <div style={{display:"flex",overflowX:"auto",background:C.white,borderBottom:`1px solid #eee`,padding:"0 8px"}}>
          {activeBikes.map((bike,i)=>(
            <button key={bike.id} onClick={()=>setActiveTab(i)} style={{padding:"10px 16px",border:"none",background:"none",borderBottom:`2px solid ${activeTab===i?C.warmOrange:"transparent"}`,color:activeTab===i?C.warmOrange:C.deepBlue,fontSize:13,...ds,fontWeight:activeTab===i?700:400,cursor:"pointer",whiteSpace:"nowrap"}}>
              {bike.id}
            </button>
          ))}
        </div>
      )}
      <div style={{flex:1,display:"flex",flexDirection:"column",padding:20,overflowY:"auto"}}>
        {activeBikes.length>0&&(()=>{
          const bike=activeBikes[Math.min(activeTab,activeBikes.length-1)];
          return(
            <div>
              <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:18,padding:20,marginBottom:16,textAlign:"center"}}>
                <p style={{color:C.skyBlue,fontSize:13,margin:"0 0 4px",...ds,fontWeight:600}}>{bike.id} · {bike.zone}</p>
                <p style={{color:"rgba(255,255,255,0.7)",fontSize:12,...ds,margin:0}}>{isGiornata?`€${TARIFFA_GIORNATA.toFixed(2)} giornata`:`€${SBLOCCO.toFixed(2)} sblocco + €${TARIFFA_MIN}/min`}</p>
              </div>
              {globalPaused&&(
                <div style={{background:C.sunYellow,borderRadius:12,padding:"8px 14px",textAlign:"center",marginBottom:12}}>
                  <p style={{color:C.deepBlue,fontSize:12,...ds,fontWeight:700,margin:0}}>⏸ Pausa · {pauseMins}min {pauseSeconds%60}sec · {isGiornata?t('free'):`€${pauseCost.toFixed(2)}`}</p>
                </div>
              )}
              <button onClick={()=>setGlobalPaused(p=>!p)} style={{width:"100%",background:globalPaused?C.blueGreen:C.sunYellow,border:"none",borderRadius:14,padding:14,color:C.deepBlue,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
                {globalPaused?t('resumeBtn'):t('pauseBtn')}
              </button>
              <button onClick={()=>startEndFlow(bike)} style={{width:"100%",background:C.warmOrange,border:"none",borderRadius:14,padding:14,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
                {t('endRide')} — {bike.id}
              </button>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

// MTB NOLEGGIO — bici muscolari
// ═══════════════════════════════════════════════════════
function MTBTab({ user, t }) {  const [showInstructions, setShowInstructions] = React.useState(false);
  const [mtbFeedback, setMtbFeedback] = React.useState(null);
  const [mtbFeedbackProblems, setMtbFeedbackProblems] = React.useState([]);
  const [mtbFeedbackNote, setMtbFeedbackNote] = React.useState("");
  const [mtbFeedbackSent, setMtbFeedbackSent] = React.useState(false);
  const [showMtbFeedback, setShowMtbFeedback] = React.useState(false);
  const MTB_PROBLEMI = ["🔒 Problema lucchetto","🚲 Ruota sgonfia","⛓️ Catena a terra","🦶 Pedale difficile","💺 Seggiolino danneggiato","🧹 Bici sporca","💰 Troppo costosa"];
  const [mtbBikes, setMtbBikes] = React.useState([]);
  const [selectedMTB, setSelectedMTB] = React.useState(null);
  const [tariffa, setTariffa] = React.useState(null);
  const [showPayment, setShowPayment] = React.useState(false);
  const [showCode, setShowCode] = React.useState(false);
  const [lockCode, setLockCode] = React.useState("");
  const [rentalId, setRentalId] = React.useState(null);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const [showQR, setShowQR] = React.useState(false);
  const qrIntervalRef = React.useRef(null);
  const [activeRental, setActiveRental] = React.useState(null);
  const trackRef = React.useRef([]);
  const [promoCode, setPromoCode] = React.useState("");
  const [promoApplied, setPromoApplied] = React.useState(null);
  const [promoError, setPromoError] = React.useState("");
  const [promoLoading, setPromoLoading] = React.useState(false);

  const isMTBFree = promoApplied && (promoApplied.type==="dipendente"||promoApplied.type==="famiglia");
  const mtbAmount = isMTBFree ? 0 : (tariffa==="adulto" ? TARIFFA_MTB_ADULTO : TARIFFA_MTB_BAMBINO);

  const applyMTBPromo = async () => {
    const code = promoCode.trim().toUpperCase();
    if (!code) return;
    setPromoLoading(true); setPromoError(""); setPromoApplied(null);
    try {
      await waitFB();
      const {doc, getDoc} = window.firebaseFunctions;
      const snap = await getDoc(doc(window.firebaseDb, "promoCodes", code));
      if (!snap.exists()) { setPromoError("Codice non valido"); setPromoLoading(false); return; }
      const data = snap.data();
      if (data.expiresAt && new Date(data.expiresAt) < new Date()) { setPromoError("Codice scaduto"); setPromoLoading(false); return; }
      if (!data.active) { setPromoError("Codice non valido"); setPromoLoading(false); return; }
      setPromoApplied({code, type:data.type});
    } catch(e) { setPromoError("Codice non valido"); }
    setPromoLoading(false);
  };

  // Carica MTB da Firebase
  React.useEffect(()=>{
    const load = async () => {
      try {
        await waitFB();
        const {collection, onSnapshot} = window.firebaseFunctions;
        onSnapshot(collection(window.firebaseDb, "mtbBikers"), snap => {
          console.log("🚲 MTB snap size:", snap.size, snap.docs.map(d=>d.id));
          setMtbBikes(snap.docs.map(d=>({id:d.id,...d.data()})));
        });
      } catch(e) {}
    };
    load();
  },[]);

  // Controlla noleggio attivo
  React.useEffect(()=>{
    const check = async () => {
      try {
        await waitFB();
        const {collection, getDocs} = window.firebaseFunctions;
        const snap = await getDocs(collection(window.firebaseDb, "mtbRentals"));

        if(!video||!canvas||!window.jsQR) return;
        canvas.width=video.videoWidth; canvas.height=video.videoHeight;
        const ctx=canvas.getContext("2d"); ctx.drawImage(video,0,0);
        const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=window.jsQR(imageData.data,imageData.width,imageData.height);
        if(code){
          try{
            const url=new URL(code.data);
            const mtbId=url.searchParams.get("mtb");
            if(mtbId){
              clearInterval(qrIntervalRef.current);
              stream.getTracks().forEach(t=>t.stop());
