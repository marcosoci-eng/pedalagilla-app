// ── MAPPA ─────────────────────────────────────────────
function MapView({ bikes, onBikeClick, height=300, fullscreen=false, tracks=[] }) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);

  React.useEffect(() => {
    if (!mapRef.current || mapInstanceRef.current) return;
    const tryInit = () => {
      if (!window.google) { setTimeout(tryInit,200); return; }
      const map = new window.google.maps.Map(mapRef.current, {
        center:{lat:43.1500,lng:12.0800}, zoom:11, mapTypeId:"roadmap",
        disableDefaultUI:false, zoomControl:true,
        styles:[{featureType:"water",elementType:"geometry",stylers:[{color:"#8ECAE6"}]},{featureType:"landscape",elementType:"geometry",stylers:[{color:"#e8f4f8"}]},{featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},{featureType:"poi",stylers:[{visibility:"off"}]}]
      });
      mapInstanceRef.current = map;
      bikes.forEach(bike => {
        const marker = new window.google.maps.Marker({
          position:{lat:bike.lat,lng:bike.lng}, map, title:bike.id,
          label:{text:`${bike.battery}%`,color:"#ffffff",fontSize:"10px",fontWeight:"bold"},
          icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:16,fillColor:bike.battery>=80?"#219EBC":bike.battery>=50?"#FFB703":"#FB8500",fillOpacity:1,strokeColor:"#ffffff",strokeWeight:2}
        });
        const iw = new window.google.maps.InfoWindow({content:`<div style="font-family:'DM Sans',sans-serif;padding:8px;min-width:140px"><b style="color:#023047;font-size:14px">${bike.id}</b><br/><span style="color:#666;font-size:11px">📍 ${bike.zone}</span><br/><span style="font-size:11px">⚡ ${bike.battery}% · ~${getRange(bike.battery)}km</span><br/><span style="font-size:11px;color:${bike.status==='Disponibile'?'#219EBC':'#FB8500'}">● ${bike.status}</span></div>`});
        marker.addListener("click",()=>{ iw.open(map,marker); onBikeClick(bike); });
      });
      tracks.forEach(track => {
        if (track.points && track.points.length > 1) {
          new window.google.maps.Polyline({
            path:track.points, geodesic:true,
            strokeColor:track.color||"#219EBC", strokeOpacity:0.8, strokeWeight:4, map
          });
          // Marker inizio e fine
          new window.google.maps.Marker({
            position:track.points[0], map,
            label:{text:"A",color:"#fff",fontSize:"11px",fontWeight:"bold"},
            icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#219EBC",fillOpacity:1,strokeColor:"#fff",strokeWeight:2}
          });
          new window.google.maps.Marker({
            position:track.points[track.points.length-1], map,
            label:{text:"B",color:"#fff",fontSize:"11px",fontWeight:"bold"},
            icon:{path:window.google.maps.SymbolPath.CIRCLE,scale:12,fillColor:"#FB8500",fillOpacity:1,strokeColor:"#fff",strokeWeight:2}
          });
        }
      });
    };
    if (!document.querySelector('script[src*="maps.googleapis"]')) {
      const s = document.createElement("script");
      s.src=`https://maps.googleapis.com/maps/api/js?key=AIzaSyBfgaG8lGRp7P8XGI-powaYfKufeLPebx8`;
      s.async=true; s.onload=tryInit; document.head.appendChild(s);
    } else tryInit();
  }, []);

  const style = fullscreen
    ? {position:"absolute",inset:0,width:"100%",height:"100%"}
    : {width:"100%",height,borderRadius:16};
  return <div ref={mapRef} style={style} />;
}

// ── PAGAMENTO ─────────────────────────────────────────
function PaymentForm({ amount, bike, plan, onSuccess, onCancel }) {
  const cardRef = React.useRef(null);
  const cardEl = React.useRef(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [nome, setNome] = React.useState("");
  React.useEffect(() => {
    if (!cardRef.current || cardEl.current) return;
    const card = stripeElements.create("card",{style:{base:{fontSize:"16px",color:"#023047",fontFamily:"'DM Sans',sans-serif","::placeholder":{color:"#aaa"}}},hidePostalCode:true});
    card.mount(cardRef.current); cardEl.current = card;
  }, []);
  const handlePay = async () => {
    if (!nome.trim()) { setError("Inserisci il tuo nome"); return; }
    setLoading(true); setError(null);
    try {
      const {paymentMethod,error:e} = await stripeInstance.createPaymentMethod({type:"card",card:cardEl.current,billing_details:{name:nome}});
      if (e) { setError(e.message); setLoading(false); return; }
      setTimeout(()=>{ setLoading(false); onSuccess(paymentMethod.id); },1500);
    } catch(e) { setError("Errore. Riprova."); setLoading(false); }
  };
  return (
    <div style={{padding:"20px 18px"}}>
      <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:16,padding:16,marginBottom:16,textAlign:"center"}}>
        <p style={{color:C.skyBlue,fontSize:11,margin:"0 0 4px",...ds,letterSpacing:2}}>TOTALE</p>
        <p style={{color:C.sunYellow,fontSize:36,fontWeight:700,margin:"0 0 4px",...ds}}>€{amount.toFixed(2)}</p>
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:12,margin:0,...ds}}>{bike.id} · {plan} · {bike.zone}</p>
      </div>
      <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:12,padding:10,marginBottom:14}}>
        <p style={{color:C.blueGreen,fontSize:11,fontWeight:600,margin:0,...ds}}>🧪 Test: 4242 4242 4242 4242 · 12/28 · 123</p>
      </div>
      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>Nome</p>
      <input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Mario Rossi"
        style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}`,fontSize:14,fontFamily:"'DM Sans'",color:C.deepBlue,marginBottom:12,background:C.white}} />
      <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>Carta</p>
      <div ref={cardRef} style={{background:C.white,padding:14,borderRadius:10,border:`1.5px solid ${C.skyBlue}`,marginBottom:12}} />
      {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 10px",...ds}}>⚠️ {error}</p>}
      <button onClick={handlePay} disabled={loading}
        style={{width:"100%",background:loading?`${C.blueGreen}80`:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:8}}>
        {loading?"⏳ Elaborazione...":`💳 Paga €${amount.toFixed(2)}`}
      </button>
      <button onClick={onCancel} style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>Annulla</button>
    </div>
  );
}

// ── AUTH ──────────────────────────────────────────────
function AuthScreen({ onLogin }) {
  const [mode, setMode] = React.useState("login");
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");
  const [nome, setNome] = React.useState("");
  const [cognome, setCognome] = React.useState("");
  const [telefono, setTelefono] = React.useState("");
  const [docFile, setDocFile] = React.useState(null);
  const [docPreview, setDocPreview] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState(null);
  const [adminUser, setAdminUser] = React.useState("");
  const [adminPass, setAdminPass] = React.useState("");

  const handleDocChange = (e) => {
    const file = e.target.files[0];
    if (file) { setDocFile(file); const r=new FileReader(); r.onload=ev=>setDocPreview(ev.target.result); r.readAsDataURL(file); }
  };
  const handleAdminLogin = () => {
    if (adminUser==="marco" && adminPass==="pedalagilla2026") onLogin({type:"admin",nome:"Marco",email:"marco@pedalagilla.it"});
    else setError("Credenziali errate");
  };
  const handleLogin = async () => {
    if (!email||!password) { setError("Inserisci email e password"); return; }
    setLoading(true); setError(null);
    try {
      await waitFB();
      const {signInWithEmailAndPassword,doc,getDoc} = window.firebaseFunctions;
      const cred = await signInWithEmailAndPassword(window.firebaseAuth,email,password);
      const snap = await getDoc(doc(window.firebaseDb,"users",cred.user.uid));
      onLogin({type:"cliente",...snap.data(),uid:cred.user.uid});
    } catch(e) { setError("Email o password errati"); }
    setLoading(false);
  };
  const handleRegister = async () => {
    if (!nome.trim()) { setError("Il nome è obbligatorio"); return; }
    if (!cognome.trim()) { setError("Il cognome è obbligatorio"); return; }
    if (!email||!password||!telefono) { setError("Compila tutti i campi"); return; }
    if (!docFile) { setError("La foto del documento è obbligatoria"); return; }
    if (password.length<6) { setError("Password minimo 6 caratteri"); return; }
    setLoading(true); setError(null);
    try {
      await waitFB();
      const {createUserWithEmailAndPassword,doc,setDoc,ref,uploadBytes,getDownloadURL} = window.firebaseFunctions;
      const cred = await createUserWithEmailAndPassword(window.firebaseAuth,email,password);
      const sRef = ref(window.firebaseStorage,`documenti/${cred.user.uid}`);
      await uploadBytes(sRef,docFile);
      const docURL = await getDownloadURL(sRef);
      await setDoc(doc(window.firebaseDb,"users",cred.user.uid),{nome,cognome,email,telefono,docURL,type:"cliente",createdAt:new Date().toISOString()});
      onLogin({type:"cliente",nome,cognome,email,telefono,docURL,uid:cred.user.uid});
    } catch(e) { setError(e.code==="auth/email-already-in-use"?"Email già registrata":"Errore: "+e.message); }
    setLoading(false);
  };
  const inp = {width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${C.skyBlue}50`,fontSize:14,fontFamily:"'DM Sans'",color:C.deepBlue,background:C.white,marginBottom:10};

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${C.deepBlue} 0%,#034a6e 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:390,background:C.bgLight,borderRadius:40,border:`6px solid ${C.deepBlue}`,overflow:"hidden",boxShadow:`0 40px 80px rgba(2,48,71,0.5)`}}>
        <div style={{background:C.deepBlue,padding:"28px 24px 22px",textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:6}}>🚲</div>
          <h1 style={{color:C.white,fontSize:26,fontWeight:700,margin:0,fontFamily:"Lora"}}>PedalAgilla</h1>
          <p style={{color:C.skyBlue,fontSize:12,margin:"4px 0 0",...ds}}>E-BIKE SHARING · Lago Trasimeno</p>
        </div>
        <div style={{padding:"22px 20px",maxHeight:"75vh",overflowY:"auto"}}>
          {mode!=="adminLogin" && (
            <div style={{display:"flex",background:"#e8f4f8",borderRadius:12,padding:4,marginBottom:18}}>
              {[["login","Accedi"],["register","Registrati"]].map(([m,l])=>(
                <button key={m} onClick={()=>{setMode(m);setError(null);}}
                  style={{flex:1,background:mode===m?C.deepBlue:"transparent",border:"none",borderRadius:10,padding:10,color:mode===m?C.white:"#888",fontSize:13,...ds,fontWeight:600,cursor:"pointer"}}>{l}</button>
              ))}
            </div>
          )}
          {mode==="login" && <>
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>📧 Email</p>
            <input value={email} onChange={e=>setEmail(e.target.value)} type="email" placeholder="mario@example.com" style={inp} />
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>🔑 Password</p>
            <input value={password} onChange={e=>setPassword(e.target.value)} type="password" placeholder="••••••••" style={inp} />
            {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 10px",...ds}}>⚠️ {error}</p>}
            <button onClick={handleLogin} disabled={loading}
              style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
              {loading?"⏳ Accesso...":"Accedi 🚲"}
            </button>
            <button onClick={()=>{setMode("adminLogin");setError(null);}}
              style={{width:"100%",background:"none",border:`1px solid ${C.deepBlue}30`,borderRadius:14,padding:9,color:"#aaa",fontSize:12,...ds,cursor:"pointer"}}>
              🔐 Accesso amministratore
            </button>
          </>}
          {mode==="register" && <>
            {[["👤 Nome *",nome,setNome,"text","Mario"],["👤 Cognome *",cognome,setCognome,"text","Rossi"],["📧 Email *",email,setEmail,"email","mario@example.com"],["📱 Telefono *",telefono,setTelefono,"tel","+39 333 1234567"],["🔑 Password *",password,setPassword,"password","Minimo 6 caratteri"]].map(([label,val,setter,type,ph])=>(

            {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 10px",...ds}}>⚠️ {error}</p>}

              style={{width:"100%",background:`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
              {loading?"⏳ Registrazione...":"Crea account 🌊"}
            </button>
          </>}
          {mode==="adminLogin" && <>
            <button onClick={()=>{setMode("login");setError(null);}} style={{background:"none",border:"none",color:C.blueGreen,fontSize:14,cursor:"pointer",...ds,fontWeight:600,marginBottom:14}}>← Torna</button>
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>👤 Username</p>
            <input value={adminUser} onChange={e=>setAdminUser(e.target.value)} type="text" placeholder="marco" style={inp} />
            <p style={{color:C.deepBlue,fontSize:12,fontWeight:600,margin:"0 0 4px",...ds}}>🔑 Password</p>
            <input value={adminPass} onChange={e=>setAdminPass(e.target.value)} type="password" placeholder="••••••••" style={inp} />
            {error && <p style={{color:C.warmOrange,fontSize:12,margin:"0 0 10px",...ds}}>⚠️ {error}</p>}

              style={{width:"100%",background:`linear-gradient(90deg,${C.deepBlue},#034a6e)`,border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>

  const [seconds, setSeconds] = React.useState(0);
  const [paused, setPaused] = React.useState(false);
  const [pauseSeconds, setPauseSeconds] = React.useState(0);
  const [showEndFlow, setShowEndFlow] = React.useState(false);
  const [parkPhoto, setParkPhoto] = React.useState(null);
  const [parkPreview, setParkPreview] = React.useState(null);
  const [uploading, setUploading] = React.useState(false);
  const trackRef = React.useRef([]);
  const isGiornata = plan==="giornata";

  React.useEffect(() => {
    if (!paused && !showEndFlow) {
      const t = setInterval(()=>setSeconds(s=>s+1),1000);
      return ()=>clearInterval(t);
    }
  }, [paused, showEndFlow]);

  React.useEffect(() => {
    if (paused && !showEndFlow) {
      const t = setInterval(()=>setPauseSeconds(s=>s+1),1000);
      return ()=>clearInterval(t);
    }
  }, [paused, showEndFlow]);

  React.useEffect(() => {
    if (!navigator.geolocation || showEndFlow) return;
    const saveGPS = () => {
      navigator.geolocation.getCurrentPosition(async pos => {
        const point = {lat:pos.coords.latitude, lng:pos.coords.longitude, t:Date.now()};
        trackRef.current.push(point);
        if (rideId) {
          try {
            await waitFB();
            const {doc,updateDoc} = window.firebaseFunctions;
            await updateDoc(doc(window.firebaseDb,"rides",rideId),{track:trackRef.current});
          } catch(e) {}
        }
      }, ()=>{}, {enableHighAccuracy:true});
    };
    saveGPS();
    const t = setInterval(saveGPS,30000);
    return ()=>clearInterval(t);
  }, [showEndFlow]);

  const mins = Math.floor(seconds/60);
  const secs = seconds%60;
  const pauseMins = Math.floor(pauseSeconds/60);
  const rideCost = isGiornata ? TARIFFA_GIORNATA : SBLOCCO + (seconds/60)*TARIFFA_MIN;
  const pauseCost = isGiornata ? 0 : (pauseSeconds/60)*TARIFFA_PAUSA;
  const totalCost = rideCost + pauseCost;

  const handleParkPhoto = (e) => {
    const file = e.target.files[0];
    if (file) { setParkPhoto(file); const r=new FileReader(); r.onload=ev=>setParkPreview(ev.target.result); r.readAsDataURL(file); }
  };

  const handleEndConfirm = async () => {
    if (!parkPhoto) { alert("Scatta una foto al parcheggio!"); return; }
    setUploading(true);
    try {
      await waitFB();
      const {ref,uploadBytes,getDownloadURL,doc,updateDoc} = window.firebaseFunctions;
      const sRef = ref(window.firebaseStorage,`parcheggi/${bike.id}_${Date.now()}`);
      await uploadBytes(sRef,parkPhoto);
      const parkPhotoURL = await getDownloadURL(sRef);
      if (rideId) {
        await updateDoc(doc(window.firebaseDb,"rides",rideId),{
          status:"Completata", endTime:new Date().toISOString(),
          duration:seconds, pauseDuration:pauseSeconds,
          cost:totalCost, parkPhotoURL, track:trackRef.current
        });
      }
    } catch(e) { console.error(e); }
    setUploading(false);
    onEnd(seconds, totalCost);
  };

  if (showEndFlow) return (
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:400,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{background:C.deepBlue,padding:"14px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>TERMINA CORSA</p>
        <h2 style={{color:C.white,fontSize:18,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>Foto del parcheggio</h2>
      </div>
      <div style={{padding:20,flex:1}}>
        <div style={{background:`${C.blueGreen}10`,border:`1px solid ${C.blueGreen}30`,borderRadius:14,padding:14,marginBottom:16}}>
          <p style={{color:C.blueGreen,fontSize:13,fontWeight:600,margin:"0 0 4px",...ds}}>📸 Obbligatorio</p>
          <p style={{color:"#888",fontSize:12,...ds,margin:0}}>Scatta una foto alla bici parcheggiata</p>
        </div>
        <div style={{border:`2px dashed ${parkPhoto?C.blueGreen:C.warmOrange}`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16,cursor:"pointer"}}
          onClick={()=>document.getElementById("parkInput").click()}>
          {parkPreview
            ?<div><img src={parkPreview} style={{width:"100%",borderRadius:10,maxHeight:200,objectFit:"cover",marginBottom:8}}/><p style={{color:C.blueGreen,fontSize:13,...ds,fontWeight:600,margin:0}}>✅ Tocca per cambiare</p></div>
            :<div><div style={{fontSize:48,marginBottom:8}}>📸</div><p style={{color:C.warmOrange,fontSize:14,...ds,fontWeight:600,margin:0}}>Scatta foto parcheggio</p></div>}
          <input id="parkInput" type="file" accept="image/*" capture="environment" onChange={handleParkPhoto} style={{display:"none"}} />
        </div>
        <div style={{background:C.white,borderRadius:14,padding:14,marginBottom:16,boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
          {[["⏱️ Corsa",`${mins}min ${secs}sec`],["⏸️ Pausa",`${pauseMins}min · ${isGiornata?"Gratis":`€${pauseCost.toFixed(2)}`}`],["💶 Totale",`€${totalCost.toFixed(2)}`]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
              <span style={{color:"#888",fontSize:13,...ds}}>{k}</span>
              <span style={{color:C.deepBlue,fontWeight:700,...ds}}>{v}</span>
            </div>
          ))}
        </div>
        <button onClick={handleEndConfirm} disabled={!parkPhoto||uploading}
          style={{width:"100%",background:parkPhoto&&!uploading?`linear-gradient(90deg,${C.blueGreen},${C.deepBlue})`:"#ccc",border:"none",borderRadius:14,padding:15,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:parkPhoto?"pointer":"not-allowed",marginBottom:10}}>
          {uploading?"⏳ Salvataggio...":"✅ Conferma fine corsa"}
        </button>
        <button onClick={()=>setShowEndFlow(false)}
          style={{width:"100%",background:"none",border:`1.5px solid ${C.skyBlue}`,borderRadius:14,padding:11,color:C.deepBlue,fontSize:14,...ds,cursor:"pointer"}}>
          ← Torna alla corsa
        </button>
      </div>
    </div>
  );

  return (
    <div style={{position:"absolute",inset:0,background:C.bgLight,zIndex:300,display:"flex",flexDirection:"column"}}>
      <div style={{background:C.deepBlue,padding:"16px 22px"}}>
        <p style={{color:C.skyBlue,fontSize:10,margin:0,letterSpacing:2,...ds}}>CORSA IN CORSO</p>
        <h2 style={{color:C.white,fontSize:20,fontWeight:700,margin:"4px 0 0",fontFamily:"Lora"}}>{bike.id} · {bike.zone}</h2>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{background:`linear-gradient(135deg,${C.deepBlue},#034a6e)`,borderRadius:24,padding:28,textAlign:"center",marginBottom:20,width:"100%"}}>
          {paused&&<div style={{background:C.sunYellow,borderRadius:10,padding:"4px 14px",display:"inline-block",marginBottom:10}}>
            <p style={{color:C.deepBlue,fontSize:11,...ds,fontWeight:700,margin:0}}>⏸️ PAUSA — {isGiornata?"Gratis":`€${TARIFFA_PAUSA}/min`}</p>
          </div>}
          <p style={{color:C.skyBlue,fontSize:12,margin:"0 0 6px",...ds,letterSpacing:2}}>{paused?"PAUSA":"CORSA"}</p>
          <p style={{color:C.white,fontSize:48,fontWeight:700,margin:"0 0 12px",...ds,fontFamily:"monospace"}}>
            {paused?`${String(pauseMins).padStart(2,"0")}:${String(pauseSeconds%60).padStart(2,"0")}`:
              `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`}
          </p>
          <p style={{color:C.skyBlue,fontSize:12,margin:"0 0 4px",...ds}}>Costo totale</p>
          <p style={{color:C.sunYellow,fontSize:34,fontWeight:700,margin:0,...ds}}>€{totalCost.toFixed(2)}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,width:"100%",marginBottom:16}}>
          {[["🔓 Sblocco",`€${SBLOCCO.toFixed(2)}`],["⏱️ Corsa",`€${TARIFFA_MIN}/min`],["⏸️ Pausa",isGiornata?"Gratis":`€${TARIFFA_PAUSA}/min`],["📍 Zona",bike.zone]].map(([k,v])=>(
            <div key={k} style={{background:C.white,borderRadius:12,padding:"10px 14px",boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
              <p style={{color:"#aaa",fontSize:10,...ds,margin:"0 0 2px"}}>{k}</p>
              <p style={{color:C.deepBlue,fontSize:13,...ds,fontWeight:700,margin:0}}>{v}</p>
            </div>
          ))}
        </div>
        <button onClick={()=>setPaused(p=>!p)}
          style={{width:"100%",background:paused?C.blueGreen:C.sunYellow,border:"none",borderRadius:14,padding:14,color:C.deepBlue,fontSize:15,...ds,fontWeight:700,cursor:"pointer",marginBottom:10}}>
          {paused?"▶️ Riprendi":"⏸️ Pausa"}
        </button>
        <button onClick={()=>setShowEndFlow(true)}
          style={{width:"100%",background:C.warmOrange,border:"none",borderRadius:14,padding:14,color:C.white,fontSize:15,...ds,fontWeight:700,cursor:"pointer"}}>
          🏁 Termina corsa
        </button>
      </div>
    </div>
  );
}

  const handlePaySuccess = async () => {

        bikeId:selectedBike.id, userId:user.uid,
        userName:`${user.nome} ${user.cognome}`,

function AdminApp({ user, onLogout }) {

  const [filter, setFilter] = React.useState("Tutti");
  const [mapFilter, setMapFilter] = React.useState("Tutti");

  const [editChecks, setEditChecks] = React.useState({});
  const [showBikeDetail, setShowBikeDetail] = React.useState(false);
  const [incassiPeriod, setIncassiPeriod] = React.useState("oggi");
  const [fbUsers, setFbUsers] = React.useState([]);
  const [rides, setRides] = React.useState([]);
  const [loadingUsers, setLoadingUsers] = React.useState(false);
  const [selectedRide, setSelectedRide] = React.useState(null);
  const [showTrack, setShowTrack] = React.useState(false);

  const today = new Date().toLocaleDateString("it-IT");
  const todayRides = rides.filter(r=>r.date===today);
  const monthRides = rides;
  const todayIncassi = todayRides.filter(r=>r.status==="Completata").reduce((a,r)=>a+(r.cost||0),0);
  const monthIncassi = monthRides.filter(r=>r.status==="Completata").reduce((a,r)=>a+(r.cost||0),0);
  const available = bikes.filter(b=>b.status==="Disponibile").length;
  const maint = bikes.filter(b=>b.status==="Manutenzione").length;
  const low = bikes.filter(b=>b.battery<50).length;
  const avg = Math.round(bikes.reduce((a,b)=>a+b.battery,0)/bikes.length);

  const filteredBikes = filter==="Tutti"?bikes:filter==="Disponibile"?bikes.filter(b=>b.status==="Disponibile"):filter==="Manutenzione"?bikes.filter(b=>b.status==="Manutenzione"):bikes.filter(b=>b.battery<50);
  const mapBikes = mapFilter==="Tutti"?bikes:mapFilter==="Disponibile"?bikes.filter(b=>b.status==="Disponibile"):bikes.filter(b=>b.status==="Manutenzione");

  // Corse real-time da Firebase
  React.useEffect(() => {
    const load = async () => {
      await waitFB();
      const {collection,onSnapshot,query,orderBy} = window.firebaseFunctions;
      const q = collection(window.firebaseDb,"rides");
      onSnapshot(q, snap => {
        const data = snap.docs.map(d=>{
          const dd = d.data();
          return {
            id:d.id, ...dd,
            date: dd.startTime ? new Date(dd.startTime).toLocaleDateString("it-IT") : "",
            user: dd.userName||"—",
            bike: dd.bikeId||"—",
            zone: dd.zone||"—",
            cost: dd.cost||0,
            status: dd.status||"In corso",
            duration: dd.duration||0,
            parkPhotoURL: dd.parkPhotoURL||null,
            track: dd.track||[],
          };
        });
        setRides(data);
      });
    };
    load();
  }, []);

  const loadUsers = async () => {
    setLoadingUsers(true);
    try {
      await waitFB();
      const {collection,getDocs} = window.firebaseFunctions;
      const snap = await getDocs(collection(window.firebaseDb,"users"));
      setFbUsers(snap.docs.map(d=>({id:d.id,...d.data()})));
    } catch(e) { console.error(e); }
    setLoadingUsers(false);
  };

  React.useEffect(() => { if(tab==="utenti") loadUsers(); }, [tab]);

  const openBikeDetail = (bike) => { setSelBike(bike); setEditNote(bike.note||""); setEditChecks(bike.checks||{}); setShowBikeDetail(true); };
  const saveBike = () => { setBikes(prev=>prev.map(b=>b.id===selBike.id?{...b,note:editNote,checks:editChecks,lastMaint:new Date().toLocaleDateString("it-IT")}:b)); setShowBikeDetail(false); };
  const toggleStatus = (bikeId) => { setBikes(prev=>prev.map(b=>b.id===bikeId?{...b,status:b.status==="Disponibile"?"Manutenzione":"Disponibile"}:b)); };

  const forceEndRide = async (ride) => {
    if (!window.confirm(`Terminare la corsa di ${ride.user}?`)) return;
    try {
      await waitFB();
      const {doc,updateDoc} = window.firebaseFunctions;
      await updateDoc(doc(window.firebaseDb,"rides",ride.id),{
        status:"Terminata (Admin)", endTime:new Date().toISOString()
      });
    } catch(e) { alert("Errore: "+e.message); }
  };

  const exportExcel = () => {
    const data = fbUsers.map(u=>({
      "Nome":u.nome||"","Cognome":u.cognome||"","Email":u.email||"",
      "Telefono":u.telefono||"","Registrato il":u.createdAt?new Date(u.createdAt).toLocaleDateString("it-IT"):""
    }));
    if (!data.length) { alert("Nessun utente da esportare"); return; }
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,"Utenti",ws);
    XLSX.writeFile(wb,"utenti_pedalagilla.xlsx");

              {["Tutti","Disponibile","Manutenzione","Batteria Bassa"].map(f=>(
                <button key={f} className="btn" onClick={()=>setFilter(f)}
                  style={{background:filter===f?C.deepBlue:C.white,border:`1.5px solid ${filter===f?C.deepBlue:C.skyBlue+"50"}`,borderRadius:20,padding:"5px 14px",color:filter===f?C.white:C.deepBlue,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",...ds,fontWeight:500}}>
                  {f}
                </button>
              ))}
            </div>
            {filteredBikes.map(bike=>(
              <div key={bike.id} className="card" onClick={()=>openBikeDetail(bike)}
                style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${getStatusColor(bike.status)}`}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:44,height:44,borderRadius:22,background:`${getBattColor(bike.battery)}15`,border:`2px solid ${getBattColor(bike.battery)}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🚲</div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{bike.id}</span>
                      <span style={{color:getBattColor(bike.battery),fontSize:13,fontWeight:700,...ds}}>{bike.battery}% · ~{getRange(bike.battery)}km</span>
                    </div>
                    <div style={{height:4,background:"#eee",borderRadius:3,margin:"5px 0",overflow:"hidden"}}>
                      <div style={{width:`${bike.battery}%`,height:"100%",background:getBattColor(bike.battery),borderRadius:3}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between"}}>
                      <span style={{color:getStatusColor(bike.status),fontSize:11,...ds}}>● {bike.status}</span>
                      <span style={{color:"#bbb",fontSize:11,...ds}}>📍 {bike.zone} · {bike.lastMaint}</span>
                    </div>
                    {bike.note&&<p style={{color:"#aaa",fontSize:11,...ds,margin:"4px 0 0",fontStyle:"italic"}}>📝 {bike.note}</p>}
                  </div>
                  <span style={{color:C.blueGreen,fontSize:18}}>›</span>
                </div>
              </div>
            ))}
          </div>}

          {tab==="corse"&&<div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              {[["oggi","Oggi"],["mese","Mese"]].map(([v,l])=>(
                <button key={v} onClick={()=>setIncassiPeriod(v)}
                  style={{background:incassiPeriod===v?C.deepBlue:C.white,border:`1.5px solid ${incassiPeriod===v?C.deepBlue:C.skyBlue+"50"}`,borderRadius:20,padding:"6px 14px",color:incassiPeriod===v?C.white:C.deepBlue,fontSize:11,...ds,cursor:"pointer",fontWeight:500}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
              {[["💶",(incassiPeriod==="oggi"?todayIncassi:monthIncassi).toFixed(2)+"€","Incassi",C.sunYellow],
                ["🏁",(incassiPeriod==="oggi"?todayRides:monthRides).filter(r=>r.status==="Completata").length,"Completate",C.blueGreen],
                ["🚴",rides.filter(r=>r.status==="In corso").length,"In corso",C.warmOrange]].map(([icon,val,label,color])=>(
                <div key={label} style={{background:C.white,borderRadius:14,padding:"12px 10px",textAlign:"center",boxShadow:"0 2px 8px rgba(2,48,71,0.07)"}}>
                  <div style={{fontSize:18,marginBottom:4}}>{icon}</div>
                  <div style={{color,fontSize:18,fontWeight:700,...ds}}>{val}</div>
                  <div style={{color:"#aaa",fontSize:10,marginTop:2,...ds}}>{label}</div>
                </div>
              ))}
            </div>

            {rides.filter(r=>r.status==="In corso").length>0&&<>
              <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"0 0 8px",...ds,opacity:0.5}}>🔴 In corso</p>
              {rides.filter(r=>r.status==="In corso").map(ride=>(
                <div key={ride.id} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${C.warmOrange}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{ride.bike}</span>
                    <button onClick={()=>forceEndRide(ride)}
                      style={{background:C.warmOrange,border:"none",borderRadius:8,padding:"4px 10px",color:C.white,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                      🛑 Termina
                    </button>
                  </div>
                  <p style={{color:"#888",fontSize:12,...ds,margin:"0 0 2px"}}>👤 {ride.user} · 📍 {ride.zone}</p>
                  <p style={{color:"#aaa",fontSize:11,...ds,margin:"0 0 8px"}}>⏰ {ride.date} · {ride.plan}</p>
                  <button onClick={()=>{setSelectedRide(ride);setShowTrack(true);}}
                    style={{background:`${C.blueGreen}15`,border:`1px solid ${C.blueGreen}30`,borderRadius:8,padding:"5px 12px",color:C.blueGreen,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                    🗺️ Vedi percorso
                  </button>
                </div>
              ))}
            </>}

            <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:"12px 0 8px",...ds,opacity:0.5}}>Completate</p>
            {(incassiPeriod==="oggi"?todayRides:monthRides).filter(r=>r.status!=="In corso").map(ride=>(
              <div key={ride.id} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)",borderLeft:`3px solid ${C.skyBlue}`}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:C.deepBlue,fontWeight:700,fontSize:14,fontFamily:"Lora"}}>{ride.bike}</span>
                  <span style={{color:C.blueGreen,fontWeight:700,fontSize:13,...ds}}>€{(ride.cost||0).toFixed(2)}</span>
                </div>
                <p style={{color:"#888",fontSize:12,...ds,margin:"0 0 2px"}}>👤 {ride.user} · 📍 {ride.zone}</p>
                <p style={{color:"#aaa",fontSize:11,...ds,margin:"0 0 8px"}}>⏱️ {Math.floor((ride.duration||0)/60)}min · {ride.date}</p>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={()=>{setSelectedRide(ride);setShowTrack(true);}}
                    style={{background:`${C.blueGreen}15`,border:`1px solid ${C.blueGreen}30`,borderRadius:8,padding:"5px 12px",color:C.blueGreen,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                    🗺️ Percorso
                  </button>
                  {ride.parkPhotoURL&&(
                    <button onClick={()=>{setSelectedRide(ride);setShowTrack(true);}}
                      style={{background:`${C.sunYellow}15`,border:`1px solid ${C.sunYellow}40`,borderRadius:8,padding:"5px 12px",color:"#b38600",fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                      📸 Foto parcheggio
                    </button>
                  )}
                </div>
              </div>
            ))}
          </div>}

          {tab==="utenti"&&<div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <p style={{color:C.deepBlue,fontSize:11,letterSpacing:1.5,textTransform:"uppercase",margin:0,...ds,opacity:0.5}}>Utenti ({fbUsers.length})</p>
              <button onClick={exportExcel}
                style={{background:C.blueGreen,border:"none",borderRadius:10,padding:"7px 14px",color:C.white,fontSize:11,...ds,fontWeight:600,cursor:"pointer"}}>
                📊 Excel
              </button>
            </div>
            {loadingUsers&&<p style={{color:"#aaa",fontSize:13,...ds,textAlign:"center",padding:20}}>⏳ Caricamento...</p>}
            {!loadingUsers&&fbUsers.length===0&&<div style={{textAlign:"center",padding:30}}><div style={{fontSize:40,marginBottom:10}}>👥</div><p style={{color:"#aaa",fontSize:13,...ds}}>Nessun utente</p></div>}
            {fbUsers.map((u,i)=>(
              <div key={i} style={{background:C.white,borderRadius:14,padding:14,marginBottom:8,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                  <div style={{width:40,height:40,borderRadius:20,background:`${C.blueGreen}20`,border:`2px solid ${C.blueGreen}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👤</div>
                  <div style={{flex:1}}>
                    <p style={{color:C.deepBlue,fontWeight:700,fontSize:14,margin:0,fontFamily:"Lora"}}>{u.nome} {u.cognome}</p>
                    <p style={{color:"#aaa",fontSize:11,...ds,margin:"2px 0 0"}}>{u.createdAt?new Date(u.createdAt).toLocaleDateString("it-IT"):"—"}</p>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
                  <span style={{color:C.deepBlue,fontSize:12,...ds}}>📧 {u.email}</span>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
                  <span style={{color:C.deepBlue,fontSize:12,...ds}}>📱 {u.telefono||"—"}</span>
                </div>
                {u.docURL&&(
                  <div style={{marginTop:8}}>
                    <p style={{color:C.deepBlue,fontSize:11,fontWeight:600,margin:"0 0 4px",...ds}}>📄 Documento d'identità</p>
                    <img src={u.docURL} style={{width:"100%",borderRadius:10,maxHeight:120,objectFit:"cover",cursor:"pointer"}} onClick={()=>window.open(u.docURL,"_blank")} alt="Documento"/>
                  </div>
                )}
              </div>
            ))}
          </div>}

          {tab==="stats"&&<div className="slide" style={{padding:"16px 18px 0"}}>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>⚡ Batteria flotta</p>
              {[["≥80%",bikes.filter(b=>b.battery>=80).length,C.blueGreen],["50-79%",bikes.filter(b=>b.battery>=50&&b.battery<80).length,C.sunYellow],["<50%",bikes.filter(b=>b.battery<50).length,C.warmOrange]].map(([range,count,color])=>(
                <div key={range} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#888",fontSize:12,...ds}}>{range}</span>
                    <span style={{color,fontSize:12,...ds,fontWeight:700}}>{count} bici</span>
                  </div>
                  <div style={{height:8,background:"#eee",borderRadius:4,overflow:"hidden"}}>
                    <div style={{width:`${(count/bikes.length)*100}%`,height:"100%",background:color,borderRadius:4}}/>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:12,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>📍 Corse per zona</p>
              {["Passignano","Castiglione","Tuoro","Magione","Panicale"].map(zona=>{
                const count=rides.filter(r=>r.zone===zona).length;
                const total=rides.length||1;
                return <div key={zona} style={{marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{color:"#888",fontSize:12,...ds}}>{zona}</span>
                    <span style={{color:C.blueGreen,fontSize:12,...ds,fontWeight:700}}>{count} corse</span>
                  </div>
                  <div style={{height:6,background:"#eee",borderRadius:3,overflow:"hidden"}}>
                    <div style={{width:`${(count/total)*100}%`,height:"100%",background:C.blueGreen,borderRadius:3}}/>
                  </div>
                </div>;
              })}
            </div>
            <div style={{background:C.white,borderRadius:14,padding:16,marginBottom:18,boxShadow:"0 2px 10px rgba(2,48,71,0.07)"}}>
              <p style={{color:C.deepBlue,fontSize:14,fontWeight:600,margin:"0 0 12px",fontFamily:"Lora"}}>🛣️ Top km percorsi</p>
              {[...bikes].sort((a,b)=>b.odometer-a.odometer).slice(0,5).map((bike,i)=>(
                <div key={bike.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{color:i===0?C.sunYellow:"#ccc",fontSize:13,...ds,fontWeight:700}}>#{i+1}</span>
                    <span style={{color:C.deepBlue,fontSize:13,...ds}}>{bike.id} · {bike.zone}</span>
                  </div>
                  <span style={{color:C.blueGreen,fontSize:13,fontWeight:700,...ds}}>{bike.odometer.toFixed(0)} km</span>
                </div>
              ))}
            </div>
          </div>}

        </div>

        {/* BOTTOM NAV ADMIN */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(245,249,251,0.97)",borderTop:`1px solid ${C.skyBlue}50`,display:"flex",padding:"8px 0 16px",zIndex:20}}>
          {[["dashboard","⊞","Home"],["mappa","🗺️","Mappa"],["bici","🚲","Bici"],["corse","🏁","Corse"],["utenti","👥","Utenti"],["stats","📊","Stats"]].map(([id,icon,label])=>(
            <button key={id} className="btn" onClick={()=>setTab(id)}
              style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"4px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:18}}>{icon}</span>
              <span style={{color:tab===id?C.blueGreen:"#bbb",fontSize:9,...ds,fontWeight:tab===id?600:400}}>{label}</span>
              {tab===id&&<div style={{width:16,height:3,borderRadius:2,background:C.blueGreen}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Main() {
  const [user, setUser] = React.useState(null);
  const handleLogin = (u) => setUser(u);
  const handleLogout = () => {
    if (window.firebaseAuth) window.firebaseFunctions.signOut(window.firebaseAuth).catch(()=>{});
    setUser(null);
  };
  if (!user) return <AuthScreen onLogin={handleLogin}/>;
  if (user.type==="admin") return <AdminApp user={user} onLogout={handleLogout}/>;
  return <ClienteApp user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Main/>);
</script>
</body>
</html>
